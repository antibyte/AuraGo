services:
  aurago:
    # Pre-built image from GitHub Container Registry (recommended)
    # Updated automatically on every push to main via GitHub Actions.
    image: ghcr.io/antibyte/aurago:latest

    # --- Build from source (uncomment to build locally instead) ---
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: aurago

    # --- Port mapping ---
    # Change the host-side port (left) if 8088 is already in use on your machine.
    ports:
      - "8088:8088"

    # --- Docker Compose Secrets ---
    # The master key is mounted read-only into /run/secrets/aurago_master_key.
    # Create the file first:  openssl rand -hex 32 > aurago_master.key && chmod 600 aurago_master.key
    # If the file does not exist, the container auto-generates a key on first start
    # and saves it to data/.env (less secure but works out of the box).
    secrets:
      - aurago_master_key

    # --- Volumes ---
    volumes:
      # Optional: place your pre-filled config.yaml next to docker-compose.yml.
      # It will be copied into the container on first start.
      # IMPORTANT: The file must exist before running docker-compose up.
      #   Create it first:  touch ./config.yaml   (empty = use built-in defaults)
      # If this line is commented out, the container generates a default config.
      # Use the Web UI (http://localhost:8088) to edit settings afterwards.
      - ./config.yaml:/app/config.yaml.user

      # Persistent runtime data: memory, chat history, state, master key, vector DB.
      - aurago_data:/app/data

      # Python venv + generated tools.
      # Mount this as a named volume so installed pip packages survive restarts.
      - aurago_workdir:/app/agent_workspace/workdir

      # Optional: expose the agent's tool scripts on the host for inspection.
      # - ./agent_workspace/tools:/app/agent_workspace/tools

      # Optional: persist log files on the host for debugging.
      # - ./log:/app/log

      # Docker socket — required for Invasion Control "Docker (Lokal)" deployments.
      # This allows AuraGo to spawn egg containers on the host Docker daemon.
      # SECURITY NOTE: Mounting the Docker socket grants root-equivalent access
      # to the host. Only enable this if you trust AuraGo's agent completely.
      # Comment out the line below to disable local Docker egg deployments.
      - /var/run/docker.sock:/var/run/docker.sock

    # host.docker.internal resolves to the host machine from inside containers.
    # On Linux Docker Engine (non-Desktop) this is NOT injected automatically —
    # the extra_hosts entry below makes it available so egg containers can reach
    # the AuraGo master via WebSocket. Safe no-op on Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- Restart policy ---
    restart: unless-stopped

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # --- Resource limits (adjust to your hardware) ---
    # Without limits AuraGo may consume unlimited CPU/RAM, which can affect
    # host stability under heavy AI workloads.  Uncomment and tune to your machine.
    # Minimum recommended: 1 CPU / 512 MB RAM.
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 2G
    #     reservations:
    #       cpus: '0.5'
    #       memory: 512M

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # --- Ansible sidecar dependency (uncomment together with the ansible block below) ---
    # depends_on:
    #   - ansible

  # ============================================================================
  # Gotenberg Sidecar  — PDF creation, document conversion, screenshots
  # ============================================================================
  # Provides all Gotenberg operations for the document_creator tool.
  # Set tools.document_creator.backend="gotenberg" in config.yaml to use.
  #
  # URL config:
  #   • AuraGo running in Docker:    http://gotenberg:3000   (default, internal)
  #   • AuraGo running bare-metal:   http://localhost:3000   (change in config)
  # ============================================================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: aurago_gotenberg
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Chromium requires SYS_ADMIN for its sandbox inside Docker containers.
    # Without this, PDF rendering and screenshots will fail.
    cap_add:
      - SYS_ADMIN
    # Increase /dev/shm for Chromium's shared memory usage (prevents crashes).
    shm_size: '256m'
    # Expose on localhost only — not accessible from outside the host.
    # Needed when AuraGo runs as a bare-metal service (not in Docker).
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Ansible Sidecar  (OPTIONAL — uncomment the entire block to enable)
  # ============================================================================
  # Runs a lightweight Ansible API server reachable from AuraGo as
  # "http://ansible:5001".  Allows AuraGo to run playbooks, ad-hoc
  # commands and inventory queries without having Ansible installed in
  # the main container.
  #
  # Quick start:
  #   1. Uncomment this block AND the depends_on block above.
  #   2. Create ./ansible/playbooks/ and ./ansible/inventory/hosts on the host.
  #   3. Copy your SSH private key to ~/.ssh (already mounted read-only).
  #   4. Set ansible.enabled=true + ansible.token in config.yaml.
  # ============================================================================
  # ansible:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ansible
  #   container_name: ansible_sidecar
  #   environment:
  #     # !! Change this token and set the same value in config.yaml ansible.token !!
  #     - ANSIBLE_API_TOKEN=change_me_please
  #     # Optional overrides:
  #     # - PLAYBOOKS_DIR=/playbooks
  #     # - DEFAULT_INVENTORY=/inventory/hosts
  #     # - ANSIBLE_TIMEOUT=300
  #     # - ANSIBLE_HOST_KEY_CHECKING=False
  #   volumes:
  #     # Playbooks directory — put your .yml playbooks here:
  #     - ./ansible/playbooks:/playbooks
  #     # Inventory directory — put your hosts file here:
  #     - ./ansible/inventory:/inventory
  #     # SSH private key(s) for connecting to managed hosts:
  #     - ~/.ssh:/root/.ssh:ro
  #     # Optional: custom ansible.cfg
  #     # - ./ansible/ansible.cfg:/etc/ansible/ansible.cfg:ro
  #   restart: unless-stopped

  # ============================================================================
  # Docker Socket Proxy  (OPTIONAL — safer alternative to mounting the socket)
  # ============================================================================
  # Instead of mounting /var/run/docker.sock directly into the AuraGo container
  # (which grants root-equivalent host access), you can use a socket proxy that
  # only exposes the API subset AuraGo actually needs.
  #
  # To use:
  #   1. Uncomment the docker-proxy block below.
  #   2. Remove the docker.sock volume mount from the aurago service above.
  #   3. Add this environment variable to the aurago service:
  #        environment:
  #          - DOCKER_HOST=tcp://docker-proxy:2375
  # ============================================================================
  # docker-proxy:
  #   image: tecnativa/docker-socket-proxy
  #   container_name: aurago_docker_proxy
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock:ro
  #   environment:
  #     - CONTAINERS=1
  #     - IMAGES=1
  #     - NETWORKS=1
  #     - VOLUMES=0
  #     - POST=1          # allow start/stop/restart
  #     - BUILD=0
  #     - COMMIT=0
  #     - EXEC=0
  #     - SWARM=0

volumes:
  aurago_data:
  aurago_workdir:

# --- Secrets ---
# File-based Docker Compose secret (no Swarm required, Compose v2.2+).
# Create the file on the host before starting:
#   openssl rand -hex 32 > aurago_master.key && chmod 600 aurago_master.key
# If the file doesn't exist, set optional: true below and the container
# will auto-generate a key internally (saved to data/.env).
secrets:
  aurago_master_key:
    file: ./aurago_master.key
