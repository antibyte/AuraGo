services:
  aurago:
    # Pre-built image from GitHub Container Registry (recommended).
    #
    # Tag strategy:
    #   v1.2.3   — stable release (recommended for production)
    #   latest   — always points to the latest stable release
    #   main     — current main branch (may contain unreleased changes)
    #
    # For reproducible deployments, pin to a specific version tag:
    #   image: ghcr.io/antibyte/aurago:v1.2.3
    image: ghcr.io/antibyte/aurago:latest

    # --- Build from source (uncomment to build locally instead) ---
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: aurago

    # --- Port mapping ---
    # Change the host-side port (left) if 8088 is already in use on your machine.
    ports:
      - "8088:8088"

    # --- Docker Compose Secrets ---
    # The master key is mounted read-only into /run/secrets/aurago_master_key.
    # Create the file first:  openssl rand -hex 32 > aurago_master.key && chmod 600 aurago_master.key
    # Docker Compose requires the secret file to exist before startup.
    secrets:
      - aurago_master_key

    # --- Environment ---
    environment:
      # Connect to Docker via the docker-proxy service (recommended).
      # If you prefer direct socket access (less secure), see the alternative below.
      - DOCKER_HOST=tcp://docker-proxy:2375

    # --- Volumes ---
    volumes:
      # Optional: place your pre-filled config.yaml next to docker-compose.yml.
      # It will be copied into the container on first start.
      # IMPORTANT: The file must exist before running docker-compose up.
      #   Create it first:  touch ./config.yaml   (empty = use built-in defaults)
      # If this line is commented out, the container generates a default config.
      # Use the Web UI (http://localhost:8088) to edit settings afterwards.
      - ./config.yaml:/app/config.yaml.user

      # Persistent runtime data: memory, chat history, state, master key, vector DB.
      - aurago_data:/app/data

      # Python venv + generated tools.
      # Mount this as a named volume so installed pip packages survive restarts.
      - aurago_workdir:/app/agent_workspace/workdir

      # Optional: expose the agent's tool scripts on the host for inspection.
      # - ./agent_workspace/tools:/app/agent_workspace/tools

      # Optional: persist log files on the host for debugging.
      # - ./log:/app/log

      # Docker socket — required for Invasion Control "Docker (Lokal)" deployments.
      # This allows AuraGo to spawn egg containers on the host Docker daemon.
      #
      # SECURITY NOTE: Mounting the Docker socket grants root-equivalent access
      # to the host. The docker-proxy service below is enabled by default and
      # provides a safer alternative that only exposes the needed API subset.
      #
      # Only uncomment the line below if you explicitly need direct socket access
      # AND have disabled the docker-proxy service further below.
      # - /var/run/docker.sock:/var/run/docker.sock:ro

    # host.docker.internal resolves to the host machine from inside containers.
    # On Linux Docker Engine (non-Desktop) this is NOT injected automatically —
    # the extra_hosts entry below makes it available so egg containers can reach
    # the AuraGo master via WebSocket. Safe no-op on Docker Desktop.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- Restart policy ---
    restart: unless-stopped

    # --- Security hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # --- Resource limits (adjust to your hardware) ---
    # Without limits AuraGo may consume unlimited CPU/RAM, which can affect
    # host stability under heavy AI workloads. Tune to your machine.
    #
    # Note: These limits apply to the AuraGo container only.
    # Gotenberg and other sidecars have separate limits.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    depends_on:
      docker-proxy:
        condition: service_healthy

  # ============================================================================
  # Gotenberg Sidecar  — PDF creation, document conversion, screenshots
  # ============================================================================
  # Provides all Gotenberg operations for the document_creator tool.
  # Set tools.document_creator.backend="gotenberg" in config.yaml to use.
  #
  # URL config:
  #   • AuraGo running in Docker:    http://gotenberg:3000   (default, internal)
  #   • AuraGo running bare-metal:   http://localhost:3000   (change in config)
  #
  # SECURITY: Gotenberg is only accessible from AuraGo container (internal network).
  #           The localhost port binding is ONLY for bare-metal AuraGo installations.
  # ============================================================================
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: aurago_gotenberg
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Drop all capabilities and only add what Gotenberg needs for file ownership.
    cap_drop:
      - ALL
    cap_add:
      - CAP_CHOWN
      - CAP_FOWNER
    # Increase /dev/shm for Chromium's shared memory usage (prevents crashes).
    shm_size: '256m'
    # Resource limits: Gotenberg can consume significant RAM during PDF generation
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # Expose on localhost only — not accessible from outside the host.
    # Needed when AuraGo runs as a bare-metal service (not in Docker).
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      # Use wget (available in the image) instead of curl (not installed by default).
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Browser Automation Sidecar  (OPTIONAL — enable with profile "browser-automation")
  # ============================================================================
  # Provides a Playwright + Chromium browser for the browser_automation tool.
  #
  # Enable it with:
  #   docker compose --profile browser-automation up -d
  #
  # Config URL:
  #   • AuraGo running in Docker:    http://browser-automation:7331
  #   • AuraGo running bare-metal:   http://127.0.0.1:7331
  #
  # Notes:
  #   - The browser session workspace is shared with AuraGo via the aurago_workdir volume.
  #   - Downloads are stored under /app/agent_workspace/workdir/browser_downloads inside AuraGo.
  # ============================================================================
  browser-automation:
    profiles: ["browser-automation"]
    build:
      context: .
      dockerfile: Dockerfile.browser_automation
    image: aurago-browser-automation:latest
    container_name: browser-automation
    restart: unless-stopped
    environment:
      - PORT=7331
      - WORKSPACE_ROOT=/workspace
      - DOWNLOAD_ROOT=/workspace/browser_downloads
      - HEADLESS=true
      - ALLOW_FILE_UPLOADS=true
      - ALLOW_FILE_DOWNLOADS=true
      - READ_ONLY=false
      - SESSION_TTL_MINUTES=30
      - MAX_SESSIONS=3
      - VIEWPORT_WIDTH=1280
      - VIEWPORT_HEIGHT=720
    volumes:
      - aurago_workdir:/workspace
    ports:
      - "127.0.0.1:7331:7331"
    shm_size: '512m'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7331/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================================
  # Ansible Sidecar  (OPTIONAL — uncomment the entire block to enable)
  # ============================================================================
  # Runs a lightweight Ansible API server reachable from AuraGo as
  # "http://ansible:5001".  Allows AuraGo to run playbooks, ad-hoc
  # commands and inventory queries without having Ansible installed in
  # the main container.
  #
  # Quick start:
  #   1. Uncomment this block AND the depends_on block above.
  #   2. Create ./ansible/playbooks/ and ./ansible/inventory/hosts on the host.
  #   3. Mount specific SSH keys (see SECURITY NOTE below).
  #   4. Set ansible.enabled=true + ansible.token in config.yaml.
  #
  # SECURITY NOTE: Never mount your entire ~/.ssh directory. Instead:
  #   - Create a dedicated SSH key for Ansible: ssh-keygen -t ed25519 -f ~/.ssh/aurago_ansible
  #   - Mount only that key: - ~/.ssh/aurago_ansible:/home/ansibleuser/.ssh/id_ed25519:ro
  #   - Mount only that key's pub: - ~/.ssh/aurago_ansible.pub:/home/ansibleuser/.ssh/id_ed25519.pub:ro
  #   - Add public key to managed hosts' authorized_keys
  #   - Optionally mount known_hosts: - ./ansible/known_hosts:/home/ansibleuser/.ssh/known_hosts:ro
  # ============================================================================
  # ansible:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.ansible
  #   container_name: ansible_sidecar
  #   environment:
  #     # !! Change this token and set the same value in config.yaml ansible.token !!
  #     - ANSIBLE_API_TOKEN=change_me_please
  #     # Optional overrides:
  #     # - PLAYBOOKS_DIR=/playbooks
  #     # - DEFAULT_INVENTORY=/inventory/hosts
  #     # - ANSIBLE_TIMEOUT=300
  #     # - ANSIBLE_HOST_KEY_CHECKING=False
  #   volumes:
  #     # Playbooks directory — put your .yml playbooks here:
  #     - ./ansible/playbooks:/playbooks
  #     # Inventory directory — put your hosts file here:
  #     - ./ansible/inventory:/inventory
  #     # SSH private key — MOUNT SPECIFIC KEY, NOT ENTIRE ~/.ssh (see SECURITY NOTE above)
  #     # Example (recommended):
  #     - ~/.ssh/aurago_ansible:/home/ansibleuser/.ssh/id_ed25519:ro
  #     - ~/.ssh/aurago_ansible.pub:/home/ansibleuser/.ssh/id_ed25519.pub:ro
  #     # Optional: custom ansible.cfg
  #     # - ./ansible/ansible.cfg:/etc/ansible/ansible.cfg:ro
  #     # Optional: known_hosts for host key verification
  #     # - ./ansible/known_hosts:/home/ansibleuser/.ssh/known_hosts:ro
  #   restart: unless-stopped

  # ============================================================================
  # Docker Socket Proxy  (ACTIVE — safer alternative to mounting the socket)
  # ============================================================================
  # Instead of mounting /var/run/docker.sock directly into the AuraGo container
  # (which grants root-equivalent host access), this proxy only exposes the API
  # subset AuraGo actually needs. This is the default and recommended setup.
  #
  # SECURITY NOTES:
  #   - EXEC=1 is required for the DockerExec tool to run commands in containers
  #   - POST=1 allows starting/stopping containers (needed for Invasion Control)
  #   - Together these grant significant control — only use if you need these features
  #   - If you don't need container exec, set EXEC=0 for improved security
  #
  # To switch to direct socket access (NOT recommended):
  #   1. Uncomment the docker.sock volume mount in the aurago service above.
  #   2. Change DOCKER_HOST in aurago service to: unix:///var/run/docker.sock
  #   3. Comment out the docker-proxy service below and remove the depends_on.
  docker-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: aurago_docker_proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - POST=1          # allow start/stop/restart/create (needed for Invasion Control)
      - BUILD=0
      - COMMIT=0
      - EXEC=1          # needed for DockerExec tool — set to 0 if not used
      - SWARM=0
    healthcheck:
      # Enhanced healthcheck: verify both ping and container list API work
      test: ["CMD-SHELL", "wget -q --spider http://localhost:2375/_ping && wget -q --spider http://localhost:2375/containers/json?limit=1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  aurago_data:
  aurago_workdir:

# --- Secrets ---
# File-based Docker Compose secret (no Swarm required, Compose v2.2+).
# Create the file on the host before starting:
#   openssl rand -hex 32 > aurago_master.key && chmod 600 aurago_master.key
# Docker Compose validates this eagerly, so the file must exist before
# `docker compose up` or stack deployment.
secrets:
  aurago_master_key:
    file: ./aurago_master.key
