auth:
    enabled: false
    password_hash: ""
    session_secret: ""
    session_timeout_hours: 24
    totp_secret: ""
    totp_enabled: false
    max_login_attempts: 5
    lockout_minutes: 15
agent:
    context_window: 131000
    core_memory_cap_mode: soft
    core_memory_max_entries: 200
    core_personality: friend
    debug_mode: false
    enable_google_workspace: true
    max_tool_calls: 12
    memory_compression_char_limit: 50000
    personality_engine: true
    personality_engine_v2: true
    personality_v2_model: qwen/qwen-2.5-7b-instruct
    personality_v2_url: ""
    personality_v2_api_key: ""
    personality_v2_timeout_secs: 120
    show_tool_results: false
    step_delay_seconds: 0
    system_language: Deutsch
    system_prompt_token_budget: 12288
    workflow_feedback: true
    # Tool permissions (Danger Zone)
    sudo_enabled: false
    allow_shell: true
    allow_python: true
    allow_filesystem_write: true
    allow_network_requests: true
    allow_remote_shell: true
    allow_self_update: true
    allow_mcp: true
    allow_web_scraper: true
budget:
    daily_limit_usd: 1
    default_cost:
        input_per_million: 1
        output_per_million: 3
    enabled: false
    enforcement: warn
    models:
        - input_per_million: 0
          name: arcee-ai/trinity-large-preview:free
          output_per_million: 0
        - input_per_million: 0.075
          name: google/gemini-2.5-flash-lite-preview-09-2025
          output_per_million: 0.3
    reset_hour: 0
    warning_threshold: 0.8
chromecast:
    enabled: true
    tts_port: 8090
circuit_breaker:
    llm_timeout_seconds: 600
    maintenance_timeout_minutes: 10
    max_tool_calls: 20
    retry_intervals:
        - 10s
        - 2m
        - 10m
co_agents:
    circuit_breaker:
        max_tokens: 0
        max_tool_calls: 12
        timeout_seconds: 300
    enabled: true
    llm:
        api_key: ""
        base_url: ""
        model: stepfun/step-3.5-flash
        provider: openrouter
    max_concurrent: 3
directories:
    data_dir: ./data
    prompts_dir: ./prompts
    skills_dir: ./agent_workspace/skills
    tools_dir: ./agent_workspace/tools
    vectordb_dir: ./data/vectordb
    workspace_dir: ./agent_workspace/workdir
discord:
    allowed_user_id: ""
    bot_token: ""
    default_channel_id: ""
    enabled: false
    guild_id: ""
docker:
    enabled: false
    host: ""
email:
    enabled: false
    from_address: ""
    imap_host: ""
    imap_port: 993
    password: ""
    smtp_host: ""
    smtp_port: 587
    username: ""
    watch_enabled: false
    watch_folder: INBOX
    watch_interval_seconds: 120
embeddings:
    api_key: dummy_key
    external_model: nomic-embed-text
    external_url: http://localhost:11434/v1
    internal_model: qwen/qwen3-embedding-8b
    provider: internal
fallback_llm:
    api_key: ""
    base_url: https://openrouter.ai/api/v1
    enabled: false
    error_threshold: 2
    model: meta-llama/llama-3.1-8b-instruct:free
    probe_interval_seconds: 60
home_assistant:
    access_token: ""
    enabled: false
    url: http://localhost:8123
brave_search:
    api_key: ""
    country: ""
    lang: ""
koofr:
    app_password: ""
    base_url: https://app.koofr.net
    enabled: false
    username: ""
virustotal:
    api_key: ""
# LLM provider definitions. Each entry has a unique 'id' used to reference it
# from llm.provider, vision.provider, whisper.provider etc.
# Set your API keys here. They are never exposed to the agent.
providers:
    -   id: main
        type: openrouter
        name: "Haupt-LLM"
        base_url: https://openrouter.ai/api/v1
        api_key: ""
        model: arcee-ai/trinity-large-preview:free
    -   id: vision
        type: openrouter
        name: "Vision"
        base_url: https://openrouter.ai/api/v1
        api_key: ""
        model: google/gemini-2.5-flash-lite-preview-09-2025
    -   id: whisper
        type: openrouter
        name: "Whisper/STT"
        base_url: https://openrouter.ai/api/v1
        api_key: ""
        model: google/gemini-2.5-flash-lite-preview-09-2025
llm:
    # provider must match an 'id' from the providers list below
    provider: main
    use_native_functions: true
    temperature: 0.7
    structured_outputs: false
logging:
    enable_file_log: true
    log_dir: ./log
meshcentral:
    enabled: false
    readonly: false
    blocked_operations: []
    url: ""
    username: ""
    # password and login_token are stored in the secure vault, not here
maintenance:
    enabled: true
    lifeboat_enabled: true
    lifeboat_port: 8091
    time: "04:00"
server:
    host: 0.0.0.0
    port: 8088
    bridge_address: "localhost:8089"
    max_body_bytes: 10485760
sqlite:
    inventory_path: ./data/inventory.db
    invasion_path: ./data/invasion.db
    long_term_path: ./data/long_term.db
    short_term_path: ./data/short_term.db
telegram:
    bot_token: ""
    telegram_user_id: 0
    max_concurrent_workers: 5
tts:
    elevenlabs:
        api_key: ""
        model_id: eleven_multilingual_v2
        voice_id: ""
    language: de
    provider: google
vision:
    # provider must match an 'id' from the providers list below (omit to share main LLM)
    provider: vision
web_config:
    enabled: true
invasion_control:
    enabled: true
indexing:
    enabled: true
    directories:
        - ./knowledge
    poll_interval_seconds: 60
    extensions:
        - .txt
        - .md
        - .json
        - .csv
        - .log
        - .yaml
        - .yml
webdav:
    enabled: false
    password: ""
    url: ""
    username: ""
whisper:
    # provider must match an 'id' from the providers list below (omit to share main LLM)
    provider: whisper
mqtt:
    enabled: false
    broker: ""
    client_id: aurago
    username: ""
    topics: []
    qos: 0
    relay_to_agent: false
