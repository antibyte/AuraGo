name: Security Gates

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  js-security:
    name: JS audits and sidecar checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Audit root runtime dependencies
        run: npm audit --omit=dev --audit-level=moderate

      - name: Check root JS syntax
        run: |
          node --check scripts/build-codemirror.js
          node --check scripts/build-ui-bundles.js

      - name: Test UI delivery regressions
        run: npm run test:ui-regressions

      - name: Install browser sidecar dependencies
        working-directory: browser_automation_sidecar
        run: npm ci

      - name: Audit browser sidecar runtime dependencies
        working-directory: browser_automation_sidecar
        run: npm audit --omit=dev --audit-level=moderate

      - name: Check browser sidecar syntax
        run: node --check browser_automation_sidecar/server.js

      - name: Run browser sidecar auth tests
        run: node browser_automation_sidecar/test_auth.js

  go-security:
    name: Go tests and vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Run targeted race tests
        run: go test -race ./internal/llm ./internal/server ./internal/memory

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...
