name: Security Gates

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  go-security:
    name: Go tests and vulnerability scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

      - name: Run targeted race tests
        run: go test -race ./internal/llm ./internal/server ./internal/memory

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-package: ./...
