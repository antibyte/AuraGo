name: Build & Push Docker Image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  CODE_STUDIO_IMAGE_NAME: ${{ github.repository_owner }}/aurago-code-studio
  COMMANDCODE_IMAGE_NAME: ${{ github.repository_owner }}/aurago-commandcode
  SUPERTONIC_IMAGE_NAME: ${{ github.repository_owner }}/aurago-supertonic

jobs:
  build-and-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Build CodeMirror bundle
        run: |
          npm ci --no-audit --no-fund
          node scripts/build-codemirror.js

      # Docker registry requires all-lowercase image names.
      # github.repository may contain uppercase letters (e.g. antibyte/AuraGo).
      - name: Lowercase image name
        run: |
          echo "IMAGE_LC=${IMAGE_NAME,,}" >> "$GITHUB_ENV"
          echo "CODE_STUDIO_IMAGE_LC=${CODE_STUDIO_IMAGE_NAME,,}" >> "$GITHUB_ENV"
          echo "COMMANDCODE_IMAGE_LC=${COMMANDCODE_IMAGE_NAME,,}" >> "$GITHUB_ENV"
          echo "SUPERTONIC_IMAGE_LC=${SUPERTONIC_IMAGE_NAME,,}" >> "$GITHUB_ENV"

      # Needed for multi-platform (arm64) emulation
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Compute image tags:
      #   push a v* tag        → ghcr.io/antibyte/aurago:<exact-tag> + :latest + :sha-<short>
      # Date-based release tags such as v2026.04.23.3 are intentionally handled
      # as raw refs rather than semver because docker/metadata-action warns on
      # non-semver tag strings.
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_LC }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          # Cache layers in the registry to speed up subsequent builds
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_LC }}:buildcache,mode=max

      - name: Sign AuraGo image tags
        run: |
          while IFS= read -r image; do
            [ -n "$image" ] || continue
            cosign sign --yes "$image"
          done <<< "${{ steps.meta.outputs.tags }}"

      - name: Extract Code Studio metadata (tags, labels)
        id: code-studio-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.CODE_STUDIO_IMAGE_LC }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Code Studio image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.code-studio
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.code-studio-meta.outputs.tags }}
          labels: ${{ steps.code-studio-meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.CODE_STUDIO_IMAGE_LC }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.CODE_STUDIO_IMAGE_LC }}:buildcache,mode=max

      - name: Sign Code Studio image tags
        run: |
          while IFS= read -r image; do
            [ -n "$image" ] || continue
            cosign sign --yes "$image"
          done <<< "${{ steps.code-studio-meta.outputs.tags }}"

      - name: Extract CommandCode metadata (tags, labels)
        id: commandcode-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.COMMANDCODE_IMAGE_LC }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push CommandCode image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.commandcode
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.commandcode-meta.outputs.tags }}
          labels: ${{ steps.commandcode-meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.COMMANDCODE_IMAGE_LC }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.COMMANDCODE_IMAGE_LC }}:buildcache,mode=max

      - name: Sign CommandCode image tags
        run: |
          while IFS= read -r image; do
            [ -n "$image" ] || continue
            cosign sign --yes "$image"
          done <<< "${{ steps.commandcode-meta.outputs.tags }}"

      - name: Extract Supertonic metadata (tags, labels)
        id: supertonic-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.SUPERTONIC_IMAGE_LC }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push Supertonic image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile.supertonic
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.supertonic-meta.outputs.tags }}
          labels: ${{ steps.supertonic-meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.SUPERTONIC_IMAGE_LC }}:buildcache
          cache-to:   type=registry,ref=${{ env.REGISTRY }}/${{ env.SUPERTONIC_IMAGE_LC }}:buildcache,mode=max

      - name: Sign Supertonic image tags
        run: |
          while IFS= read -r image; do
            [ -n "$image" ] || continue
            cosign sign --yes "$image"
          done <<< "${{ steps.supertonic-meta.outputs.tags }}"
