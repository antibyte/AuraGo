<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">AuraGo Memory System Overview</title>
  <desc id="desc">Architecture overview of AuraGo's memory system showing capture, storage, consolidation, retrieval, and prompt injection flows.</desc>
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .panel { fill: #ffffff; stroke: #cfd7e6; stroke-width: 2; rx: 22; ry: 22; }
      .panel-soft { fill: #f9fbff; stroke: #d8e1f0; stroke-width: 2; rx: 18; ry: 18; }
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #183153; }
      .subtitle { font: 400 16px 'Segoe UI', Arial, sans-serif; fill: #4e617d; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #17304f; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #223b59; }
      .body { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #40536d; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #546983; }
      .chip { fill: #eaf1fb; stroke: #cad7ea; stroke-width: 1.5; rx: 12; ry: 12; }
      .chip-text { font: 600 13px 'Segoe UI', Arial, sans-serif; fill: #2e4767; }
      .runtime { fill: #eef6ff; stroke: #8ab0e8; }
      .sqlite { fill: #f4f8ff; stroke: #9cb6e8; }
      .analysis { fill: #fff8ef; stroke: #f0bc72; }
      .vector { fill: #f3fbf6; stroke: #79c298; }
      .graph { fill: #f6f2ff; stroke: #a18ddb; }
      .notes { fill: #fef4f6; stroke: #e0a0b0; }
      .accent-blue { fill: #377dd8; }
      .accent-green { fill: #2f9d62; }
      .accent-purple { fill: #7f67c2; }
      .accent-gold { fill: #d48a1f; }
      .accent-rose { fill: #cb6e88; }
      .arrow-blue { stroke: #377dd8; }
      .arrow-green { stroke: #2f9d62; }
      .arrow-purple { stroke: #7f67c2; }
      .arrow-gold { stroke: #d48a1f; }
      .arrow-rose { stroke: #cb6e88; }
      .arrow {
        fill: none;
        stroke-width: 3.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrowhead);
      }
      .arrow-thin {
        fill: none;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        marker-end: url(#arrowheadThin);
      }
      .divider { stroke: #dbe4f2; stroke-width: 1.5; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#496487"/>
    </marker>
    <marker id="arrowheadThin" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7f99"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080"/>

  <text class="title" x="56" y="64">AuraGo Memory System</text>
  <text class="subtitle" x="56" y="95">Capture, consolidation, semantic retrieval, and prompt injection across SQLite, vector memory, and the knowledge graph.</text>

  <rect class="panel runtime" x="52" y="128" width="1496" height="150"/>
  <text class="section" x="82" y="166">1. Agent Runtime and Prompt Assembly</text>
  <text class="body" x="82" y="194">The agent loop assembles the live system prompt from current messages, short-term state, retrieved memories, planner data, profile signals, emotion, and inner voice.</text>
  <rect class="chip" x="82" y="214" width="218" height="32"/>
  <text class="chip-text" x="98" y="235">agent_loop.go</text>
  <rect class="chip" x="318" y="214" width="214" height="32"/>
  <text class="chip-text" x="334" y="235">context_memory.go</text>
  <rect class="chip" x="550" y="214" width="184" height="32"/>
  <text class="chip-text" x="566" y="235">prompts/builder.go</text>
  <rect class="chip" x="752" y="214" width="212" height="32"/>
  <text class="chip-text" x="768" y="235">memory_retrieval_policy.go</text>
  <rect class="chip" x="982" y="214" width="172" height="32"/>
  <text class="chip-text" x="998" y="235">predictive_memory.go</text>
  <rect class="chip" x="1172" y="214" width="214" height="32"/>
  <text class="chip-text" x="1188" y="235">personality + inner voice</text>

  <rect class="panel" x="52" y="326" width="350" height="692"/>
  <text class="section" x="82" y="364">2. Capture Inputs</text>
  <text class="body" x="82" y="392">Raw interaction data enters through multiple paths before being distilled into memory layers.</text>

  <rect class="panel-soft notes" x="82" y="430" width="290" height="108"/>
  <text class="label" x="104" y="462">Conversation Stream</text>
  <text class="body" x="104" y="488">User messages</text>
  <text class="body" x="104" y="510">Assistant replies</text>
  <text class="body" x="104" y="532">Tool outputs and errors</text>

  <rect class="panel-soft notes" x="82" y="566" width="290" height="116"/>
  <text class="label" x="104" y="598">Explicit Memory Signals</text>
  <text class="body" x="104" y="624">remember / cheatsheet tools</text>
  <text class="body" x="104" y="646">notes, todos, appointments</text>
  <text class="body" x="104" y="668">core memory edits</text>

  <rect class="panel-soft notes" x="82" y="710" width="290" height="128"/>
  <text class="label" x="104" y="742">Background and Maintenance</text>
  <text class="body" x="104" y="768">predictive lookups</text>
  <text class="body" x="104" y="790">reflection and memory analysis</text>
  <text class="body" x="104" y="812">planner + contact sync into KG</text>

  <rect class="panel-soft notes" x="82" y="866" width="290" height="116"/>
  <text class="label" x="104" y="898">What the Agent Needs Back</text>
  <text class="body" x="104" y="924">Recent context and session state</text>
  <text class="body" x="104" y="946">Reusable procedures and facts</text>
  <text class="body" x="104" y="968">Entity relations and follow-ups</text>

  <rect class="panel sqlite" x="436" y="326" width="500" height="692"/>
  <text class="section" x="466" y="364">3. SQLite Memory Hub (Short-Term + Structured State)</text>
  <text class="body" x="466" y="392">SQLite is the operational backbone: it stores recent messages, structured activity, reminders, personality state, archival metadata, and retrieval telemetry.</text>

  <rect class="panel-soft sqlite" x="466" y="430" width="204" height="120"/>
  <text class="label" x="486" y="462">Session and Message State</text>
  <text class="body" x="486" y="488">messages</text>
  <text class="body" x="486" y="510">chat_sessions</text>
  <text class="body" x="486" y="532">system_notifications</text>

  <rect class="panel-soft sqlite" x="700" y="430" width="206" height="120"/>
  <text class="label" x="720" y="462">Recent Working Memory</text>
  <text class="body" x="720" y="488">activity turns + rollups</text>
  <text class="body" x="720" y="510">episodic anchors</text>
  <text class="body" x="720" y="532">pending follow-ups</text>

  <rect class="panel-soft sqlite" x="466" y="578" width="204" height="132"/>
  <text class="label" x="486" y="610">Human-Readable Layers</text>
  <text class="body" x="486" y="636">journal entries</text>
  <text class="body" x="486" y="658">notes and reminders</text>
  <text class="body" x="486" y="680">session plans and todos</text>

  <rect class="panel-soft sqlite" x="700" y="578" width="206" height="132"/>
  <text class="label" x="720" y="610">Persistent Runtime State</text>
  <text class="body" x="720" y="636">core memory</text>
  <text class="body" x="720" y="658">user profile and personality</text>
  <text class="body" x="720" y="680">emotion, inner voice, telemetry</text>

  <rect class="panel-soft sqlite" x="466" y="738" width="204" height="132"/>
  <text class="label" x="486" y="770">Learning and Diagnostics</text>
  <text class="body" x="486" y="796">error patterns</text>
  <text class="body" x="486" y="818">tool transitions</text>
  <text class="body" x="486" y="840">memory usage log</text>

  <rect class="panel-soft sqlite" x="700" y="738" width="206" height="132"/>
  <text class="label" x="720" y="770">Index and Archive Support</text>
  <text class="body" x="720" y="796">archived_messages</text>
  <text class="body" x="720" y="818">file indices + embedding docs</text>
  <text class="body" x="720" y="840">memory_meta + archive events</text>

  <text class="small" x="466" y="910">Representative entry points: short_term_init.go, activity.go, journal.go, notes.go, core_memory.go, error_learning.go</text>

  <rect class="panel analysis" x="970" y="326" width="578" height="284"/>
  <text class="section" x="1000" y="364">4. Consolidation and Memory Intelligence</text>
  <text class="body" x="1000" y="392">Async and periodic jobs compress raw turns into durable signals and decide what deserves stronger long-term storage.</text>

  <rect class="panel-soft analysis" x="1000" y="430" width="244" height="132"/>
  <text class="label" x="1020" y="462">Real-Time Extraction</text>
  <text class="body" x="1020" y="488">memory_analysis.go</text>
  <text class="body" x="1020" y="510">facts, preferences, corrections</text>
  <text class="body" x="1020" y="532">pending actions for later surfacing</text>

  <rect class="panel-soft analysis" x="1272" y="430" width="246" height="132"/>
  <text class="label" x="1292" y="462">Activity Distillation</text>
  <text class="body" x="1292" y="488">activity_capture.go</text>
  <text class="body" x="1292" y="510">intent, actions, outcomes</text>
  <text class="body" x="1292" y="532">entities and importance</text>

  <rect class="panel-soft analysis" x="1000" y="578" width="518" height="78"/>
  <text class="label" x="1020" y="610">Quality Control and Maintenance</text>
  <text class="body" x="1020" y="636">memory_effectiveness, conflicts, ranking, cleanup, planner/core/contact sync, predictive prefetch, periodic consolidation</text>

  <rect class="panel vector" x="970" y="646" width="578" height="180"/>
  <text class="section" x="1000" y="684">5. Semantic Long-Term Memory (Chromem Vector DB)</text>
  <text class="body" x="1000" y="712">Stores durable semantic documents, extracted facts, indexed documentation, and cheatsheets for similarity search and reuse.</text>
  <rect class="chip" x="1000" y="736" width="188" height="32"/>
  <text class="chip-text" x="1016" y="757">aurago_memories</text>
  <rect class="chip" x="1204" y="736" width="148" height="32"/>
  <text class="chip-text" x="1220" y="757">tool_guides</text>
  <rect class="chip" x="1368" y="736" width="134" height="32"/>
  <text class="chip-text" x="1384" y="757">documentation</text>
  <text class="body" x="1000" y="792">Used by SearchSimilar, SearchMemoriesOnly, predictive retrieval, and cheatsheet indexing.</text>

  <rect class="panel graph" x="970" y="846" width="578" height="172"/>
  <text class="section" x="1000" y="884">6. Knowledge Graph</text>
  <text class="body" x="1000" y="912">Entity-centric memory with FTS, semantic node scores, relation edges, co-occurrence, access counts, and prompt-focused context expansion.</text>
  <rect class="chip" x="1000" y="936" width="176" height="32"/>
  <text class="chip-text" x="1016" y="957">entities and relations</text>
  <rect class="chip" x="1192" y="936" width="176" height="32"/>
  <text class="chip-text" x="1208" y="957">SearchForContext</text>
  <rect class="chip" x="1384" y="936" width="134" height="32"/>
  <text class="chip-text" x="1400" y="957">fusion with RAG</text>

  <line class="divider" x1="52" y1="300" x2="1548" y2="300"/>

  <path class="arrow arrow-rose" d="M 372 484 C 414 484, 418 484, 456 484"/>
  <path class="arrow arrow-rose" d="M 372 624 C 420 624, 424 624, 456 624"/>
  <path class="arrow arrow-rose" d="M 372 774 C 424 774, 426 774, 456 774"/>

  <path class="arrow arrow-gold" d="M 936 490 C 968 490, 972 490, 1000 490"/>
  <path class="arrow arrow-gold" d="M 936 798 C 982 798, 988 736, 1000 736"/>

  <path class="arrow arrow-gold" d="M 1244 496 C 1260 496, 1260 496, 1272 496"/>
  <path class="arrow arrow-green" d="M 1244 548 C 1320 548, 1310 694, 1310 736"/>
  <path class="arrow arrow-green" d="M 1394 548 C 1394 618, 1394 672, 1394 736"/>

  <path class="arrow arrow-purple" d="M 1518 496 C 1536 496, 1536 908, 1518 908"/>
  <path class="arrow arrow-purple" d="M 906 490 C 960 490, 952 908, 1000 908"/>

  <path class="arrow arrow-blue" d="M 1114 846 C 1066 846, 980 846, 860 846 C 770 846, 740 848, 740 870"/>
  <path class="arrow arrow-blue" d="M 1220 646 C 1164 646, 1036 646, 850 646 C 760 646, 740 646, 740 578"/>
  <path class="arrow arrow-purple" d="M 1260 846 C 1210 846, 1120 846, 900 846 C 830 846, 820 710, 820 710"/>

  <path class="arrow arrow-blue" d="M 1260 278 C 1260 304, 1260 304, 1260 326"/>
  <path class="arrow arrow-blue" d="M 760 278 C 760 300, 760 300, 760 326"/>

  <path class="arrow arrow-thin arrow-blue" d="M 936 450 C 1010 400, 1090 324, 1180 278"/>
  <path class="arrow arrow-thin arrow-green" d="M 1548 736 C 1562 736, 1562 250, 1386 246"/>
  <path class="arrow arrow-thin arrow-purple" d="M 1548 922 C 1568 922, 1568 234, 1386 230"/>
  <path class="arrow arrow-thin arrow-blue" d="M 372 922 C 520 922, 730 922, 730 278"/>

  <rect x="82" y="1018" width="18" height="18" class="accent-rose"/>
  <text class="small" x="112" y="1032">capture writes</text>
  <rect x="258" y="1018" width="18" height="18" class="accent-gold"/>
  <text class="small" x="288" y="1032">consolidation</text>
  <rect x="446" y="1018" width="18" height="18" class="accent-green"/>
  <text class="small" x="476" y="1032">semantic storage</text>
  <rect x="656" y="1018" width="18" height="18" class="accent-purple"/>
  <text class="small" x="686" y="1032">graph enrichment</text>
  <rect x="862" y="1018" width="18" height="18" class="accent-blue"/>
  <text class="small" x="892" y="1032">retrieval into prompt</text>
</svg>
