<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-section="common.nav_truenas">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>TrueNAS - AuraGo</title>
    <meta name="description" content="AuraGo - Autonomous AI agent for home lab environments">
    <meta property="og:title" content="AuraGo">
    <meta property="og:description" content="Autonomous AI agent for home lab environments">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260425a">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/tokens.css">
        <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
    <link rel="stylesheet" href="/css/truenas.css">
    <link rel="stylesheet" href="/css/enhancements.css?v=20260425a">
    <link href="/fonts/fonts.css" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link" data-i18n="common.skip_to_content"></a>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🖥️</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="truenas.subtitle"></span>
            </a>
        </div>
        <div class="header-actions">
            <div class="connection-status">
                <span id="status-indicator" class="status-unknown">
                    <span class="spinner"></span><span data-i18n="truenas.checking_connection"></span>
                </span>
            </div>
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
        </div>
    </header>
    <div id="radialMenuAnchor"></div>

    <div class="truenas-container">
        <!-- Tab Navigation -->
        <nav class="truenas-nav">
            <button class="nav-btn active" data-tab="overview" data-i18n="truenas.nav_overview"></button>
            <button class="nav-btn" data-tab="pools" data-i18n="truenas.nav_pools"></button>
            <button class="nav-btn" data-tab="datasets" data-i18n="truenas.nav_datasets"></button>
            <button class="nav-btn" data-tab="snapshots" data-i18n="truenas.nav_snapshots"></button>
            <button class="nav-btn" data-tab="shares" data-i18n="truenas.nav_shares"></button>
            <button class="nav-btn" data-tab="settings" data-i18n="truenas.nav_settings"></button>
        </nav>

        <!-- Content -->
        <main class="truenas-content" id="main-content">
            <!-- Overview Tab -->
            <div id="tab-overview" class="tab-content active">
                <div id="overview-error"></div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 data-i18n="truenas.stat_pools"></h3>
                        <div class="stat-value" id="pool-count">-</div>
                        <div class="stat-detail" id="pool-status"></div>
                    </div>
                    <div class="stat-card">
                        <h3 data-i18n="truenas.stat_storage"></h3>
                        <div class="stat-value" id="total-storage">-</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="storage-progress"></div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <h3 data-i18n="truenas.nav_snapshots"></h3>
                        <div class="stat-value" id="snapshot-count">-</div>
                        <div class="stat-detail"><span data-i18n="truenas.recent_label"></span> <span id="recent-snapshots">-</span></div>
                    </div>
                    <div class="stat-card">
                        <h3 data-i18n="truenas.nav_shares"></h3>
                        <div class="stat-value" id="share-count">-</div>
                        <div class="stat-detail"><span data-i18n="truenas.stat_smb"></span> <span id="smb-count">-</span> • <span data-i18n="truenas.stat_nfs"></span> <span id="nfs-count">-</span></div>
                    </div>
                </div>

                <!-- Health Alerts -->
                <div class="alerts-section is-hidden" id="alerts-section">
                    <h2 data-i18n="truenas.alerts_title"></h2>
                    <div id="alerts-container"></div>
                </div>
            </div>

            <!-- Pools Tab -->
            <div id="tab-pools" class="tab-content">
                <div class="section-header">
                    <h2 data-i18n="truenas.section_pools"></h2>
                    <button class="btn btn-secondary" type="button" id="refresh-pools-btn" data-i18n="truenas.btn_refresh"></button>
                </div>
                <div id="pools-container" class="pools-grid">
                    <div class="loading"><span class="spinner"></span><span data-i18n="truenas.loading_pools"></span></div>
                </div>
            </div>

            <!-- Datasets Tab -->
            <div id="tab-datasets" class="tab-content">
                <div class="section-header">
                    <h2 data-i18n="truenas.nav_datasets"></h2>
                    <button class="btn btn-primary" type="button" id="create-dataset-btn" data-i18n="truenas.btn_new_dataset"></button>
                </div>
                <div id="datasets-container" class="datasets-list">
                    <div class="loading"><span class="spinner"></span><span data-i18n="truenas.loading_datasets"></span></div>
                </div>
            </div>

            <!-- Snapshots Tab -->
            <div id="tab-snapshots" class="tab-content">
                <div class="section-header">
                    <h2 data-i18n="truenas.nav_snapshots"></h2>
                    <div>
                        <select id="snapshot-filter">
                            <option value="" data-i18n="truenas.filter_all_datasets"></option>
                        </select>
                        <button class="btn btn-primary" type="button" id="create-snapshot-btn" data-i18n="truenas.btn_create_snapshot"></button>
                    </div>
                </div>
                <div id="snapshots-container" class="snapshots-list">
                    <div class="loading"><span class="spinner"></span><span data-i18n="truenas.loading_snapshots"></span></div>
                </div>
            </div>

            <!-- Shares Tab -->
            <div id="tab-shares" class="tab-content">
                <div class="section-header">
                    <h2 data-i18n="truenas.section_shares"></h2>
                    <button class="btn btn-primary" type="button" id="create-share-btn" data-i18n="truenas.btn_new_share"></button>
                </div>
                <div id="shares-container" class="shares-list">
                    <div class="loading"><span class="spinner"></span><span data-i18n="truenas.loading_shares"></span></div>
                </div>
            </div>

            <!-- Settings Tab -->
            <div id="tab-settings" class="tab-content">
                <h2 data-i18n="truenas.section_settings"></h2>
                <div id="settings-error"></div>
                <form id="truenas-settings-form">
                    <div class="form-group">
                        <label data-i18n="truenas.label_host"></label>
                        <input type="text" id="setting-host" placeholder="truenas.local">
                        <small data-i18n="truenas.hint_host"></small>
                    </div>

                    <div class="form-group">
                        <label data-i18n="truenas.label_apikey"></label>
                        <input type="password" id="setting-apikey" placeholder="API Key">
                        <small data-i18n="truenas.hint_apikey">Create an API key under System → API Keys in TrueNAS</small>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="setting-https" checked>
                        <label for="setting-https" data-i18n="truenas.label_https"></label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="setting-insecure">
                        <label for="setting-insecure" data-i18n="truenas.label_insecure"></label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="setting-readonly">
                        <label for="setting-readonly" data-i18n="truenas.label_readonly"></label>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="setting-destructive">
                        <label for="setting-destructive" data-i18n="truenas.label_destructive"></label>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="test-connection-btn" data-i18n="truenas.btn_test_connection"></button>
                        <button type="submit" class="btn btn-primary" data-i18n="common.btn_save"></button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Modal: Create Dataset -->
    <div id="modal-dataset" class="truenas-modal">
        <div class="modal-content">
            <h3 data-i18n="truenas.modal_dataset_title"></h3>
            <div id="dataset-error"></div>
            <form id="dataset-form">
                <div class="form-group">
                    <label data-i18n="truenas.label_name_example"></label>
                    <input type="text" id="dataset-name" required placeholder="tank/my-share">
                </div>
                <div class="form-group">
                    <label data-i18n="truenas.label_compression"></label>
                    <select id="dataset-compression">
                        <option value="lz4" selected data-i18n="truenas.opt_lz4"></option>
                        <option value="gzip" data-i18n="truenas.opt_gzip"></option>
                        <option value="zle" data-i18n="truenas.opt_zle"></option>
                        <option value="off" data-i18n="truenas.opt_off"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="truenas.label_quota"></label>
                    <input type="number" id="dataset-quota" min="0" value="0">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-close-modal data-i18n="common.btn_cancel"></button>
                    <button type="submit" class="btn btn-primary" data-i18n="truenas.btn_create"></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Create Snapshot -->
    <div id="modal-snapshot" class="truenas-modal">
        <div class="modal-content">
            <h3 data-i18n="truenas.modal_snapshot_title"></h3>
            <div id="snapshot-error"></div>
            <form id="snapshot-form">
                <div class="form-group">
                    <label data-i18n="truenas.nav_datasets"></label>
                    <select id="snapshot-dataset" required>
                        <option value="">...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="truenas.label_name_optional"></label>
                    <input type="text" id="snapshot-name" placeholder="aura-20240101-120000">
                </div>
                <div class="form-group checkbox">
                    <input type="checkbox" id="snapshot-recursive">
                    <label for="snapshot-recursive" data-i18n="truenas.label_recursive"></label>
                </div>
                <div class="form-group">
                    <label data-i18n="truenas.label_retention"></label>
                    <input type="number" id="snapshot-retention" min="0" value="0">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-close-modal data-i18n="common.btn_cancel"></button>
                    <button type="submit" class="btn btn-primary" data-i18n="truenas.btn_create"></button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal: Create Share -->
    <div id="modal-share" class="truenas-modal">
        <div class="modal-content">
            <h3 data-i18n="truenas.modal_share_title"></h3>
            <div id="share-error"></div>
            <form id="share-form">
                <div class="form-group">
                    <label data-i18n="truenas.label_share_type"></label>
                    <select id="share-type">
                        <option value="smb" selected data-i18n="truenas.opt_smb"></option>
                        <option value="nfs" data-i18n="truenas.opt_nfs"></option>
                    </select>
                </div>
                <div class="form-group" id="smb-share-name-field">
                    <label data-i18n="truenas.label_name"></label>
                    <input type="text" id="share-name" placeholder="MyShare">
                </div>
                <div class="form-group">
                    <label data-i18n="truenas.label_path"></label>
                    <input type="text" id="share-path" required placeholder="/mnt/tank/share">
                </div>
                <div id="smb-share-fields">
                    <div class="form-group checkbox">
                        <input type="checkbox" id="share-guest">
                        <label for="share-guest" data-i18n="truenas.label_guest_access"></label>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="share-timemachine">
                        <label for="share-timemachine" data-i18n="truenas.label_timemachine"></label>
                    </div>
                </div>
                <div id="nfs-share-fields" style="display: none;">
                    <div class="form-group">
                        <label data-i18n="truenas.label_networks_optional"></label>
                        <input type="text" id="nfs-networks" placeholder="192.168.1.0/24">
                        <small data-i18n="truenas.hint_networks"></small>
                    </div>
                    <div class="form-group">
                        <label data-i18n="truenas.label_hosts_optional"></label>
                        <input type="text" id="nfs-hosts" placeholder="backup-host,media-host">
                        <small data-i18n="truenas.hint_hosts"></small>
                    </div>
                    <div class="form-group checkbox">
                        <input type="checkbox" id="nfs-readonly">
                        <label for="nfs-readonly" data-i18n="truenas.label_nfs_readonly"></label>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" data-close-modal data-i18n="common.btn_cancel"></button>
                    <button type="submit" class="btn btn-primary" data-i18n="truenas.btn_create"></button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/truenas.js"></script>
</body>
</html>
