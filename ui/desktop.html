<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="desktop.page_title">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>AuraGo Virtual Desktop</title>
    <link href="/fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/desktop.css?v={{.BuildVersion}}-desktop-20260510d">
    <link rel="stylesheet" href="/css/radio.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/camera.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/code-studio.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/stl-viewer.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/chat-modules.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/stt-overlay.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/quill.snow.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/xterm.css">
    <link rel="stylesheet" href="/css/hljs-github-dark.min.css">
    <script src="/shared.js?v={{.BuildVersion}}"></script>
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        const BUILD_VERSION = "{{.BuildVersion}}";
        window.BUILD_VERSION = BUILD_VERSION;
        (function () { var th = localStorage.getItem('aurago-theme'); if (th) document.documentElement.setAttribute('data-theme', th); })();
        const I18N = {{.I18N}};
    </script>
</head>

<body class="desktop-body">
    <main id="desktop-root" class="vd-shell" aria-live="polite">
        <section class="vd-workspace" id="vd-workspace">
            <div class="vd-icons" id="vd-icons"></div>
            <div class="vd-widgets" id="vd-widgets"></div>
            <div class="vd-window-layer" id="vd-window-layer"></div>
            <div class="vd-disabled" id="vd-disabled" hidden>
                <div class="vd-disabled-panel">
                    <div class="vd-disabled-title" data-i18n="desktop.disabled_title"></div>
                    <div class="vd-disabled-copy" data-i18n="desktop.disabled_copy"></div>
                    <a href="/config#virtual_desktop" class="vd-button" data-i18n="desktop.open_config"></a>
                </div>
            </div>
        </section>

        <section class="vd-taskbar">
            <button class="vd-start-button" id="vd-start-button" type="button" data-i18n-title="desktop.start_menu">
                <span class="vd-start-glyph">A</span>
                <span class="vd-start-label" data-i18n="desktop.start_menu"></span>
            </button>
            <div class="vd-taskbar-apps" id="vd-taskbar-apps"></div>
            <div class="vd-taskbar-system">
                <span id="vd-ws-state" class="vd-status-dot" data-state="offline"></span>
                <span id="vd-clock" class="vd-clock"></span>
                <button class="vd-agent-button" id="vd-agent-button" type="button" data-i18n-title="desktop.agent_chat">
                    <span class="vd-agent-dot"></span>
                    <span data-i18n="desktop.agent_chat"></span>
                </button>
            </div>
        </section>

        <aside class="vd-start-menu" id="vd-start-menu" hidden>
            <div class="vd-start-search">
                <input id="vd-start-search" type="search" autocomplete="off" spellcheck="false" data-i18n-placeholder="desktop.search_placeholder">
            </div>
            <div id="vd-start-apps" class="vd-start-apps"></div>
        </aside>
    </main>

    <noscript>
        <div style="position:fixed;inset:0;display:grid;place-items:center;background:#11151c;z-index:99999;padding:24px;">
            <div style="max-width:480px;text-align:center;color:#f6f7fb;">
                <div style="font-size:1.5rem;font-weight:800;margin-bottom:12px;">AuraGo Virtual Desktop</div>
                <div style="color:#a7b0c0;line-height:1.6;">JavaScript is required to use the Virtual Desktop. Please enable JavaScript in your browser settings and reload the page.</div>
            </div>
        </div>
    </noscript>

    <script defer src="/js/vendor/xterm.min.js"></script>
    <script defer src="/js/vendor/xterm-addon-fit.min.js"></script>
    <script defer src="/js/vendor/highlight.min.js"></script>
    <script defer src="/js/vendor/markdown-it.min.js"></script>
    <script defer src="/js/shared/render-markdown.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/vendor/pdf.min.js"></script>
    <script defer src="/js/vendor/three.min.js"></script>
    <script defer src="/js/vendor/STLLoader.min.js"></script>
    <script defer src="/js/vendor/OrbitControls.min.js"></script>
    <script defer src="/js/chat/ui-icons.js?v=20260501a"></script>
    <script defer src="/js/chat/modules/voice-recorder.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/chat/modules/speech-to-text.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/chat/modules/mermaid-loader.js"></script>
    <script defer src="/js/vendor/quill.js"></script>
    <script defer src="/chart.min.js"></script>
    <script defer src="/js/desktop/core/module-loader.js"></script>
    <script defer src="/js/desktop/apps/code-studio.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/writer.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/sheets.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/system-info.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/file-manager.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/chat-renderer.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/main.js?v={{.BuildVersion}}-desktop-20260510f"></script>
    <script defer src="/js/desktop/apps/radio.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/camera.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/looper.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/viewer.js?v={{.BuildVersion}}"></script>
    <script defer src="/js/desktop/apps/viewer-3d.js?v={{.BuildVersion}}"></script>
</body>

</html>
