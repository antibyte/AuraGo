<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="invasion.page_title">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title></title>
    <meta name="description" content="AuraGo - Autonomous AI agent for home lab environments">
    <meta property="og:title" content="AuraGo">
    <meta property="og:description" content="Autonomous AI agent for home lab environments">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260425a">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/tokens.css">
        <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
    <link rel="stylesheet" href="/css/invasion.css">
    <link rel="stylesheet" href="/css/enhancements.css?v=20260425a">
    <link href="/fonts/fonts.css" rel="stylesheet">
</head>
<body>
    <a href="#main-content" class="skip-link" data-i18n="common.skip_to_content"></a>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="invasion.logo_subtitle"></span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="container" id="main-content">
        <div class="page-header">
            <h1 data-i18n="invasion.title"></h1>
            <button class="btn btn-primary" id="btn-create" type="button">
                <span>+</span> <span data-i18n="invasion.create_new"></span>
            </button>
        </div>

        <div class="media-tabs invasion-tabs">
            <button class="media-tab invasion-tab active" type="button" data-tab="nests">
                🪺 <span data-i18n="invasion.nests"></span>
            </button>
            <button class="media-tab invasion-tab" type="button" data-tab="eggs">
                🥚 <span data-i18n="invasion.eggs"></span>
            </button>
        </div>

        <div id="content-nests" class="tab-content">
            <div class="cards-grid" id="nests-grid"></div>
            <div class="empty-state is-hidden" id="nests-empty">
                <div class="icon">🪺</div>
                <p data-i18n="invasion.no_nests"></p>
                <button class="btn btn-primary" type="button" data-action="open-create">
                    <span data-i18n="invasion.create_first_nest"></span>
                </button>
            </div>
        </div>

        <div id="content-eggs" class="tab-content is-hidden">
            <div class="cards-grid" id="eggs-grid"></div>
            <div class="empty-state is-hidden" id="eggs-empty">
                <div class="icon">🥚</div>
                <p data-i18n="invasion.no_eggs"></p>
                <button class="btn btn-primary" type="button" data-action="open-create">
                    <span data-i18n="invasion.create_first_egg"></span>
                </button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="nest-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="nest-modal-title" data-i18n="invasion.create_nest"></h2>
                <button class="modal-close" type="button" data-i18n-aria-label="common.close" data-modal-close="nest-modal">&times;</button>
            </div>
            <input type="hidden" id="nest-id">
            <div class="form-group">
                <label for="nest-name" data-i18n="invasion.name"></label>
                <input type="text" id="nest-name" data-i18n-placeholder="invasion.ph_nest_name" placeholder="">
            </div>
            <div class="form-group">
                <label for="nest-notes" data-i18n="invasion.notes"></label>
                <textarea id="nest-notes" data-i18n-placeholder="invasion.ph_nest_notes" placeholder="" rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-group">
                <label for="nest-access-type" data-i18n="invasion.access_type"></label>
                <select id="nest-access-type" class="form-select">
                    <option value="ssh" data-i18n="invasion.access_ssh"></option>
                    <option value="docker" data-i18n="invasion.access_docker"></option>
                    <option value="local" data-i18n="invasion.access_local"></option>
                </select>
            </div>
            <div id="nest-remote-fields">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nest-host" data-i18n="invasion.host"></label>
                        <input type="text" id="nest-host" data-i18n-placeholder="invasion.ph_host" placeholder="">
                    </div>
                    <div class="form-group">
                        <label for="nest-port" data-i18n="invasion.port"></label>
                        <input type="number" id="nest-port" value="22">
                    </div>
                </div>
                <div class="form-group">
                    <label for="nest-username" data-i18n="invasion.username"></label>
                    <input type="text" id="nest-username" data-i18n-placeholder="invasion.ph_username" placeholder="">
                </div>
                <div class="form-group">
                    <label for="nest-secret" id="nest-secret-label" data-i18n="invasion.secret"></label>
                    <textarea id="nest-secret" data-i18n-placeholder="invasion.ph_secret" placeholder="" rows="3" class="resize-vertical"></textarea>
                    <small id="nest-secret-hint" class="hint-subtle is-hidden" data-i18n="invasion.secret_set"></small>
                </div>
            </div>
            <div class="form-group">
                <label for="nest-egg-id" data-i18n="invasion.assign_egg"></label>
                <select id="nest-egg-id" class="form-select">
                    <option value="" data-i18n="invasion.no_egg">— No Egg —</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nest-deploy-method" data-i18n="invasion.deploy_method"></label>
                <select id="nest-deploy-method" class="form-select">
                    <option value="ssh" data-i18n="invasion.deploy_ssh"></option>
                    <option value="docker_remote" data-i18n="invasion.deploy_docker_remote"></option>
                    <option value="docker_local" data-i18n="invasion.deploy_docker_local"></option>
                </select>
                <small id="deploy-docker-local-hint" class="hint-subtle is-hidden mt-xs" data-i18n="invasion.docker_local_hint"></small>
            </div>
            <div class="form-group">
                <label for="nest-target-arch" data-i18n="invasion.target_arch"></label>
                <select id="nest-target-arch" class="form-select">
                    <option value="linux/amd64">linux/amd64</option>
                    <option value="linux/arm64">linux/arm64</option>
                </select>
            </div>
            <div class="form-group">
                <label for="nest-route" data-i18n="invasion.route"></label>
                <select id="nest-route" class="form-select">
                    <option value="direct" data-i18n="invasion.route_direct"></option>
                    <option value="ssh_tunnel" data-i18n="invasion.route_ssh_tunnel"></option>
                    <option value="tailscale" data-i18n="invasion.route_tailscale"></option>
                    <option value="wireguard" data-i18n="invasion.route_wireguard"></option>
                    <option value="custom" data-i18n="invasion.route_custom"></option>
                </select>
            </div>
            <div class="form-group">
                <label for="nest-route-config" data-i18n="invasion.route_config"></label>
                <textarea id="nest-route-config" placeholder='{"tunnel_port":8443}' rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="nest-active" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" data-i18n="invasion.active"></span>
                </div>
            </div>
            <div id="nest-validate-area" class="is-hidden">
                <button class="btn btn-sm btn-secondary" id="btn-validate" type="button" data-i18n="invasion.test_connection"></button>
                <div class="validate-result" id="validate-result"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="nest-cancel-btn" type="button" data-i18n="invasion.cancel"></button>
                <button class="btn btn-primary" id="nest-save-btn" type="button" data-i18n="invasion.save"></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="egg-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="egg-modal-title" data-i18n="invasion.create_egg"></h2>
                <button class="modal-close" type="button" data-i18n-aria-label="common.close" data-modal-close="egg-modal">&times;</button>
            </div>
            <input type="hidden" id="egg-id">
            <div class="form-group">
                <label for="egg-name" data-i18n="invasion.name"></label>
                <input type="text" id="egg-name" data-i18n-placeholder="invasion.ph_egg_name" placeholder="">
            </div>
            <div class="form-group">
                <label for="egg-description" data-i18n="invasion.description"></label>
                <textarea id="egg-description" data-i18n-placeholder="invasion.ph_egg_description" placeholder="" rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="egg-provider" data-i18n="invasion.provider"></label>
                    <select id="egg-provider">
                        <option value=""></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="egg-model" data-i18n="invasion.model"></label>
                    <input type="text" id="egg-model" placeholder="gpt-4o-mini">
                </div>
            </div>
            <div class="form-group">
                <label for="egg-base-url" data-i18n="invasion.base_url"></label>
                <input type="text" id="egg-base-url" placeholder="https://openrouter.ai/api/v1">
            </div>
            <div class="form-group">
                <label for="egg-api-key" data-i18n="invasion.api_key"></label>
                <input type="password" id="egg-api-key" placeholder="sk-...">
                <small id="egg-apikey-hint" class="hint-subtle is-hidden" data-i18n="invasion.apikey_set"></small>
            </div>
            <div class="form-group">
                <label for="egg-port" data-i18n="invasion.egg_port"></label>
                <input type="number" id="egg-port" value="8099" min="1024" max="65535">
            </div>
            <div class="form-group">
                <label for="egg-allowed-tools" data-i18n="invasion.allowed_tools"></label>
                <input type="text" id="egg-allowed-tools" placeholder='["shell","python"]'>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-permanent">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" data-i18n="invasion.permanent"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-include-vault">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" data-i18n="invasion.include_vault"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-inherit-llm" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" data-i18n="invasion.inherit_llm"></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-active" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label" data-i18n="invasion.active"></span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="egg-cancel-btn" type="button" data-i18n="invasion.cancel"></button>
                <button class="btn btn-primary" id="egg-save-btn" type="button" data-i18n="invasion.save"></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="reconfigure-modal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h2 id="reconfigure-modal-title" data-i18n="invasion.reconfigure_title"></h2>
                <button class="modal-close" type="button" data-i18n-aria-label="common.close" data-modal-close="reconfigure-modal">&times;</button>
            </div>
            <input type="hidden" id="reconfigure-nest-id">
            <div class="reconfigure-warning" data-i18n="invasion.reconfigure_warning">⚠️ The egg will be restarted after applying changes.</div>
            <div class="form-row">
                <div class="form-group">
                    <label for="reconfigure-provider" data-i18n="invasion.provider"></label>
                    <select id="reconfigure-provider" class="form-select">
                        <option value="" data-i18n="invasion.reconfigure_keep_current">— Keep Current —</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reconfigure-model" data-i18n="invasion.model"></label>
                    <input type="text" id="reconfigure-model" data-i18n-placeholder="invasion.reconfigure_ph_model" placeholder="">
                </div>
            </div>
            <div class="form-group">
                <label for="reconfigure-base-url" data-i18n="invasion.base_url"></label>
                <input type="text" id="reconfigure-base-url" data-i18n-placeholder="invasion.reconfigure_ph_base_url" placeholder="">
            </div>
            <div class="form-group">
                <label for="reconfigure-allowed-tools" data-i18n="invasion.allowed_tools"></label>
                <input type="text" id="reconfigure-allowed-tools" placeholder='["shell","python"]'>
                <small class="hint-subtle" data-i18n="invasion.reconfigure_tools_hint"></small>
            </div>
            <fieldset class="reconfigure-fieldset">
                <legend data-i18n="invasion.reconfigure_runtime_flags"></legend>
                <div class="reconfigure-toggles">
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" id="reconfigure-allow-filesystem">
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" data-i18n="invasion.reconfigure_allow_filesystem"></span>
                    </div>
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" id="reconfigure-allow-network">
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" data-i18n="invasion.reconfigure_allow_network"></span>
                    </div>
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" id="reconfigure-allow-remote-shell">
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" data-i18n="invasion.reconfigure_allow_remote"></span>
                    </div>
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" id="reconfigure-allow-self-update">
                            <span class="slider"></span>
                        </label>
                        <span class="toggle-label" data-i18n="invasion.reconfigure_allow_selfupdate"></span>
                    </div>
                </div>
            </fieldset>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="reconfigure-cancel-btn" type="button" data-i18n="invasion.cancel"></button>
                <button class="btn btn-primary" id="reconfigure-apply-btn" type="button" data-i18n="invasion.reconfigure_apply">Apply & Restart</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="config-history-modal">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h2 id="config-history-title" data-i18n="invasion.config_history_title"></h2>
                <button class="modal-close" type="button" data-i18n-aria-label="common.close" data-modal-close="config-history-modal">&times;</button>
            </div>
            <input type="hidden" id="history-nest-id">
            <div id="config-history-list" class="config-history-list">
                <div class="config-history-empty" data-i18n="invasion.config_history_empty"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="config-history-close-btn" type="button" data-i18n="invasion.cancel"></button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="delete-modal-title">⚠️ <span data-i18n="invasion.confirm_delete"></span></h2>
                <button class="modal-close" type="button" data-i18n-aria-label="common.close" data-modal-close="delete-modal">&times;</button>
            </div>
            <p id="delete-message" class="delete-message"></p>
            <p class="delete-modal-hint" data-i18n="invasion.type_name_confirm"></p>
            <input type="text" class="delete-confirm-input" id="delete-confirm-input" autocomplete="off">
            <div class="modal-actions">
                <button class="btn btn-secondary" id="delete-cancel-btn" type="button" data-i18n="invasion.cancel"></button>
                <button class="btn btn-danger" id="btn-delete-confirm" type="button" disabled data-i18n="invasion.delete_permanent"></button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="/js/invasion/main.js"></script>
</body>
</html>
