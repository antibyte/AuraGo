<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">AuraGo - Invasion Control</title>
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js"></script>
    <script>
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <script>const I18N={{.I18N}};</script>
    <link rel="stylesheet" href="/css/invasion.css">
    <link rel="stylesheet" href="/css/enhancements.css">
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle"><script>document.write(t('invasion.logo_subtitle'))</script></span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1><script>document.write(t('invasion.title'))</script></h1>
            <button class="btn btn-primary" id="btn-create" onclick="openCreateModal()">
                <span>+</span> <span><script>document.write(t('invasion.create_new'))</script></span>
            </button>
        </div>

        <!-- Tabs -->
        <div class="media-tabs invasion-tabs">
            <button class="media-tab invasion-tab active" data-tab="nests" onclick="switchTab('nests')">
                🪺 <span><script>document.write(t('invasion.nests'))</script></span>
            </button>
            <button class="media-tab invasion-tab" data-tab="eggs" onclick="switchTab('eggs')">
                🥚 <span><script>document.write(t('invasion.eggs'))</script></span>
            </button>
        </div>

        <!-- Content -->
        <div id="content-nests" class="tab-content">
            <div class="cards-grid" id="nests-grid"></div>
            <div class="empty-state is-hidden" id="nests-empty">
                <div class="icon">🪺</div>
                <p><script>document.write(t('invasion.no_nests'))</script></p>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <span><script>document.write(t('invasion.create_first_nest'))</script></span>
                </button>
            </div>
        </div>

        <div id="content-eggs" class="tab-content is-hidden">
            <div class="cards-grid" id="eggs-grid"></div>
            <div class="empty-state is-hidden" id="eggs-empty">
                <div class="icon">🥚</div>
                <p><script>document.write(t('invasion.no_eggs'))</script></p>
                <button class="btn btn-primary" onclick="openCreateModal()">
                    <span><script>document.write(t('invasion.create_first_egg'))</script></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Nest Modal -->
    <div class="modal-overlay" id="nest-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="nest-modal-title"><script>document.write(t('invasion.create_nest'))</script></h2>
                <button class="modal-close" onclick="closeModal('nest-modal')">&times;</button>
            </div>
            <input type="hidden" id="nest-id">
            <div class="form-group">
                <label><script>document.write(t('invasion.name'))</script></label>
                <input type="text" id="nest-name" data-i18n-placeholder="invasion.ph_nest_name" placeholder="Produktionsserver">
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.notes'))</script></label>
                <textarea id="nest-notes" data-i18n-placeholder="invasion.ph_nest_notes" placeholder="Optionale Notizen..." rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.access_type'))</script></label>
                <select id="nest-access-type" class="form-select" onchange="onAccessTypeChange()">
                    <option value="ssh" data-i18n="invasion.access_ssh">SSH</option>
                    <option value="docker" data-i18n="invasion.access_docker">Docker API</option>
                    <option value="local" data-i18n="invasion.access_local">Lokal</option>
                </select>
            </div>
            <div id="nest-remote-fields">
                <div class="form-row">
                    <div class="form-group">
                        <label><script>document.write(t('invasion.host'))</script></label>
                        <input type="text" id="nest-host" data-i18n-placeholder="invasion.ph_host" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label><script>document.write(t('invasion.port'))</script></label>
                        <input type="number" id="nest-port" value="22">
                    </div>
                </div>
                <div class="form-group">
                    <label><script>document.write(t('invasion.username'))</script></label>
                    <input type="text" id="nest-username" data-i18n-placeholder="invasion.ph_username" placeholder="deploy">
                </div>
                <div class="form-group">
                    <label id="nest-secret-label"><script>document.write(t('invasion.secret'))</script></label>
                    <textarea id="nest-secret" data-i18n-placeholder="invasion.ph_secret" placeholder="Passwort oder SSH Private Key..." rows="3" class="resize-vertical"></textarea>
                    <small id="nest-secret-hint" class="hint-subtle is-hidden">
                        <script>document.write(t('invasion.secret_set'))</script>
                    </small>
                </div>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.assign_egg'))</script></label>
                <select id="nest-egg-id" class="form-select">
                    <option value="" data-i18n="invasion.no_egg">— Kein Egg —</option>
                </select>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.deploy_method'))</script></label>
                <select id="nest-deploy-method" class="form-select" onchange="onDeployMethodChange()">
                    <option value="ssh" data-i18n="invasion.deploy_ssh">SSH</option>
                    <option value="docker_remote" data-i18n="invasion.deploy_docker_remote">Docker (Remote)</option>
                    <option value="docker_local" data-i18n="invasion.deploy_docker_local">Docker (Lokal)</option>
                </select>
                <small id="deploy-docker-local-hint" class="hint-subtle is-hidden mt-xs"><script>document.write(t('invasion.docker_local_hint'))</script></small>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.target_arch'))</script></label>
                <select id="nest-target-arch" class="form-select">
                    <option value="linux/amd64">linux/amd64</option>
                    <option value="linux/arm64">linux/arm64</option>
                </select>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.route'))</script></label>
                <select id="nest-route" class="form-select">
                    <option value="direct" data-i18n="invasion.route_direct">Direct</option>
                    <option value="ssh_tunnel" data-i18n="invasion.route_ssh_tunnel">SSH Tunnel</option>
                    <option value="tailscale" data-i18n="invasion.route_tailscale">Tailscale</option>
                    <option value="wireguard" data-i18n="invasion.route_wireguard">WireGuard</option>
                    <option value="custom" data-i18n="invasion.route_custom">Custom</option>
                </select>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.route_config'))</script></label>
                <textarea id="nest-route-config" placeholder='{"tunnel_port":8443}' rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="nest-active" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label"><script>document.write(t('invasion.active'))</script></span>
                </div>
            </div>
            <div id="nest-validate-area" class="is-hidden">
                <button class="btn btn-sm btn-secondary" id="btn-validate" onclick="validateNest()">
                    <script>document.write(t('invasion.test_connection'))</script>
                </button>
                <div class="validate-result" id="validate-result"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('nest-modal')"><script>document.write(t('invasion.cancel'))</script></button>
                <button class="btn btn-primary" onclick="saveNest()"><script>document.write(t('invasion.save'))</script></button>
            </div>
        </div>
    </div>

    <!-- Egg Modal -->
    <div class="modal-overlay" id="egg-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="egg-modal-title"><script>document.write(t('invasion.create_egg'))</script></h2>
                <button class="modal-close" onclick="closeModal('egg-modal')">&times;</button>
            </div>
            <input type="hidden" id="egg-id">
            <div class="form-group">
                <label><script>document.write(t('invasion.name'))</script></label>
                <input type="text" id="egg-name" data-i18n-placeholder="invasion.ph_egg_name" placeholder="Analytics Agent">
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.description'))</script></label>
                <textarea id="egg-description" data-i18n-placeholder="invasion.ph_egg_description" placeholder="Was macht dieser Sub-Agent?" rows="2" class="resize-vertical"></textarea>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label><script>document.write(t('invasion.provider'))</script></label>
                    <select id="egg-provider">
                        <option value=""></option>
                    </select>
                </div>
                <div class="form-group">
                    <label><script>document.write(t('invasion.model'))</script></label>
                    <input type="text" id="egg-model" placeholder="gpt-4o-mini">
                </div>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.base_url'))</script></label>
                <input type="text" id="egg-base-url" placeholder="https://openrouter.ai/api/v1">
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.api_key'))</script></label>
                <input type="password" id="egg-api-key" placeholder="sk-...">
                <small id="egg-apikey-hint" class="hint-subtle is-hidden">
                    <script>document.write(t('invasion.apikey_set'))</script>
                </small>
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.egg_port'))</script></label>
                <input type="number" id="egg-port" value="8099" min="1024" max="65535">
            </div>
            <div class="form-group">
                <label><script>document.write(t('invasion.allowed_tools'))</script></label>
                <input type="text" id="egg-allowed-tools" placeholder='["shell","python"]'>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-permanent">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label"><script>document.write(t('invasion.permanent'))</script></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-include-vault">
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label"><script>document.write(t('invasion.include_vault'))</script></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-inherit-llm" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label"><script>document.write(t('invasion.inherit_llm'))</script></span>
                </div>
            </div>
            <div class="form-group">
                <div class="toggle-wrap">
                    <label class="toggle">
                        <input type="checkbox" id="egg-active" checked>
                        <span class="slider"></span>
                    </label>
                    <span class="toggle-label"><script>document.write(t('invasion.active'))</script></span>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('egg-modal')"><script>document.write(t('invasion.cancel'))</script></button>
                <button class="btn btn-primary" onclick="saveEgg()"><script>document.write(t('invasion.save'))</script></button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 class="delete-modal-title">⚠️ <span><script>document.write(t('invasion.confirm_delete'))</script></span></h2>
                <button class="modal-close" onclick="closeModal('delete-modal')">&times;</button>
            </div>
            <p id="delete-message" class="delete-message"></p>
            <p class="delete-modal-hint">
                <script>document.write(t('invasion.type_name_confirm'))</script>
            </p>
            <input type="text" class="delete-confirm-input" id="delete-confirm-input"
                   oninput="checkDeleteConfirm()" autocomplete="off">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('delete-modal')"><script>document.write(t('invasion.cancel'))</script></button>
                <button class="btn btn-danger" id="btn-delete-confirm" disabled onclick="confirmDelete()">
                    <script>document.write(t('invasion.delete_permanent'))</script>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script src="/js/invasion/main.js"></script>
</body>
</html>
