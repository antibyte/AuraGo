<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-section="common.nav_containers">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title id="page-title">AuraGo - Containers</title>
    <meta name="description" content="AuraGo - Autonomous AI agent for home lab environments">
    <meta property="og:title" content="AuraGo">
    <meta property="og:description" content="Autonomous AI agent for home lab environments">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260425a">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/tokens.css">
        <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
    <link rel="stylesheet" href="/css/xterm.css">
    <link rel="stylesheet" href="/css/containers.css">
    <link rel="stylesheet" href="/css/enhancements.css?v=20260425a">
    <link rel="stylesheet" href="/css/precision-workspace.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/precision-pages.css?v={{.BuildVersion}}">
    <link href="/fonts/fonts.css" rel="stylesheet">
    <script defer src="/js/vendor/xterm.min.js"></script>
    <script defer src="/js/vendor/xterm-addon-fit.min.js"></script>
</head>
<body class="pw-page pw-operational-page" data-workspace-page="containers" data-density="comfortable">
    <a href="#main-content" class="skip-link" data-i18n="common.skip_to_content"></a>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="containers.subtitle"></span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="ct-container" id="main-content">
        <!-- Status bar -->
        <div class="ct-status-bar" id="ct-status-bar">
            <div class="ct-stat">
                <span class="ct-stat-value" id="ct-total">0</span>
                <span class="ct-stat-label" data-i18n="containers.stat_total"></span>
            </div>
            <div class="ct-stat ct-stat-running">
                <span class="ct-stat-value" id="ct-running">0</span>
                <span class="ct-stat-label" data-i18n="containers.stat_running"></span>
            </div>
            <div class="ct-stat ct-stat-stopped">
                <span class="ct-stat-value" id="ct-stopped">0</span>
                <span class="ct-stat-label" data-i18n="containers.stat_stopped"></span>
            </div>
        </div>

        <!-- Search + filter bar -->
        <div class="ct-toolbar">
            <input type="text" id="ct-search" class="ct-search"
                placeholder="" data-i18n-placeholder="containers.search_placeholder"
                oninput="filterContainers()">
            <div class="ct-filter-group">
                <button class="ct-filter-btn active" data-filter="all" onclick="setFilter('all')" data-i18n="containers.filter_all"></button>
                <button class="ct-filter-btn" data-filter="running" onclick="setFilter('running')" data-i18n="containers.filter_running"></button>
                <button class="ct-filter-btn" data-filter="stopped" onclick="setFilter('stopped')" data-i18n="containers.filter_stopped"></button>
            </div>
        </div>

        <!-- Container cards -->
        <div class="ct-grid" id="ct-grid"></div>

        <!-- Empty state -->
        <div class="empty-state is-hidden" id="ct-empty">
            <div class="empty-icon">🐳</div>
            <h3 data-i18n="containers.empty_title"></h3>
            <p data-i18n="containers.empty_desc"></p>
        </div>

        <!-- Error state (Docker disabled) -->
        <div class="empty-state is-hidden" id="ct-disabled">
            <div class="empty-icon">⚠️</div>
            <h3 data-i18n="containers.disabled_title"></h3>
            <p data-i18n="containers.disabled_desc"></p>
        </div>
    </div>

    <!-- ═══════ LOG MODAL ═══════ -->
    <div class="modal-overlay" id="log-modal" role="dialog" aria-modal="true" aria-labelledby="log-modal-title">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h2 id="log-modal-title" data-i18n="containers.logs_title"></h2>
                <button type="button" class="modal-close" data-i18n-aria-label="common.close" onclick="closeLogModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre class="ct-log-output" id="log-output"></pre>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeLogModal()" data-i18n="common.btn_close"></button>
                <button class="btn btn-primary" onclick="refreshLogs()" data-i18n="containers.logs_refresh"></button>
            </div>
        </div>
    </div>

    <!-- ═══════ INSPECT MODAL ═══════ -->
    <div class="modal-overlay" id="inspect-modal" role="dialog" aria-modal="true" aria-labelledby="inspect-modal-title">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h2 id="inspect-modal-title" data-i18n="containers.inspect_title"></h2>
                <button type="button" class="modal-close" data-i18n-aria-label="common.close" onclick="closeInspectModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre class="ct-inspect-output" id="inspect-output"></pre>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeInspectModal()" data-i18n="common.btn_close"></button>
            </div>
        </div>
    </div>

    <!-- ═══════ TERMINAL MODAL ═══════ -->
    <div class="modal-overlay" id="terminal-modal" role="dialog" aria-modal="true" aria-labelledby="terminal-modal-title">
        <div class="modal modal-wide ct-terminal-modal">
            <div class="modal-header">
                <h2 id="terminal-modal-title"><span data-i18n="containers.terminal_title"></span> <span id="terminal-container-name"></span></h2>
                <button type="button" class="modal-close" data-i18n-aria-label="common.close" onclick="closeTerminalModal()">&times;</button>
            </div>
            <div class="modal-body ct-terminal-body">
                <div class="ct-terminal-status" id="terminal-status" data-i18n="containers.terminal_connecting"></div>
                <div class="ct-terminal-output" id="terminal-output"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTerminalModal()" data-i18n="common.btn_close"></button>
            </div>
        </div>
    </div>

    <!-- ═══════ CONFIRM UPDATE MODAL ═══════ -->
    <div class="modal-overlay" id="update-modal" role="dialog" aria-modal="true" aria-labelledby="update-modal-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="update-modal-title" data-i18n="containers.update_title"></h2>
                <button type="button" class="modal-close" data-i18n-aria-label="common.close" onclick="closeUpdateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p data-i18n="containers.update_confirm"></p>
                <p class="ct-delete-name" id="update-container-name"></p>
                <p class="muted" data-i18n="containers.update_note"></p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeUpdateModal()" data-i18n="containers.update_cancel"></button>
                <button class="btn btn-primary" id="update-confirm-btn" onclick="confirmUpdate()" data-i18n="containers.update_confirm_btn"></button>
            </div>
        </div>
    </div>

    <!-- ═══════ CONFIRM DELETE MODAL ═══════ -->
    <div class="modal-overlay" id="delete-modal" role="dialog" aria-modal="true" aria-labelledby="delete-modal-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="delete-modal-title" data-i18n="containers.delete_title"></h2>
                <button type="button" class="modal-close" data-i18n-aria-label="common.close" onclick="closeDeleteModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p data-i18n="containers.delete_confirm"></p>
                <p class="ct-delete-name" id="delete-container-name"></p>
                <label class="ct-checkbox-label">
                    <input type="checkbox" id="delete-force"> <span data-i18n="containers.delete_force"></span>
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeDeleteModal()" data-i18n="common.btn_cancel"></button>
                <button class="btn btn-danger" id="delete-confirm-btn" onclick="confirmDelete()" data-i18n="common.btn_delete"></button>
            </div>
        </div>
    </div>

    <script src="/js/precision/workspace.js?v={{.BuildVersion}}"></script>
    <script src="/js/containers/main.js"></script>
</body>
</html>
