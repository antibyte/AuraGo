<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="/shared.css">`n  <link rel="stylesheet" href="/css/tailwind-compat.css">
    <script src="/shared.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aura': {
                            'accent': 'var(--accent)',
                            'bg': 'var(--bg-primary)',
                            'surface': 'var(--bg-secondary)',
                            'text': 'var(--text-primary)',
                            'muted': 'var(--text-secondary)',
                            'border': 'var(--border)',
                        }
                    }
                }
            }
        }
    </script>
    <script>
        (function () { var th = localStorage.getItem('aurago-theme'); if (th) document.documentElement.setAttribute('data-theme', th); })();
        const I18N = {{.I18N }};
    </script>
    <title>
        <script>document.write(t('missions.page_title'))</script>
    </title>
</head>

<body class="bg-aura-bg text-aura-text min-h-screen">
    <!-- App Header -->
    <header class="sticky top-0 z-50 bg-aura-surface/80 backdrop-blur-md border-b border-aura-border">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="flex items-center gap-3 text-lg font-semibold no-underline hover:opacity-80 transition-opacity">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-blue-500 to-purple-500 flex items-center justify-center text-lg">🚀</div>
                    <span class="text-aura-accent">AURA</span><span class="text-aura-text">GO</span>
                    <span class="text-xs text-aura-muted font-normal ml-1">
                        <script>document.write(t('missions.logo_subtitle'))</script>
                    </span>
                </a>
            </div>
            <div class="flex items-center gap-2">
                <button id="theme-toggle" class="w-10 h-10 rounded-lg bg-aura-surface border border-aura-border flex items-center justify-center hover:border-aura-accent hover:text-aura-accent transition-all" title="">
                    <script>document.currentScript.parentElement.title = t('common.toggle_theme')</script>
                </button>
            </div>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="container mx-auto px-4 py-6">
        <!-- Page Header -->
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
            <h1 class="text-2xl font-bold text-aura-text">
                <script>document.write(t('missions.heading'))</script>
            </h1>
            <div class="flex items-center gap-3">
                <div class="flex bg-aura-surface rounded-lg p-1 border border-aura-border" id="view-toggle">
                    <button onclick="setViewMode('grid')" title="Grid View" data-mode="grid" class="px-3 py-1.5 rounded-md text-sm font-medium hover:bg-aura-accent/10 hover:text-aura-accent transition-all">▦</button>
                    <button onclick="setViewMode('list')" title="List View" data-mode="list" class="px-3 py-1.5 rounded-md text-sm font-medium hover:bg-aura-accent/10 hover:text-aura-accent transition-all">☰</button>
                </div>
                <button class="px-4 py-2 bg-aura-accent text-white rounded-lg font-medium hover:opacity-90 transition-opacity flex items-center gap-2" onclick="openMissionModal()">
                    <span>+</span>
                    <script>document.write(t('missions.btn_new_mission'))</script>
                </button>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-aura-surface rounded-xl p-4 border border-aura-border" id="status-total">
                <div class="text-sm text-aura-muted mb-1">
                    <script>document.write(t('missions.status_total'))</script>
                </div>
                <div class="text-2xl font-bold text-aura-text">-</div>
            </div>
            <div class="bg-aura-surface rounded-xl p-4 border border-aura-border" id="status-running">
                <div class="text-sm text-aura-muted mb-1">
                    <script>document.write(t('missions.status_running'))</script>
                </div>
                <div class="text-2xl font-bold text-aura-text">-</div>
            </div>
            <div class="bg-aura-surface rounded-xl p-4 border border-aura-border" id="status-queued">
                <div class="text-sm text-aura-muted mb-1">
                    <script>document.write(t('missions.status_queue'))</script>
                </div>
                <div class="text-2xl font-bold text-aura-text">-</div>
            </div>
            <div class="bg-aura-surface rounded-xl p-4 border border-aura-border" id="status-triggered">
                <div class="text-sm text-aura-muted mb-1">
                    <script>document.write(t('missions.status_triggered'))</script>
                </div>
                <div class="text-2xl font-bold text-aura-text">-</div>
            </div>
        </div>

        <!-- Queue Section -->
        <div class="hidden bg-aura-surface rounded-xl p-6 border border-aura-border mb-6" id="queue-section">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-aura-text">
                    <script>document.write(t('missions.queue_title'))</script>
                </h3>
                <span class="px-2.5 py-1 bg-blue-500/20 text-blue-400 text-xs font-medium rounded-full">
                    <script>document.write(t('missions.queue_serial_badge'))</script>
                </span>
            </div>
            <div id="queue-items" class="space-y-2"></div>
        </div>

        <!-- Tabs -->
        <div class="flex gap-1 bg-aura-surface p-1 rounded-xl border border-aura-border mb-6 overflow-x-auto">
            <button class="tab active px-4 py-2 rounded-lg text-sm font-medium transition-all whitespace-nowrap bg-aura-accent text-white" onclick="filterMissions('all')" id="tab-all">
                <script>document.write(t('missions.filter_all'))</script>
            </button>
            <button class="tab px-4 py-2 rounded-lg text-sm font-medium text-aura-muted hover:text-aura-text transition-all whitespace-nowrap" onclick="filterMissions('manual')" id="tab-manual">
                <script>document.write(t('missions.filter_manual'))</script>
            </button>
            <button class="tab px-4 py-2 rounded-lg text-sm font-medium text-aura-muted hover:text-aura-text transition-all whitespace-nowrap" onclick="filterMissions('scheduled')" id="tab-scheduled">
                <script>document.write(t('missions.filter_scheduled'))</script>
            </button>
            <button class="tab px-4 py-2 rounded-lg text-sm font-medium text-aura-muted hover:text-aura-text transition-all whitespace-nowrap" onclick="filterMissions('triggered')" id="tab-triggered">
                <script>document.write(t('missions.filter_triggered'))</script>
            </button>
        </div>

        <!-- Missions Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="missions-grid">
            <div class="bg-aura-surface rounded-xl p-6 border border-aura-border animate-pulse">
                <div class="h-4 bg-aura-border/50 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-aura-border/50 rounded w-1/2 mb-2"></div>
                <div class="h-3 bg-aura-border/50 rounded w-2/3"></div>
            </div>
            <div class="bg-aura-surface rounded-xl p-6 border border-aura-border animate-pulse">
                <div class="h-4 bg-aura-border/50 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-aura-border/50 rounded w-1/2 mb-2"></div>
                <div class="h-3 bg-aura-border/50 rounded w-2/3"></div>
            </div>
            <div class="bg-aura-surface rounded-xl p-6 border border-aura-border animate-pulse">
                <div class="h-4 bg-aura-border/50 rounded w-3/4 mb-3"></div>
                <div class="h-3 bg-aura-border/50 rounded w-1/2 mb-2"></div>
                <div class="h-3 bg-aura-border/50 rounded w-2/3"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4" id="modal">
        <div class="bg-aura-surface rounded-2xl w-full max-w-3xl max-h-[90vh] overflow-hidden flex flex-col shadow-2xl border border-aura-border">
            <div class="flex items-center justify-between p-6 border-b border-aura-border">
                <h2 id="modal-title" class="text-xl font-bold text-aura-text"></h2>
                <button class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-aura-border/50 text-aura-muted hover:text-aura-text transition-all text-2xl" onclick="closeModal('modal')">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="mission-form" onsubmit="return false;">
                    <input type="hidden" id="mission-id">

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-aura-text mb-2">
                            <script>document.write(t('missions.form_name_label'))</script>
                        </label>
                        <input type="text" id="mission-name" required class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text placeholder-aura-muted focus:outline-none focus:border-aura-accent transition-colors">
                        <script>document.getElementById('mission-name').placeholder = t('missions.form_name_placeholder')</script>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-aura-text mb-2">
                            <script>document.write(t('missions.form_prompt_label'))</script>
                        </label>
                        <textarea id="mission-prompt" required class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text placeholder-aura-muted focus:outline-none focus:border-aura-accent transition-colors min-h-[120px] resize-y"></textarea>
                        <script>document.getElementById('mission-prompt').placeholder = t('missions.form_prompt_placeholder')</script>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-aura-text mb-2">
                            <script>document.write(t('missions.form_cheatsheets_label'))</script>
                        </label>
                        <div id="cheatsheet-picker" class="bg-aura-bg border border-aura-border rounded-lg p-4 max-h-48 overflow-y-auto">
                            <div class="text-aura-muted text-sm">
                                <script>document.write(t('missions.form_cheatsheets_loading'))</script>
                            </div>
                        </div>
                        <div class="text-xs text-aura-muted mt-1">
                            <script>document.write(t('missions.form_cheatsheets_hint'))</script>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-aura-text mb-2">
                            <script>document.write(t('missions.form_priority_label'))</script>
                        </label>
                        <select id="mission-priority" class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text focus:outline-none focus:border-aura-accent transition-colors">
                            <option value="low">
                                <script>document.write(t('missions.form_priority_low'))</script>
                            </option>
                            <option value="medium" selected>
                                <script>document.write(t('missions.form_priority_medium'))</script>
                            </option>
                            <option value="high">
                                <script>document.write(t('missions.form_priority_high'))</script>
                            </option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="block text-sm font-medium text-aura-text mb-2">
                            <script>document.write(t('missions.form_exec_type_label'))</script>
                        </label>
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <label class="relative flex flex-col items-center p-4 bg-aura-bg border border-aura-border rounded-xl cursor-pointer hover:border-aura-accent/50 transition-all group" onclick="selectExecType('manual')">
                                <input type="radio" name="exec-type" value="manual" checked class="sr-only peer">
                                <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">👆</span>
                                <span class="font-medium text-aura-text text-sm">
                                    <script>document.write(t('missions.form_exec_manual_label'))</script>
                                </span>
                                <span class="text-xs text-aura-muted text-center mt-1">
                                    <script>document.write(t('missions.form_exec_manual_desc'))</script>
                                </span>
                                <div class="absolute inset-0 border-2 border-aura-accent rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                            </label>
                            <label class="relative flex flex-col items-center p-4 bg-aura-bg border border-aura-border rounded-xl cursor-pointer hover:border-aura-accent/50 transition-all group" onclick="selectExecType('scheduled')">
                                <input type="radio" name="exec-type" value="scheduled" class="sr-only peer">
                                <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">📅</span>
                                <span class="font-medium text-aura-text text-sm">
                                    <script>document.write(t('missions.form_exec_scheduled_label'))</script>
                                </span>
                                <span class="text-xs text-aura-muted text-center mt-1">
                                    <script>document.write(t('missions.form_exec_scheduled_desc'))</script>
                                </span>
                                <div class="absolute inset-0 border-2 border-aura-accent rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                            </label>
                            <label class="relative flex flex-col items-center p-4 bg-aura-bg border border-aura-border rounded-xl cursor-pointer hover:border-aura-accent/50 transition-all group" onclick="selectExecType('triggered')">
                                <input type="radio" name="exec-type" value="triggered" class="sr-only peer">
                                <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">⚡</span>
                                <span class="font-medium text-aura-text text-sm">
                                    <script>document.write(t('missions.form_exec_triggered_label'))</script>
                                </span>
                                <span class="text-xs text-aura-muted text-center mt-1">
                                    <script>document.write(t('missions.form_exec_triggered_desc'))</script>
                                </span>
                                <div class="absolute inset-0 border-2 border-aura-accent rounded-xl opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                            </label>
                        </div>
                    </div>

                    <!-- Scheduled Config -->
                    <div id="config-scheduled" class="hidden space-y-4 p-4 bg-aura-bg/50 rounded-xl border border-aura-border/50">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-aura-text mb-2">
                                <script>document.write(t('missions.form_cron_preset_label'))</script>
                            </label>
                            <select id="cron-preset" onchange="applyCronPreset(this.value)" class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text focus:outline-none focus:border-aura-accent transition-colors">
                                <option value="">
                                    <script>document.write(t('missions.form_cron_preset_custom'))</script>
                                </option>
                                <option value="*/5 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_5min'))</script>
                                </option>
                                <option value="*/15 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_15min'))</script>
                                </option>
                                <option value="*/30 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_30min'))</script>
                                </option>
                                <option value="0 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_hour'))</script>
                                </option>
                                <option value="0 */6 * * *">
                                    <script>document.write(t('missions.cron_preset_every_6hours'))</script>
                                </option>
                                <option value="0 0 * * *">
                                    <script>document.write(t('missions.cron_preset_daily_midnight'))</script>
                                </option>
                                <option value="0 9 * * *">
                                    <script>document.write(t('missions.cron_preset_daily_9am'))</script>
                                </option>
                                <option value="0 9 * * 1">
                                    <script>document.write(t('missions.cron_preset_weekly_monday'))</script>
                                </option>
                                <option value="0 0 1 * *">
                                    <script>document.write(t('missions.cron_preset_monthly_first'))</script>
                                </option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-aura-text mb-2">
                                <script>document.write(t('missions.form_cron_label'))</script>
                            </label>
                            <input type="text" id="cron-schedule" class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text placeholder-aura-muted focus:outline-none focus:border-aura-accent transition-colors font-mono text-sm">
                            <script>document.getElementById('cron-schedule').placeholder = t('missions.form_cron_placeholder')</script>
                            <div class="text-xs text-aura-muted mt-1">
                                <script>document.write(t('missions.form_cron_hint'))</script>
                            </div>
                        </div>
                    </div>

                    <!-- Triggered Config -->
                    <div id="config-triggered" class="hidden space-y-4">
                        <div class="flex flex-wrap gap-2">
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="mission_completed" onclick="selectTriggerType('mission_completed')">
                                <script>document.write(t('missions.trigger_mission_completed'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="email_received" onclick="selectTriggerType('email_received')">
                                <script>document.write(t('missions.trigger_email_received'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="webhook" onclick="selectTriggerType('webhook')">
                                <script>document.write(t('missions.trigger_webhook'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="egg_hatched" onclick="selectTriggerType('egg_hatched')">
                                <script>document.write(t('missions.trigger_egg_hatched'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="nest_cleared" onclick="selectTriggerType('nest_cleared')">
                                <script>document.write(t('missions.trigger_nest_cleared'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="mqtt_message" onclick="selectTriggerType('mqtt_message')">
                                <script>document.write(t('missions.trigger_mqtt_message'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="system_startup" onclick="selectTriggerType('system_startup')">
                                <script>document.write(t('missions.trigger_system_startup'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="device_connected" onclick="selectTriggerType('device_connected')">
                                <script>document.write(t('missions.trigger_device_connected'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="device_disconnected" onclick="selectTriggerType('device_disconnected')">
                                <script>document.write(t('missions.trigger_device_disconnected'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="fritzbox_call" onclick="selectTriggerType('fritzbox_call')">
                                <script>document.write(t('missions.trigger_fritzbox_call'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="budget_warning" onclick="selectTriggerType('budget_warning')">
                                <script>document.write(t('missions.trigger_budget_warning'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn px-3 py-1.5 bg-aura-bg border border-aura-border rounded-lg text-sm text-aura-text hover:border-aura-accent hover:text-aura-accent transition-all" data-trigger="budget_exceeded" onclick="selectTriggerType('budget_exceeded')">
                                <script>document.write(t('missions.trigger_budget_exceeded'))</script>
                            </button>
                        </div>

                        <!-- System Startup Trigger -->
                        <div id="trigger-system_startup" class="trigger-fields hidden">
                            <div class="text-sm text-aura-muted">
                                <script>document.write(t('missions.trigger_system_startup_hint'))</script>
                            </div>
                        </div>

                        <!-- Mission Completed Trigger -->
                        <div id="trigger-mission_completed" class="trigger-fields hidden space-y-4">
                            <div class="mb-4">
                                <label class="block text-sm font-medium text-aura-text mb-2">
                                    <script>document.write(t('missions.trigger_source_mission_label'))</script>
                                </label>
                                <div id="mission-selector" class="bg-aura-bg border border-aura-border rounded-lg p-4"></div>
                            </div>
                            <div class="flex items-center gap-3">
                                <label class="relative inline-flex items-center cursor-pointer">
                                    <input type="checkbox" id="require-success" class="sr-only peer">
                                    <div class="w-11 h-6 bg-aura-border peer-focus:ring-2 peer-focus:ring-aura-accent/50 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-aura-accent"></div>
                                </label>
                                <span class="text-sm text-aura-muted">
                                    <script>document.write(t('missions.trigger_require_success'))</script>
                                </span>
                            </div>
                        </div>

                        <!-- Email Trigger -->
                        <div id="trigger-email_received" class="trigger-fields hidden space-y-4">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div class="mb-4">
                                    <label class="block text-sm font-medium text-aura-text mb-2">
                                        <script>document.write(t('missions.trigger_email_folder_label'))</script>
                                    </label>
                                    <select id="email-folder" class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text focus:outline-none focus:border-aura-accent transition-colors">
                                        <option value="INBOX">
                                            <script>document.write(t('missions.trigger_email_folder_inbox'))</script>
                                        </option>
                                        <option value="Sent">
                                            <script>document.write(t('missions.trigger_email_folder_sent'))</script>
                                        </option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label class="block text-sm font-medium text-aura-text mb-2">
                                        <script>document.write(t('missions.trigger_email_subject_label'))</script>
                                    </label>
                                    <input type="text" id="email-subject" class="w-full px-4 py-2 bg-aura-bg border border-aura-border rounded-lg text-aura-text placeholder-aura-muted focus:outline-none focus:border-aura-accent transition-colors">
                                    <script>document.getElementById('email-subject').placeholder = t('missions.trigger_email_subject_placeholder')</script>
                                </div>
