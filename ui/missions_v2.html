<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js"></script>
    <script>
        (function () { var th = localStorage.getItem('aurago-theme'); if (th) document.documentElement.setAttribute('data-theme', th); })();
        const I18N = {{.I18N }};
    </script>
    <title>
        <script>document.write(t('missions.page_title'))</script>
    </title>
    <link rel="stylesheet" href="/css/missions.css">
    <link rel="stylesheet" href="/css/enhancements.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<body>
    <!-- App Header -->
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🚀</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle">
                    <script>document.write(t('missions.logo_subtitle'))</script>
                </span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn-theme">
                <script>document.currentScript.parentElement.title = t('common.toggle_theme')</script>
            </button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="container">
        <!-- Page Header -->
        <div class="page-header">
            <h1>
                <script>document.write(t('missions.heading'))</script>
            </h1>
            <div class="header-actions">
                <div class="view-toggle" id="view-toggle">
                    <button onclick="setViewMode('grid')" title="Grid View" data-mode="grid">▦</button>
                    <button onclick="setViewMode('list')" title="List View" data-mode="list">☰</button>
                </div>
                <button class="btn btn-primary" onclick="openMissionModal()">
                    <span>+</span>
                    <script>document.write(t('missions.btn_new_mission'))</script>
                </button>
            </div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-card" id="status-total">
                <div class="status-label">
                    <script>document.write(t('missions.status_total'))</script>
                </div>
                <div class="status-value">-</div>
            </div>
            <div class="status-card" id="status-running">
                <div class="status-label">
                    <script>document.write(t('missions.status_running'))</script>
                </div>
                <div class="status-value">-</div>
            </div>
            <div class="status-card" id="status-queued">
                <div class="status-label">
                    <script>document.write(t('missions.status_queue'))</script>
                </div>
                <div class="status-value">-</div>
            </div>
            <div class="status-card" id="status-triggered">
                <div class="status-label">
                    <script>document.write(t('missions.status_triggered'))</script>
                </div>
                <div class="status-value">-</div>
            </div>
        </div>

        <!-- Queue Section -->
        <div class="queue-section is-hidden" id="queue-section">
            <div class="queue-header">
                <h3>
                    <script>document.write(t('missions.queue_title'))</script>
                </h3>
                <span class="badge badge-running">
                    <script>document.write(t('missions.queue_serial_badge'))</script>
                </span>
            </div>
            <div class="queue-items" id="queue-items"></div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="filterMissions('all')" id="tab-all">
                <script>document.write(t('missions.filter_all'))</script>
            </button>
            <button class="tab" onclick="filterMissions('manual')" id="tab-manual">
                <script>document.write(t('missions.filter_manual'))</script>
            </button>
            <button class="tab" onclick="filterMissions('scheduled')" id="tab-scheduled">
                <script>document.write(t('missions.filter_scheduled'))</script>
            </button>
            <button class="tab" onclick="filterMissions('triggered')" id="tab-triggered">
                <script>document.write(t('missions.filter_triggered'))</script>
            </button>
        </div>

        <!-- Missions Grid -->
        <div class="missions-grid" id="missions-grid">
            <div class="mission-card skeleton mission-card-skeleton"></div>
            <div class="mission-card skeleton mission-card-skeleton"></div>
            <div class="mission-card skeleton mission-card-skeleton"></div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" onclick="closeModal('modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="mission-form" onsubmit="return false;">
                    <input type="hidden" id="mission-id">

                    <div class="form-group">
                        <label>
                            <script>document.write(t('missions.form_name_label'))</script>
                        </label>
                        <input type="text" id="mission-name" required>
                        <script>document.getElementById('mission-name').placeholder = t('missions.form_name_placeholder')</script>
                    </div>

                    <div class="form-group">
                        <label>
                            <script>document.write(t('missions.form_prompt_label'))</script>
                        </label>
                        <textarea class="form-textarea" id="mission-prompt" required></textarea>
                        <script>document.getElementById('mission-prompt').placeholder = t('missions.form_prompt_placeholder')</script>
                    </div>

                    <div class="form-group">
                        <label>
                            <script>document.write(t('missions.form_cheatsheets_label'))</script>
                        </label>
                        <div id="cheatsheet-picker" class="cheatsheet-picker">
                            <div class="cheatsheet-picker-empty">
                                <script>document.write(t('missions.form_cheatsheets_loading'))</script>
                            </div>
                        </div>
                        <div class="form-hint">
                            <script>document.write(t('missions.form_cheatsheets_hint'))</script>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>
                            <script>document.write(t('missions.form_priority_label'))</script>
                        </label>
                        <select id="mission-priority" class="form-select">
                            <option value="low">
                                <script>document.write(t('missions.form_priority_low'))</script>
                            </option>
                            <option value="medium" selected>
                                <script>document.write(t('missions.form_priority_medium'))</script>
                            </option>
                            <option value="high">
                                <script>document.write(t('missions.form_priority_high'))</script>
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <script>document.write(t('missions.form_exec_type_label'))</script>
                        </label>
                        <div class="exec-type-selector">
                            <label class="exec-type-option" onclick="selectExecType('manual')">
                                <input type="radio" name="exec-type" value="manual" checked>
                                <span class="exec-icon">👆</span>
                                <span class="exec-label">
                                    <script>document.write(t('missions.form_exec_manual_label'))</script>
                                </span>
                                <span class="exec-desc">
                                    <script>document.write(t('missions.form_exec_manual_desc'))</script>
                                </span>
                            </label>
                            <label class="exec-type-option" onclick="selectExecType('scheduled')">
                                <input type="radio" name="exec-type" value="scheduled">
                                <span class="exec-icon">📅</span>
                                <span class="exec-label">
                                    <script>document.write(t('missions.form_exec_scheduled_label'))</script>
                                </span>
                                <span class="exec-desc">
                                    <script>document.write(t('missions.form_exec_scheduled_desc'))</script>
                                </span>
                            </label>
                            <label class="exec-type-option" onclick="selectExecType('triggered')">
                                <input type="radio" name="exec-type" value="triggered">
                                <span class="exec-icon">⚡</span>
                                <span class="exec-label">
                                    <script>document.write(t('missions.form_exec_triggered_label'))</script>
                                </span>
                                <span class="exec-desc">
                                    <script>document.write(t('missions.form_exec_triggered_desc'))</script>
                                </span>
                            </label>
                        </div>
                    </div>

                    <!-- Scheduled Config -->
                    <div id="config-scheduled" class="trigger-config is-hidden">
                        <div class="form-group">
                            <label>
                                <script>document.write(t('missions.form_cron_preset_label'))</script>
                            </label>
                            <select id="cron-preset" onchange="applyCronPreset(this.value)">
                                <option value="">
                                    <script>document.write(t('missions.form_cron_preset_custom'))</script>
                                </option>
                                <option value="*/5 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_5min'))</script>
                                </option>
                                <option value="*/15 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_15min'))</script>
                                </option>
                                <option value="*/30 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_30min'))</script>
                                </option>
                                <option value="0 * * * *">
                                    <script>document.write(t('missions.cron_preset_every_hour'))</script>
                                </option>
                                <option value="0 */6 * * *">
                                    <script>document.write(t('missions.cron_preset_every_6hours'))</script>
                                </option>
                                <option value="0 0 * * *">
                                    <script>document.write(t('missions.cron_preset_daily_midnight'))</script>
                                </option>
                                <option value="0 9 * * *">
                                    <script>document.write(t('missions.cron_preset_daily_9am'))</script>
                                </option>
                                <option value="0 9 * * 1">
                                    <script>document.write(t('missions.cron_preset_weekly_monday'))</script>
                                </option>
                                <option value="0 0 1 * *">
                                    <script>document.write(t('missions.cron_preset_monthly_first'))</script>
                                </option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>
                                <script>document.write(t('missions.form_cron_label'))</script>
                            </label>
                            <input type="text" id="cron-schedule">
                            <script>document.getElementById('cron-schedule').placeholder = t('missions.form_cron_placeholder')</script>
                            <div class="form-hint">
                                <script>document.write(t('missions.form_cron_hint'))</script>
                            </div>
                        </div>
                    </div>

                    <!-- Triggered Config -->
                    <div id="config-triggered" class="trigger-config is-hidden">
                        <div class="trigger-type-selector">
                            <button type="button" class="trigger-type-btn" data-trigger="mission_completed"
                                onclick="selectTriggerType('mission_completed')">
                                <script>document.write(t('missions.trigger_mission_completed'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="email_received"
                                onclick="selectTriggerType('email_received')">
                                <script>document.write(t('missions.trigger_email_received'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="webhook"
                                onclick="selectTriggerType('webhook')">
                                <script>document.write(t('missions.trigger_webhook'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="egg_hatched"
                                onclick="selectTriggerType('egg_hatched')">
                                <script>document.write(t('missions.trigger_egg_hatched'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="nest_cleared"
                                onclick="selectTriggerType('nest_cleared')">
                                <script>document.write(t('missions.trigger_nest_cleared'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="mqtt_message"
                                onclick="selectTriggerType('mqtt_message')">
                                <script>document.write(t('missions.trigger_mqtt_message'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="system_startup"
                                onclick="selectTriggerType('system_startup')">
                                <script>document.write(t('missions.trigger_system_startup'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="device_connected"
                                onclick="selectTriggerType('device_connected')">
                                <script>document.write(t('missions.trigger_device_connected'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="device_disconnected"
                                onclick="selectTriggerType('device_disconnected')">
                                <script>document.write(t('missions.trigger_device_disconnected'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="fritzbox_call"
                                onclick="selectTriggerType('fritzbox_call')">
                                <script>document.write(t('missions.trigger_fritzbox_call'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="budget_warning"
                                onclick="selectTriggerType('budget_warning')">
                                <script>document.write(t('missions.trigger_budget_warning'))</script>
                            </button>
                            <button type="button" class="trigger-type-btn" data-trigger="budget_exceeded"
                                onclick="selectTriggerType('budget_exceeded')">
                                <script>document.write(t('missions.trigger_budget_exceeded'))</script>
                            </button>
                        </div>

                        <!-- System Startup Trigger -->
                        <div id="trigger-system_startup" class="trigger-fields">
                            <div class="form-hint form-hint-tight">
                                <script>document.write(t('missions.trigger_system_startup_hint'))</script>
                            </div>
                        </div>

                        <!-- Mission Completed Trigger -->
                        <div id="trigger-mission_completed" class="trigger-fields">
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_source_mission_label'))</script>
                                </label>
                                <div class="mission-selector" id="mission-selector"></div>
                            </div>
                            <div class="form-group">
                                <label class="toggle">
                                    <input type="checkbox" id="require-success">
                                    <span class="slider"></span>
                                </label>
                                <span class="inline-note">
                                    <script>document.write(t('missions.trigger_require_success'))</script>
                                </span>
                            </div>
                        </div>

                        <!-- Email Trigger -->
                        <div id="trigger-email_received" class="trigger-fields">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_email_folder_label'))</script>
                                    </label>
                                    <select id="email-folder" class="form-select">
                                        <option value="INBOX">
                                            <script>document.write(t('missions.trigger_email_folder_inbox'))</script>
                                        </option>
                                        <option value="Sent">
                                            <script>document.write(t('missions.trigger_email_folder_sent'))</script>
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_email_subject_label'))</script>
                                    </label>
                                    <input type="text" id="email-subject">
                                    <script>document.getElementById('email-subject').placeholder = t('missions.trigger_email_subject_placeholder')</script>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_email_from_label'))</script>
                                </label>
                                <input type="text" id="email-from">
                                <script>document.getElementById('email-from').placeholder = t('missions.trigger_email_from_placeholder')</script>
                            </div>
                        </div>

                        <!-- Webhook Trigger -->
                        <div id="trigger-webhook" class="trigger-fields">
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_webhook_label'))</script>
                                </label>
                                <select id="webhook-select" class="form-select">
                                    <option value="">
                                        <script>document.write(t('missions.trigger_webhook_loading'))</script>
                                    </option>
                                </select>
                                <div class="form-hint">
                                    <script>document.write(t('missions.trigger_webhook_hint'))</script>
                                </div>
                            </div>
                        </div>

                        <!-- Egg Hatched Trigger -->
                        <div id="trigger-egg_hatched" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_egg_hatched_hint'))</script>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_egg_select_label'))</script>
                                    </label>
                                    <select id="egg-hatched-egg-select" class="form-select">
                                        <option value="">
                                            <script>document.write(t('missions.trigger_egg_any'))</script>
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_nest_select_label'))</script>
                                    </label>
                                    <select id="egg-hatched-nest-select" class="form-select">
                                        <option value="">
                                            <script>document.write(t('missions.trigger_nest_any'))</script>
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- Nest Cleared Trigger -->
                        <div id="trigger-nest_cleared" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_nest_cleared_hint'))</script>
                            </div>
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_nest_select_label'))</script>
                                </label>
                                <select id="nest-cleared-nest-select" class="form-select">
                                    <option value="">
                                        <script>document.write(t('missions.trigger_nest_any'))</script>
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- MQTT Message Trigger -->
                        <div id="trigger-mqtt_message" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_mqtt_hint'))</script>
                            </div>
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_mqtt_topic_label'))</script>
                                </label>
                                <input type="text" id="mqtt-topic">
                                <script>document.getElementById('mqtt-topic').placeholder = t('missions.trigger_mqtt_topic_placeholder')</script>
                                <div class="form-hint">
                                    <script>document.write(t('missions.trigger_mqtt_topic_hint'))</script>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_mqtt_payload_label'))</script>
                                </label>
                                <input type="text" id="mqtt-payload-contains">
                                <script>document.getElementById('mqtt-payload-contains').placeholder = t('missions.trigger_mqtt_payload_placeholder')</script>
                                <div class="form-hint">
                                    <script>document.write(t('missions.trigger_mqtt_payload_hint'))</script>
                                </div>
                            </div>
                        </div>

                        <!-- Device Connected Trigger -->
                        <div id="trigger-device_connected" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_device_connected_hint'))</script>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_device_id_label'))</script>
                                    </label>
                                    <input type="text" id="device-connected-id">
                                    <script>document.getElementById('device-connected-id').placeholder = t('missions.trigger_device_id_placeholder')</script>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_device_name_label'))</script>
                                    </label>
                                    <input type="text" id="device-connected-name">
                                    <script>document.getElementById('device-connected-name').placeholder = t('missions.trigger_device_name_placeholder')</script>
                                </div>
                            </div>
                        </div>

                        <!-- Device Disconnected Trigger -->
                        <div id="trigger-device_disconnected" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_device_disconnected_hint'))</script>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_device_id_label'))</script>
                                    </label>
                                    <input type="text" id="device-disconnected-id">
                                    <script>document.getElementById('device-disconnected-id').placeholder = t('missions.trigger_device_id_placeholder')</script>
                                </div>
                                <div class="form-group">
                                    <label>
                                        <script>document.write(t('missions.trigger_device_name_label'))</script>
                                    </label>
                                    <input type="text" id="device-disconnected-name">
                                    <script>document.getElementById('device-disconnected-name').placeholder = t('missions.trigger_device_name_placeholder')</script>
                                </div>
                            </div>
                        </div>

                        <!-- Fritz!Box Call Trigger -->
                        <div id="trigger-fritzbox_call" class="trigger-fields">
                            <div class="form-hint form-hint-spaced">
                                <script>document.write(t('missions.trigger_fritzbox_call_hint'))</script>
                            </div>
                            <div class="form-group">
                                <label>
                                    <script>document.write(t('missions.trigger_fritzbox_call_type_label'))</script>
                                </label>
                                <select id="fritzbox-call-type" class="form-select">
                                    <option value="">
                                        <script>document.write(t('missions.trigger_fritzbox_call_type_any'))</script>
                                    </option>
                                    <option value="call">
                                        <script>document.write(t('missions.trigger_fritzbox_call_type_call'))</script>
                                    </option>
                                    <option value="tam_message">
                                        <script>document.write(t('missions.trigger_fritzbox_call_type_tam'))</script>
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Budget Warning Trigger -->
                        <div id="trigger-budget_warning" class="trigger-fields">
                            <div class="form-hint form-hint-tight">
                                <script>document.write(t('missions.trigger_budget_warning_hint'))</script>
                            </div>
                        </div>

                        <!-- Budget Exceeded Trigger -->
                        <div id="trigger-budget_exceeded" class="trigger-fields">
                            <div class="form-hint form-hint-tight">
                                <script>document.write(t('missions.trigger_budget_exceeded_hint'))</script>
                            </div>
                        </div>
                    </div>

                    <div class="form-group form-group-inline mt-lg">
                        <label class="toggle">
                            <input type="checkbox" id="mission-locked">
                            <span class="slider"></span>
                        </label>
                        <div>
                            <div class="font-medium">
                                <script>document.write(t('missions.form_lock_label'))</script>
                            </div>
                            <div class="form-hint">
                                <script>document.write(t('missions.form_lock_hint'))</script>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeModal('modal')">
                    <script>document.write(t('missions.modal_btn_cancel'))</script>
                </button>
                <button type="button" class="btn btn-primary" onclick="saveMission()">
                    <script>document.write(t('missions.modal_btn_save'))</script>
                </button>
            </div>
        </div>
    </div>

    <script src="/js/missions/main.js"></script>
</body>

</html>
