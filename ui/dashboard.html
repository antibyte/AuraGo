<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="dashboard.page_title">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="AuraGo" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title></title>
  <meta name="description" content="Monitor and manage your AI agent">
  <meta property="og:title" content="AuraGo Dashboard">
  <meta property="og:description" content="Monitor and manage your AI agent">
  <meta property="og:image" content="/aurago_logo_dark.png">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="/shared-variables.css">
  <link rel="stylesheet" href="/shared-utilities.css">
  <link rel="stylesheet" href="/shared-components.css?v=20260425a">
  <link rel="stylesheet" href="/shared-animations.css">
    <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
  <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
  <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
  <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
  <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
  <link href="/fonts/fonts.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/tokens.css">
  <link rel="stylesheet" href="/css/dashboard.css?v={{.BuildVersion}}">
  <link rel="stylesheet" href="/css/enhancements.css?v=20260425a">
  <link rel="stylesheet" href="/css/precision-workspace.css?v={{.BuildVersion}}">
  <link rel="stylesheet" href="/css/precision-pages.css?v={{.BuildVersion}}">
  <script src="/chart.min.js" defer></script>
  <script src="/js/vendor/force-graph.min.js" defer></script>
  <script src="/js/dashboard/dash-icons.js?v={{.BuildVersion}}" defer></script>
</head>

<body class="pw-page pw-operational-page" data-workspace-page="dashboard" data-density="comfortable">
  <a href="#tab-overview" class="skip-link" data-i18n="common.skip_to_content"></a>

  <!-- Header -->
  <header class="app-header">
    <a href="/" class="logo">
      <div class="logo-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" fill="currentColor" stroke="none"/><rect x="13" y="7" width="3" height="10" fill="currentColor" stroke="none"/></svg></div>
      <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
      <span class="logo-subtitle" data-i18n="dashboard.logo_subtitle"></span>
    </a>
    <div class="dash-header-title">
      <h1 class="dash-page-heading" data-i18n="dashboard.page_heading"></h1>
      <p class="dash-page-subheading" data-i18n="dashboard.page_heading_sub"></p>
    </div>
    <div class="header-actions">
      <button id="dash-density-toggle" type="button" class="pw-density-toggle" aria-pressed="false"
          data-pw-density-toggle data-i18n-title="common.workspace_density_toggle"
          data-i18n-aria-label="common.workspace_density_toggle">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M5 7h14M5 12h14M5 17h14" />
        </svg>
        <span data-pw-density-label data-i18n="common.workspace_density_comfortable"></span>
      </button>
      <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
    </div>
  </header>

  <div id="radialMenuAnchor"></div>

  <!-- Agent Status Banner – always visible above tabs -->
  <div class="dash-banner-always">
    <div class="dash-card dash-full-width" id="card-agent-banner">
      <div class="dash-card-header"><svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="8" width="16" height="12" rx="2"/><circle cx="9" cy="14" r="1.5" fill="currentColor" stroke="none"/><circle cx="15" cy="14" r="1.5" fill="currentColor" stroke="none"/><path d="M12 4v4M9 2h6"/></svg> <span data-i18n="dashboard.agent_banner_title"></span></div>
      <div class="dash-card-body">
        <div class="agent-banner" id="agent-banner">
          <div class="agent-banner-item"><span class="status-dot gray" id="ab-status-dot" role="img" data-i18n-aria-label="dashboard.status_label"></span> <strong id="ab-model">—</strong></div>
          <div class="agent-banner-sep"></div>
          <div class="agent-banner-item"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M8 11l2 2-2 2M16 11l-2 2 2 2" stroke-linecap="round"/><circle cx="9" cy="9" r="1" fill="currentColor" stroke="none"/><circle cx="15" cy="9" r="1" fill="currentColor" stroke="none"/></svg> <strong id="ab-personality">—</strong></div>
          <div class="agent-banner-sep"></div>
          <div class="agent-banner-item context-gauge"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><line x1="4" y1="6" x2="4" y2="10"/><line x1="4" y1="14" x2="4" y2="18"/><line x1="12" y1="6" x2="12" y2="8"/><line x1="12" y1="12" x2="12" y2="18"/><line x1="20" y1="6" x2="20" y2="12"/><line x1="20" y1="16" x2="20" y2="18"/><circle cx="4" cy="12" r="2"/><circle cx="12" cy="10" r="2"/><circle cx="20" cy="14" r="2"/></svg> <span data-i18n="dashboard.agent_banner_context"></span> <div class="context-gauge-bar"><div class="context-gauge-fill" id="ab-ctx-fill"></div></div> <span id="ab-ctx-pct">—</span></div>
          <div class="agent-banner-sep"></div>
          <div class="agent-banner-item" id="ab-integrations"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 2v6M15 2v6M6 8h12v4a6 6 0 0 1-12 0z"/><path d="M12 18v4" stroke-linecap="round"/></svg> <strong>—</strong> <span data-i18n="dashboard.agent_banner_integrations"></span></div>
          <div class="agent-banner-sep"></div>
          <div class="agent-banner-item" id="ab-last-activity"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> <span>—</span></div>
          <div class="agent-banner-sep"></div>
          <div class="agent-banner-item" id="ab-maintenance"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M14 7l3-3 3 3-3 3z"/><path d="M5 12l3-3 4 4-3 3zM14 7l3 3" stroke-linecap="round"/></svg> <span>—</span></div>
        </div>
      </div>
    </div>
  </div><!-- .dash-banner-always -->

  <!-- Tab Navigation: primary (health) · knowledge · ops -->
  <nav class="dash-tabs" id="dashTabs" role="tablist" data-i18n-aria-label="dashboard.tablist_label">
    <button class="dash-tab active dash-tab-primary" data-tab="overview" id="dash-tab-overview" data-tab-group="primary" role="tab" aria-selected="true" aria-controls="tab-overview" tabindex="0" data-i18n-title="dashboard.tab_overview">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_overview"></span>
    </button>
    <button class="dash-tab dash-tab-primary" data-tab="agent" id="dash-tab-agent" data-tab-group="primary" role="tab" aria-selected="false" aria-controls="tab-agent" tabindex="-1" data-i18n-title="dashboard.tab_agent">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v.5A3.5 3.5 0 0 0 5.5 9c0 1 .4 1.9 1 2.5A3.5 3.5 0 0 0 5 15.5c0 1.9 1.3 3.5 3 3.8V21a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1.7c1.7-.3 3-1.9 3-3.8a3.5 3.5 0 0 0-1.5-4c.6-.6 1-1.5 1-2.5A3.5 3.5 0 0 0 15 5.5V5a3 3 0 0 0-3-3z"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_agent"></span>
    </button>
    <button class="dash-tab dash-tab-primary" data-tab="user" id="dash-tab-user" data-tab-group="primary" role="tab" aria-selected="false" aria-controls="tab-user" tabindex="-1" data-i18n-title="dashboard.tab_user">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_user"></span>
    </button>
    <span class="dash-tab-group-sep" role="presentation" aria-hidden="true"></span>
    <button class="dash-tab" data-tab="knowledge" id="dash-tab-knowledge" data-tab-group="knowledge" role="tab" aria-selected="false" aria-controls="tab-knowledge" tabindex="-1" data-i18n-title="dashboard.tab_knowledge">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="2"/><circle cx="5" cy="5" r="1.5"/><circle cx="19" cy="5" r="1.5"/><circle cx="5" cy="19" r="1.5"/><circle cx="19" cy="19" r="1.5"/><line x1="6.5" y1="6.5" x2="10.5" y2="10.5"/><line x1="13.5" y1="10.5" x2="17.5" y2="6.5"/><line x1="6.5" y1="17.5" x2="10.5" y2="13.5"/><line x1="13.5" y1="13.5" x2="17.5" y2="17.5"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_knowledge"></span>
    </button>
    <button class="dash-tab" data-tab="filesync" id="dash-tab-filesync" data-tab-group="knowledge" role="tab" aria-selected="false" aria-controls="tab-filesync" tabindex="-1" data-i18n-title="dashboard.tab_filesync">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2v6m0 0L8 6m4 2l4-2"/><rect x="3" y="8" width="18" height="13" rx="2"/><path d="M7 13h2v4H7zm8 0h2v4h-2z" fill="currentColor" stroke="none"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_filesync"></span>
    </button>
    <span class="dash-tab-group-sep" role="presentation" aria-hidden="true"></span>
    <button class="dash-tab" data-tab="audit" id="dash-tab-audit" data-tab-group="ops" role="tab" aria-selected="false" aria-controls="tab-audit" tabindex="-1" data-i18n-title="dashboard.tab_audit">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_audit"></span>
    </button>
    <button class="dash-tab" data-tab="cronjobs" id="dash-tab-cronjobs" data-tab-group="ops" role="tab" aria-selected="false" aria-controls="tab-cronjobs" tabindex="-1" data-i18n-title="dashboard.tab_cronjobs">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_cronjobs"></span>
    </button>
    <button class="dash-tab" data-tab="system" id="dash-tab-system" data-tab-group="ops" role="tab" aria-selected="false" aria-controls="tab-system" tabindex="-1" data-i18n-title="dashboard.tab_system">
      <span class="tab-icon"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1"/></svg></span><span class="tab-label" data-i18n="dashboard.tab_system"></span>
    </button>
  </nav>

  <!-- ═══ Tab 1: Übersicht ═══════════════════════════════════════════════ -->
  <div class="dash-tab-panel" id="tab-overview" role="tabpanel" aria-labelledby="dash-tab-overview">
    <div class="dash-grid">

    <!-- 1. System Health -->
    <div class="dash-card" id="card-system">
      <div class="dash-card-header"><svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21" stroke-linecap="round"/><line x1="12" y1="17" x2="12" y2="21" stroke-linecap="round"/></svg> <span data-i18n="dashboard.system_title"></span> <button type="button" class="collapse-toggle" data-card="card-system" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button></div>
      <div class="dash-card-body">
        <div class="gauge-grid">
          <div class="gauge-item">
            <canvas id="cpu-chart"></canvas>
            <div class="gauge-value" id="cpu-val">—</div>
            <div class="gauge-label" data-i18n="dashboard.system_cpu"></div>
          </div>
          <div class="gauge-item">
            <canvas id="ram-chart"></canvas>
            <div class="gauge-value" id="ram-val">—</div>
            <div class="gauge-label" data-i18n="dashboard.system_ram"></div>
          </div>
          <div class="gauge-item">
            <canvas id="disk-chart"></canvas>
            <div class="gauge-value" id="disk-val">—</div>
            <div class="gauge-label" data-i18n="dashboard.system_disk"></div>
          </div>
        </div>
        <div class="stats-grid" id="system-stats">
          <div class="stat-item">
            <div class="stat-value" id="net-sent">—</div>
            <div class="stat-label" data-i18n="dashboard.system_net_sent"></div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="net-recv">—</div>
            <div class="stat-label" data-i18n="dashboard.system_net_recv"></div>
          </div>
          <div class="stat-item">
            <div class="stat-value" id="sse-clients">—</div>
            <div class="stat-label" data-i18n="dashboard.system_sse_clients"></div>
          </div>
        </div>
        <div class="stats-grid stats-grid-single">
          <div class="stat-item">
            <div class="stat-value" id="uptime-val">—</div>
            <div class="stat-label" data-i18n="dashboard.system_uptime"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 2. Quick Status -->
    <div class="dash-card" id="card-quickstatus">
      <div class="dash-card-header"><svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M13 2L3 14h7l-1 8 10-12h-7z" fill="currentColor" stroke="none"/></svg> <span data-i18n="dashboard.quickstatus_title"></span> <button type="button" class="collapse-toggle" data-card="card-quickstatus" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button></div>
      <div class="dash-card-body">
        <div class="qs-grid" id="qs-grid"></div>
      </div>
    </div>

    <!-- 3. Budget & Tokens -->
    <div class="dash-card" id="card-budget">
      <div class="dash-card-header"><svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="15" r="1.5" fill="currentColor" stroke="none"/></svg> <span data-i18n="dashboard.budget_title"></span> <button type="button" class="collapse-toggle" data-card="card-budget" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button></div>
      <div class="dash-card-body">
        <div id="budget-content">
          <div class="budget-badges" id="budget-badges"></div>
          <div class="budget-layout">
            <div class="budget-doughnut-wrap">
              <canvas id="budget-chart"></canvas>
              <div class="budget-center">
                <div class="amount" id="budget-spent">$0.00</div>
                <div class="sublabel" id="budget-sublabel">of $0.00</div>
              </div>
            </div>
            <div class="budget-bar-wrap">
              <canvas id="budget-models-chart"></canvas>
            </div>
          </div>
          <div class="budget-reset" id="budget-reset"></div>
          <div class="credits-row" id="credits-row">
            <span data-i18n="dashboard.budget_openrouter_credits"></span>
            <span class="credits-val" id="credits-balance">—</span>
          </div>
          <!-- Per-LLM average token consumption -->
          <div id="budget-llm-avg-wrap" class="mt-sm">
            <h4 class="dash-subheading" data-i18n="dashboard.budget_llm_avg_title"></h4>
            <div class="chart-wrap-sm">
              <canvas id="budget-llm-avg-chart"></canvas>
            </div>
          </div>
        </div>
        <div id="budget-disabled" class="empty-state" data-i18n="dashboard.budget_disabled"></div>
      </div>
    </div>

    <!-- 4. Optimization -->
    <div class="dash-card" id="card-optimization">
      <div class="dash-card-header"><svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.9 4.9l2.1 2.1M17 17l2.1 2.1M4.9 19.1L7 17M17 7l2.1-2.1" stroke-linecap="round"/></svg> <span data-i18n="dashboard.optimization_title"></span> <button type="button" class="collapse-toggle" data-card="card-optimization" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button></div>
      <div class="dash-card-body">
        <p class="dash-card-desc" data-i18n="dashboard.optimization_desc"></p>
        <div class="stats-grid" id="opt-grid"></div>
      </div>
    </div>

    <!-- 5. Output Compression -->
    <div class="dash-card" id="card-compression">
      <div class="dash-card-header">
        <svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 9V3M15 9V3M9 15v6M15 15v6M3 9h6M15 9h6M3 15h6M15 15h6" stroke-linecap="round"/></svg>
        <span data-i18n="dashboard.compression_title"></span>
        <span class="status-badge" id="compression-status-badge">
          <span data-i18n="dashboard.compression_enabled"></span>
        </span>
        <button type="button" class="collapse-toggle" data-card="card-compression" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button>
      </div>
      <div class="dash-card-body">
        <div class="stats-grid" id="compression-stats"></div>
        <div id="compression-details" class="mt-sm">
          <div id="compression-tools-wrap">
            <h4 class="dash-subheading" data-i18n="dashboard.compression_top_tools"></h4>
            <div id="compression-tools-list" class="compression-rank-list"></div>
          </div>
          <div id="compression-filters-wrap" class="mt-xs">
            <h4 class="dash-subheading" data-i18n="dashboard.compression_top_filters"></h4>
            <div id="compression-filters-list" class="compression-rank-list"></div>
          </div>
        </div>
        <div id="compression-empty" class="empty-state" data-i18n="dashboard.compression_no_data"></div>
      </div>
    </div>

    <!-- 6. Mission History -->
    <div class="dash-card" id="card-mission-history">
      <div class="dash-card-header">
        <svg class="dash-ic card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2c3 2 5 5 5 9l-2 4h-6l-2-4c0-4 2-7 5-9z" fill="currentColor" stroke="none"/><path d="M9 15l-3 3c0-2 1-4 3-5M15 15l3 3c0-2-1-4-3-5"/><circle cx="12" cy="8" r="1.5" fill="none" stroke="currentColor"/></svg>
        <span data-i18n="dashboard.mission_history_title"></span>
        <button type="button" class="collapse-toggle" data-card="card-mission-history" data-i18n-title="dashboard.activity_collapse" title="" aria-expanded="true">▼</button>
      </div>
      <div class="dash-card-body">
        <div id="mission-history-content">
          <table class="mh-table">
            <caption class="visually-hidden" data-i18n="dashboard.mh_table_desc"></caption>
            <thead>
              <tr>
                <th data-i18n="dashboard.mh_col_mission"></th>
                <th data-i18n="dashboard.mh_col_status"></th>
                <th data-i18n="dashboard.mh_col_trigger"></th>
                <th data-i18n="dashboard.mh_col_started"></th>
                <th data-i18n="dashboard.mh_col_duration"></th>
              </tr>
            </thead>
            <tbody id="mission-history-tbody"></tbody>
          </table>
          <div id="mission-history-empty" class="empty-state" data-i18n="dashboard.mh_empty"></div>
          <button id="mission-history-more" class="mh-more-btn is-initially-hidden" data-i18n="dashboard.mh_load_more"></button>
        </div>
      </div>
    </div>

    </div><!-- .dash-grid tab-overview -->

          <button class="log-btn" id="log-scroll-btn" data-i18n-title="dashboard.logs_scroll_to_bottom_title" title=""><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="6 13 12 19 18 13"/></svg> <span data-i18n="dashboard.logs_scroll_to_bottom"></span></button>
          <button class="log-btn" id="log-refresh-btn" data-i18n-title="dashboard.logs_refresh_title" title=""><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3-6.7L21 8" fill="none"/><polyline points="21 3 21 8 16 8"/></svg> <span data-i18n="dashboard.logs_refresh"></span></button>
        </div>
        <div class="log-viewer" id="log-viewer">
          <div class="log-line text-secondary" data-i18n="dashboard.logs_loading"></div>
        </div>
        <div class="log-meta" id="log-meta"></div>
      </div>
    </div>

  </div><!-- .dash-grid tab-system -->
  </div><!-- #tab-system -->

  <script src="/js/precision/workspace.js?v={{.BuildVersion}}"></script>
  <script src="/js/dashboard/main.js" defer></script>
  <script src="/js/dashboard/dashboard-charts.js" defer></script>
  <script src="/js/dashboard/widgets-knowledge.js" defer></script>
  <script src="/js/dashboard/dashboard-widgets.js" defer></script>
  <script src="/js/dashboard/dashboard-events.js" defer></script>
  <script src="/js/knowledge/file_sync_status.js" defer></script>

  <!-- Core-Facts Modal -->
  <div class="cf-overlay" id="cfOverlay" role="dialog" aria-modal="true" aria-labelledby="cfTitleLabel">
    <div class="cf-modal">
      <div class="cf-header">
        <span class="cf-title" id="cfTitleLabel"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 2a3 3 0 0 0-3 3v.5A3.5 3.5 0 0 0 5.5 9c0 1 .4 1.9 1 2.5A3.5 3.5 0 0 0 5 15.5c0 1.9 1.3 3.5 3 3.8V21a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-1.7c1.7-.3 3-1.9 3-3.8a3.5 3.5 0 0 0-1.5-4c.6-.6 1-1.5 1-2.5A3.5 3.5 0 0 0 15 5.5V5a3 3 0 0 0-3-3z"/></svg> <span data-i18n="dashboard.core_facts_modal_title"></span></span>
        <button class="cf-close" id="cfClose" data-i18n-title="common.btn_close" title="">&times;</button>
      </div>
      <div class="cf-body" id="cfBody">
        <div class="empty-state" data-i18n="dashboard.core_facts_modal_loading"></div>
      </div>
    </div>
  </div>

  <!-- Cron Edit Modal -->
  <div class="cf-overlay" id="cronEditOverlay" role="dialog" aria-modal="true" aria-labelledby="cronEditTitleLabel">
    <div class="cf-modal">
      <div class="cf-header">
        <span class="cf-title" id="cronEditTitleLabel"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14" stroke-linecap="round" stroke-linejoin="round"/></svg> <span data-i18n="dashboard.cron_edit_title"></span></span>
        <button class="cf-close" id="cronEditClose">&times;</button>
      </div>
      <div class="cf-body">
        <div class="cron-edit-form">
          <div class="cron-form-group">
            <label class="cron-form-label" data-i18n="dashboard.cron_edit_id_label"></label>
            <input type="text" id="cronEditId" class="cf-add-input cron-edit-id" readonly>
          </div>
          <div class="cron-form-group">
            <label class="cron-form-label" data-i18n="dashboard.cron_edit_source_label"></label>
            <input type="text" id="cronEditSource" class="cf-add-input cron-edit-id" readonly>
          </div>
          <div class="cron-form-group">
            <label class="cron-form-label" data-i18n="dashboard.cron_edit_expr_label"></label>
            <input type="text" id="cronEditExpr" class="cf-add-input" placeholder="0 0 9 * * *">
          </div>
          <div class="cron-form-group">
            <label class="cron-form-label" data-i18n="dashboard.cron_edit_status_label"></label>
            <select id="cronEditDisabled" class="cf-add-input">
              <option value="enabled" data-i18n="dashboard.cronjobs_status_enabled"></option>
              <option value="disabled" data-i18n="dashboard.cronjobs_status_disabled"></option>
            </select>
          </div>
          <div class="cron-form-group">
            <label class="cron-form-label" data-i18n="dashboard.cron_edit_prompt_label"></label>
            <textarea id="cronEditPrompt" class="cf-add-input cron-edit-textarea" rows="8"></textarea>
          </div>
          <div class="cron-form-actions">
            <button class="cf-add-btn cron-btn-cancel" onclick="closeCronEditModal()" data-i18n="dashboard.cron_edit_cancel"></button>
            <button class="cf-add-btn" id="cronEditSaveBtn" onclick="saveCronEdit()" data-i18n="dashboard.cron_edit_save"></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Knowledge Graph Detail Modal -->
  <div class="cf-overlay" id="kgDetailOverlay" role="dialog" aria-modal="true" aria-labelledby="kgDetailTitleLabel">
    <div class="cf-modal cf-modal-wide">
      <div class="cf-header">
        <span class="cf-title" id="kgDetailTitleLabel"><svg class="dash-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><polygon points="16 8 14 14 8 16 10 10" fill="currentColor" stroke="none"/></svg> <span data-i18n="dashboard.knowledge_detail_title"></span></span>
        <button class="cf-close" id="kgDetailClose">&times;</button>
      </div>
      <div class="cf-body" id="kgDetailBody">
        <div class="empty-state" data-i18n="dashboard.knowledge_detail_loading"></div>
      </div>
    </div>
  </div>

</body>

</html>
