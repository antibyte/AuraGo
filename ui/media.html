<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-section="common.nav_media">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title id="page-title">AuraGo - Media View</title>
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260425a">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/tokens.css">
    <script src="/shared.js?v=14"></script>
    <script>
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <script>const I18N={{.I18N}};</script>
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/media.css">
    <link rel="stylesheet" href="/css/enhancements.css?v=20260425a">
    <link href="/fonts/fonts.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="media.subtitle">Media View</span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="media-container">
        <div class="page-header media-header">
            <h1 data-i18n="media.title">📁 Media View</h1>
            <div class="media-controls">
                <input type="text" id="media-search" class="gallery-search"
                    placeholder="Search..." data-i18n-placeholder="media.search_placeholder">
            </div>
        </div>

        <!-- Tab bar -->
        <div class="media-tabs" role="tablist" aria-label="Media categories">
            <button class="media-tab active" id="tab-images" role="tab" aria-selected="true"
                aria-controls="panel-images" tabindex="0"
                onclick="switchTab('images')" data-i18n="media.tab_images">🖼️ Images</button>
            <button class="media-tab" id="tab-audio" role="tab" aria-selected="false"
                aria-controls="panel-audio" tabindex="-1"
                onclick="switchTab('audio')" data-i18n="media.tab_audio">🎵 Audio</button>
            <button class="media-tab" id="tab-videos" role="tab" aria-selected="false"
                aria-controls="panel-videos" tabindex="-1"
                onclick="switchTab('videos')" data-i18n="media.tab_videos">🎬 Videos</button>
            <button class="media-tab" id="tab-documents" role="tab" aria-selected="false"
                aria-controls="panel-documents" tabindex="-1"
                onclick="switchTab('documents')" data-i18n="media.tab_documents">📄 Documents</button>
        </div>

        <div id="media-bulk-toolbar" class="media-bulk-toolbar" aria-live="polite">
            <button id="media-select-mode-btn" type="button" class="btn-gallery-nav" onclick="toggleMediaSelectionMode()" data-i18n="media.bulk_select">Select</button>
            <button id="media-select-visible-btn" type="button" class="btn-gallery-nav" onclick="selectVisibleMediaItems()" data-i18n="media.bulk_select_visible">Select visible</button>
            <button id="media-clear-selection-btn" type="button" class="btn-gallery-nav" onclick="clearCurrentMediaSelection()" data-i18n="media.bulk_clear_selection">Clear selection</button>
            <button id="media-delete-selected-btn" type="button" class="btn-gallery-nav btn-danger" onclick="deleteSelectedMediaItems()" disabled data-i18n="media.bulk_delete_selected">Delete selected</button>
            <span id="media-selected-count" class="media-selected-count" data-i18n="media.bulk_selected_none">0 selected</span>
        </div>

        <!-- Tab panels -->
        <div id="panel-images" class="media-panel active" role="tabpanel" aria-labelledby="tab-images" tabindex="0">
            <div id="images-extra-controls" class="media-extra-controls">
                <select id="gallery-provider-filter" class="gallery-filter">
                    <option value="" data-i18n="gallery.all_providers">All Providers</option>
                </select>
            </div>
            <div id="gallery-grid" class="gallery-grid">
                <div class="gallery-loading" data-i18n="gallery.loading">Loading...</div>
            </div>
            <div id="gallery-pagination" class="gallery-pagination is-hidden">
                <button id="gallery-prev" class="btn-gallery-nav" onclick="galleryPrev()">← <span data-i18n="common.pagination_previous">Previous</span></button>
                <span id="gallery-page-info"></span>
                <button id="gallery-next" class="btn-gallery-nav" onclick="galleryNext()"><span data-i18n="common.pagination_next">Next</span> →</button>
            </div>
        </div>

        <div id="panel-audio" class="media-panel" role="tabpanel" aria-labelledby="tab-audio" tabindex="0">
            <div id="audio-grid" class="media-audio-grid">
                <div class="gallery-loading" data-i18n="gallery.loading">Loading...</div>
            </div>
            <div id="audio-pagination" class="gallery-pagination is-hidden">
                <button id="audio-prev" class="btn-gallery-nav" onclick="audioPrev()">← <span data-i18n="common.pagination_previous">Previous</span></button>
                <span id="audio-page-info"></span>
                <button id="audio-next" class="btn-gallery-nav" onclick="audioNext()"><span data-i18n="common.pagination_next">Next</span> →</button>
            </div>
        </div>

        <div id="panel-videos" class="media-panel" role="tabpanel" aria-labelledby="tab-videos" tabindex="0">
            <div id="video-grid" class="media-video-grid">
                <div class="gallery-loading" data-i18n="gallery.loading">Loading...</div>
            </div>
            <div id="video-pagination" class="gallery-pagination is-hidden">
                <button id="video-prev" class="btn-gallery-nav" onclick="videoPrev()">← <span data-i18n="common.pagination_previous">Previous</span></button>
                <span id="video-page-info"></span>
                <button id="video-next" class="btn-gallery-nav" onclick="videoNext()"><span data-i18n="common.pagination_next">Next</span> →</button>
            </div>
        </div>

        <div id="panel-documents" class="media-panel" role="tabpanel" aria-labelledby="tab-documents" tabindex="0">
            <div id="doc-list" class="media-doc-list">
                <div class="gallery-loading" data-i18n="gallery.loading">Loading...</div>
            </div>
            <div id="doc-pagination" class="gallery-pagination is-hidden">
                <button id="doc-prev" class="btn-gallery-nav" onclick="docPrev()">← <span data-i18n="common.pagination_previous">Previous</span></button>
                <span id="doc-page-info"></span>
                <button id="doc-next" class="btn-gallery-nav" onclick="docNext()"><span data-i18n="common.pagination_next">Next</span> →</button>
            </div>
        </div>
    </div>

    <!-- Image lightbox -->
    <div id="lightbox" class="lightbox is-hidden" onclick="closeLightbox(event)">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button type="button" class="lightbox-close" data-i18n-aria-label="common.close" onclick="closeLightbox()">&times;</button>
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-meta" id="lightbox-meta"></div>
            <div class="lightbox-actions">
                <a id="lightbox-download" href="" download class="btn-gallery-action" data-i18n="gallery.download">⬇ Download</a>
                <button id="lightbox-delete" class="btn-gallery-action btn-danger" onclick="galleryDeleteCurrent()" data-i18n="gallery.delete">🗑 Delete</button>
            </div>
        </div>
    </div>

    <!-- Audio lightbox overlay with full player -->
    <div id="audio-modal" class="media-modal is-hidden" onclick="closeAudioModal(event)">
        <div class="media-modal-content" onclick="event.stopPropagation()">
            <button type="button" class="lightbox-close" data-i18n-aria-label="common.close" onclick="closeAudioModal()">&times;</button>
            <div id="audio-modal-body"></div>
            <div class="lightbox-actions">
                <a id="audio-modal-download" href="" download class="btn-gallery-action" data-i18n="gallery.download">⬇ Download</a>
                <button id="audio-modal-delete" class="btn-gallery-action btn-danger" onclick="audioDeleteCurrent()" data-i18n="gallery.delete">🗑 Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/gallery/main.js"></script>
    <script src="/js/chat/ui-icons.js?v=20260501a"></script>
    <script src="/js/chat/audio-player.js"></script>
    <script src="/js/media/main.js"></script>
</body>
</html>
