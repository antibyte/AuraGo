<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="page-title">AuraGo – Quick Setup</title>
    <script src="/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aura': {
                            'accent': 'var(--accent)',
                            'bg': 'var(--bg-primary)',
                            'surface': 'var(--bg-secondary)',
                            'text': 'var(--text-primary)',
                            'muted': 'var(--text-secondary)',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['SF Mono', 'Fira Code', 'Cascadia Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js"></script>
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        let I18N = {{.I18N }};
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/setup.css">
    <link rel="stylesheet" href="/css/enhancements.css">
</head>

<body>
    <!-- ── Header ─────────────────────────────────── -->
    <header class="cfg-header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
            <span id="header-subtitle"
                class="logo-subtitle">
                <script>document.write(t('setup.header_subtitle'))</script>
            </span>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme"></button>
            <button id="btn-skip-setup" class="btn-header btn-skip" onclick="skipSetup()">
                <script>document.write(t('setup.skip_button'))</script>
            </button>
        </div>
    </header>

    <!-- ── Toast Container ─────────────────────── -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ── Main Setup Card ─────────────────────── -->
    <div class="setup-container">
        <div class="setup-card">

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" data-step="0" onclick="goToStep(0)"></div>
                <div class="step-line" id="line-0-1"></div>
                <div class="step-dot" data-step="1" onclick="goToStep(1)"></div>
                <div class="step-line" id="line-1-2"></div>
                <div class="step-dot" data-step="2" onclick="goToStep(2)"></div>
                <div class="step-line" id="line-2-3"></div>
                <div class="step-dot" data-step="3" onclick="goToStep(3)"></div>
            </div>

            <!-- ═══ Section 1: Minimum Config ═══ -->
            <div class="setup-section active" id="step-0">
                <div class="section-header">
                    <div id="badge-step0" class="section-badge badge-required">
                        <script>document.write(t('setup.step0_badge'))</script>
                    </div>
                    <h2 id="title-step0" class="section-title">
                        <script>document.write(t('setup.step0_title'))</script>
                    </h2>
                    <p id="desc-step0" class="section-desc">
                        <script>document.write(t('setup.step0_description'))</script>
                    </p>
                </div>

                <div class="field-group">
                    <label id="lbl-provider" class="field-label">
                        <script>document.write(t('setup.step0_provider_label'))</script> <span
                            class="required-star">*</span>
                    </label>
                    <select class="field-select" id="llm-provider" onchange="onProviderChange()">
                        <option value="openrouter" data-i18n="setup.step0_provider_openrouter">OpenRouter</option>
                        <option value="openai" data-i18n="setup.step0_provider_openai">OpenAI</option>
                        <option value="anthropic" data-i18n="setup.step0_provider_anthropic">Anthropic</option>
                        <option value="google" data-i18n="setup.step0_provider_google">Google (Gemini)</option>
                        <option value="ollama" data-i18n="setup.step0_provider_ollama">Ollama (local)</option>
                        <option value="custom" data-i18n="setup.step0_provider_custom">Custom / Other</option>
                    </select>
                    <div id="hint-provider" class="field-hint">
                        <script>document.write(t('setup.step0_provider_hint'))</script>
                    </div>
                </div>

                <div class="field-group" id="group-api-key">
                    <label id="lbl-api-key" class="field-label">
                        <script>document.write(t('setup.step0_api_key_label'))</script> <span
                            class="required-star">*</span>
                    </label>
                    <input class="field-input" type="password" id="llm-api-key" placeholder="sk-or-v1-..."
                        autocomplete="off">
                    <div class="field-error" id="err-api-key">
                        <script>document.write(t('setup.step0_api_key_error'))</script>
                    </div>
                    <div class="field-hint" id="hint-api-key"><span id="hint-api-key-text">
                            <script>document.write(t('setup.step0_api_key_hint'))</script>
                        </span> <span id="provider-link">openrouter.ai</span></div>
                </div>

                <div class="field-group">
                    <label id="lbl-admin-password" class="field-label">
                        <script>document.write(t('setup.step0_admin_password_label'))</script> <span
                            class="required-star">*</span>
                    </label>
                    <input class="field-input" type="password" id="admin-password"
                        data-i18n-placeholder="setup.step0_admin_password_placeholder" placeholder="Minimum 8 characters" autocomplete="new-password">
                    <div class="field-error" id="err-admin-password">
                        <script>document.write(t('setup.step0_admin_password_error'))</script>
                    </div>
                    <div class="field-hint" id="hint-admin-password">
                        <script>document.write(t('setup.step0_admin_password_hint'))</script>
                    </div>
                </div>

                <div class="field-group">
                    <label id="lbl-base-url" class="field-label">
                        <script>document.write(t('setup.step0_base_url_label'))</script>
                    </label>
                    <input class="field-input" type="url" id="llm-base-url" placeholder="https://openrouter.ai/api/v1">
                    <div id="hint-base-url" class="field-hint">
                        <script>document.write(t('setup.step0_base_url_hint'))</script>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label id="lbl-model" class="field-label">
                            <script>document.write(t('setup.step0_model_label'))</script> <span
                                class="required-star">*</span>
                        </label>
                        <div class="setup-inline-row">
                            <input class="field-input setup-flex-1" type="text" id="llm-model"
                                data-i18n-placeholder="setup.step0_model_placeholder" placeholder="e.g. gpt-4o, claude-sonnet-4-20250514">
                            <button type="button" id="or-browse-btn" class="btn-primary setup-or-browse is-hidden"
                                onclick="openOpenRouterBrowser(function(m){document.getElementById('llm-model').value=m.id;document.getElementById('err-model').style.display='none';})">
                                <script>document.write(t('setup.step0_model_browse'))</script>
                            </button>
                        </div>
                        <div class="field-error" id="err-model">
                            <script>document.write(t('setup.step0_model_error'))</script>
                        </div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" id="lang-label">
                            <script>document.write(t('setup.step0_language_label'))</script>
                        </label>
                        <select class="field-select" id="system-language" onchange="onLanguageChange()">
                            <option value="Deutsch" data-i18n="setup.language_de">Deutsch</option>
                            <option value="English" data-i18n="setup.language_en">English</option>
                            <option value="Español" data-i18n="setup.language_es">Español</option>
                            <option value="Français" data-i18n="setup.language_fr">Français</option>
                            <option value="Polski" data-i18n="setup.language_pl">Polski</option>
                            <option value="中文" data-i18n="setup.language_zh">中文</option>
                            <option value="हिन्दी" data-i18n="setup.language_hi">हिन्दी</option>
                            <option value="Nederlands" data-i18n="setup.language_nl">Nederlands</option>
                            <option value="Italiano" data-i18n="setup.language_it">Italiano</option>
                            <option value="Português" data-i18n="setup.language_pt">Português</option>
                            <option value="Dansk" data-i18n="setup.language_da">Dansk</option>
                            <option value="日本語" data-i18n="setup.language_ja">日本語</option>
                            <option value="Svenska" data-i18n="setup.language_sv">Svenska</option>
                            <option value="Norsk" data-i18n="setup.language_no">Norsk</option>
                            <option value="Čeština" data-i18n="setup.language_cs">Čeština</option>
                            <option value="Other / Custom" data-i18n="setup.step0_provider_custom">Other / Custom</option>
                        </select>
                        <input class="field-input is-hidden mt-xs" type="text" id="system-language-custom" placeholder="e.g. Klingon">
                    </div>
                </div>

                <div class="toggle-row">
                    <div>
                        <div id="lbl-native-functions" class="toggle-label">
                            <script>document.write(t('setup.step0_native_functions_label'))</script>
                        </div>
                        <div id="desc-native-functions" class="toggle-desc">
                            <script>document.write(t('setup.step0_native_functions_desc'))</script>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="native-functions">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- ═══ Section 2: Recommended Optional ═══ -->
            <div class="setup-section" id="step-1">
                <div class="section-header">
                    <div id="badge-step1" class="section-badge badge-recommended">
                        <script>document.write(t('setup.step1_badge'))</script>
                    </div>
                    <h2 id="title-step1" class="section-title">
                        <script>document.write(t('setup.step1_title'))</script>
                    </h2>
                    <p id="desc-step1" class="section-desc">
                        <script>document.write(t('setup.step1_description'))</script>
                    </p>
                </div>

                <!-- Embeddings -->
                <div class="mb-lg">
                    <h3 id="heading-embeddings" class="setup-section-heading">
                        <script>document.write(t('setup.step1_embeddings_heading'))</script>
                    </h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-emb-provider" class="field-label">
                                <script>document.write(t('setup.step1_embeddings_provider_label'))</script>
                            </label>
                            <select class="field-select" id="emb-provider">
                                <option value="internal" data-i18n="setup.step1_embeddings_provider_internal">Internal (OpenRouter/OpenAI compatible)</option>
                                <option value="ollama" data-i18n="setup.step1_embeddings_provider_ollama">Ollama (local)</option>
                                <option value="" data-i18n="setup.step1_embeddings_provider_disabled">Disabled</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-emb-model" class="field-label">
                                <script>document.write(t('setup.step1_embeddings_model_label'))</script>
                            </label>
                            <input class="field-input" type="text" id="emb-model" placeholder="qwen/qwen3-embedding-8b"
                                value="qwen/qwen3-embedding-8b">
                        </div>
                    </div>
                </div>

                <!-- Vision -->
                <div class="mb-lg">
                    <h3 id="heading-vision" class="setup-section-heading">
                        <script>document.write(t('setup.step1_vision_heading'))</script>
                    </h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-vision-provider" class="field-label">
                                <script>document.write(t('setup.step1_vision_provider_label'))</script>
                            </label>
                            <select class="field-select" id="vision-provider">
                                <option value="openrouter" data-i18n="setup.step1_vision_provider_openrouter">OpenRouter</option>
                                <option value="openai" data-i18n="setup.step1_vision_provider_openai">OpenAI</option>
                                <option value="ollama" data-i18n="setup.step1_vision_provider_ollama">Ollama</option>
                                <option value="" data-i18n="setup.step1_vision_provider_disabled">Disabled</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-vision-model" class="field-label">
                                <script>document.write(t('setup.step1_vision_model_label'))</script>
                            </label>
                            <input class="field-input" type="text" id="vision-model"
                                placeholder="google/gemini-2.5-flash-lite-preview-09-2025"
                                value="google/gemini-2.5-flash-lite-preview-09-2025">
                        </div>
                    </div>
                </div>

                <!-- Whisper / STT -->
                <div>
                    <h3 id="heading-whisper" class="setup-section-heading">
                        <script>document.write(t('setup.step1_whisper_heading'))</script>
                    </h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-whisper-provider" class="field-label">
                                <script>document.write(t('setup.step1_whisper_provider_label'))</script>
                            </label>
                            <select class="field-select" id="whisper-provider" onchange="onWhisperProviderChange()">
                                <option value="openrouter" data-i18n="setup.step1_whisper_provider_openrouter">OpenRouter</option>
                                <option value="openai" data-i18n="setup.step1_whisper_provider_openai">OpenAI</option>
                                <option value="ollama" data-i18n="setup.step1_whisper_provider_ollama">Ollama</option>
                                <option value="" data-i18n="setup.step1_whisper_provider_disabled">Disabled</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-whisper-model" class="field-label">
                                <script>document.write(t('setup.step1_whisper_model_label'))</script>
                            </label>
                            <input class="field-input" type="text" id="whisper-model"
                                placeholder="google/gemini-2.5-flash-lite-preview-09-2025"
                                value="google/gemini-2.5-flash-lite-preview-09-2025">
                        </div>
                        <div class="field-group">
                            <label id="lbl-whisper-mode" class="field-label">
                                <script>document.write(t('setup.step1_whisper_mode_label'))</script>
                            </label>
                            <select class="field-select" id="whisper-mode">
                                <option value="multimodal" data-i18n="setup.step1_whisper_mode_multimodal">Multimodal (Gemini / LLM)</option>
                                <option value="whisper" data-i18n="setup.step1_whisper_mode_whisper">Whisper API (OpenAI)</option>
                                <option value="local" data-i18n="setup.step1_whisper_mode_local">Local (Ollama)</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Section 3: Optional ═══ -->
            <div class="setup-section" id="step-2">
                <div class="section-header">
                    <div id="badge-step2" class="section-badge badge-optional">
                        <script>document.write(t('setup.step2_badge'))</script>
                    </div>
                    <h2 id="title-step2" class="section-title">
                        <script>document.write(t('setup.step2_title'))</script>
                    </h2>
                    <p id="desc-step2" class="section-desc">
                        <script>document.write(t('setup.step2_description'))</script>
                    </p>
                </div>

                <!-- Personality Engine V2 -->
                <div class="toggle-row setup-divider mb-md">
                    <div>
                        <div id="lbl-personality-v2" class="toggle-label">
                            <script>document.write(t('setup.step2_personality_v2_label'))</script>
                        </div>
                        <div id="desc-personality-v2" class="toggle-desc">
                            <script>document.write(t('setup.step2_personality_v2_desc'))</script>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="personality-v2" checked onchange="onPersonalityToggle()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="conditional-fields visible" id="personality-v2-fields">
                    <div class="field-group">
                        <label id="lbl-v2-model" class="field-label">
                            <script>document.write(t('setup.step2_v2_model_label'))</script>
                        </label>
                        <input class="field-input" type="text" id="v2-model" placeholder="gpt-4o-mini"
                            value="gpt-4o-mini">
                        <div id="hint-v2-model" class="field-hint">
                            <script>document.write(t('setup.step2_v2_model_hint'))</script>
                        </div>
                    </div>
                </div>

                <!-- Core Personality -->
                <div class="field-group mt-lg">
                    <label id="lbl-core-personality" class="field-label">
                        <script>document.write(t('setup.step2_core_personality_label'))</script>
                    </label>
                    <select class="field-select" id="core-personality">
                        <option value="friend" selected data-i18n="setup.step2_core_personality_default">Friendly (friend)</option>
                    </select>
                    <div id="hint-core-personality" class="field-hint">
                        <script>document.write(t('setup.step2_core_personality_hint'))</script>
                    </div>
                </div>

                <!-- Maintenance -->
                <div class="toggle-row mt-sm">
                    <div>
                        <div id="lbl-maintenance" class="toggle-label">
                            <script>document.write(t('setup.step2_maintenance_label'))</script>
                        </div>
                        <div id="desc-maintenance" class="toggle-desc">
                            <script>document.write(t('setup.step2_maintenance_desc'))</script>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="maintenance-enabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- Web Config -->
                <div class="toggle-row">
                    <div>
                        <div id="lbl-web-config" class="toggle-label">
                            <script>document.write(t('setup.step2_web_config_label'))</script>
                        </div>
                        <div id="desc-web-config" class="toggle-desc">
                            <script>document.write(t('setup.step2_web_config_desc'))</script>
                        </div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="web-config-enabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- ═══ Section 4: Mutprobe (Trust Level) ═══ -->
            <div class="setup-section" id="step-3">
                <div class="section-header">
                    <div id="badge-step3" class="section-badge badge-trust">
                        <script>document.write(t('setup.step3_badge'))</script>
                    </div>
                    <h2 id="title-step3" class="section-title">
                        <script>document.write(t('setup.step3_title'))</script>
                    </h2>
                    <p id="desc-step3" class="section-desc">
                        <script>document.write(t('setup.step3_description'))</script>
                    </p>
                </div>

                <div class="trust-level-grid">
                    <!-- Level 1: Minimal -->
                    <label class="trust-level-card" id="trust-card-1">
                        <input type="radio" name="trust-level" value="1" checked>
                        <div class="trust-card-inner">
                            <div class="trust-card-icon">🛡️</div>
                            <div class="trust-card-text">
                                <div class="trust-card-title" id="trust-title-1">
                                    <script>document.write(t('setup.step3_level1_title'))</script>
                                </div>
                                <div class="trust-card-desc" id="trust-desc-1">
                                    <script>document.write(t('setup.step3_level1_desc'))</script>
                                </div>
                            </div>
                        </div>
                    </label>

                    <!-- Level 2: Careful -->
                    <label class="trust-level-card" id="trust-card-2">
                        <input type="radio" name="trust-level" value="2">
                        <div class="trust-card-inner">
                            <div class="trust-card-icon">🔍</div>
                            <div class="trust-card-text">
                                <div class="trust-card-title" id="trust-title-2">
                                    <script>document.write(t('setup.step3_level2_title'))</script>
                                </div>
                                <div class="trust-card-desc" id="trust-desc-2">
                                    <script>document.write(t('setup.step3_level2_desc'))</script>
                                </div>
                            </div>
                        </div>
                    </label>

                    <!-- Level 3: Brave -->
                    <label class="trust-level-card" id="trust-card-3">
                        <input type="radio" name="trust-level" value="3">
                        <div class="trust-card-inner">
                            <div class="trust-card-icon">🚀</div>
                            <div class="trust-card-text">
                                <div class="trust-card-title" id="trust-title-3">
                                    <script>document.write(t('setup.step3_level3_title'))</script>
                                </div>
                                <div class="trust-card-desc" id="trust-desc-3">
                                    <script>document.write(t('setup.step3_level3_desc'))</script>
                                </div>
                            </div>
                        </div>
                    </label>

                    <!-- Level 4: YOLO -->
                    <label class="trust-level-card" id="trust-card-4">
                        <input type="radio" name="trust-level" value="4">
                        <div class="trust-card-inner">
                            <div class="trust-card-icon">🔥</div>
                            <div class="trust-card-text">
                                <div class="trust-card-title" id="trust-title-4">
                                    <script>document.write(t('setup.step3_level4_title'))</script>
                                </div>
                                <div class="trust-card-desc" id="trust-desc-4">
                                    <script>document.write(t('setup.step3_level4_desc'))</script>
                                </div>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- ═══ Success Screen ═══ -->
            <div class="success-screen" id="success-screen">
                <div class="success-icon">✨</div>
                <h2 id="success-title" class="success-title">
                    <script>document.write(t('setup.success_title'))</script>
                </h2>
                <p id="success-desc" class="success-desc">
                    <script>document.write(t('setup.success_description').replace(/\n/g, '<br>'))</script>
                </p>
                <p class="success-desc is-hidden setup-warning-text" id="restart-notice">
                    <script>document.write(t('setup.success_restart_notice'))</script>
                </p>
                <button id="btn-go-to-chat" class="btn-setup btn-next" onclick="window.location.href='/'">
                    <script>document.write(t('setup.success_go_to_chat'))</script>
                </button>
            </div>

            <!-- Footer -->
            <div class="setup-footer" id="setup-footer">
                <div class="footer-left">
                    <button class="btn-setup btn-back is-hidden" id="btn-back" onclick="prevStep()">
                        <script>document.write(t('setup.nav_back'))</script>
                    </button>
                </div>
                <div class="setup-inline-actions">
                    <button class="btn-skip" id="btn-skip-step" onclick="nextStep(true)">
                        <script>document.write(t('setup.nav_skip_step'))</script>
                    </button>
                    <button class="btn-setup btn-next" id="btn-next" onclick="nextStep()">
                        <script>document.write(t('setup.nav_next'))</script>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/setup/main.js"></script>
</body>

</html>
