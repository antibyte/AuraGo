<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title id="page-title">AuraGo – Quick Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aura': {
                            'accent': 'var(--accent)',
                            'bg': 'var(--bg-primary)',
                            'surface': 'var(--bg-secondary)',
                            'text': 'var(--text-primary)',
                            'muted': 'var(--text-secondary)',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['SF Mono', 'Fira Code', 'Cascadia Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        const I18N = {{.I18N}};
        function t(k,p){let s=I18N[k]||k;if(p)Object.entries(p).forEach(([a,b])=>s=s.replaceAll('{'+'{'+a+'}'+'}',b));return s;}
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .setup-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem 1rem;
            overflow-y: auto;
        }

        .setup-card {
            width: 100%;
            max-width: 720px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        /* ── Step Indicator ─────────────────────────── */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1.5rem 2rem 0;
        }

        .step-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-subtle);
            transition: all 0.3s;
            cursor: pointer;
        }

        .step-dot.active {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
            transform: scale(1.3);
        }

        .step-dot.completed {
            background: var(--accent);
            opacity: 0.5;
        }

        .step-line {
            width: 40px;
            height: 2px;
            background: var(--border-subtle);
            transition: background 0.3s;
        }

        .step-line.completed {
            background: var(--accent);
            opacity: 0.5;
        }

        /* ── Section ────────────────────────────────── */
        .setup-section {
            display: none;
            padding: 2rem;
            animation: fadeIn 0.3s ease;
        }

        .setup-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header {
            margin-bottom: 1.5rem;
        }

        .section-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: var(--text-xs);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.3rem 0.7rem;
            border-radius: 999px;
            margin-bottom: 0.75rem;
        }

        .badge-required {
            background: rgba(239, 68, 68, 0.12);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .badge-recommended {
            background: rgba(245, 158, 11, 0.12);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .badge-optional {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--border-accent);
        }

        .section-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 0.35rem;
        }

        .section-desc {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.5;
        }

        /* ── Form Fields ────────────────────────────── */
        .field-group {
            margin-bottom: 1.25rem;
        }

        .field-label {
            display: block;
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
        }

        .field-label .required-star {
            color: #ef4444;
            margin-left: 0.15rem;
        }

        .field-hint {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            opacity: 0.7;
            margin-top: 0.3rem;
        }

        .field-input,
        .field-select {
            width: 100%;
            padding: 0.6rem 0.85rem;
            font-size: var(--text-base);
            font-family: inherit;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 10px;
            color: var(--text-primary);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field-input:focus,
        .field-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .field-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        .field-select option {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 560px) {
            .field-row {
                grid-template-columns: 1fr;
            }
        }

        /* Toggle Switch */
        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
        }

        .toggle-label {
            font-size: var(--text-sm);
            font-weight: 500;
        }

        .toggle-desc {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-top: 0.15rem;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: rgba(128, 128, 128, 0.25);
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.25s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            bottom: 3px;
            background: white;
            border-radius: 50%;
            transition: transform 0.25s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(20px);
        }

        /* Conditional field groups */
        .conditional-fields {
            display: none;
            margin-top: 0.75rem;
            padding: 1rem;
            background: var(--bg-glass);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
        }

        .conditional-fields.visible {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        /* ── Footer Buttons ─────────────────────────── */
        .setup-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-top: 1px solid var(--border-subtle);
            background: var(--bg-glass);
        }

        .btn-setup {
            font-size: var(--text-sm);
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .btn-next {
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            color: #fff;
            box-shadow: 0 4px 16px rgba(45, 212, 191, 0.3);
        }

        .btn-next:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(45, 212, 191, 0.4);
        }

        .btn-next:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-back {
            background: var(--bg-glass);
            color: var(--text-secondary);
            border: 1px solid var(--border-subtle);
        }

        .btn-back:hover {
            color: var(--text-primary);
            border-color: var(--border-accent);
        }

        .btn-skip {
            background: none;
            color: var(--text-secondary);
            font-size: var(--text-xs);
            text-decoration: underline;
            text-underline-offset: 2px;
            cursor: pointer;
            border: none;
            padding: 0.4rem;
        }

        .btn-skip:hover {
            color: var(--text-primary);
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* ── Validation ─────────────────────────────── */
        .field-input.error,
        .field-select.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .field-error {
            font-size: var(--text-xs);
            color: #ef4444;
            margin-top: 0.3rem;
            display: none;
        }

        .field-error.visible {
            display: block;
        }

        /* ── Saving Spinner ─────────────────────────── */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Success animation */
        .success-screen {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-screen.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .success-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .success-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .success-desc {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <!-- ── Header ─────────────────────────────────── -->
    <header class="cfg-header">
        <div class="logo">
            <div class="logo-icon">✦</div>
            <span>AURAGO</span>
            <span id="header-subtitle" style="font-size:var(--text-xs); font-weight:400; color:var(--text-secondary); margin-left:0.3rem"><script>document.write(t('setup.header_subtitle'))</script></span>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn-theme" title="Toggle theme"></button>
            <button id="btn-skip-setup" class="btn-header btn-skip" onclick="skipSetup()"><script>document.write(t('setup.skip_button'))</script></button>
        </div>
    </header>

    <!-- ── Toast Container ─────────────────────── -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- ── Main Setup Card ─────────────────────── -->
    <div class="setup-container">
        <div class="setup-card">

            <!-- Step Indicator -->
            <div class="step-indicator">
                <div class="step-dot active" data-step="0" onclick="goToStep(0)"></div>
                <div class="step-line" id="line-0-1"></div>
                <div class="step-dot" data-step="1" onclick="goToStep(1)"></div>
                <div class="step-line" id="line-1-2"></div>
                <div class="step-dot" data-step="2" onclick="goToStep(2)"></div>
            </div>

            <!-- ═══ Section 1: Minimum Config ═══ -->
            <div class="setup-section active" id="step-0">
                <div class="section-header">
                    <div id="badge-step0" class="section-badge badge-required"><script>document.write(t('setup.step0_badge'))</script></div>
                    <h2 id="title-step0" class="section-title"><script>document.write(t('setup.step0_title'))</script></h2>
                    <p id="desc-step0" class="section-desc"><script>document.write(t('setup.step0_description'))</script></p>
                </div>

                <div class="field-group">
                    <label id="lbl-provider" class="field-label"><script>document.write(t('setup.step0_provider_label'))</script> <span class="required-star">*</span></label>
                    <select class="field-select" id="llm-provider" onchange="onProviderChange()">
                        <option value="openrouter">OpenRouter</option>
                        <option value="openai">OpenAI</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="google">Google (Gemini)</option>
                        <option value="ollama">Ollama (lokal)</option>
                        <option value="custom">Custom / Andere</option>
                    </select>
                    <div id="hint-provider" class="field-hint"><script>document.write(t('setup.step0_provider_hint'))</script></div>
                </div>

                <div class="field-group" id="group-api-key">
                    <label id="lbl-api-key" class="field-label"><script>document.write(t('setup.step0_api_key_label'))</script> <span class="required-star">*</span></label>
                    <input class="field-input" type="password" id="llm-api-key" placeholder="sk-or-v1-..." autocomplete="off">
                    <div class="field-error" id="err-api-key"><script>document.write(t('setup.step0_api_key_error'))</script></div>
                    <div class="field-hint" id="hint-api-key"><span id="hint-api-key-text"><script>document.write(t('setup.step0_api_key_hint'))</script></span> <span id="provider-link">openrouter.ai</span></div>
                </div>

                <div class="field-group">
                    <label id="lbl-base-url" class="field-label"><script>document.write(t('setup.step0_base_url_label'))</script></label>
                    <input class="field-input" type="url" id="llm-base-url" placeholder="https://openrouter.ai/api/v1">
                    <div id="hint-base-url" class="field-hint"><script>document.write(t('setup.step0_base_url_hint'))</script></div>
                </div>

                <div class="field-row">
                    <div class="field-group">
                        <label id="lbl-model" class="field-label"><script>document.write(t('setup.step0_model_label'))</script> <span class="required-star">*</span></label>
                        <div style="display:flex;gap:0.4rem;align-items:stretch;">
                            <input class="field-input" type="text" id="llm-model" placeholder="z.B. gpt-4o, claude-sonnet-4-20250514" style="flex:1;">
                            <button type="button" id="or-browse-btn" class="btn-primary" style="display:none;padding:0.4rem 0.7rem;font-size:0.75rem;white-space:nowrap;border-radius:8px;background:rgba(72,199,142,0.15);color:#48c78e;border:1px solid rgba(72,199,142,0.3);cursor:pointer;" onclick="openOpenRouterBrowser(function(m){document.getElementById('llm-model').value=m.id;document.getElementById('err-model').style.display='none';})"><script>document.write(t('setup.step0_model_browse'))</script></button>
                        </div>
                        <div class="field-error" id="err-model"><script>document.write(t('setup.step0_model_error'))</script></div>
                    </div>
                    <div class="field-group">
                        <label class="field-label" id="lang-label"><script>document.write(t('setup.step0_language_label'))</script></label>
                        <select class="field-select" id="system-language">
                            <option value="Deutsch">Deutsch</option>
                            <option value="English">English</option>
                            <option value="Español">Español</option>
                            <option value="Français">Français</option>
                            <option value="Polski">Polski</option>
                            <option value="中文">中文</option>
                            <option value="हिन्दी">हिन्दी</option>
                            <option value="Nederlands">Nederlands</option>
                            <option value="Italiano">Italiano</option>
                            <option value="Português">Português</option>
                            <option value="Dansk">Dansk</option>
                            <option value="日本語">日本語</option>
                            <option value="Svenska">Svenska</option>
                            <option value="Norsk">Norsk</option>
                            <option value="Čeština">Čeština</option>
                        </select>
                    </div>
                </div>

                <div class="toggle-row">
                    <div>
                        <div id="lbl-native-functions" class="toggle-label"><script>document.write(t('setup.step0_native_functions_label'))</script></div>
                        <div id="desc-native-functions" class="toggle-desc"><script>document.write(t('setup.step0_native_functions_desc'))</script></div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="native-functions">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- ═══ Section 2: Recommended Optional ═══ -->
            <div class="setup-section" id="step-1">
                <div class="section-header">
                    <div id="badge-step1" class="section-badge badge-recommended"><script>document.write(t('setup.step1_badge'))</script></div>
                    <h2 id="title-step1" class="section-title"><script>document.write(t('setup.step1_title'))</script></h2>
                    <p id="desc-step1" class="section-desc"><script>document.write(t('setup.step1_description'))</script></p>
                </div>

                <!-- Embeddings -->
                <div style="margin-bottom: 1.5rem;">
                    <h3 id="heading-embeddings" style="font-size: var(--text-base); font-weight: 600; margin-bottom: 0.75rem;"><script>document.write(t('setup.step1_embeddings_heading'))</script></h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-emb-provider" class="field-label"><script>document.write(t('setup.step1_embeddings_provider_label'))</script></label>
                            <select class="field-select" id="emb-provider" onchange="onEmbProviderChange()">
                                <option value="internal">Internal (OpenRouter/OpenAI kompatibel)</option>
                                <option value="ollama">Ollama (lokal)</option>
                                <option value="">Deaktiviert</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-emb-model" class="field-label"><script>document.write(t('setup.step1_embeddings_model_label'))</script></label>
                            <input class="field-input" type="text" id="emb-model" placeholder="qwen/qwen3-embedding-8b" value="qwen/qwen3-embedding-8b">
                        </div>
                    </div>
                    <div class="field-group" id="group-emb-apikey" style="display: none;">
                        <label id="lbl-emb-apikey" class="field-label"><script>document.write(t('setup.step1_embeddings_apikey_label'))</script></label>
                        <input class="field-input" type="password" id="emb-api-key" placeholder="Gleicher Key wie LLM, falls selber Provider">
                        <div id="hint-emb-apikey" class="field-hint"><script>document.write(t('setup.step1_embeddings_apikey_hint'))</script></div>
                    </div>
                </div>

                <!-- Vision -->
                <div style="margin-bottom: 1.5rem;">
                    <h3 id="heading-vision" style="font-size: var(--text-base); font-weight: 600; margin-bottom: 0.75rem;"><script>document.write(t('setup.step1_vision_heading'))</script></h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-vision-provider" class="field-label"><script>document.write(t('setup.step1_vision_provider_label'))</script></label>
                            <select class="field-select" id="vision-provider">
                                <option value="openrouter">OpenRouter</option>
                                <option value="openai">OpenAI</option>
                                <option value="ollama">Ollama</option>
                                <option value="">Deaktiviert</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-vision-model" class="field-label"><script>document.write(t('setup.step1_vision_model_label'))</script></label>
                            <input class="field-input" type="text" id="vision-model" placeholder="google/gemini-2.5-flash-lite-preview-09-2025" value="google/gemini-2.5-flash-lite-preview-09-2025">
                        </div>
                    </div>
                </div>

                <!-- Whisper / STT -->
                <div>
                    <h3 id="heading-whisper" style="font-size: var(--text-base); font-weight: 600; margin-bottom: 0.75rem;"><script>document.write(t('setup.step1_whisper_heading'))</script></h3>
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-whisper-provider" class="field-label"><script>document.write(t('setup.step1_whisper_provider_label'))</script></label>
                            <select class="field-select" id="whisper-provider">
                                <option value="openrouter">OpenRouter</option>
                                <option value="openai">OpenAI</option>
                                <option value="ollama">Ollama</option>
                                <option value="">Deaktiviert</option>
                            </select>
                        </div>
                        <div class="field-group">
                            <label id="lbl-whisper-model" class="field-label"><script>document.write(t('setup.step1_whisper_model_label'))</script></label>
                            <input class="field-input" type="text" id="whisper-model" placeholder="google/gemini-2.5-flash-lite-preview-09-2025" value="google/gemini-2.5-flash-lite-preview-09-2025">
                        </div>
                    </div>
                </div>
            </div>

            <!-- ═══ Section 3: Optional ═══ -->
            <div class="setup-section" id="step-2">
                <div class="section-header">
                    <div id="badge-step2" class="section-badge badge-optional"><script>document.write(t('setup.step2_badge'))</script></div>
                    <h2 id="title-step2" class="section-title"><script>document.write(t('setup.step2_title'))</script></h2>
                    <p id="desc-step2" class="section-desc"><script>document.write(t('setup.step2_description'))</script></p>
                </div>

                <!-- Personality Engine V2 -->
                <div class="toggle-row" style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem; margin-bottom: 1rem;">
                    <div>
                        <div id="lbl-personality-v2" class="toggle-label"><script>document.write(t('setup.step2_personality_v2_label'))</script></div>
                        <div id="desc-personality-v2" class="toggle-desc"><script>document.write(t('setup.step2_personality_v2_desc'))</script></div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="personality-v2" checked onchange="onPersonalityToggle()">
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <div class="conditional-fields visible" id="personality-v2-fields">
                    <div class="field-row">
                        <div class="field-group">
                            <label id="lbl-v2-model" class="field-label"><script>document.write(t('setup.step2_v2_model_label'))</script></label>
                            <input class="field-input" type="text" id="v2-model" placeholder="gpt-4o-mini" value="gpt-4o-mini">
                            <div id="hint-v2-model" class="field-hint"><script>document.write(t('setup.step2_v2_model_hint'))</script></div>
                        </div>
                        <div class="field-group">
                            <label id="lbl-v2-url" class="field-label"><script>document.write(t('setup.step2_v2_url_label'))</script></label>
                            <input class="field-input" type="url" id="v2-url" placeholder="Leer = gleiche URL wie Haupt-LLM">
                        </div>
                    </div>
                    <div class="field-group">
                        <label id="lbl-v2-apikey" class="field-label"><script>document.write(t('setup.step2_v2_apikey_label'))</script></label>
                        <input class="field-input" type="password" id="v2-api-key" placeholder="Leer = gleicher Key wie Haupt-LLM">
                        <div id="hint-v2-apikey" class="field-hint"><script>document.write(t('setup.step2_v2_apikey_hint'))</script></div>
                    </div>
                </div>

                <!-- Core Personality -->
                <div class="field-group" style="margin-top: 1.25rem;">
                    <label id="lbl-core-personality" class="field-label"><script>document.write(t('setup.step2_core_personality_label'))</script></label>
                    <select class="field-select" id="core-personality">
                        <option value="friend" selected>Freundlich (friend)</option>
                    </select>
                    <div id="hint-core-personality" class="field-hint"><script>document.write(t('setup.step2_core_personality_hint'))</script></div>
                </div>

                <!-- Maintenance -->
                <div class="toggle-row" style="margin-top: 0.5rem;">
                    <div>
                        <div id="lbl-maintenance" class="toggle-label"><script>document.write(t('setup.step2_maintenance_label'))</script></div>
                        <div id="desc-maintenance" class="toggle-desc"><script>document.write(t('setup.step2_maintenance_desc'))</script></div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="maintenance-enabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>

                <!-- Web Config -->
                <div class="toggle-row">
                    <div>
                        <div id="lbl-web-config" class="toggle-label"><script>document.write(t('setup.step2_web_config_label'))</script></div>
                        <div id="desc-web-config" class="toggle-desc"><script>document.write(t('setup.step2_web_config_desc'))</script></div>
                    </div>
                    <label class="toggle-switch">
                        <input type="checkbox" id="web-config-enabled" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- ═══ Success Screen ═══ -->
            <div class="success-screen" id="success-screen">
                <div class="success-icon">✨</div>
                <h2 id="success-title" class="success-title"><script>document.write(t('setup.success_title'))</script></h2>
                <p id="success-desc" class="success-desc"><script>document.write(t('setup.success_description').replace(/\n/g,'<br>'))</script></p>
                <p class="success-desc" id="restart-notice" style="display:none; color: var(--warning);"><script>document.write(t('setup.success_restart_notice'))</script></p>
                <button id="btn-go-to-chat" class="btn-setup btn-next" onclick="window.location.href='/'"><script>document.write(t('setup.success_go_to_chat'))</script></button>
            </div>

            <!-- Footer -->
            <div class="setup-footer" id="setup-footer">
                <div class="footer-left">
                    <button class="btn-setup btn-back" id="btn-back" style="display:none" onclick="prevStep()"><script>document.write(t('setup.nav_back'))</script></button>
                </div>
                <div style="display:flex; align-items:center; gap:0.75rem;">
                    <button class="btn-skip" id="btn-skip-step" onclick="nextStep(true)"><script>document.write(t('setup.nav_skip_step'))</script></button>
                    <button class="btn-setup btn-next" id="btn-next" onclick="nextStep()"><script>document.write(t('setup.nav_next'))</script></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── State ────────────────────────────────────
        let currentStep = 0;
        const totalSteps = 3;
        let saving = false;

        // ── Load Personality Profiles on startup ─────
        (async function loadPersonalities() {
            try {
                const resp = await fetch('/api/personalities');
                if (!resp.ok) return;
                const data = await resp.json();
                const profiles = data.personalities || [];
                const active = data.active || 'friend';
                const sel = document.getElementById('core-personality');
                if (!sel || profiles.length === 0) return;
                sel.innerHTML = '';
                for (const p of profiles) {
                    const name = p.name || p; // API returns objects {name, core}
                    const opt = document.createElement('option');
                    opt.value = name;
                    opt.textContent = name.charAt(0).toUpperCase() + name.slice(1);
                    if (name === active || name === 'friend') opt.selected = true;
                    sel.appendChild(opt);
                }
                // Ensure 'friend' is selected by default for setup
                const names = profiles.map(p => p.name || p);
                if (names.includes('friend')) sel.value = 'friend';
                else if (active && names.includes(active)) sel.value = active;
            } catch (e) { /* ignore — fallback option remains */ }
        })();

        // ── Provider Config Map ──────────────────────
        const providerConfig = {
            openrouter: {
                baseUrl: 'https://openrouter.ai/api/v1',
                placeholder: 'sk-or-v1-...',
                link: 'openrouter.ai/keys',
                defaultModel: 'arcee-ai/trinity-large-preview:free',
                needsKey: true,
            },
            openai: {
                baseUrl: 'https://api.openai.com/v1',
                placeholder: 'sk-...',
                link: 'platform.openai.com/api-keys',
                defaultModel: 'gpt-4o',
                needsKey: true,
            },
            anthropic: {
                baseUrl: 'https://api.anthropic.com/v1',
                placeholder: 'sk-ant-...',
                link: 'console.anthropic.com/settings/keys',
                defaultModel: 'claude-sonnet-4-20250514',
                needsKey: true,
            },
            google: {
                baseUrl: 'https://generativelanguage.googleapis.com/v1beta/openai/',
                placeholder: 'AIza...',
                link: 'aistudio.google.com/apikey',
                defaultModel: 'gemini-2.5-flash',
                needsKey: true,
            },
            ollama: {
                baseUrl: 'http://localhost:11434/v1',
                placeholder: t('setup.provider_ollama_key_placeholder'),
                link: 'ollama.com',
                defaultModel: 'llama3.1',
                needsKey: false,
            },
            custom: {
                baseUrl: '',
                placeholder: 'API Key...',
                link: '',
                defaultModel: '',
                needsKey: true,
            },
        };

        // ── Helpers ───────────────────────────────────
        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        /* ── OpenRouter Model Browser (reusable modal) ── */
        let _orModelsCache = null;
        let _orModelsCacheTime = 0;
        const OR_CACHE_TTL = 5 * 60 * 1000;

        async function openOpenRouterBrowser(onSelect) {

            const existing = document.getElementById('or-browser-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'or-browser-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1100;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
            <div style="background:var(--bg-secondary, #1a1a2e);border-radius:16px;width:min(760px,95vw);height:min(85vh,720px);display:flex;flex-direction:column;border:1px solid var(--border-subtle, #2a2a3e);overflow:hidden;" onclick="event.stopPropagation()">
                <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border-subtle, #2a2a3e);flex-shrink:0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.7rem;">
                        <div style="font-weight:700;font-size:1rem;">${t('setup.or_browser_title')}</div>
                        <button onclick="document.getElementById('or-browser-overlay').remove()" style="background:none;border:none;color:var(--text-secondary, #888);font-size:1.2rem;cursor:pointer;">✕</button>
                    </div>
                    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                        <input id="or-search" class="field-input" type="text" placeholder="${t('setup.or_browser_search_placeholder')}" style="flex:1;min-width:180px;font-size:0.82rem;padding:0.4rem 0.7rem;">
                        <button id="or-free-btn" style="padding:0.35rem 0.8rem;font-size:0.75rem;background:var(--bg-tertiary, #252538);color:var(--text-primary, #eee);border:1px solid var(--border-subtle, #2a2a3e);border-radius:8px;cursor:pointer;white-space:nowrap;" title="${t('setup.or_browser_free_button_title')}">
                            ${t('setup.or_browser_free_button')}
                        </button>
                        <div id="or-count" style="font-size:0.72rem;color:var(--text-tertiary, #666);white-space:nowrap;"></div>
                    </div>
                </div>
                <div style="flex:1;display:flex;overflow:hidden;">
                    <div id="or-list-wrap" style="flex:1;overflow-y:auto;min-width:0;">
                        <div id="or-list" style="padding:0.3rem;"></div>
                    </div>
                    <div id="or-detail" style="width:280px;flex-shrink:0;border-left:1px solid var(--border-subtle, #2a2a3e);overflow-y:auto;display:none;padding:1rem;font-size:0.8rem;"></div>
                </div>
                <div id="or-loading" style="padding:2rem;text-align:center;color:var(--text-secondary, #888);font-size:0.85rem;">
                    ${t('setup.or_browser_loading')}
                </div>
            </div>`;
            document.body.appendChild(overlay);

            const searchInput = document.getElementById('or-search');
            const freeBtn = document.getElementById('or-free-btn');
            const listDiv = document.getElementById('or-list');
            const detailDiv = document.getElementById('or-detail');
            const countDiv = document.getElementById('or-count');
            const loadingDiv = document.getElementById('or-loading');
            const listWrap = document.getElementById('or-list-wrap');

            let allModels = [];
            let freeOnly = false;
            let selectedModel = null;

            try {
                const now = Date.now();
                if (_orModelsCache && (now - _orModelsCacheTime) < OR_CACHE_TTL) {
                    allModels = _orModelsCache;
                } else {
                    const resp = await fetch('/api/openrouter/models');
                    const json = await resp.json();
                    if (json.available === false) {
                        loadingDiv.innerHTML = '<span style="color:#e74c3c;">❌ ' + (json.reason || t('common.error')) + '</span>';
                        return;
                    }
                    allModels = (json.data || []).map(m => ({
                        id: m.id || '',
                        name: m.name || m.id || '',
                        description: m.description || '',
                        context_length: m.context_length || 0,
                        pricing: m.pricing || {},
                    }));
                    allModels.sort((a, b) => a.name.localeCompare(b.name));
                    _orModelsCache = allModels;
                    _orModelsCacheTime = now;
                }
            } catch (e) {
                loadingDiv.innerHTML = '<span style="color:#e74c3c;">❌ ' + t('setup.or_browser_connection_error') + e.message + '</span>';
                return;
            }
            loadingDiv.style.display = 'none';
            listWrap.style.display = 'block';

            function isFree(m) {
                return m.pricing && parseFloat(m.pricing.prompt || '1') === 0 && parseFloat(m.pricing.completion || '1') === 0;
            }
            function formatCost(perToken) {
                const val = parseFloat(perToken || '0');
                if (val === 0) return t('setup.or_browser_free_cost');
                const perMillion = val * 1000000;
                if (perMillion < 0.01) return '$' + perMillion.toFixed(4) + '/M';
                if (perMillion < 1) return '$' + perMillion.toFixed(3) + '/M';
                return '$' + perMillion.toFixed(2) + '/M';
            }
            function formatContext(ctx) {
                if (!ctx) return '—';
                if (ctx >= 1000000) return (ctx / 1000000).toFixed(1) + 'M';
                if (ctx >= 1000) return Math.round(ctx / 1000) + 'K';
                return ctx.toString();
            }

            function renderList() {
                const query = searchInput.value.toLowerCase().trim();
                const filtered = allModels.filter(m => {
                    if (freeOnly && !isFree(m)) return false;
                    if (query) return m.id.toLowerCase().includes(query) || m.name.toLowerCase().includes(query);
                    return true;
                });
                countDiv.textContent = filtered.length + ' ' + t('setup.or_browser_model_count') + (freeOnly ? ' ' + t('setup.or_browser_model_count_free_only') : '');
                if (filtered.length === 0) {
                    listDiv.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--text-tertiary, #666);font-size:0.82rem;">' + t('setup.or_browser_no_models_found') + '</div>';
                    return;
                }
                listDiv.innerHTML = filtered.map(m => {
                    const free = isFree(m);
                    const promptCost = formatCost(m.pricing.prompt);
                    const completionCost = formatCost(m.pricing.completion);
                    const isSelected = selectedModel && selectedModel.id === m.id;
                    return `<div class="or-model-row" data-id="${escapeAttr(m.id)}" style="padding:0.5rem 0.7rem;border-bottom:1px solid var(--border-subtle, #2a2a3e);cursor:pointer;display:flex;align-items:center;gap:0.6rem;transition:background 0.12s;${isSelected?'background:rgba(99,179,237,0.1);':''}">
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:0.8rem;font-weight:600;color:var(--text-primary, #eee);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeAttr(m.id)}">${escapeHtml(m.name)}</div>
                            <div style="font-size:0.68rem;color:var(--text-tertiary, #666);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(m.id)}</div>
                        </div>
                        <div style="flex-shrink:0;display:flex;gap:0.4rem;align-items:center;">
                            ${free ? '<span style="font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(72,199,142,0.15);color:#48c78e;font-weight:600;">'+t('setup.or_browser_free_badge')+'</span>' : '<span style="font-size:0.65rem;color:var(--text-tertiary, #666);" title="Input / Output">'+promptCost+' · '+completionCost+'</span>'}
                            <span style="font-size:0.65rem;color:var(--text-tertiary, #666);" title="Context">${formatContext(m.context_length)}</span>
                        </div>
                    </div>`;
                }).join('');
                listDiv.querySelectorAll('.or-model-row').forEach(row => {
                    row.onmouseover = () => { if (!row.style.background.includes('237')) row.style.background='var(--bg-tertiary, #252538)'; };
                    row.onmouseout = () => { if (selectedModel && selectedModel.id === row.dataset.id) row.style.background='rgba(99,179,237,0.1)'; else row.style.background=''; };
                    row.onclick = () => {
                        const m = allModels.find(x => x.id === row.dataset.id);
                        if (!m) return;
                        selectedModel = m;
                        showDetail(m);
                        listDiv.querySelectorAll('.or-model-row').forEach(r => r.style.background='');
                        row.style.background = 'rgba(99,179,237,0.1)';
                    };
                });
            }

            function showDetail(m) {
                detailDiv.style.display = 'block';
                const free = isFree(m);
                const promptPerM = (parseFloat(m.pricing.prompt || '0') * 1000000);
                const completionPerM = (parseFloat(m.pricing.completion || '0') * 1000000);
                detailDiv.innerHTML = `
                    <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary, #eee);margin-bottom:0.3rem;">${escapeHtml(m.name)}</div>
                    <div style="font-family:monospace;font-size:0.7rem;color:var(--accent, #63b3ed);margin-bottom:0.7rem;word-break:break-all;">${escapeHtml(m.id)}</div>
                    ${m.description ? '<div style="font-size:0.75rem;color:var(--text-secondary, #aaa);margin-bottom:0.8rem;line-height:1.4;max-height:120px;overflow-y:auto;">' + escapeHtml(m.description) + '</div>' : ''}
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem 0.8rem;font-size:0.75rem;margin-bottom:0.8rem;">
                        <div><span style="color:var(--text-tertiary, #666);">${t('setup.or_browser_detail_context')}</span></div>
                        <div style="font-weight:600;">${formatContext(m.context_length)} ${t('setup.or_browser_detail_tokens')}</div>
                        <div><span style="color:var(--text-tertiary, #666);">${t('setup.or_browser_detail_input')}</span></div>
                        <div style="font-weight:600;${free?'color:#48c78e;':''}">${free ? t('setup.or_browser_free_cost') : '$'+promptPerM.toFixed(4)+'/M'}</div>
                        <div><span style="color:var(--text-tertiary, #666);">${t('setup.or_browser_detail_output')}</span></div>
                        <div style="font-weight:600;${free?'color:#48c78e;':''}">${free ? t('setup.or_browser_free_cost') : '$'+completionPerM.toFixed(4)+'/M'}</div>
                    </div>
                    ${free ? '<div style="padding:0.4rem 0.6rem;border-radius:7px;background:rgba(72,199,142,0.1);border:1px solid rgba(72,199,142,0.2);font-size:0.72rem;color:#48c78e;margin-bottom:0.8rem;">'+t('setup.or_browser_free_model_badge')+'</div>' : ''}
                    <button id="or-apply-btn" style="width:100%;padding:0.5rem;font-size:0.82rem;border-radius:8px;background:var(--accent, #63b3ed);color:#fff;border:none;cursor:pointer;font-weight:600;">
                        ${t('setup.or_browser_apply_model')}
                    </button>
                `;
                document.getElementById('or-apply-btn').onclick = () => {
                    if (onSelect) onSelect({
                        id: m.id,
                        name: m.name,
                        pricing: m.pricing,
                        context_length: m.context_length,
                        inputPerMillion: parseFloat(m.pricing.prompt || '0') * 1000000,
                        outputPerMillion: parseFloat(m.pricing.completion || '0') * 1000000,
                    });
                    overlay.remove();
                };
            }

            let searchTimer;
            searchInput.oninput = () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(renderList, 150);
            };
            freeBtn.onclick = () => {
                freeOnly = !freeOnly;
                freeBtn.style.background = freeOnly ? 'rgba(72,199,142,0.2)' : 'var(--bg-tertiary, #252538)';
                freeBtn.style.color = freeOnly ? '#48c78e' : 'var(--text-primary, #eee)';
                freeBtn.style.borderColor = freeOnly ? 'rgba(72,199,142,0.4)' : 'var(--border-subtle, #2a2a3e)';
                renderList();
            };
            renderList();
            searchInput.focus();
        }

        // ── Provider Change Handler ──────────────────
        function onProviderChange() {
            const provider = document.getElementById('llm-provider').value;
            const cfg = providerConfig[provider] || providerConfig.custom;

            document.getElementById('llm-base-url').value = cfg.baseUrl;
            document.getElementById('llm-base-url').placeholder = cfg.baseUrl || 'https://...';
            document.getElementById('llm-api-key').placeholder = cfg.placeholder;
            document.getElementById('llm-model').placeholder = cfg.defaultModel;
            document.getElementById('provider-link').textContent = cfg.link;

            // Pre-fill model if empty
            const modelInput = document.getElementById('llm-model');
            if (!modelInput.value && cfg.defaultModel) {
                modelInput.value = cfg.defaultModel;
            }

            // Show/hide API key field for Ollama
            const apiKeyGroup = document.getElementById('group-api-key');
            if (!cfg.needsKey) {
                apiKeyGroup.style.opacity = '0.4';
                document.getElementById('llm-api-key').removeAttribute('required');
            } else {
                apiKeyGroup.style.opacity = '1';
            }

            // Show/hide OpenRouter browse button
            const orBrowseBtn = document.getElementById('or-browse-btn');
            if (orBrowseBtn) {
                orBrowseBtn.style.display = provider === 'openrouter' ? 'block' : 'none';
            }
        }

        // ── Embeddings Provider Change ───────────────
        function onEmbProviderChange() {
            const provider = document.getElementById('emb-provider').value;
            const apiKeyGroup = document.getElementById('group-emb-apikey');
            apiKeyGroup.style.display = (provider === 'internal' || provider === '') ? 'none' : 'block';
        }

        // ── Personality V2 Toggle ────────────────────
        function onPersonalityToggle() {
            const fields = document.getElementById('personality-v2-fields');
            const checked = document.getElementById('personality-v2').checked;
            fields.classList.toggle('visible', checked);
        }

        // ── Step Navigation ──────────────────────────
        function goToStep(step) {
            if (step < 0 || step >= totalSteps) return;
            // Only allow going back or to completed steps
            if (step > currentStep) return;

            currentStep = step;
            updateUI();
        }

        function nextStep(skip = false) {
            if (currentStep === 0 && !skip) {
                if (!validateStep0()) return;
            }

            if (currentStep < totalSteps - 1) {
                currentStep++;
                updateUI();
            } else {
                // Final step — save
                saveConfig();
            }
        }

        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateUI();
            }
        }

        function updateUI() {
            // Update sections
            document.querySelectorAll('.setup-section').forEach((s, i) => {
                s.classList.toggle('active', i === currentStep);
            });

            // Update step dots
            document.querySelectorAll('.step-dot').forEach((dot, i) => {
                dot.classList.toggle('active', i === currentStep);
                dot.classList.toggle('completed', i < currentStep);
            });

            // Update lines
            for (let i = 0; i < totalSteps - 1; i++) {
                const line = document.getElementById(`line-${i}-${i + 1}`);
                if (line) line.classList.toggle('completed', i < currentStep);
            }

            // Update buttons
            document.getElementById('btn-back').style.display = currentStep > 0 ? '' : 'none';
            document.getElementById('btn-skip-step').style.display = currentStep > 0 ? '' : 'none';

            const btnNext = document.getElementById('btn-next');
            if (currentStep === totalSteps - 1) {
                btnNext.innerHTML = t('setup.nav_save_and_start');
            } else {
                btnNext.innerHTML = t('setup.nav_next');
            }
        }

        // ── Validation ───────────────────────────────
        function validateStep0() {
            let valid = true;
            const provider = document.getElementById('llm-provider').value;
            const cfg = providerConfig[provider];

            // API Key required (except Ollama)
            if (cfg && cfg.needsKey) {
                const apiKey = document.getElementById('llm-api-key').value.trim();
                if (!apiKey) {
                    showFieldError('llm-api-key', 'err-api-key');
                    valid = false;
                } else {
                    clearFieldError('llm-api-key', 'err-api-key');
                }
            }

            // Model required
            const model = document.getElementById('llm-model').value.trim();
            if (!model) {
                showFieldError('llm-model', 'err-model');
                valid = false;
            } else {
                clearFieldError('llm-model', 'err-model');
            }

            return valid;
        }

        function showFieldError(inputId, errorId) {
            document.getElementById(inputId).classList.add('error');
            document.getElementById(errorId).classList.add('visible');
        }

        function clearFieldError(inputId, errorId) {
            document.getElementById(inputId).classList.remove('error');
            document.getElementById(errorId).classList.remove('visible');
        }

        // Clear errors on input
        document.addEventListener('input', (e) => {
            if (e.target.classList.contains('error')) {
                e.target.classList.remove('error');
                const errEl = e.target.parentElement.querySelector('.field-error');
                if (errEl) errEl.classList.remove('visible');
            }
        });

        // ── Build Config Patch ───────────────────────
        function buildConfigPatch() {
            const provider = document.getElementById('llm-provider').value;
            const patch = {
                llm: {
                    provider: provider,
                    api_key: document.getElementById('llm-api-key').value.trim(),
                    base_url: document.getElementById('llm-base-url').value.trim(),
                    model: document.getElementById('llm-model').value.trim(),
                    use_native_functions: document.getElementById('native-functions').checked,
                },
                agent: {
                    system_language: document.getElementById('system-language').value,
                    personality_engine_v2: document.getElementById('personality-v2').checked,
                    personality_engine: document.getElementById('personality-v2').checked, // V2 implies V1
                    core_personality: document.getElementById('core-personality').value,
                },
                maintenance: {
                    enabled: document.getElementById('maintenance-enabled').checked,
                },
                web_config: {
                    enabled: document.getElementById('web-config-enabled').checked,
                },
            };

            // Section 2: Embeddings
            const embProvider = document.getElementById('emb-provider').value;
            if (embProvider) {
                patch.embeddings = {
                    provider: embProvider,
                    internal_model: document.getElementById('emb-model').value.trim(),
                };
                const embKey = document.getElementById('emb-api-key').value.trim();
                if (embKey) patch.embeddings.api_key = embKey;
            }

            // Section 2: Vision
            const visionProvider = document.getElementById('vision-provider').value;
            if (visionProvider) {
                patch.vision = {
                    provider: visionProvider,
                    model: document.getElementById('vision-model').value.trim(),
                };
            }

            // Section 2: Whisper
            const whisperProvider = document.getElementById('whisper-provider').value;
            if (whisperProvider) {
                patch.whisper = {
                    provider: whisperProvider,
                    model: document.getElementById('whisper-model').value.trim(),
                };
            }

            // Section 3: Personality V2
            if (patch.agent.personality_engine_v2) {
                const v2Model = document.getElementById('v2-model').value.trim();
                if (v2Model) patch.agent.personality_v2_model = v2Model;
                const v2Url = document.getElementById('v2-url').value.trim();
                if (v2Url) patch.agent.personality_v2_url = v2Url;
                const v2Key = document.getElementById('v2-api-key').value.trim();
                if (v2Key) patch.agent.personality_v2_api_key = v2Key;
            }

            return patch;
        }

        // ── Save Config ──────────────────────────────
        async function saveConfig() {
            if (saving) return;
            saving = true;

            const btnNext = document.getElementById('btn-next');
            btnNext.disabled = true;
            btnNext.innerHTML = '<div class="spinner"></div> ' + t('setup.nav_saving');

            try {
                const patch = buildConfigPatch();
                const resp = await fetch('/api/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patch),
                });

                if (!resp.ok) {
                    const text = await resp.text();
                    throw new Error(text || `HTTP ${resp.status}`);
                }

                const result = await resp.json();

                // Show success screen
                document.querySelectorAll('.setup-section').forEach(s => s.classList.remove('active'));
                document.getElementById('setup-footer').style.display = 'none';
                document.querySelector('.step-indicator').style.display = 'none';
                document.getElementById('success-screen').classList.add('active');

                if (result.needs_restart) {
                    document.getElementById('restart-notice').style.display = '';
                }

                showToast(t('setup.toast_config_saved'), 'success');
            } catch (err) {
                showToast(t('setup.toast_error_prefix') + err.message, 'error');
                btnNext.disabled = false;
                btnNext.innerHTML = t('setup.nav_save_and_start');
            } finally {
                saving = false;
            }
        }

        // ── Skip Setup ───────────────────────────────
        function skipSetup() {
            if (confirm(t('setup.confirm_skip_setup'))) {
                window.location.href = '/?skip_setup=1';
            }
        }

        // ── Theme Toggle ─────────────────────────────
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('aurago-theme', next);
        }

        // ── Toast Notifications ──────────────────────
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icons = { success: '✓', error: '✕', warning: '⚠', info: 'ℹ' };
            toast.innerHTML = `<span style="font-weight:700">${icons[type] || ''}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // ── Browser Language Auto-detection ──────────
        (function detectAndSetLanguage() {
            const lang = (navigator.languages && navigator.languages[0]) || navigator.language || 'en';
            const base = lang.toLowerCase().split('-')[0];
            const map = {
                'de': 'Deutsch',
                'en': 'English',
                'es': 'Español',
                'fr': 'Français',
                'pl': 'Polski',
                'zh': '中文',
                'hi': 'हिन्दी',
                'nl': 'Nederlands',
                'it': 'Italiano',
                'pt': 'Português',
                'da': 'Dansk',
                'ja': '日本語',
                'sv': 'Svenska',
                'no': 'Norsk',
                'cs': 'Čeština',
            };
            const sel = document.getElementById('system-language');
            sel.value = map[base] || 'English';
        })();
