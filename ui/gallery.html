<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-section="common.nav_gallery">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title id="page-title">AuraGo - Image Gallery</title>
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css">
    <link rel="stylesheet" href="/shared-animations.css">
    <link rel="stylesheet" href="/css/tokens.css">
    <script src="/shared.js?v=7"></script>
    <script>
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <script>const I18N={{.I18N}};</script>
    <link rel="stylesheet" href="/css/gallery.css">
    <link rel="stylesheet" href="/css/enhancements.css">
    <link href="/fonts/fonts.css" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="gallery.subtitle">Image Gallery</span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="gallery-container">
        <div class="page-header gallery-header">
            <h1 data-i18n="gallery.title">🎨 Image Gallery</h1>
            <div class="gallery-controls">
                <input type="text" id="gallery-search" class="gallery-search"
                    placeholder="Search prompts..." data-i18n-placeholder="gallery.search_placeholder">
                <select id="gallery-provider-filter" class="gallery-filter">
                    <option value="" data-i18n="gallery.all_providers">All Providers</option>
                </select>
            </div>
        </div>

        <div id="gallery-grid" class="gallery-grid">
            <div class="gallery-loading" data-i18n="gallery.loading">Loading...</div>
        </div>

        <div id="gallery-pagination" class="gallery-pagination is-hidden">
            <button id="gallery-prev" class="btn-gallery-nav" onclick="galleryPrev()">← <span data-i18n="common.pagination_previous">Previous</span></button>
            <span id="gallery-page-info"></span>
            <button id="gallery-next" class="btn-gallery-nav" onclick="galleryNext()"><span data-i18n="common.pagination_next">Next</span> →</button>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal is-hidden">
        <div class="modal-backdrop" onclick="closeModal('delete-modal')"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="common.confirm_title">Confirm</h3>
                <button class="modal-close" onclick="closeModal('delete-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p id="delete-confirm-text"></p>
                <input type="hidden" id="delete-target-id">
                <input type="hidden" id="delete-target-type">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('delete-modal')" data-i18n="common.btn_cancel">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDeleteGallery()" data-i18n="common.btn_delete">Delete</button>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox is-hidden" onclick="closeLightbox(event)">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <img id="lightbox-img" src="" alt="">
            <div class="lightbox-meta" id="lightbox-meta"></div>
            <div class="lightbox-actions">
                <a id="lightbox-download" href="" download class="btn-gallery-action" data-i18n="gallery.download">⬇ Download</a>
                <button id="lightbox-delete" class="btn-gallery-action btn-danger" onclick="galleryDeleteCurrent()" data-i18n="gallery.delete">🗑 Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/gallery/main.js"></script>
</body>
</html>
