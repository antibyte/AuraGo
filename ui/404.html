<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraGo – 404</title>
    <meta name="description" content="AuraGo - Autonomous AI agent for home lab environments">
    <meta property="og:title" content="AuraGo – Page Not Found">
    <meta property="og:description" content="The page you are looking for does not exist">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <link href="/fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind-compat.css">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css">
    <link rel="stylesheet" href="/shared-animations.css">
    <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <link rel="stylesheet" href="/css/tokens.css">
    <style>
        .not-found-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: var(--space-8);
            text-align: center;
            position: relative;
            isolation: isolate;
        }

        .not-found-code {
            font-size: clamp(5rem, 12vw, 9rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, var(--accent), #0d9488);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: var(--space-2);
            animation: float 3s ease-in-out infinite;
        }

        .not-found-title {
            font-size: var(--text-xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--space-3);
            text-wrap: balance;
        }

        .not-found-desc {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            max-width: 40ch;
            margin-bottom: var(--space-8);
            text-wrap: pretty;
        }

        .not-found-actions {
            display: flex;
            gap: var(--space-3);
            flex-wrap: wrap;
            justify-content: center;
        }

        .not-found-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-3) var(--space-6);
            border-radius: var(--radius-xl);
            font-size: var(--text-sm);
            font-weight: 600;
            text-decoration: none;
            transition: all var(--transition-base) ease;
        }

        .not-found-link-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }

        .not-found-link-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .not-found-link-secondary {
            background: var(--bg-glass);
            color: var(--text-primary);
            border: 1px solid var(--border-subtle);
        }

        .not-found-link-secondary:hover {
            border-color: var(--border-accent);
            transform: translateY(-2px);
        }

        .not-found-logo {
            position: absolute;
            top: var(--space-6);
            left: var(--space-6);
            text-decoration: none;
            color: inherit;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            font-weight: 700;
            font-size: var(--text-sm);
        }

        .not-found-logo .logo-wordmark-accent {
            color: var(--accent);
        }

        .not-found-logo .logo-wordmark-base {
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <a href="#main-content" class="skip-link" data-i18n="common.skip_to_content"></a>

    <a href="/" class="not-found-logo">
        <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
    </a>

    <main id="main-content" class="not-found-page">
        <div class="not-found-code">404</div>
        <h1 class="not-found-title" data-i18n="notfound.title"></h1>
        <p class="not-found-desc" data-i18n="notfound.description"></p>
        <div class="not-found-actions">
            <a href="/" class="not-found-link not-found-link-primary" data-i18n="notfound.go_home"></a>
            <a href="/dashboard" class="not-found-link not-found-link-secondary" data-i18n="notfound.go_dashboard"></a>
        </div>
    </main>

    <script>
        if (typeof I18N !== 'undefined' && I18N) {
            document.querySelectorAll('[data-i18n]').forEach(function (el) {
                var key = el.getAttribute('data-i18n');
                if (I18N[key]) el.textContent = I18N[key];
            });
        }
    </script>
</body>

</html>
