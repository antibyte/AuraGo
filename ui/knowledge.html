<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">AuraGo - Knowledge Center</title>
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js"></script>
    <script>
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <script>const I18N={{.I18N}};</script>
    <link rel="stylesheet" href="/css/knowledge.css">
</head>
<body>
    <header class="app-header">
        <div class="header-left">
            <a href="/" class="logo">
                <div class="logo-icon">🥚</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="knowledge.subtitle">Knowledge Center</span>
            </a>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="btn-theme" title="Toggle theme"></button>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <div class="kc-container">
        <!-- Tab bar -->
        <div class="kc-tabs" role="tablist">
            <button class="kc-tab active" id="tab-contacts" role="tab" aria-selected="true"
                onclick="switchKCTab('contacts')" data-i18n="knowledge.tab_contacts">📇 Address Book</button>
            <button class="kc-tab" id="tab-files" role="tab" aria-selected="false"
                onclick="switchKCTab('files')" data-i18n="knowledge.tab_files">📂 Knowledge Files</button>
        </div>

        <!-- ═══════ CONTACTS PANEL ═══════ -->
        <div id="panel-contacts" class="kc-panel active">
            <div class="kc-panel-header">
                <div class="kc-search-row">
                    <input type="text" id="contacts-search" class="kc-search"
                        placeholder="Search contacts..." data-i18n-placeholder="knowledge.contacts_search_placeholder"
                        oninput="debounceContactSearch()">
                    <button class="btn btn-primary" onclick="openContactModal()">
                        <span>+</span> <span data-i18n="knowledge.contacts_add">Add Contact</span>
                    </button>
                </div>
            </div>
            <div class="kc-table-wrap">
                <table class="kc-table" id="contacts-table">
                    <thead>
                        <tr>
                            <th data-i18n="knowledge.col_name">Name</th>
                            <th data-i18n="knowledge.col_email">Email</th>
                            <th data-i18n="knowledge.col_phone">Phone</th>
                            <th data-i18n="knowledge.col_mobile">Mobile</th>
                            <th data-i18n="knowledge.col_relationship">Relationship</th>
                            <th data-i18n="knowledge.col_actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="contacts-tbody"></tbody>
                </table>
            </div>
            <div class="empty-state is-hidden" id="contacts-empty">
                <div class="empty-icon">📇</div>
                <h3 data-i18n="knowledge.contacts_empty_title">No Contacts Yet</h3>
                <p data-i18n="knowledge.contacts_empty_desc">Add contacts to your address book.</p>
            </div>
        </div>

        <!-- ═══════ FILES PANEL ═══════ -->
        <div id="panel-files" class="kc-panel">
            <div class="kc-panel-header">
                <div class="kc-search-row">
                    <input type="text" id="files-search" class="kc-search"
                        placeholder="Filter files..." data-i18n-placeholder="knowledge.files_search_placeholder"
                        oninput="filterFiles()">
                    <label class="btn btn-primary kc-upload-btn">
                        <span>⬆</span> <span data-i18n="knowledge.files_upload">Upload File</span>
                        <input type="file" id="file-upload-input" class="is-hidden" onchange="uploadFile(this)">
                    </label>
                </div>
            </div>
            <div class="kc-table-wrap">
                <table class="kc-table" id="files-table">
                    <thead>
                        <tr>
                            <th data-i18n="knowledge.col_filename">Filename</th>
                            <th data-i18n="knowledge.col_size">Size</th>
                            <th data-i18n="knowledge.col_modified">Modified</th>
                            <th data-i18n="knowledge.col_actions">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="files-tbody"></tbody>
                </table>
            </div>
            <div class="empty-state is-hidden" id="files-empty">
                <div class="empty-icon">📂</div>
                <h3 data-i18n="knowledge.files_empty_title">No Knowledge Files</h3>
                <p data-i18n="knowledge.files_empty_desc">Upload files to the knowledge directory.</p>
            </div>
        </div>
    </div>

    <!-- ═══════ CONTACT MODAL ═══════ -->
    <div class="modal-overlay" id="contact-modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="contact-modal-title" data-i18n="knowledge.contacts_add">Add Contact</h2>
                <button class="modal-close" onclick="closeModal('contact-modal')">&times;</button>
            </div>
            <input type="hidden" id="contact-id">
            <div class="form-group">
                <label data-i18n="knowledge.col_name">Name</label>
                <input type="text" id="contact-name" maxlength="200" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="knowledge.col_email">Email</label>
                    <input type="email" id="contact-email" maxlength="200">
                </div>
                <div class="form-group">
                    <label data-i18n="knowledge.col_relationship">Relationship</label>
                    <input type="text" id="contact-relationship" maxlength="100"
                        placeholder="e.g. friend, colleague" data-i18n-placeholder="knowledge.relationship_placeholder">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label data-i18n="knowledge.col_phone">Phone</label>
                    <input type="tel" id="contact-phone" maxlength="50">
                </div>
                <div class="form-group">
                    <label data-i18n="knowledge.col_mobile">Mobile</label>
                    <input type="tel" id="contact-mobile" maxlength="50">
                </div>
            </div>
            <div class="form-group">
                <label data-i18n="knowledge.col_address">Address</label>
                <textarea id="contact-address" rows="2" maxlength="500"></textarea>
            </div>
            <div class="form-group">
                <label data-i18n="knowledge.col_notes">Notes</label>
                <textarea id="contact-notes" rows="2" maxlength="1000"></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('contact-modal')" data-i18n="common.btn_cancel">Cancel</button>
                <button class="btn btn-primary" onclick="saveContact()" data-i18n="common.btn_save">Save</button>
            </div>
        </div>
    </div>

    <!-- ═══════ DELETE CONFIRM MODAL ═══════ -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal modal-small">
            <div class="modal-header">
                <h2 data-i18n="knowledge.delete_confirm_title">Confirm Delete</h2>
                <button class="modal-close" onclick="closeModal('delete-modal')">&times;</button>
            </div>
            <p id="delete-confirm-text" data-i18n="knowledge.delete_confirm_text">Are you sure you want to delete this item?</p>
            <input type="hidden" id="delete-target-id">
            <input type="hidden" id="delete-target-type">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('delete-modal')" data-i18n="common.btn_cancel">Cancel</button>
                <button class="btn btn-danger" onclick="confirmDelete()" data-i18n="common.btn_delete">Delete</button>
            </div>
        </div>
    </div>

    <script src="/js/knowledge/main.js"></script>
</body>
</html>
