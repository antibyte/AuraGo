        function persSetMetaDefaults() {
            const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
            const setVal = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = parseFloat(v).toFixed(1); };
            set('pers-meta-volatility', 1.0); setVal('pers-val-volatility', 1.0);
            set('pers-meta-empathy', 1.0); setVal('pers-val-empathy', 1.0);
            set('pers-meta-loneliness', 1.0); setVal('pers-val-loneliness', 1.0);
            set('pers-meta-decay', 1.0); setVal('pers-val-decay', 1.0);
            const cf = document.getElementById('pers-meta-conflict'); if (cf) cf.value = 'neutral';
        }

        function persApplyMeta(meta) {
            if (!meta) { persSetMetaDefaults(); return; }
            const set = (id, v) => { const el = document.getElementById(id); if (el) el.value = v; };
            const setVal = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = parseFloat(v).toFixed(1); };
            set('pers-meta-volatility', meta.volatility ?? 1.0); setVal('pers-val-volatility', meta.volatility ?? 1.0);
            set('pers-meta-empathy', meta.empathy_bias ?? 1.0); setVal('pers-val-empathy', meta.empathy_bias ?? 1.0);
            set('pers-meta-loneliness', meta.loneliness_susceptibility ?? 1.0); setVal('pers-val-loneliness', meta.loneliness_susceptibility ?? 1.0);
            set('pers-meta-decay', meta.trait_decay_rate ?? 1.0); setVal('pers-val-decay', meta.trait_decay_rate ?? 1.0);
            const cf = document.getElementById('pers-meta-conflict'); if (cf) cf.value = meta.conflict_response || 'neutral';
        }

        function persBuildFrontmatter(name) {
            const fv = (id) => parseFloat(document.getElementById(id)?.value ?? 1.0).toFixed(1);
            const cv = document.getElementById('pers-meta-conflict')?.value || 'neutral';
            return `---\nid: "${name}"\ntags: ["core"]\npriority: 100\nmeta:\n  volatility: ${fv('pers-meta-volatility')}\n  empathy_bias: ${fv('pers-meta-empathy')}\n  conflict_response: "${cv}"\n  loneliness_susceptibility: ${fv('pers-meta-loneliness')}\n  trait_decay_rate: ${fv('pers-meta-decay')}\n---\n\n`;
        }

        function persNew() {
            persState.editName = null;
            persState.isCore = false;
            const editor = document.getElementById('pers-editor');
            if (!editor) return;
            document.getElementById('pers-editor-name-row').style.display = 'block';
            document.getElementById('pers-activate-btn').style.display = 'none';
            document.getElementById('pers-delete-btn').style.display = 'none';
            document.getElementById('pers-name-input').value = '';
            document.getElementById('pers-content-input').value = '';
            document.getElementById('pers-editor-status').textContent = '';
            persSetMetaDefaults();
            persApplyCoreMode(false);
            editor.style.display = 'block';
            document.querySelectorAll('.pers-chip').forEach(c => c.classList.remove('selected'));
            document.getElementById('pers-name-input').focus();
        }

        async function persSelectForEdit(name) {
            persState.editName = name;
            // Determine if this is a built-in (read-only) persona
            const entry = persState.personalities.find(p => p.name === name);
            persState.isCore = entry ? entry.core : false;

            document.querySelectorAll('.pers-chip').forEach(c => {
                const chipName = c.textContent.replace(' ✦', '').replace('🔒', '').trim();
                c.classList.toggle('selected', chipName === name);
            });
            const editor = document.getElementById('pers-editor');
            if (!editor) return;
            document.getElementById('pers-editor-name-row').style.display = 'none';
            document.getElementById('pers-activate-btn').style.display = name === persState.active ? 'none' : 'inline-block';
            document.getElementById('pers-delete-btn').style.display = name === persState.active ? 'none' : 'inline-block';
            document.getElementById('pers-content-input').value = '';
            const status = document.getElementById('pers-editor-status');
            status.textContent = lang === 'de' ? 'Lade...' : 'Loading...';
            editor.style.display = 'block';
            try {
                const resp = await fetch('/api/config/personality-files?name=' + encodeURIComponent(name));
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                document.getElementById('pers-content-input').value = data.body || '';
                persApplyMeta(data.meta);
                status.textContent = '';
            } catch (e) {
                status.textContent = '❌ ' + e.message;
            }
            // Apply read-only mode for core personas AFTER content is loaded
            persApplyCoreMode(persState.isCore);
        }

        // Toggles the editor between read-only (core) and editable (user) mode.
        function persApplyCoreMode(isCore) {
            const inputs = ['pers-meta-volatility', 'pers-meta-empathy', 'pers-meta-loneliness', 'pers-meta-decay', 'pers-meta-conflict', 'pers-content-input'];
            inputs.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.disabled = isCore;
            });
            const saveBtn = document.querySelector('.pers-editor-actions .wh-btn-primary');
            if (saveBtn) saveBtn.style.display = isCore ? 'none' : '';
            const delBtn = document.getElementById('pers-delete-btn');
            if (delBtn && isCore) delBtn.style.display = 'none';
            const statusEl = document.getElementById('pers-editor-status');
            if (statusEl) {
                if (isCore) {
                    statusEl.innerHTML = '<span style="color:var(--text-secondary);">🔒 ' +
                        (lang === 'de' ? 'Integrierte Persona – schreibgeschützt. Zum Anpassen eine Kopie erstellen.' :
                        'Built-in persona – read-only. Create a copy to customise.') + '</span>';
                } else {
                    // Only clear if it currently shows the lock message
                    if (statusEl.textContent.includes('🔒')) statusEl.textContent = '';
                }
            }
        }

        async function persSave() {
            if (persState.isCore) {
                const s = document.getElementById('pers-editor-status');
                if (s) s.textContent = '❌ ' + (lang === 'de' ? 'Integrierte Persona kann nicht geändert werden.' : 'Built-in persona cannot be modified.');
                return;
            }
            const isNew = persState.editName === null;
            const nameInput = document.getElementById('pers-name-input');
            const contentInput = document.getElementById('pers-content-input');
            const status = document.getElementById('pers-editor-status');
            const name = isNew ? (nameInput ? nameInput.value.trim() : '') : persState.editName;
            if (!name) { status.textContent = '❌ ' + (lang === 'de' ? 'Name erforderlich.' : 'Name is required.'); return; }
            status.textContent = lang === 'de' ? 'Speichere...' : 'Saving...';
            // Reconstruct full file: YAML front matter + body
            const frontmatter = persBuildFrontmatter(name);
            const fullContent = frontmatter + (contentInput.value || '');
            try {
                const resp = await fetch('/api/config/personality-files', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, content: fullContent })
                });
                if (!resp.ok) { const t = await resp.text(); throw new Error(t || 'HTTP ' + resp.status); }
                status.textContent = '✓ ' + (lang === 'de' ? 'Gespeichert.' : 'Saved.');
                if (isNew) {
                    persState.editName = name;
                    const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'prompts_editor');
                    await renderPromptsSection(sectionMeta);
                    await persSelectForEdit(name);
                }
            } catch (e) { status.textContent = '❌ ' + e.message; }
        }

        async function persActivate() {
            const name = persState.editName;
            if (!name) return;
            const status = document.getElementById('pers-editor-status');
            status.textContent = lang === 'de' ? 'Setze aktiv...' : 'Setting active...';
            try {
                const resp = await fetch('/api/personality', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: name })
                });
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                if (!configData.agent) configData.agent = {};
                configData.agent.core_personality = name;
                persState.active = name;
                const cfgResp = await fetch('/api/config');
                configData = await cfgResp.json();
                const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'prompts_editor');
                await renderPromptsSection(sectionMeta);
                await persSelectForEdit(name);
            } catch (e) { const s = document.getElementById('pers-editor-status'); if (s) s.textContent = '❌ ' + e.message; }
        }

        async function persDelete() {
            const name = persState.editName;
            if (!name) return;
            const confirmed = confirm(lang === 'de' ? `Persönlichkeit "${name}" wirklich löschen?` : `Really delete personality "${name}"?`);
            if (!confirmed) return;
            const status = document.getElementById('pers-editor-status');
            status.textContent = lang === 'de' ? 'Lösche...' : 'Deleting...';
            try {
                const resp = await fetch('/api/config/personality-files?name=' + encodeURIComponent(name), { method: 'DELETE' });
                if (!resp.ok) { const t = await resp.text(); throw new Error(t || 'HTTP ' + resp.status); }
                persState.editName = undefined;
                const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'prompts_editor');
                await renderPromptsSection(sectionMeta);
            } catch (e) { const s = document.getElementById('pers-editor-status'); if (s) s.textContent = '❌ ' + e.message; }
        }

        function persCancel() {
            const editor = document.getElementById('pers-editor');
            if (editor) editor.style.display = 'none';
            document.querySelectorAll('.pers-chip').forEach(c => c.classList.remove('selected'));
            persState.editName = undefined;
        }

        /* ── Indexing Section ─────────────────────────────────────────── */
        async function renderIndexingSection(section) {
            const content = document.getElementById('content');

            let html = '<div class="cfg-section active">';
            html += '<div class="section-header">' + section.icon + ' ' + section.label[lang] + '</div>';
            html += '<div class="section-desc">' + section.desc[lang] + '</div>';

            // Fetch status
            let status = null;
            try {
                const resp = await fetch('/api/indexing/status');
                if (resp.ok) status = await resp.json();
            } catch (_) {}

            const isEnabled = status && status.enabled;

            // Enabled toggle
            const enabledVal = configData.indexing && configData.indexing.enabled;
            html += `<div class="cfg-field" style="margin-bottom:1.2rem;">
                <div style="display:flex;align-items:center;gap:0.6rem;">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-primary);">${lang === 'de' ? 'Indexierung aktiviert' : 'Indexing enabled'}</label>
                    <div class="toggle ${enabledVal ? 'on' : ''}" onclick="toggleBool(this)" data-path="indexing.enabled"></div>
                </div>
                <div style="font-size:0.72rem;color:var(--text-secondary);margin-top:0.3rem;">
                    ${lang === 'de'
                        ? 'Aktiviert die automatische Datei-Indexierung. Dateien in den konfigurierten Ordnern werden in Embeddings umgewandelt und stehen dem Agenten als Wissen zur Verfügung.'
                        : 'Enables automatic file indexing. Files in configured folders are converted to embeddings and available to the agent as knowledge.'}
                </div>
            </div>`;

            // Status card
            if (isEnabled && status.status) {
                const st = status.status;
                html += `<div style="padding:0.8rem 1rem;border-radius:10px;border:1px solid var(--border-subtle);background:var(--bg-secondary);margin-bottom:1.2rem;">
                    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">
                        <span style="font-size:0.9rem;">${st.running ? '🟢' : '🔴'}</span>
                        <span style="font-size:0.82rem;font-weight:600;color:var(--text-primary);">
                            ${st.running ? (lang === 'de' ? 'Indexer läuft' : 'Indexer running') : (lang === 'de' ? 'Indexer gestoppt' : 'Indexer stopped')}
                        </span>
                        <button class="btn-save" style="margin-left:auto;padding:0.3rem 0.8rem;font-size:0.72rem;" onclick="idxRescan()">
                            🔄 ${lang === 'de' ? 'Jetzt scannen' : 'Scan now'}
                        </button>
                    </div>
                    <div style="display:flex;flex-wrap:wrap;gap:1rem;font-size:0.75rem;color:var(--text-secondary);">
                        <span>📁 ${lang === 'de' ? 'Dateien' : 'Files'}: <strong>${st.total_files}</strong></span>
                        <span>🔗 ${lang === 'de' ? 'Indexiert' : 'Indexed'}: <strong>${st.indexed_files}</strong></span>
                        ${st.last_scan_at ? `<span>⏱️ ${lang === 'de' ? 'Letzter Scan' : 'Last scan'}: ${st.last_scan_duration || '—'}</span>` : ''}
                    </div>
                    ${st.errors && st.errors.length > 0 ? `<div style="margin-top:0.5rem;font-size:0.72rem;color:var(--danger);">⚠️ ${st.errors.length} ${lang === 'de' ? 'Fehler' : 'errors'}</div>` : ''}
                </div>`;
            }

            // Directories list
            html += `<div style="margin-top:0.5rem;">
                <div style="font-size:0.85rem;font-weight:600;color:var(--text-primary);margin-bottom:0.6rem;">
                    📂 ${lang === 'de' ? 'Überwachte Verzeichnisse' : 'Watched Directories'}
                </div>
                <div id="idx-dirs-list">`;

            // Fetch current directories from API
            let dirs = [];
            try {
                const resp = await fetch('/api/indexing/directories');
                if (resp.ok) {
                    const data = await resp.json();
                    dirs = data.directories || [];
                }
            } catch (_) {}

            if (dirs.length === 0) {
                html += `<div style="padding:1rem;text-align:center;color:var(--text-secondary);font-size:0.8rem;">
                    ${lang === 'de' ? 'Keine Verzeichnisse konfiguriert' : 'No directories configured'}
                </div>`;
            } else {
                dirs.forEach(d => {
                    html += `<div class="idx-dir-item" style="display:flex;align-items:center;gap:0.5rem;padding:0.55rem 0.8rem;border:1px solid var(--border-subtle);border-radius:8px;background:var(--surface-elevated);margin-bottom:0.4rem;">
                        <span style="font-size:0.85rem;">📁</span>
                        <span style="flex:1;font-size:0.8rem;color:var(--text-primary);font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${d}">${d}</span>
                        <button onclick="idxRemoveDir('${d.replace(/'/g, "\\'").replace(/\\/g, "\\\\")}')" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:0.9rem;padding:0.2rem 0.4rem;" title="${lang === 'de' ? 'Entfernen' : 'Remove'}">✕</button>
                    </div>`;
                });
            }

            html += `</div>
                <div style="display:flex;gap:0.5rem;margin-top:0.6rem;">
                    <input type="text" id="idx-new-dir" placeholder="${lang === 'de' ? 'Verzeichnispfad (relativ oder absolut)' : 'Directory path (relative or absolute)'}"
                        style="flex:1;padding:0.45rem 0.7rem;border:1px solid var(--border-subtle);border-radius:8px;background:var(--input-bg);color:var(--text-primary);font-size:0.8rem;font-family:monospace;"
                        onkeydown="if(event.key==='Enter')idxAddDir()">
                    <button class="btn-save" style="padding:0.45rem 1rem;font-size:0.78rem;" onclick="idxAddDir()">+ ${lang === 'de' ? 'Hinzufügen' : 'Add'}</button>
                </div>
            </div>`;

            // Extensions info
            const exts = (configData.indexing && configData.indexing.extensions) || ['.txt', '.md', '.json', '.csv', '.log', '.yaml', '.yml', '.pdf', '.docx', '.xlsx', '.pptx', '.odt', '.rtf'];
            const docExts = ['.pdf', '.docx', '.xlsx', '.pptx', '.odt', '.rtf'];
            const imgExts = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'];
            html += `<div style="margin-top:1.2rem;padding:0.8rem 1rem;border-radius:10px;border:1px solid var(--border-subtle);background:var(--bg-secondary);">
                <div style="font-size:0.78rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.4rem;">
                    📋 ${lang === 'de' ? 'Unterstützte Dateitypen' : 'Supported file types'}
                </div>
                <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.3rem;">
                    ${lang === 'de' ? 'Textdateien' : 'Text files'}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.5rem;">
                    ${exts.filter(e => !docExts.includes(e) && !imgExts.includes(e)).map(e => '<span style="padding:0.15rem 0.5rem;border-radius:6px;background:var(--accent-subtle);color:var(--accent);font-size:0.72rem;font-weight:600;">' + e + '</span>').join('')}
                </div>
                <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.3rem;">
                    ${lang === 'de' ? 'Dokumente (Text wird automatisch extrahiert)' : 'Documents (text extracted automatically)'}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.5rem;">
                    ${docExts.map(e => '<span style="padding:0.15rem 0.5rem;border-radius:6px;background:rgba(59,130,246,0.12);color:#3b82f6;font-size:0.72rem;font-weight:600;">' + e + '</span>').join('')}
                </div>
                <div style="font-size:0.7rem;color:var(--text-secondary);margin-bottom:0.3rem;">
                    ${lang === 'de' ? 'Bilder (via Vision-LLM analysiert, wenn aktiviert)' : 'Images (analyzed via Vision LLM, when enabled)'}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:0.3rem;">
                    ${imgExts.map(e => '<span style="padding:0.15rem 0.5rem;border-radius:6px;background:rgba(168,85,247,0.12);color:#a855f7;font-size:0.72rem;font-weight:600;">' + e + '</span>').join('')}
                </div>
            </div>`;

            // Poll interval
            const poll = (configData.indexing && configData.indexing.poll_interval_seconds) || 60;
            html += `<div class="cfg-field" style="margin-top:1rem;">
                <label style="font-size:0.82rem;font-weight:600;color:var(--text-primary);">${lang === 'de' ? 'Scan-Intervall (Sekunden)' : 'Scan interval (seconds)'}</label>
                <input type="number" min="10" max="3600" value="${poll}"
                    data-path="indexing.poll_interval_seconds"
                    oninput="idxSetVal('indexing.poll_interval_seconds', parseInt(this.value))"
                    style="width:100px;padding:0.4rem 0.6rem;border:1px solid var(--border-subtle);border-radius:8px;background:var(--input-bg);color:var(--text-primary);font-size:0.8rem;margin-top:0.3rem;">
                <div style="font-size:0.7rem;color:var(--text-secondary);margin-top:0.2rem;">
                    ${lang === 'de' ? 'Wie oft nach geänderten Dateien gesucht wird (Standard: 60s).' : 'How often to check for changed files (default: 60s).'}
                </div>
            </div>`;

            // ── Index Images toggle ──
            const indexImagesVal = configData.indexing && configData.indexing.index_images;
            html += `<div class="cfg-field" style="margin-top:1.2rem;">
                <div style="display:flex;align-items:center;gap:0.6rem;">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-primary);">🖼️ ${lang === 'de' ? 'Bilder indexieren' : 'Index images'}</label>
                    <div class="toggle ${indexImagesVal ? 'on' : ''}" onclick="toggleBool(this)" data-path="indexing.index_images"></div>
                </div>
                <div style="font-size:0.72rem;color:var(--text-secondary);margin-top:0.3rem;">
                    ${lang === 'de'
                        ? 'Wenn aktiv, werden Bilddateien (.jpg, .png, .gif, .webp, .bmp) an die Vision-LLM gesendet. Die Bildanalyse wird zusammen mit Dateiname und Pfad in die Embeddings gespeichert.'
                        : 'When enabled, image files (.jpg, .png, .gif, .webp, .bmp) are sent to the Vision LLM. The image analysis is stored with filename and path in the embeddings.'}
                </div>
            </div>`;

            // Cost warning for image indexing
            html += `<div style="margin-top:0.6rem;padding:0.7rem 1rem;border-radius:10px;border:1px solid rgba(234,179,8,0.3);background:rgba(234,179,8,0.08);display:flex;align-items:flex-start;gap:0.5rem;">
                <span style="font-size:1rem;line-height:1;">⚠️</span>
                <div style="font-size:0.72rem;color:var(--text-secondary);">
                    <strong style="color:var(--text-primary);">${lang === 'de' ? 'Hinweis zu Bildindexierung' : 'Image indexing notice'}</strong><br>
                    ${lang === 'de'
                        ? 'Die Bildanalyse über Vision-LLM kann bei vielen Bildern erhebliche API-Kosten verursachen. Jedes Bild wird einzeln an die LLM gesendet und erzeugt Token-Kosten. Empfehlung: Nur gezielt Ordner mit relevanten Bildern indexieren.'
                        : 'Image analysis via Vision LLM can cause significant API costs when indexing many images. Each image is sent individually to the LLM and generates token costs. Recommendation: Only index folders with relevant images.'}
                </div>
            </div>`;

            html += '</div>';
            content.innerHTML = html;
        }



        function idxSetVal(path, val) {
            const parts = path.split('.');
            let obj = configData;
            for (let i = 0; i < parts.length - 1; i++) {
                if (!obj[parts[i]]) obj[parts[i]] = {};
                obj = obj[parts[i]];
            }
            obj[parts[parts.length - 1]] = val;
            setDirty(true);
        }

        async function idxAddDir() {
            const input = document.getElementById('idx-new-dir');
            const path = input.value.trim();
            if (!path) return;

            try {
                const resp = await fetch('/api/indexing/directories', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    alert(text || 'Fehler');
                    return;
                }
                input.value = '';
                // Re-render
                const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'indexing');
                await renderIndexingSection(sectionMeta);
            } catch (e) {
                alert('Fehler: ' + e.message);
            }
        }

        async function idxRemoveDir(path) {
            if (!confirm(lang === 'de' ? 'Verzeichnis entfernen?' : 'Remove directory?')) return;
            try {
                const resp = await fetch('/api/indexing/directories', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    alert(text || 'Fehler');
                    return;
                }
                const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'indexing');
                await renderIndexingSection(sectionMeta);
            } catch (e) {
                alert('Fehler: ' + e.message);
            }
        }

        async function idxRescan() {
            try {
                const resp = await fetch('/api/indexing/rescan', { method: 'POST' });
                if (resp.ok) {
                    // Re-render after a short delay to allow scan to start
                    setTimeout(async () => {
                        const sectionMeta = SECTIONS.flatMap(g => g.items).find(s => s.key === 'indexing');
                        await renderIndexingSection(sectionMeta);
                    }, 1500);
                }
            } catch (_) {}
        }

        /* ══════════════════════════════════════════════════════════
         *  Provider Management Section
         * ══════════════════════════════════════════════════════════ */

        function renderProvidersSection(section) {
            const lDe = lang === 'de';
            let html = `<div class="cfg-section active">
                <div class="section-header">${section.icon} ${section.label[lang]}</div>
                <div class="section-desc">${section.desc[lang]}</div>
                <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
                    <button class="btn-save" style="padding:0.45rem 1.1rem;font-size:0.82rem;" onclick="providerAdd()">
                        ＋ ${lDe ? 'Neuer Provider' : 'New Provider'}
                    </button>
                </div>
                <div id="providers-list"></div>
                <div id="providers-empty" style="display:none;text-align:center;padding:2rem;color:var(--text-tertiary);font-size:0.85rem;">
                    ${lDe ? 'Keine Provider konfiguriert. Füge einen hinzu!' : 'No providers configured. Add one!'}
                </div>
            </div>`;
            document.getElementById('content').innerHTML = html;
            providerRenderCards();
        }

        function providerRenderCards() {
            const wrap = document.getElementById('providers-list');
            const empty = document.getElementById('providers-empty');
            if (!wrap) return;
            if (providersCache.length === 0) {
                wrap.innerHTML = '';
                if (empty) empty.style.display = '';
                return;
            }
            if (empty) empty.style.display = 'none';

            const lDe = lang === 'de';
            let html = '';
            providersCache.forEach((p, idx) => {
                const typeBadge = p.type
                    ? `<span style="display:inline-block;padding:0.15rem 0.5rem;border-radius:6px;font-size:0.7rem;font-weight:600;background:var(--accent);color:#fff;margin-left:0.4rem;">${escapeAttr(p.type)}</span>`
                    : '';
                const isOAuth = p.auth_type === 'oauth2';
                const authBadge = isOAuth
                    ? '<span style="display:inline-block;padding:0.15rem 0.5rem;border-radius:6px;font-size:0.7rem;font-weight:600;background:#8e44ad;color:#fff;margin-left:0.4rem;">🔑 OAuth2</span>'
                    : '';
                let authInfo;
                if (isOAuth) {
                    authInfo = `<span style="color:var(--text-tertiary);" id="oauth-status-${idx}">🔑 OAuth2</span>`;
                } else {
                    const maskedKey = p.api_key === '••••••••'
                        ? '<span style="color:var(--text-tertiary);">••••••••</span>'
                        : (p.api_key ? '<span style="color:var(--success);">✔ gesetzt</span>' : '<span style="color:var(--text-tertiary);">—</span>');
                    authInfo = maskedKey;
                }
                html += `
                <div class="provider-card" data-idx="${idx}" style="border:1px solid var(--border-subtle);border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.75rem;background:var(--bg-secondary);transition:border-color 0.15s;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;">
                        <div style="font-weight:600;font-size:0.9rem;">
                            ${escapeAttr(p.name || p.id)}${typeBadge}${authBadge}
                            <span style="font-size:0.72rem;color:var(--text-tertiary);margin-left:0.5rem;">ID: ${escapeAttr(p.id)}</span>
                        </div>
                        <div style="display:flex;gap:0.4rem;">
                            <button onclick="providerEdit(${idx})" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:0.85rem;" title="Edit">✏️</button>
                            <button onclick="providerDelete(${idx})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:0.85rem;" title="Delete">🗑️</button>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.3rem 1rem;font-size:0.78rem;">
                        <div><span style="color:var(--text-tertiary);">Base URL:</span> ${escapeAttr(p.base_url || '—')}</div>
                        <div><span style="color:var(--text-tertiary);">Model:</span> ${escapeAttr(p.model || '—')}</div>
                        <div><span style="color:var(--text-tertiary);">${isOAuth ? 'Auth:' : 'API Key:'}</span> ${authInfo}</div>
                    </div>
                </div>`;
            });
            wrap.innerHTML = html;

            // Async: fetch OAuth status for OAuth2 providers
            providersCache.forEach((p, idx) => {
                if (p.auth_type === 'oauth2') {
                    fetch('/api/oauth/status?provider=' + encodeURIComponent(p.id))
                        .then(r => r.json())
                        .then(st => {
                            const el = document.getElementById('oauth-status-' + idx);
                            if (!el) return;
                            if (st.authorized && !st.expired) {
                                el.innerHTML = '<span style="color:var(--success);">✅ Autorisiert</span>';
                            } else if (st.authorized && st.expired) {
                                el.innerHTML = '<span style="color:var(--warning);">⚠️ Token abgelaufen</span>';
                            } else {
                                el.innerHTML = '<span style="color:var(--danger);">❌ Nicht autorisiert</span>';
                            }
                        }).catch(() => {});
                }
            });
        }

        // Known base URLs for auto-fill when creating new providers
        const PROVIDER_BASE_URLS = {

            anthropic: { de: 'API Key beginnt mit sk-ant-...', en: 'API Key starts with sk-ant-...' },

                <!-- Ollama model query (only visible when type = ollama) -->

                    <div id="prov-ollama-result" style="margin-top:0.6rem;display:none;">
                        <div style="font-size:0.72rem;font-weight:600;color:var(--text-secondary);margin-bottom:0.35rem;">${lDe ? 'Verf\u00fcgbare Modelle (klicken zum \u00dcbernehmen):' : 'Available models (click to apply):'}</div>
                        <div id="prov-ollama-models" style="display:flex;flex-wrap:wrap;gap:0.35rem;"></div>
                        <div id="prov-ollama-error" style="font-size:0.75rem;color:var(--danger);margin-top:0.35rem;display:none;"></div>
                    </div>
                </div>

                <!-- OpenRouter model browser (only visible when type = openrouter) -->
                <div id="prov-openrouter-block" class="field-group" style="display:${(data.type || 'openai') === 'openrouter' ? 'block' : 'none'};margin-top:0;padding:0.7rem 0.9rem;border-radius:9px;background:rgba(72,199,142,0.06);border:1px solid rgba(72,199,142,0.18);">
                    <div style="display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;">
                        <button type="button" class="btn-save" style="padding:0.3rem 0.9rem;font-size:0.75rem;background:rgba(72,199,142,0.15);color:#48c78e;border:1px solid rgba(72,199,142,0.3);" onclick="openOpenRouterBrowser(function(m){document.getElementById('prov-model').value=m.id;document.getElementById('prov-model').dispatchEvent(new Event('input',{bubbles:true}));updateBudgetModelCost(m);})">
                            🌐 ${lDe ? 'Modell-Browser öffnen' : 'Open Model Browser'}
                        </button>
                        <span style="font-size:0.72rem;color:var(--text-tertiary);">${lDe ? 'Durchsuche alle verfügbaren OpenRouter Modelle' : 'Browse all available OpenRouter models'}</span>
                    </div>
                </div>

                <!-- Auth Type Toggle -->
                <div class="field-group" style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border-subtle);">
                    <div class="field-label">${lDe ? 'Authentifizierung' : 'Authentication'}</div>
                    <select class="field-select" id="prov-auth-type">
                        <option value="api_key"${currentAuthType !== 'oauth2' ? ' selected' : ''}>🔑 API Key</option>
                        <option value="oauth2"${currentAuthType === 'oauth2' ? ' selected' : ''}>🔐 OAuth2 Authorization Code</option>
                    </select>
                </div>

                <!-- API Key section (visible when auth_type = api_key) -->
                <div id="prov-apikey-section" style="display:${isOAuth ? 'none' : 'block'};">
                    <div class="field-group">
                        <div class="field-label">API Key</div>
                        <div id="prov-key-hint" style="font-size:0.72rem;color:var(--text-tertiary);margin-bottom:0.3rem;">${(PROVIDER_HINTS[data.type || 'openai'] || PROVIDER_HINTS.openai)[lang] || ''}</div>
                        <div class="password-wrap">
                            <input class="field-input" id="prov-key" type="password" value="${escapeAttr(data.api_key === '••••••••' ? '' : (data.api_key || ''))}" placeholder="${data.api_key === '••••••••' ? '••••••••  (unverändert)' : 'sk-...'}" autocomplete="off">
                            <button type="button" class="password-toggle" data-visible="false" onclick="togglePassword(this)">${EYE_OPEN_SVG}</button>
                        </div>
                        ${data.api_key === '••••••••' ? `<div style="font-size:0.72rem;color:var(--text-tertiary);margin-top:0.2rem;">${lDe ? 'Leer lassen um den bestehenden Key beizubehalten.' : 'Leave empty to keep the existing key.'}</div>` : ''}
                    </div>
                </div>

                <!-- OAuth2 section (visible when auth_type = oauth2) -->
                <div id="prov-oauth-section" style="display:${isOAuth ? 'block' : 'none'};">
                    <div class="field-group">
                        <div class="field-label">Authorization URL</div>
                        <div class="field-help">${lDe ? 'OAuth2 Authorization-Endpunkt des Providers.' : 'OAuth2 authorization endpoint of the provider.'}</div>
                        <input class="field-input" id="prov-oauth-auth-url" value="${escapeAttr(data.oauth_auth_url || '')}" placeholder="https://accounts.google.com/o/oauth2/v2/auth">
                    </div>
                    <div class="field-group">
                        <div class="field-label">Token URL</div>
                        <div class="field-help">${lDe ? 'OAuth2 Token-Exchange-Endpunkt.' : 'OAuth2 token exchange endpoint.'}</div>
                        <input class="field-input" id="prov-oauth-token-url" value="${escapeAttr(data.oauth_token_url || '')}" placeholder="https://oauth2.googleapis.com/token">
                    </div>
                    <div class="field-group">
                        <div class="field-label">Client ID</div>
                        <input class="field-input" id="prov-oauth-client-id" value="${escapeAttr(data.oauth_client_id || '')}" placeholder="123456789.apps.googleusercontent.com">
                    </div>
                    <div class="field-group">
                        <div class="field-label">Client Secret</div>
                        <div class="password-wrap">
                            <input class="field-input" id="prov-oauth-client-secret" type="password" value="${escapeAttr(data.oauth_client_secret === '••••••••' ? '' : (data.oauth_client_secret || ''))}" placeholder="${data.oauth_client_secret === '••••••••' ? '••••••••  (unverändert)' : 'GOCSPX-...'}" autocomplete="off">
                            <button type="button" class="password-toggle" data-visible="false" onclick="togglePassword(this)">${EYE_OPEN_SVG}</button>
                        </div>
                        ${data.oauth_client_secret === '••••••••' ? `<div style="font-size:0.72rem;color:var(--text-tertiary);margin-top:0.2rem;">${lDe ? 'Leer lassen um bestehendes Secret beizubehalten.' : 'Leave empty to keep existing secret.'}</div>` : ''}
                    </div>
                    <div class="field-group">
                        <div class="field-label">Scopes</div>
                        <div class="field-help">${lDe ? 'Leerzeichen-getrennte OAuth2 Scopes.' : 'Space-separated OAuth2 scopes.'}</div>
                        <input class="field-input" id="prov-oauth-scopes" value="${escapeAttr(data.oauth_scopes || '')}" placeholder="openid email https://www.googleapis.com/auth/cloud-platform">
                    </div>
                    ${data._editMode && currentAuthType === 'oauth2' ? `
                    <div class="field-group" style="margin-top:0.5rem;">
                        <div id="prov-oauth-status" style="font-size:0.8rem;color:var(--text-tertiary);">⏳ ${lDe ? 'Prüfe Status...' : 'Checking status...'}</div>
                        <div style="display:flex;gap:0.5rem;margin-top:0.5rem;">
                            <button class="btn-save" style="padding:0.35rem 1rem;font-size:0.78rem;background:#8e44ad;" id="prov-oauth-authorize-btn">
                                🔐 ${lDe ? 'Autorisieren' : 'Authorize'}
                            </button>
                            <button class="btn-save" style="padding:0.35rem 1rem;font-size:0.78rem;background:var(--danger);" id="prov-oauth-revoke-btn">
                                🗑️ ${lDe ? 'Token widerrufen' : 'Revoke Token'}
                            </button>
                        </div>
                    </div>
                    ` : ''}
                </div>

                <div style="display:flex;justify-content:flex-end;gap:0.6rem;margin-top:1.2rem;">
                    <button class="btn-save" style="padding:0.45rem 1.4rem;font-size:0.82rem;background:var(--bg-tertiary);color:var(--text-primary);" onclick="document.getElementById('provider-modal-overlay').remove()">
                        ${lDe ? 'Abbrechen' : 'Cancel'}
                    </button>
                    <button class="btn-save" style="padding:0.45rem 1.4rem;font-size:0.82rem;" id="prov-save-btn">
                        ${lDe ? 'Speichern' : 'Save'}
                    </button>
                </div>
            </div>`;
            document.body.appendChild(overlay);

            // ── Auto-fill Base URL when type changes (only if URL field is empty) ──
            const typeSelect = document.getElementById('prov-type');
            const urlInput = document.getElementById('prov-url');
            const hintEl = document.getElementById('prov-key-hint');
            const ollamaBlock = document.getElementById('prov-ollama-block');
            const openrouterBlock = document.getElementById('prov-openrouter-block');
            typeSelect.addEventListener('change', () => {
                const t = typeSelect.value;
                // Auto-fill URL only when empty
                if (!urlInput.value.trim() && PROVIDER_BASE_URLS[t]) {
                    urlInput.value = PROVIDER_BASE_URLS[t];
                }
                // Update placeholder
                urlInput.placeholder = PROVIDER_BASE_URLS[t] || 'https://...';
                // Update hint
                if (hintEl) {
                    const hint = PROVIDER_HINTS[t];
                    hintEl.textContent = hint ? (hint[lang] || hint.en || '') : '';
                }
                // Show/hide Ollama model query block
                if (ollamaBlock) ollamaBlock.style.display = t === 'ollama' ? 'block' : 'none';
                // Show/hide OpenRouter model browser block
                if (openrouterBlock) openrouterBlock.style.display = t === 'openrouter' ? 'block' : 'none';
            });

            // ── Auth type toggle ──
            const authTypeSelect = document.getElementById('prov-auth-type');
            const apikeySection = document.getElementById('prov-apikey-section');
            const oauthSection = document.getElementById('prov-oauth-section');
            authTypeSelect.addEventListener('change', () => {
                const isOA = authTypeSelect.value === 'oauth2';
                apikeySection.style.display = isOA ? 'none' : 'block';
                oauthSection.style.display = isOA ? 'block' : 'none';
            });

            // ── OAuth Authorize button ──
            const authBtn = document.getElementById('prov-oauth-authorize-btn');
            if (authBtn) {
                authBtn.onclick = async () => {
                    try {
                        const resp = await fetch('/api/oauth/start?provider=' + encodeURIComponent(data.id));
                        if (!resp.ok) { alert(await resp.text()); return; }
                        const result = await resp.json();
                        if (result.auth_url) {
                            window.open(result.auth_url, '_blank', 'width=600,height=700');
                        }
                    } catch (e) { alert('Error: ' + e.message); }
                };
            }

            // ── OAuth Revoke button ──
            const revokeBtn = document.getElementById('prov-oauth-revoke-btn');
            if (revokeBtn) {
                revokeBtn.onclick = async () => {
                    if (!confirm(lDe ? 'OAuth Token wirklich widerrufen?' : 'Really revoke OAuth token?')) return;
                    try {
                        await fetch('/api/oauth/revoke?provider=' + encodeURIComponent(data.id), { method: 'DELETE' });
                        const statusEl = document.getElementById('prov-oauth-status');
                        if (statusEl) statusEl.innerHTML = '<span style="color:var(--danger);">❌ ' + (lDe ? 'Nicht autorisiert' : 'Not authorized') + '</span>';
                    } catch (e) { alert('Error: ' + e.message); }
                };
            }

            // ── Fetch OAuth status for edit mode ──
            if (data._editMode && currentAuthType === 'oauth2' && data.id) {
                fetch('/api/oauth/status?provider=' + encodeURIComponent(data.id))
                    .then(r => r.json())
                    .then(st => {
                        const statusEl = document.getElementById('prov-oauth-status');
                        if (!statusEl) return;
                        if (st.authorized && !st.expired) {
                            statusEl.innerHTML = '<span style="color:var(--success);">✅ ' + (lDe ? 'Autorisiert' : 'Authorized') + '</span>'
                                + (st.expiry ? `<span style="margin-left:0.5rem;font-size:0.72rem;color:var(--text-tertiary);">(${lDe ? 'läuft ab' : 'expires'}: ${new Date(st.expiry).toLocaleString()})</span>` : '');
                        } else if (st.authorized && st.expired) {
                            statusEl.innerHTML = '<span style="color:var(--warning);">⚠️ ' + (lDe ? 'Token abgelaufen — bitte neu autorisieren' : 'Token expired — please re-authorize') + '</span>';
                        } else {
                            statusEl.innerHTML = '<span style="color:var(--danger);">❌ ' + (lDe ? 'Nicht autorisiert — klicke Autorisieren' : 'Not authorized — click Authorize') + '</span>';
                        }
                    }).catch(() => {});
            }

            // ── Save handler ──
            document.getElementById('prov-save-btn').onclick = () => {
                const id = document.getElementById('prov-id').value.trim();
                const name = document.getElementById('prov-name').value.trim();
                const type = document.getElementById('prov-type').value;
                const base_url = document.getElementById('prov-url').value.trim();
                const model = document.getElementById('prov-model').value.trim();
                const auth_type = document.getElementById('prov-auth-type').value;

                if (!id) { alert(lDe ? 'ID darf nicht leer sein.' : 'ID must not be empty.'); return; }
                if (!base_url) { alert(lDe ? 'Base URL darf nicht leer sein.' : 'Base URL must not be empty.'); return; }

                const entry = { id, name: name || id, type, base_url, model, auth_type };

                if (auth_type === 'oauth2') {
                    entry.api_key = data.api_key === '••••••••' ? '••••••••' : '';
                    entry.oauth_auth_url = document.getElementById('prov-oauth-auth-url').value.trim();
                    entry.oauth_token_url = document.getElementById('prov-oauth-token-url').value.trim();
                    entry.oauth_client_id = document.getElementById('prov-oauth-client-id').value.trim();
                    let client_secret = document.getElementById('prov-oauth-client-secret').value.trim();
                    if (!client_secret && data.oauth_client_secret === '••••••••') client_secret = '••••••••';
                    entry.oauth_client_secret = client_secret;
                    entry.oauth_scopes = document.getElementById('prov-oauth-scopes').value.trim();

                    if (!entry.oauth_auth_url || !entry.oauth_token_url || !entry.oauth_client_id) {
                        alert(lDe ? 'OAuth2: Auth URL, Token URL und Client ID sind erforderlich.' : 'OAuth2: Auth URL, Token URL and Client ID are required.');
                        return;
                    }
                } else {
                    let api_key = document.getElementById('prov-key').value.trim();
                    if (!api_key && data.api_key === '••••••••') api_key = '••••••••';
                    entry.api_key = api_key;
                    // Clear OAuth fields
                    entry.oauth_auth_url = '';
                    entry.oauth_token_url = '';
                    entry.oauth_client_id = '';
                    entry.oauth_client_secret = '';
                    entry.oauth_scopes = '';
                }

                onSave(entry);
                overlay.remove();
            };

            // Focus first editable field
            setTimeout(() => {
                const focus = data._editMode ? document.getElementById('prov-name') : document.getElementById('prov-id');
                if (focus) focus.focus();
            }, 50);

            // Trigger initial auto-fill for new providers
            if (!data._editMode && !data.base_url) {
                const initType = typeSelect.value;
                if (PROVIDER_BASE_URLS[initType]) {
                    urlInput.value = PROVIDER_BASE_URLS[initType];
                }
            }
        }

        function providerAdd() {
            const lDe = lang === 'de';
            providerShowModal(
                lDe ? 'Neuer Provider' : 'New Provider',
                {},
                async (entry) => {
                    // Check unique ID
                    if (providersCache.some(p => p.id === entry.id)) {
                        alert(lDe ? 'Ein Provider mit dieser ID existiert bereits.' : 'A provider with this ID already exists.');
                        return;
                    }
                    providersCache.push(entry);
                    await providerSave();
                }
            );
        }

        function providerEdit(idx) {
            const lDe = lang === 'de';
            const p = { ...providersCache[idx], _editMode: true };
            providerShowModal(
                lDe ? 'Provider bearbeiten' : 'Edit Provider',
                p,
                async (entry) => {
                    providersCache[idx] = entry;
                    await providerSave();
                }
            );
        }

        function providerDelete(idx) {
            const lDe = lang === 'de';
            const p = providersCache[idx];
            if (!confirm(lDe
                ? `Provider "${p.name || p.id}" wirklich löschen?`
                : `Really delete provider "${p.name || p.id}"?`)) return;
            providersCache.splice(idx, 1);
            providerSave();
        }

        async function providerSave() {
            try {
                const resp = await fetch('/api/providers', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(providersCache)
                });
                if (!resp.ok) {
                    const txt = await resp.text();
                    alert('Error: ' + txt);
                    return;
                }
                // Reload providers from server (API keys will be masked)
                const reload = await fetch('/api/providers');
                if (reload.ok) providersCache = await reload.json();
                providerRenderCards();
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        /* ══════════════════════════════════════════════════════════
         *  Email Accounts Management Section
         * ══════════════════════════════════════════════════════════ */

        function renderEmailSection(section) {
            const lDe = lang === 'de';
            let html = `<div class="cfg-section active">
                <div class="section-header">${section.icon} ${section.label[lang]}</div>
                <div class="section-desc">${section.desc[lang]}</div>`;

            html += `<div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
                    <button class="btn-save" style="padding:0.45rem 1.1rem;font-size:0.82rem;" onclick="emailAccountAdd()">
                        ＋ ${lDe ? 'Neues E-Mail-Konto' : 'New Email Account'}
                    </button>
                </div>
                <div id="email-accounts-list"></div>
                <div id="email-accounts-empty" style="display:none;text-align:center;padding:2rem;color:var(--text-tertiary);font-size:0.85rem;">
                    ${lDe ? 'Keine E-Mail-Konten konfiguriert. Füge eins hinzu!' : 'No email accounts configured. Add one!'}
                </div>
            </div>`;
            document.getElementById('content').innerHTML = html;
            emailAccountRenderCards();
        }

        function emailAccountRenderCards() {
            const wrap = document.getElementById('email-accounts-list');
            const empty = document.getElementById('email-accounts-empty');
            if (!wrap) return;
            if (emailAccountsCache.length === 0) {
                wrap.innerHTML = '';
                if (empty) empty.style.display = '';
                return;
            }
            if (empty) empty.style.display = 'none';

            const lDe = lang === 'de';
            let html = '';
            emailAccountsCache.forEach((a, idx) => {
                const watchBadge = a.watch_enabled
                    ? `<span style="display:inline-block;padding:0.15rem 0.5rem;border-radius:6px;font-size:0.7rem;font-weight:600;background:var(--success);color:#fff;margin-left:0.4rem;">👁️ Watcher</span>`
                    : '';
                const maskedPw = a.password === '••••••••'
                    ? '<span style="color:var(--success);">✔ gesetzt</span>'
                    : (a.password ? '<span style="color:var(--success);">✔ gesetzt</span>' : '<span style="color:var(--text-tertiary);">—</span>');

                html += `
                <div class="provider-card" data-idx="${idx}" style="border:1px solid var(--border-subtle);border-radius:12px;padding:1rem 1.2rem;margin-bottom:0.75rem;background:var(--bg-secondary);transition:border-color 0.15s;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem;">
                        <div style="font-weight:600;font-size:0.9rem;">
                            ${escapeAttr(a.name || a.id)}${watchBadge}
                            <span style="font-size:0.72rem;color:var(--text-tertiary);margin-left:0.5rem;">ID: ${escapeAttr(a.id)}</span>
                        </div>
                        <div style="display:flex;gap:0.4rem;">
                            <button onclick="emailAccountEdit(${idx})" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:0.85rem;" title="Edit">✏️</button>
                            <button onclick="emailAccountDelete(${idx})" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:0.85rem;" title="Delete">🗑️</button>
                        </div>
                    </div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.3rem 1rem;font-size:0.78rem;">
                        <div><span style="color:var(--text-tertiary);">IMAP:</span> ${escapeAttr(a.imap_host || '—')}:${a.imap_port || '—'}</div>
                        <div><span style="color:var(--text-tertiary);">SMTP:</span> ${escapeAttr(a.smtp_host || '—')}:${a.smtp_port || '—'}</div>
                        <div><span style="color:var(--text-tertiary);">${lDe ? 'Benutzer' : 'User'}:</span> ${escapeAttr(a.username || '—')}</div>
                        <div><span style="color:var(--text-tertiary);">${lDe ? 'Passwort' : 'Password'}:</span> ${maskedPw}</div>
                        <div><span style="color:var(--text-tertiary);">From:</span> ${escapeAttr(a.from_address || '—')}</div>
                        <div><span style="color:var(--text-tertiary);">${lDe ? 'Ordner' : 'Folder'}:</span> ${escapeAttr(a.watch_folder || 'INBOX')}</div>
                    </div>
                </div>`;
            });
            wrap.innerHTML = html;
        }

        function emailAccountShowModal(title, data, onSave) {
            const lDe = lang === 'de';
            const existing = document.getElementById('email-modal-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'email-modal-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
            <div style="background:var(--bg-secondary);border-radius:16px;padding:1.5rem;width:min(520px,92vw);max-height:85vh;overflow-y:auto;border:1px solid var(--border-subtle);" onclick="event.stopPropagation()">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem;">
                    <div style="font-weight:700;font-size:1rem;">${title}</div>
                    <button onclick="document.getElementById('email-modal-overlay').remove()" style="background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;">✕</button>
                </div>
                <div class="field-group">
                    <div class="field-label">ID</div>
                    <div class="field-help">${lDe ? 'Eindeutige Kennung (z.B. personal, work). Kleinbuchstaben, Bindestriche erlaubt.' : 'Unique identifier (e.g. personal, work). Lowercase, hyphens allowed.'}</div>
                    <input class="field-input" id="ea-id" value="${escapeAttr(data.id || '')}" placeholder="personal" ${data._editMode ? 'disabled style="opacity:0.55;cursor:not-allowed;"' : ''}>
                </div>
                <div class="field-group">
                    <div class="field-label">Name</div>
                    <input class="field-input" id="ea-name" value="${escapeAttr(data.name || '')}" placeholder="${lDe ? 'Anzeigename' : 'Display name'}">
                </div>

                <div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border-subtle);">
                    <div style="font-weight:600;font-size:0.85rem;color:var(--accent);margin-bottom:0.6rem;">📥 IMAP (${lDe ? 'Empfang' : 'Receive'})</div>
                </div>
                <div class="field-group">
                    <div class="field-label">IMAP Host</div>
                    <input class="field-input" id="ea-imap-host" value="${escapeAttr(data.imap_host || '')}" placeholder="imap.example.com">
                </div>
                <div class="field-group">
                    <div class="field-label">IMAP Port</div>
                    <div class="field-help">${lDe ? 'Meist 993 für SSL/TLS.' : 'Usually 993 for SSL/TLS.'}</div>
                    <input class="field-input" id="ea-imap-port" type="number" value="${data.imap_port || 993}" placeholder="993">
                </div>

                <div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border-subtle);">
                    <div style="font-weight:600;font-size:0.85rem;color:var(--accent);margin-bottom:0.6rem;">📤 SMTP (${lDe ? 'Versand' : 'Send'})</div>
                </div>
                <div class="field-group">
                    <div class="field-label">SMTP Host</div>
                    <input class="field-input" id="ea-smtp-host" value="${escapeAttr(data.smtp_host || '')}" placeholder="smtp.example.com">
                </div>
                <div class="field-group">
                    <div class="field-label">SMTP Port</div>
                    <div class="field-help">${lDe ? '587 = STARTTLS, 465 = SSL/TLS.' : '587 = STARTTLS, 465 = SSL/TLS.'}</div>
                    <input class="field-input" id="ea-smtp-port" type="number" value="${data.smtp_port || 587}" placeholder="587">
                </div>

                <div style="margin-top:0.8rem;padding-top:0.8rem;border-top:1px solid var(--border-subtle);">

        function backupShowTab(tab) {

                document.getElementById('backup-panel-' + t).classList.toggle('active', t === tab);

        async function backupCreate() {
            const btn = document.getElementById('backup-create-btn');
            const status = document.getElementById('backup-create-status');
            const lDe = lang === 'de';
            btn.disabled = true;
            status.textContent = lDe ? '⏳ Erstelle Backup…' : '⏳ Creating backup…';
            status.style.color = 'var(--text-secondary)';

            const payload = {
                password: document.getElementById('backup-password').value || '',
                include_vectordb: document.getElementById('backup-opt-vectordb').checked,
                include_workdir: document.getElementById('backup-opt-workdir').checked,
            };

            try {
                const resp = await fetch('/api/backup/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    const txt = await resp.text();
                    throw new Error(txt);
                }
                const disposition = resp.headers.get('Content-Disposition') || '';
                const fnMatch = disposition.match(/filename="([^"]+)"/);
                const filename = fnMatch ? fnMatch[1] : 'backup.ago';
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                status.textContent = '✅ ' + (lDe ? 'Backup heruntergeladen: ' : 'Downloaded: ') + filename;
                status.style.color = 'var(--success)';
            } catch (e) {
                status.textContent = '❌ ' + e.message;
                status.style.color = 'var(--danger)';
            } finally {
                btn.disabled = false;
            }
        }

        async function backupImport() {
            const btn = document.getElementById('backup-import-btn');
            const status = document.getElementById('backup-import-status');
            const result = document.getElementById('backup-import-result');
            const lDe = lang === 'de';
            const fileInput = document.getElementById('backup-import-file');

            if (!fileInput.files || !fileInput.files[0]) {
                status.textContent = lDe ? '⚠️ Bitte eine .ago-Datei auswählen.' : '⚠️ Please select a .ago file.';
                status.style.color = 'var(--warning)';
                return;
            }

            btn.disabled = true;
            status.textContent = lDe ? '⏳ Importiere…' : '⏳ Importing…';
            status.style.color = 'var(--text-secondary)';
            result.style.display = 'none';

            const fd = new FormData();
            fd.append('file', fileInput.files[0]);
            fd.append('password', document.getElementById('backup-import-password').value || '');

            try {
                const resp = await fetch('/api/backup/import', { method: 'POST', body: fd });
                const data = await resp.json();
                if (!resp.ok || data.error) {
                    let msg = data.message || data.error || 'Unknown error';
                    if (data.error === 'password_required') msg = lDe ? 'Verschlüsseltes Backup — bitte Passwort eingeben.' : 'Encrypted backup — please enter the password.';
                    if (data.error === 'decryption_failed') msg = lDe ? 'Entschlüsselung fehlgeschlagen — falsches Passwort?' : 'Decryption failed — wrong password?';
                    status.textContent = '❌ ' + msg;
                    status.style.color = 'var(--danger)';
                } else {
                    status.textContent = '';
                    result.style.display = 'block';
                    result.innerHTML = `<div style="background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:10px;padding:1rem 1.25rem;">
                        <div style="font-weight:600;color:var(--success);margin-bottom:0.4rem;">✅ ${lDe ? 'Import erfolgreich' : 'Import successful'}</div>
                        <div style="font-size:0.82rem;color:var(--text-secondary);">${data.message}</div>
                        <button class="btn-save" style="margin-top:0.85rem;padding:0.45rem 1.1rem;font-size:0.8rem;" onclick="restartAuraGo()">
                            ↻ ${lDe ? 'Jetzt neu starten' : 'Restart now'}
                        </button>
                    </div>`;
                }
            } catch (e) {
                status.textContent = '❌ ' + e.message;
                status.style.color = 'var(--danger)';
            } finally {
                btn.disabled = false;
            }
        }

        async function devicesLoad() {
            const tbody = document.getElementById('devices-tbody');
            const empty = document.getElementById('devices-empty');
            const loading = document.getElementById('devices-loading');
            const table = document.getElementById('devices-table-wrap');
            loading.style.display = 'block';
            table.style.display = 'none';
            empty.style.display = 'none';

            try {
                const resp = await fetch('/api/devices');
                if (!resp.ok) throw new Error(await resp.text());
                devicesCache = await resp.json();
            } catch (e) {
                loading.textContent = '❌ ' + e.message;
                return;
            }

            loading.style.display = 'none';
            if (devicesCache.length === 0) {
                empty.style.display = 'block';
                return;
            }
            table.style.display = 'block';
            devicesRenderRows(devicesCache);
        }

        function devicesRenderRows(devices) {
            const lDe = lang === 'de';
            const tbody = document.getElementById('devices-tbody');
            tbody.innerHTML = '';
            devices.forEach(d => {
                const tags = (d.tags || []).map(t => `<span style="display:inline-block;background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:6px;padding:0.1rem 0.45rem;font-size:0.72rem;margin-right:0.25rem;">${escapeHtml(t)}</span>`).join('');
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid var(--border-subtle)';
                tr.dataset.id = d.id;
                tr.innerHTML = `
                    <td style="padding:0.5rem 0.6rem;font-weight:500;">${escapeHtml(d.name)}</td>
                    <td style="padding:0.5rem 0.6rem;"><span style="background:var(--bg-secondary);border:1px solid var(--border-subtle);border-radius:6px;padding:0.15rem 0.5rem;font-size:0.75rem;">${escapeHtml(d.type)}</span></td>
                    <td style="padding:0.5rem 0.6rem;font-family:monospace;font-size:0.8rem;">${escapeHtml(d.ip_address || '—')}</td>
                    <td style="padding:0.5rem 0.6rem;">${d.port || '—'}</td>
                    <td style="padding:0.5rem 0.6rem;">${escapeHtml(d.username || '—')}</td>

                        <button onclick="devicesDelete('${d.id}','${escapeHtml(d.name)}')" style="background:none;border:none;cursor:pointer;font-size:0.9rem;margin-left:0.3rem;" title="${lDe ? 'Löschen' : 'Delete'}">🗑️</button>
                    </td>`;
                tbody.appendChild(tr);

        function devicesApplyFilter() {
            const q = (document.getElementById('devices-filter').value || '').toLowerCase();
            const filtered = devicesCache.filter(d => {
                const hay = [d.name, d.type, d.ip_address, d.username, d.description, d.mac_address, ...(d.tags || [])].join(' ').toLowerCase();
                return hay.includes(q);
            });
            devicesRenderRows(filtered);
            document.getElementById('devices-empty').style.display = filtered.length === 0 ? 'block' : 'none';
            document.getElementById('devices-table-wrap').style.display = filtered.length > 0 ? 'block' : 'none';
        }

        function devicesShowModal(id) {
            const lDe = lang === 'de';
            const overlay = document.getElementById('device-modal-overlay');
            const title = document.getElementById('device-modal-title');
            document.getElementById('device-modal-error').style.display = 'none';

            if (id) {
                const d = devicesCache.find(x => x.id === id);
                if (!d) return;
                title.textContent = lDe ? '✏️ Gerät bearbeiten' : '✏️ Edit Device';
                document.getElementById('device-edit-id').value = d.id;
                document.getElementById('device-field-name').value = d.name || '';
                document.getElementById('device-field-type').value = d.type || 'generic';
                document.getElementById('device-field-ip').value = d.ip_address || '';
                document.getElementById('device-field-port').value = d.port || 22;
                document.getElementById('device-field-username').value = d.username || '';
                document.getElementById('device-field-desc').value = d.description || '';
                document.getElementById('device-field-mac').value = d.mac_address || '';
                document.getElementById('device-field-tags').value = (d.tags || []).join(', ');
                document.getElementById('device-field-vault').value = d.vault_secret_id || '';

                document.getElementById('device-field-name').value = '';

                document.getElementById('device-field-tags').value = '';

        function devicesCloseModal(e) {
            if (e && e.target !== e.currentTarget) return;
            document.getElementById('device-modal-overlay').style.display = 'none';
        }

        async function devicesSave() {
            const lDe = lang === 'de';
            const errBox = document.getElementById('device-modal-error');
            errBox.style.display = 'none';

            const name = document.getElementById('device-field-name').value.trim();
            if (!name) {
                errBox.textContent = lDe ? 'Name ist erforderlich.' : 'Name is required.';
                errBox.style.display = 'block';
                return;
            }

            const tagsRaw = document.getElementById('device-field-tags').value.trim();
            const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

            const payload = {
                name: name,
                type: document.getElementById('device-field-type').value,
                ip_address: document.getElementById('device-field-ip').value.trim(),
                port: parseInt(document.getElementById('device-field-port').value) || 22,
                username: document.getElementById('device-field-username').value.trim(),
                description: document.getElementById('device-field-desc').value.trim(),
                mac_address: document.getElementById('device-field-mac').value.trim(),
                tags: tags,
                vault_secret_id: document.getElementById('device-field-vault').value || ''
            };

            const editId = document.getElementById('device-edit-id').value;
            const isEdit = !!editId;
            const btn = document.getElementById('device-modal-save');
            btn.disabled = true;

            try {
                const url = isEdit ? '/api/devices/' + editId : '/api/devices';
                const method = isEdit ? 'PUT' : 'POST';
                const resp = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.error || 'Request failed');
                }
                devicesCloseModal();
                await devicesLoad();
            } catch (e) {
                errBox.textContent = '❌ ' + e.message;
                errBox.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }

        async function devicesDelete(id, name) {
            const lDe = lang === 'de';
            const msg = lDe
                ? `Gerät "${name}" wirklich löschen? Diese Aktion kann nicht rückgängig gemacht werden.`
                : `Really delete device "${name}"? This cannot be undone.`;
            if (!confirm(msg)) return;

            try {
                const resp = await fetch('/api/devices/' + id, { method: 'DELETE' });
                if (!resp.ok) {
                    const data = await resp.json().catch(() => ({}));
                    throw new Error(data.error || 'Delete failed');
                }
                await devicesLoad();
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

            const lDe = lang === 'de';
            let html = '';
            mcpServersCache.forEach((s, idx) => {

        function mcpServerAdd() {
            mcpServerShowModal({name:'', command:'', args:[], env:{}, enabled:true}, -1);
        }

        function mcpServerEdit(idx) {
            mcpServerShowModal({...mcpServersCache[idx]}, idx);
        }

        async function mcpServerDelete(idx) {
            const lDe = lang === 'de';
            const s = mcpServersCache[idx];
            if (!confirm(lDe ? `MCP-Server "${s.name}" wirklich löschen?` : `Really delete MCP server "${s.name}"?`)) return;
            mcpServersCache.splice(idx, 1);
            await mcpServerSave();
            mcpServerRenderCards();
        }

        function mcpServerShowModal(data, idx) {
            const lDe = lang === 'de';
            const isEdit = idx >= 0;
            const argsStr = (data.args || []).join('\n');
            const envStr = data.env ? Object.entries(data.env).map(([k,v]) => k + '=' + v).join('\n') : '';

            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:1000;';
            overlay.innerHTML = `
            <div style="background:var(--bg-secondary);border-radius:16px;padding:1.5rem;width:min(480px,90vw);max-height:85vh;overflow-y:auto;border:1px solid var(--border-subtle);">
                <div style="font-weight:700;font-size:1rem;margin-bottom:1rem;">${isEdit ? (lDe ? 'MCP-Server bearbeiten' : 'Edit MCP Server') : (lDe ? 'Neuer MCP-Server' : 'New MCP Server')}</div>
                <label style="display:block;margin-bottom:0.8rem;">
                    <span style="font-size:0.78rem;color:var(--text-secondary);">Name</span>
                    <input id="mcp-m-name" class="cfg-input" value="${escapeAttr(data.name)}" placeholder="my-server" style="width:100%;margin-top:0.2rem;">
                </label>
                <label style="display:block;margin-bottom:0.8rem;">
                    <span style="font-size:0.78rem;color:var(--text-secondary);">Command</span>
                    <input id="mcp-m-command" class="cfg-input" value="${escapeAttr(data.command)}" placeholder="npx" style="width:100%;margin-top:0.2rem;">
                </label>
                <label style="display:block;margin-bottom:0.8rem;">
                    <span style="font-size:0.78rem;color:var(--text-secondary);">Args <small style="color:var(--text-tertiary);">(${lDe ? 'ein Argument pro Zeile' : 'one argument per line'})</small></span>
                    <textarea id="mcp-m-args" class="cfg-input" rows="3" placeholder="-y\n@my/mcp-server" style="width:100%;margin-top:0.2rem;font-family:monospace;font-size:0.8rem;">${escapeAttr(argsStr)}</textarea>
                </label>
                <label style="display:block;margin-bottom:0.8rem;">
                    <span style="font-size:0.78rem;color:var(--text-secondary);">Environment Variables <small style="color:var(--text-tertiary);">(KEY=VALUE, ${lDe ? 'eine pro Zeile' : 'one per line'})</small></span>
                    <textarea id="mcp-m-env" class="cfg-input" rows="3" placeholder="API_KEY=xxx\nDEBUG=1" style="width:100%;margin-top:0.2rem;font-family:monospace;font-size:0.8rem;">${escapeAttr(envStr)}</textarea>
                </label>
                <label style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;">
                    <input id="mcp-m-enabled" type="checkbox" ${data.enabled ? 'checked' : ''}>
                    <span style="font-size:0.85rem;">${lDe ? 'Aktiviert' : 'Enabled'}</span>
                </label>
                <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
                    <button class="btn-save" style="background:var(--bg-tertiary);color:var(--text-primary);padding:0.45rem 1rem;" onclick="this.closest('div[style*=fixed]').remove()">${lDe ? 'Abbrechen' : 'Cancel'}</button>
                    <button class="btn-save" style="padding:0.45rem 1rem;" id="mcp-m-save">${lDe ? 'Speichern' : 'Save'}</button>
                </div>
            </div>`;
            document.body.appendChild(overlay);
            overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

            document.getElementById('mcp-m-save').addEventListener('click', async () => {
                const entry = {
                    name: document.getElementById('mcp-m-name').value.trim(),
                    command: document.getElementById('mcp-m-command').value.trim(),
                    args: document.getElementById('mcp-m-args').value.split('\n').map(l => l.trim()).filter(Boolean),
                    env: {},
                    enabled: document.getElementById('mcp-m-enabled').checked
                };
                // Parse env vars
                document.getElementById('mcp-m-env').value.split('\n').forEach(line => {
                    const eq = line.indexOf('=');
                    if (eq > 0) entry.env[line.substring(0, eq).trim()] = line.substring(eq + 1).trim();
                });
                if (!entry.name || !entry.command) {
                    alert(lDe ? 'Name und Command sind Pflichtfelder.' : 'Name and Command are required.');
                    return;
                }
                if (isEdit) {
                    mcpServersCache[idx] = entry;
                } else {
                    if (mcpServersCache.some(s => s.name === entry.name)) {
                        alert(lDe ? 'Ein Server mit diesem Namen existiert bereits.' : 'A server with this name already exists.');
                        return;
                    }
                    mcpServersCache.push(entry);
                }
                await mcpServerSave();
                overlay.remove();
                mcpServerRenderCards();
            });
        }

        async function mcpServerSave() {
            try {
                const resp = await fetch('/api/mcp-servers', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(mcpServersCache)
                });
                if (!resp.ok) throw new Error(await resp.text());
                // Reload to get canonical data
                const reload = await fetch('/api/mcp-servers');
                if (reload.ok) mcpServersCache = await reload.json();
            } catch (e) {
                alert('❌ MCP save failed: ' + e.message);
            }
        }
