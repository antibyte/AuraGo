<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="config.page_title">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>AuraGo – Configuration</title>
    <meta name="description" data-i18n="config.page_description" data-i18n-attr="content"
        content="">
    <meta property="og:title" data-i18n="config.page_title" data-i18n-attr="content" content="">
    <meta property="og:description" data-i18n="config.page_description" data-i18n-attr="content"
        content="">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <link href="/fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind-compat.css">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260430a">
    <link rel="stylesheet" href="/shared-animations.css">
    <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
    <!-- QR code generator for TOTP setup (auth section only) -->
    <script src="/js/vendor/qrcode.min.js" defer></script>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/config.css?v=20260520a">
    <link rel="stylesheet" href="/css/enhancements.css?v=20260430a">
    <link rel="stylesheet" href="/css/precision-workspace.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/precision-pages.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/config-workspace.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/secrets-shared.css?v={{.BuildVersion}}">
</head>

<body class="pw-page" data-workspace-page="config" data-density="comfortable">
    <a href="#main-content" class="skip-link" data-i18n="common.skip_to_content"></a>
    <!-- Header -->
    <div class="cfg-header">
        <div class="cfg-logo-wrap">
            <button id="cfg-hamburger" class="hamburger-btn cfg-hamburger" data-i18n-title="config.menu"
                data-i18n-aria-label="config.toggle_sidebar">☰</button>
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle" data-i18n="config.logo_subtitle"></span>
            </a>
        </div>
        <div class="header-actions">
            <button id="cfg-density-toggle" type="button" class="pw-density-toggle" aria-pressed="false"
                data-pw-density-toggle data-i18n-title="common.workspace_density_toggle"
                data-i18n-aria-label="common.workspace_density_toggle">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M5 7h14M5 12h14M5 17h14" />
                </svg>
                <span data-pw-density-label data-i18n="common.workspace_density_comfortable"></span>
            </button>
            <button id="cfg-restart-btn" class="btn-header cfg-restart-btn cfg-restart-danger" onclick="restartAuraGo()">
                <span class="cfg-restart-full" data-i18n="config.header.restart_full"></span>
                <span class="cfg-restart-short">↻</span>
            </button>
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme" data-i18n-aria-label="common.toggle_theme"></button>
        </div>
    </div>

    <div id="radialMenuAnchor"></div>

    <!-- Layout -->
    <div class="cfg-layout" id="main-content">
        <!-- Sidebar backdrop (mobile) -->
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <!-- Sidebar -->
        <div class="cfg-sidebar" id="sidebar"></div>

        <!-- Content -->
        <div class="cfg-content" id="content">
            <div class="cfg-loading-state">
                <div class="cfg-skeleton-header">
                    <div class="skeleton pw-skeleton-title"></div>
                    <div class="skeleton pw-skeleton-subtitle"></div>
                </div>
                <div class="cfg-skeleton-section">
                    <div class="skeleton pw-skeleton-label-25"></div>
                    <div class="skeleton pw-skeleton-control"></div>
                    <div class="skeleton pw-skeleton-control"></div>
                    <div class="skeleton pw-skeleton-control-75"></div>
                </div>
                <div class="cfg-skeleton-section">
                    <div class="skeleton pw-skeleton-label-30"></div>
                    <div class="skeleton pw-skeleton-control"></div>
                    <div class="skeleton pw-skeleton-control-90"></div>
                </div>
                <div class="cfg-skeleton-section">
                    <div class="skeleton pw-skeleton-label-20"></div>
                    <div class="skeleton pw-skeleton-control"></div>
                    <div class="skeleton pw-skeleton-control-60"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Save bar -->
    <div class="save-bar">
        <div class="pw-save-context">
            <strong id="saveSection"></strong>
            <span id="saveChangeCount"></span>
            <span id="saveValidation"></span>
        </div>
        <span class="changes-pill" id="changesPill" data-i18n="config.save_bar.unsaved_changes"></span>
        <span class="save-status" id="saveStatus" role="status" aria-live="polite" aria-atomic="true"></span>
        <button type="button" class="btn-save" id="btnSave" onclick="saveConfig()" disabled data-i18n="config.save_bar.save_button"></button>
    </div>

    <script src="/js/config/catalog.js?v={{.BuildVersion}}"></script>
    <script src="/js/config/state.js?v={{.BuildVersion}}"></script>
    <script src="/js/config/actions.js?v={{.BuildVersion}}"></script>
    <script src="/cfg/form-builder.js?v={{.BuildVersion}}"></script>
    <script src="/js/config/utils.js?v={{.BuildVersion}}"></script>
    <script src="/js/precision/workspace.js?v={{.BuildVersion}}"></script>
    <script src="/js/config/main.js?v={{.BuildVersion}}"></script>

    <!-- Vault delete confirmation modal -->
    <div id="vault-delete-overlay" class="modal-overlay">
        <div class="modal-card modal-card-danger">
            <div class="modal-icon vault-modal-icon">☠️</div>
            <h2 id="modal-title" class="modal-title vault-modal-title"></h2>
            <div id="modal-message" class="modal-body">
                <p id="vault-modal-desc" class="modal-desc vault-modal-desc"></p>
                <input id="vault-confirm-input" type="text" class="field-input vault-confirm-input" oninput="vaultCheckWord()"
                    autocomplete="off">
                <div id="vault-confirm-word" class="is-hidden"></div>
            </div>
            <div class="modal-actions">
                <button id="vault-cancel-btn" type="button" onclick="vaultDeleteCancel()"
                    class="btn btn-secondary"></button>
                <button id="vault-confirm-btn" type="button" onclick="vaultDeleteConfirm()" disabled
                    class="btn btn-danger"></button>
            </div>
        </div>
    </div>

    <!-- Radial menu and shared functionality are provided by js/shared/shared-core.js -->

</body>

</html>
