            // Load log if enabled
            if (enabled) whLoadLog();
        }

        function whRenderConfigSettings() {
            const wh = configData.webhooks || {};
            return `
            <div style="margin-top:1.5rem;margin-bottom:1rem;">
                <div style="font-weight:600;font-size:0.85rem;color:var(--accent);margin-bottom:0.75rem;border-bottom:1px solid var(--border-subtle);padding-bottom:0.3rem;">
                    ${lang === 'de' ? 'Webhook-Einstellungen' : 'Webhook Settings'}
                </div>
                <div class="field-group">
                    <div class="field-label">Enabled</div>
                    <div class="toggle-wrap">
                        <div class="toggle ${wh.enabled ? 'on' : ''}" data-path="webhooks.enabled" onclick="toggleBool(this);markDirty()"></div>
                        <span class="toggle-label">${wh.enabled ? 'Aktiv' : 'Inaktiv'}</span>
                    </div>
                </div>
                <div class="field-group">
                    <div class="field-label">Max Payload Size (bytes)</div>
                    <input class="field-input" type="number" step="1" data-path="webhooks.max_payload_size" value="${wh.max_payload_size || 65536}" onchange="markDirty()">
                </div>
                <div class="field-group">
                    <div class="field-label">Rate Limit (req/min, 0 = ${lang === 'de' ? 'unbegrenzt' : 'unlimited'})</div>
                    <input class="field-input" type="number" step="1" data-path="webhooks.rate_limit" value="${wh.rate_limit || 0}" onchange="markDirty()">
                </div>
            </div>`;
        }

        function whSwitchTab(btn, panelId) {
            document.querySelectorAll('.wh-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.wh-panel').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');
            if (panelId === 'wh-panel-log') whLoadLog();
        }

        /* ── Webhook List ── */
        function whRenderWebhookList() {
            let html = `<div class="wh-toolbar">
                <span class="wh-count">${whWebhooks.length} / ${10} Webhooks</span>
                ${whWebhooks.length < 10 ? `<button class="wh-btn wh-btn-primary" onclick="whShowEditor(null)">+ ${lang === 'de' ? 'Neuer Webhook' : 'New Webhook'}</button>` : ''}
            </div>`;

            if (whWebhooks.length === 0) {
                html += `<div class="wh-empty">${lang === 'de' ? 'Noch keine Webhooks angelegt.' : 'No webhooks configured yet.'}</div>`;
            } else {
                html += '<div class="wh-list">';
                for (const w of whWebhooks) {
                    const url = location.origin + '/webhook/' + w.slug;
                    html += `<div class="wh-card ${w.enabled ? '' : 'wh-card-disabled'}">
                        <div class="wh-card-header">
                            <div class="wh-card-title">
                                <span class="wh-status-dot ${w.enabled ? 'active' : ''}"></span>
                                <strong>${esc(w.name)}</strong>
                                <span class="wh-card-slug">/${w.slug}</span>
                            </div>
                            <div class="wh-card-actions">
                                <button class="wh-btn-icon" title="Test" onclick="whTestWebhook('${w.id}')">🧪</button>
                                <button class="wh-btn-icon" title="Edit" onclick="whShowEditor('${w.id}')">✏️</button>
                                <button class="wh-btn-icon wh-btn-danger" title="Delete" onclick="whDeleteWebhook('${w.id}','${esc(w.name)}')">🗑️</button>
                            </div>
                        </div>
                        <div class="wh-card-body">
                            <div class="wh-card-url" onclick="whCopy(this, '${esc(url)}')" title="${lang === 'de' ? 'Klick zum Kopieren' : 'Click to copy'}">
                                <code>${esc(url)}</code>
                                <span class="wh-copy-icon">📋</span>
                            </div>
                            <div class="wh-card-meta">
                                <span>Mode: <strong>${w.delivery?.mode || 'message'}</strong></span>
                                <span>Fires: <strong>${w.fire_count || 0}</strong></span>
                                ${w.format?.description ? '<span>' + esc(w.format.description) + '</span>' : ''}
                            </div>
                        </div>
                    </div>`;
                }
                html += '</div>';
            }

            // Hidden editor form
            html += '<div id="wh-editor" class="wh-editor" style="display:none;"></div>';
            return html;
        }

        /* ── Webhook Editor ── */
        function whShowEditor(id) {
            whEditingId = id;
            const wh = id ? whWebhooks.find(w => w.id === id) : null;
            const ed = document.getElementById('wh-editor');
            if (!ed) return;

            const name = wh ? wh.name : '';
            const slug = wh ? wh.slug : '';
            const enabled = wh ? wh.enabled : true;
            const tokenId = wh ? (wh.token_id || '') : '';
            const format = wh ? wh.format : { accepted_content_types: ['application/json'], fields: [], description: '' };
            const delivery = wh ? wh.delivery : { mode: 'message', prompt_template: '', priority: 'queue' };

            let presetsHtml = '<option value="">— ' + (lang === 'de' ? 'Vorlage wählen' : 'Choose preset') + ' —</option>';
            for (const p of whPresets) {
                presetsHtml += `<option value="${p.key}">${esc(p.label)}</option>`;
            }

            let tokensHtml = '<option value="">— ' + (lang === 'de' ? 'Kein Token' : 'No token') + ' —</option>';
            for (const t of whTokens) {
                tokensHtml += `<option value="${t.id}" ${t.id === tokenId ? 'selected' : ''}>${esc(t.name)} (${t.prefix}…)</option>`;
            }

            let fieldsHtml = '';
            if (format.fields && format.fields.length > 0) {
                for (let i = 0; i < format.fields.length; i++) {
                    fieldsHtml += whFieldRow(i, format.fields[i]);
                }
            }

            ed.innerHTML = `
            <div class="wh-editor-header">
                <h3>${id ? (lang === 'de' ? 'Webhook bearbeiten' : 'Edit Webhook') : (lang === 'de' ? 'Neuer Webhook' : 'New Webhook')}</h3>
                <button class="wh-btn-icon" onclick="whHideEditor()">✕</button>
            </div>
            <div class="wh-editor-body">
                <div class="wh-form-row">
                    <label>Name</label>
                    <input id="wh-f-name" class="field-input" value="${esc(name)}" placeholder="z.B. GitHub Push">
                </div>
                <div class="wh-form-row">
                    <label>Slug (URL-Pfad)</label>
                    <input id="wh-f-slug" class="field-input" value="${esc(slug)}" placeholder="z.B. github-push" pattern="[a-z0-9][a-z0-9-]{1,48}[a-z0-9]" ${id ? 'disabled' : ''}>
                    <small class="wh-field-hint">${lang === 'de' ? 'Kleinbuchstaben, Zahlen, Bindestriche. 3-50 Zeichen.' : 'Lowercase, numbers, hyphens. 3-50 chars.'}</small>
                </div>
                <div class="wh-form-row">
                    <label>${lang === 'de' ? 'Aktiv' : 'Enabled'}</label>
                    <div class="toggle-wrap">
                        <div id="wh-f-enabled" class="toggle ${enabled ? 'on' : ''}" onclick="this.classList.toggle('on')"></div>
                    </div>
                </div>
                <div class="wh-form-row">
                    <label>Token</label>
                    <select id="wh-f-token" class="field-select">${tokensHtml}</select>
                </div>
                <div class="wh-form-row">
                    <label>${lang === 'de' ? 'Vorlage' : 'Preset'}</label>
                    <select id="wh-f-preset" class="field-select" onchange="whApplyPreset(this.value)">${presetsHtml}</select>
                </div>
                <div style="font-weight:600;font-size:0.8rem;color:var(--accent);margin-top:1rem;margin-bottom:0.5rem;">Format</div>
                <div class="wh-form-row">
                    <label>Content-Types</label>
                    <input id="wh-f-ct" class="field-input" value="${(format.accepted_content_types || []).join(', ')}" placeholder="application/json">
                </div>
                <div class="wh-form-row">
                    <label>${lang === 'de' ? 'Beschreibung' : 'Description'}</label>
                    <input id="wh-f-desc" class="field-input" value="${esc(format.description || '')}">
                </div>
                <div class="wh-form-row">
                    <label>Signature Header</label>
                    <input id="wh-f-sighdr" class="field-input" value="${esc(format.signature_header || '')}" placeholder="z.B. X-Hub-Signature-256">
                </div>
                <div class="wh-form-row">
                    <label>Signature Algo</label>
                    <select id="wh-f-sigalgo" class="field-select">
                        <option value="" ${!format.signature_algo ? 'selected' : ''}>— ${lang === 'de' ? 'Keine' : 'None'} —</option>
                        <option value="sha256" ${format.signature_algo === 'sha256' ? 'selected' : ''}>sha256</option>
                        <option value="sha1" ${format.signature_algo === 'sha1' ? 'selected' : ''}>sha1</option>
                        <option value="plain" ${format.signature_algo === 'plain' ? 'selected' : ''}>plain</option>
                    </select>
                </div>
                <div class="wh-form-row">
                    <label>Signature Secret</label>
                    <input id="wh-f-sigsec" class="field-input" type="password" value="${esc(format.signature_secret || '')}" placeholder="HMAC Secret">
                </div>
                <div style="font-weight:600;font-size:0.8rem;color:var(--accent);margin-top:1rem;margin-bottom:0.5rem;">
                    Field Mappings
                    <button class="wh-btn wh-btn-sm" onclick="whAddFieldRow()" style="margin-left:0.5rem;">+ Field</button>
                </div>
                <div id="wh-fields-list">${fieldsHtml}</div>
                <div style="font-weight:600;font-size:0.8rem;color:var(--accent);margin-top:1rem;margin-bottom:0.5rem;">Delivery</div>
                <div class="wh-form-row">
                    <label>Mode</label>
                    <select id="wh-f-mode" class="field-select">
                        <option value="message" ${delivery.mode === 'message' ? 'selected' : ''}>Message (${lang === 'de' ? 'An Agent senden' : 'Send to agent'})</option>
                        <option value="notify" ${delivery.mode === 'notify' ? 'selected' : ''}>Notify (SSE only)</option>
                        <option value="silent" ${delivery.mode === 'silent' ? 'selected' : ''}>Silent (${lang === 'de' ? 'Nur Log' : 'Log only'})</option>
                    </select>
                </div>
                <div class="wh-form-row">
                    <label>Prompt Template</label>
                    <textarea id="wh-f-prompt" class="field-input wh-textarea" rows="5" placeholder="${lang === 'de' ? 'Leer = Standard-Template' : 'Empty = default template'}">${esc(delivery.prompt_template || '')}</textarea>
                </div>
                <div class="wh-form-row">
                    <label>Priority</label>
                    <select id="wh-f-priority" class="field-select">
                        <option value="queue" ${delivery.priority !== 'immediate' ? 'selected' : ''}>Queue</option>
                        <option value="immediate" ${delivery.priority === 'immediate' ? 'selected' : ''}>Immediate</option>
                    </select>
                </div>
            </div>
            <div class="wh-editor-footer">
                <button class="wh-btn" onclick="whHideEditor()">${lang === 'de' ? 'Abbrechen' : 'Cancel'}</button>
                <button class="wh-btn wh-btn-primary" onclick="whSaveWebhook()">${lang === 'de' ? 'Speichern' : 'Save'}</button>
            </div>`;
            ed.style.display = 'block';
            ed.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function whHideEditor() {
            const ed = document.getElementById('wh-editor');
            if (ed) ed.style.display = 'none';
            whEditingId = null;
        }

        function whFieldRow(idx, field) {
            return `<div class="wh-field-row" data-idx="${idx}">
                <input class="field-input wh-field-src" value="${esc(field?.source || '')}" placeholder="source (z.B. repository.full_name)">
                <input class="field-input wh-field-alias" value="${esc(field?.alias || '')}" placeholder="alias (z.B. repo)">
                <button class="wh-btn-icon wh-btn-danger" onclick="this.parentElement.remove()">✕</button>
            </div>`;
        }

        function whAddFieldRow() {
            const list = document.getElementById('wh-fields-list');
            if (!list) return;
            const idx = list.children.length;
            list.insertAdjacentHTML('beforeend', whFieldRow(idx, {}));
        }

        function whApplyPreset(key) {
            const preset = whPresets.find(p => p.key === key);
            if (!preset) return;
            const f = preset.format;
            document.getElementById('wh-f-ct').value = (f.accepted_content_types || []).join(', ');
            document.getElementById('wh-f-desc').value = f.description || '';
            document.getElementById('wh-f-sighdr').value = f.signature_header || '';
            document.getElementById('wh-f-sigalgo').value = f.signature_algo || '';
            // Populate fields
            const list = document.getElementById('wh-fields-list');
            list.innerHTML = '';
            if (f.fields) {
                for (let i = 0; i < f.fields.length; i++) {
                    list.insertAdjacentHTML('beforeend', whFieldRow(i, f.fields[i]));
                }
            }
            // Prompt hint
            if (preset.prompt_hint) {
                document.getElementById('wh-f-prompt').value = preset.prompt_hint;
            }
        }

        function whCollectEditor() {
            const fields = [];
            document.querySelectorAll('#wh-fields-list .wh-field-row').forEach(row => {
                const src = row.querySelector('.wh-field-src')?.value?.trim();
                const alias = row.querySelector('.wh-field-alias')?.value?.trim();
                if (src) fields.push({ source: src, alias: alias || '' });
            });
            const ct = document.getElementById('wh-f-ct').value.split(',').map(s => s.trim()).filter(Boolean);
            return {
                name: document.getElementById('wh-f-name').value.trim(),
                slug: document.getElementById('wh-f-slug').value.trim(),
                enabled: document.getElementById('wh-f-enabled').classList.contains('on'),
                token_id: document.getElementById('wh-f-token').value,
                format: {
                    accepted_content_types: ct.length ? ct : ['application/json'],
                    fields: fields,
                    description: document.getElementById('wh-f-desc').value.trim(),
                    signature_header: document.getElementById('wh-f-sighdr').value.trim(),
                    signature_algo: document.getElementById('wh-f-sigalgo').value,
                    signature_secret: document.getElementById('wh-f-sigsec').value,
                },
                delivery: {
                    mode: document.getElementById('wh-f-mode').value,
                    prompt_template: document.getElementById('wh-f-prompt').value,
                    priority: document.getElementById('wh-f-priority').value,
                }
            };
        }

        async function whSaveWebhook() {
            const data = whCollectEditor();
            if (!data.name) return whToast(lang === 'de' ? 'Name ist erforderlich' : 'Name is required', 'error');
            if (!whEditingId && !data.slug) return whToast(lang === 'de' ? 'Slug ist erforderlich' : 'Slug is required', 'error');

            try {
                let resp;
                if (whEditingId) {
                    resp = await fetch('/api/webhooks/' + whEditingId, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                } else {
                    resp = await fetch('/api/webhooks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                }
                const result = await resp.json();
                if (!resp.ok) {
                    whToast(result.error || 'Error', 'error');
                    return;
                }
                whToast(lang === 'de' ? 'Webhook gespeichert' : 'Webhook saved', 'success');
                whHideEditor();
                // Refresh
                const section = SECTIONS.flatMap(g => g.items).find(s => s.key === 'webhooks');
                await renderWebhooksSection(section);
            } catch (e) {
                whToast(e.message, 'error');
            }
        }

        async function whDeleteWebhook(id, name) {
            if (!confirm((lang === 'de' ? 'Webhook löschen: ' : 'Delete webhook: ') + name + '?')) return;
            try {
                const resp = await fetch('/api/webhooks/' + id, { method: 'DELETE' });
                if (resp.ok) {
                    whToast(lang === 'de' ? 'Webhook gelöscht' : 'Webhook deleted', 'success');
                    const section = SECTIONS.flatMap(g => g.items).find(s => s.key === 'webhooks');
                    await renderWebhooksSection(section);
                } else {
                    const r = await resp.json();
                    whToast(r.error || 'Error', 'error');
                }
            } catch (e) { whToast(e.message, 'error'); }
        }

        async function whTestWebhook(id) {
            try {
                const resp = await fetch('/api/webhooks/' + id + '/test', { method: 'POST' });
                const r = await resp.json();
                if (resp.ok) {
                    whToast('Test: ' + (r.prompt || 'OK').substring(0, 100), 'success');
                } else {
                    whToast(r.error || 'Test failed', 'error');
                }
            } catch (e) { whToast(e.message, 'error'); }
        }

        /* ── Token Management ── */
        function whRenderTokenList() {
            let html = `<div class="wh-toolbar">
                <span class="wh-count">${whTokens.length} Tokens</span>
                <button class="wh-btn wh-btn-primary" onclick="whCreateToken()">+ ${lang === 'de' ? 'Neuer Token' : 'New Token'}</button>
            </div>`;
            html += '<div id="wh-token-created" style="display:none;" class="wh-token-reveal"></div>';

            if (whTokens.length === 0) {
                html += `<div class="wh-empty">${lang === 'de' ? 'Noch keine Tokens angelegt.' : 'No tokens created yet.'}</div>`;
            } else {
                html += '<div class="wh-list">';
                for (const t of whTokens) {
                    const exp = t.expires_at ? new Date(t.expires_at).toLocaleDateString() : (lang === 'de' ? 'Nie' : 'Never');
                    const lastUsed = t.last_used_at ? new Date(t.last_used_at).toLocaleString() : '—';
                    html += `<div class="wh-card wh-card-token ${t.enabled ? '' : 'wh-card-disabled'}">
                        <div class="wh-card-header">
                            <div class="wh-card-title">
                                <span class="wh-status-dot ${t.enabled ? 'active' : ''}"></span>
                                <strong>${esc(t.name)}</strong>
                                <code class="wh-token-prefix">${esc(t.prefix)}…</code>
                            </div>
                            <div class="wh-card-actions">
                                <button class="wh-btn-icon" title="${t.enabled ? 'Disable' : 'Enable'}" onclick="whToggleToken('${t.id}', ${!t.enabled})">${t.enabled ? '🔒' : '🔓'}</button>
                                <button class="wh-btn-icon wh-btn-danger" title="Delete" onclick="whDeleteToken('${t.id}','${esc(t.name)}')">🗑️</button>
                            </div>
                        </div>
                        <div class="wh-card-meta" style="margin-top:0.4rem;">
                            <span>Scopes: <strong>${(t.scopes || ['webhook']).join(', ')}</strong></span>
                            <span>${lang === 'de' ? 'Läuft ab' : 'Expires'}: <strong>${exp}</strong></span>
                            <span>${lang === 'de' ? 'Zuletzt benutzt' : 'Last used'}: ${lastUsed}</span>
                        </div>
                    </div>`;
                }
                html += '</div>';
            }
            return html;
        }

        async function whCreateToken() {
            const name = prompt(lang === 'de' ? 'Token-Name:' : 'Token name:');
            if (!name) return;
            try {
                const resp = await fetch('/api/tokens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, scopes: ['webhook'] })
                });
                const r = await resp.json();
                if (!resp.ok) { whToast(r.error || 'Error', 'error'); return; }
                // Show the raw token ONCE
                const reveal = document.getElementById('wh-token-created');
                if (reveal) {
                    reveal.style.display = 'block';
                    reveal.innerHTML = `
                        <div class="wh-token-alert">
                            <strong>⚠️ ${lang === 'de' ? 'Token erstellt! Jetzt kopieren – wird nur einmal angezeigt.' : 'Token created! Copy now – shown only once.'}</strong>
                            <div class="wh-token-value" onclick="whCopy(this, '${esc(r.raw_token || r.token)}')" title="Click to copy">
                                <code>${esc(r.raw_token || r.token)}</code>
                                <span class="wh-copy-icon">📋</span>
                            </div>
                        </div>`;
                    reveal.scrollIntoView({ behavior: 'smooth' });
                }
                // Refresh tokens
                const tResp = await fetch('/api/tokens');
                if (tResp.ok) whTokens = await tResp.json();
                // Re-render token list below the reveal
                const panel = document.getElementById('wh-panel-tokens');
                if (panel) {
                    const revealHtml = reveal.outerHTML;
                    panel.innerHTML = whRenderTokenList();
                    // Re-insert reveal
                    const newReveal = document.getElementById('wh-token-created');
                    if (newReveal) {
                        newReveal.outerHTML = revealHtml;
                    }
                }
            } catch (e) { whToast(e.message, 'error'); }
        }

        async function whToggleToken(id, enabled) {
            try {
                const resp = await fetch('/api/tokens/' + id, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ enabled: enabled })
                });
                if (resp.ok) {
                    whToast(enabled ? 'Token aktiviert' : 'Token deaktiviert', 'success');
                    const tResp = await fetch('/api/tokens');
                    if (tResp.ok) whTokens = await tResp.json();
                    const panel = document.getElementById('wh-panel-tokens');
                    if (panel) panel.innerHTML = whRenderTokenList();
                }
            } catch (e) { whToast(e.message, 'error'); }
        }

        async function whDeleteToken(id, name) {
            if (!confirm((lang === 'de' ? 'Token löschen: ' : 'Delete token: ') + name + '?')) return;
            try {
                const resp = await fetch('/api/tokens/' + id, { method: 'DELETE' });
                if (resp.ok) {
                    whToast('Token gelöscht', 'success');
                    const tResp = await fetch('/api/tokens');
                    if (tResp.ok) whTokens = await tResp.json();
                    const panel = document.getElementById('wh-panel-tokens');
                    if (panel) panel.innerHTML = whRenderTokenList();
                }
            } catch (e) { whToast(e.message, 'error'); }
        }

        /* ── Webhook Log ── */
        function whRenderLog() {
            return `<div id="wh-log-content" class="wh-log-content">
                <div style="text-align:center;padding:1rem;color:var(--text-secondary);">Lade...</div>
            </div>`;
        }

        async function whLoadLog() {
            try {
                const resp = await fetch('/api/webhooks/log');
                if (!resp.ok) return;
                whLog = await resp.json();
                const el = document.getElementById('wh-log-content');
                if (!el) return;
                if (!whLog || whLog.length === 0) {
                    el.innerHTML = `<div class="wh-empty">${lang === 'de' ? 'Noch keine Webhook-Ereignisse.' : 'No webhook events yet.'}</div>`;
                    return;
                }
                let html = '<table class="wh-log-table"><thead><tr><th>Zeit</th><th>Webhook</th><th>Status</th><th>IP</th><th>Size</th><th>Delivered</th></tr></thead><tbody>';
                for (const e of whLog) {
                    const time = new Date(e.timestamp).toLocaleString();
                    const statusClass = e.status_code >= 200 && e.status_code < 300 ? 'success' : 'error';
                    html += `<tr>
                        <td>${time}</td>
                        <td>${esc(e.webhook_name || e.webhook_id)}</td>
                        <td><span class="wh-badge ${statusClass}">${e.status_code}</span></td>
                        <td>${esc(e.source_ip || '')}</td>
                        <td>${e.payload_size || 0} B</td>
                        <td>${e.delivered ? '✓' : (e.error ? '✗ ' + esc(e.error) : '—')}</td>
                    </tr>`;
                }
                html += '</tbody></table>';
                el.innerHTML = html;
            } catch (e) {
                const el = document.getElementById('wh-log-content');
                if (el) el.innerHTML = '<div class="wh-empty" style="color:var(--danger);">Fehler: ' + esc(e.message) + '</div>';
            }
        }

        /* ── Utilities ── */
        function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

        function whCopy(el, text) {
            navigator.clipboard.writeText(text).then(() => {
                const icon = el.querySelector('.wh-copy-icon');
                if (icon) { icon.textContent = '✓'; setTimeout(() => icon.textContent = '📋', 2000); }
            });
        }

        function whToast(msg, type) {
            const t = document.createElement('div');
            t.className = 'wh-toast ' + (type || '');
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.classList.add('wh-toast-exit'); setTimeout(() => t.remove(), 300); }, 3000);
        }

        // ── Web-Konfiguration & Login-Schutz Section ─────────────────────────
        let _totpNewSecret = '';

        async function renderWebConfigSection(section) {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="cfg-section active"><div style="text-align:center;padding:3rem;color:var(--text-secondary);">Lade...</div></div>';

            let authStatus = { enabled: false, password_set: false, totp_enabled: false };
            try {
                const resp = await fetch('/api/auth/status');
                authStatus = await resp.json();
            } catch (e) { /* auth endpoint unavailable */ }

            const webCfg = configData.web_config || {};
            const authCfg = configData.auth || {};
            const isWebEnabled = webCfg.enabled === true;
            const isAuthEnabled = authCfg.enabled === true;
            const t = lang === 'de';

            let html = '<div class="cfg-section active">';
            html += '<div class="section-header">' + section.icon + ' ' + section.label[lang] + '</div>';
            html += '<div class="section-desc">' + section.desc[lang] + '</div>';

            // ── Web Config Toggle ──
            html += `<div style="margin-bottom:0.5rem;font-weight:600;font-size:0.85rem;color:var(--accent);border-bottom:1px solid var(--border-subtle);padding-bottom:0.3rem;">
                🛡️ ${t ? 'Web-Konfiguration' : 'Web Configuration'}
            </div>`;
            const wcHelp = (helpTexts['web_config.enabled'] || {})[lang] || '';
            html += `<div class="field-group">
                <div class="field-label">${t ? 'Config-Seite aktiviert' : 'Config page enabled'}</div>
                ${wcHelp ? `<div class="field-help">${wcHelp}</div>` : ''}
                <div class="toggle-wrap">
                    <div class="toggle ${isWebEnabled ? 'on' : ''}" data-path="web_config.enabled" onclick="toggleBool(this)"></div>
                    <span class="toggle-label">${isWebEnabled ? 'Aktiv' : 'Inaktiv'}</span>
                </div>
            </div>`;

            // ── Login-Schutz ──
            html += `<div style="margin-top:1.5rem;margin-bottom:0.5rem;font-weight:600;font-size:0.85rem;color:var(--accent);border-bottom:1px solid var(--border-subtle);padding-bottom:0.3rem;">
                🔐 ${t ? 'Login-Schutz' : 'Login Guard'}
            </div>`;

            // Enable toggle
            html += `<div class="field-group">
                <div class="field-label">🔐 ${t ? 'Login-Schutz aktivieren' : 'Enable Login Guard'}</div>
                <div class="field-help">${t ? 'Wenn aktiviert, ist eine Anmeldung für alle Web-Zugriffe erforderlich. Setze zuerst ein Passwort!' : 'When enabled, authentication is required for all web access. Set a password first!'}</div>
                <div class="toggle-wrap">
                    <div class="toggle ${isAuthEnabled ? 'on' : ''}" data-path="auth.enabled" onclick="toggleBool(this)"></div>
                    <span class="toggle-label">${isAuthEnabled ? 'Aktiv' : 'Inaktiv'}</span>
                </div>
            </div>`;

            // Session / rate limit settings
            html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
                <div class="field-group" style="margin-bottom:0;">
                    <div class="field-label">${t ? '⏱ Session (Stunden)' : '⏱ Session (hours)'}</div>
                    <div class="field-help">${t ? 'Gültigkeit' : 'Session duration'}</div>
                    <input class="field-input" type="number" min="1" max="8760" data-path="auth.session_timeout_hours" value="${authCfg.session_timeout_hours || 24}">
                </div>
                <div class="field-group" style="margin-bottom:0;">
                    <div class="field-label">${t ? '🚫 Max. Versuche' : '🚫 Max Attempts'}</div>
                    <div class="field-help">${t ? 'Bis zur Sperrung' : 'Before lockout'}</div>
                    <input class="field-input" type="number" min="1" max="100" data-path="auth.max_login_attempts" value="${authCfg.max_login_attempts || 5}">
                </div>
                <div class="field-group" style="margin-bottom:0;">
                    <div class="field-label">${t ? '🔒 Sperrzeit (Min.)' : '🔒 Lockout (min)'}</div>
                    <div class="field-help">${t ? 'Sperrdauer' : 'Lockout duration'}</div>
                    <input class="field-input" type="number" min="1" max="10080" data-path="auth.lockout_minutes" value="${authCfg.lockout_minutes || 15}">
                </div>
            </div>`;

            // ── Password card
            html += `<div class="field-group">
                <div class="field-label">🔑 ${t ? 'Passwort' : 'Password'}</div>
                <div class="field-help">${authStatus.password_set
                    ? (t ? '✅ Passwort gesetzt. Hier ändern:' : '✅ Password is set. Change it here:')
                    : (t ? '⚠️ Kein Passwort gesetzt — Login-Schutz kann nicht aktiviert werden.' : '⚠️ No password set — login guard cannot be activated.')
                }</div>
                <div style="display:flex;gap:0.5rem;align-items:center;margin-top:0.4rem;">
                    <div class="password-wrap" style="flex:1;margin-bottom:0;">
                        <input class="field-input" type="password" id="auth-new-pw"
                            placeholder="${t ? 'Neues Passwort (min. 8 Zeichen)' : 'New password (min. 8 chars)'}"
                            autocomplete="new-password"
                            onkeydown="if(event.key==='Enter')authSetPassword()">
                        <button type="button" class="password-toggle" data-visible="false" onclick="togglePassword(this)">${EYE_OPEN_SVG}</button>
                    </div>
                    <button onclick="authSetPassword()" style="padding:0.5rem 1rem;background:linear-gradient(135deg,#2dd4bf,#0d9488);color:#fff;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;white-space:nowrap;">
                        ${authStatus.password_set ? (t ? 'Ändern' : 'Update') : (t ? 'Setzen' : 'Set')}
                    </button>
                </div>
                <div id="auth-pw-msg" style="margin-top:0.5rem;font-size:0.8rem;display:none;"></div>
            </div>`;

            // ── TOTP card
            html += `<div class="field-group">
                <div class="field-label">📱 ${t ? 'Zwei-Faktor-Authentifizierung (TOTP)' : 'Two-Factor Authentication (TOTP)'}</div>
                <div class="field-help">${t ? 'Zusätzliche Sicherheit via Authenticator-Apps (Google Authenticator, Authy, etc.).' : 'Additional security via authenticator apps (Google Authenticator, Authy, etc.).'}</div>
                <div id="auth-totp-status-area" style="margin-top:0.5rem;">`;

            if (authStatus.totp_enabled) {
                html += `<div style="display:flex;align-items:center;gap:0.75rem;">
                    <span style="color:var(--success);font-weight:600;">✅ TOTP ${t ? 'aktiv' : 'active'}</span>
                    <button onclick="authTOTPDisable()" style="padding:0.35rem 0.75rem;background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.3);border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;">
                        ${t ? 'TOTP deaktivieren' : 'Disable TOTP'}
                    </button>
                </div>`;
            } else {
                html += `<div style="margin-bottom:0.5rem;font-size:0.82rem;color:var(--text-secondary);">TOTP ${t ? 'nicht aktiviert' : 'not active'}.</div>
                <button onclick="authTOTPStartSetup()" id="btn-totp-start" style="padding:0.45rem 1rem;background:var(--bg-glass);color:var(--text-primary);border:1px solid var(--border-accent);border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;">
                    ${t ? 'TOTP einrichten →' : 'Set up TOTP →'}
                </button>
                <div id="auth-totp-setup" style="display:none;margin-top:1.25rem;">
                    <div style="font-size:0.82rem;color:var(--text-secondary);margin-bottom:0.85rem;">
                        ${t
                        ? '1. Scanne den QR-Code mit deiner Authenticator-App oder gib den Schlüssel manuell ein.<br>2. Gib den 6-stelligen Code zur Bestätigung ein.'
                        : '1. Scan the QR code with your authenticator app or enter the key manually.<br>2. Enter the 6-digit code to confirm.'}
                    </div>
                    <div style="display:flex;gap:1.5rem;align-items:flex-start;flex-wrap:wrap;margin-bottom:1rem;">
                        <div id="totp-qr" style="background:#fff;padding:8px;border-radius:10px;flex-shrink:0;"></div>
                        <div style="flex:1;min-width:180px;">
                            <div style="font-size:0.72rem;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:0.35rem;">${t ? 'Manueller Schlüssel' : 'Manual key'}:</div>
                            <div id="totp-secret-display" style="font-family:monospace;font-size:0.85rem;word-break:break-all;padding:0.6rem 0.75rem;background:var(--bg-glass);border:1px solid var(--border-subtle);border-radius:8px;letter-spacing:0.08em;"></div>
                        </div>
                    </div>
                    <div>
                        <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:0.35rem;">${t ? 'Bestätigungs-Code:' : 'Confirmation code:'}</div>
                        <div style="display:flex;gap:0.5rem;align-items:center;">
                            <input id="totp-confirm-code" type="number" class="field-input" placeholder="000000"
                                style="font-family:monospace;letter-spacing:0.3em;text-align:center;font-size:1.1rem;max-width:160px;"
                                onkeydown="if(event.key==='Enter')authTOTPConfirm()">
                            <button onclick="authTOTPConfirm()" style="padding:0.5rem 1rem;background:linear-gradient(135deg,#2dd4bf,#0d9488);color:#fff;border:none;border-radius:8px;font-size:0.82rem;font-weight:600;cursor:pointer;">
                                ${t ? 'Aktivieren' : 'Activate'}
                            </button>
                        </div>
                    </div>
                    <div id="auth-totp-msg" style="margin-top:0.5rem;font-size:0.8rem;display:none;"></div>
                </div>`;
            }

            html += '</div></div>'; // close totp-status-area + field-group
            html += '</div>'; // close cfg-section

            content.innerHTML = html;
            attachChangeListeners();
        }

        async function authSetPassword() {
            const pw = (document.getElementById('auth-new-pw') || {}).value || '';
            const msgEl = document.getElementById('auth-pw-msg');
            msgEl.style.display = 'none';
            const t = lang === 'de';
            if (!pw || pw.length < 8) {
                msgEl.style.display = '';
                msgEl.style.color = 'var(--danger)';
                msgEl.textContent = t ? 'Passwort muss mindestens 8 Zeichen haben.' : 'Password must be at least 8 characters.';
                return;
            }
            try {
                const resp = await fetch('/api/auth/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ new_password: pw })
                });
                const data = await resp.json();
                msgEl.style.display = '';
                if (resp.ok && data.ok) {
                    msgEl.style.color = 'var(--success)';
                    msgEl.textContent = '✓ ' + (data.message || 'Gespeichert.');
                    document.getElementById('auth-new-pw').value = '';
                } else {
                    msgEl.style.color = 'var(--danger)';
                    msgEl.textContent = data.error || 'Fehler.';
                }
            } catch (e) {
                msgEl.style.display = '';
                msgEl.style.color = 'var(--danger)';
                msgEl.textContent = 'Netzwerkfehler.';
            }
        }

        async function authTOTPStartSetup() {
            const t = lang === 'de';
            try {
                const resp = await fetch('/api/auth/totp/setup');
                if (resp.status === 401) { alert(t ? 'Bitte zuerst anmelden.' : 'Please log in first.'); return; }
                const data = await resp.json();
                _totpNewSecret = data.secret;
                document.getElementById('totp-secret-display').textContent = data.secret;
                document.getElementById('auth-totp-setup').style.display = '';
                document.getElementById('btn-totp-start').style.display = 'none';
                // Render QR code (qrcodejs library)
                const qrEl = document.getElementById('totp-qr');
                qrEl.innerHTML = '';
                if (typeof QRCode !== 'undefined') {
                    new QRCode(qrEl, { text: data.uri, width: 180, height: 180, colorDark: '#000000', colorLight: '#ffffff' });
                } else {
                    // Fallback: display URI as text
                    qrEl.style.cssText = 'background:none;padding:0;';
                    qrEl.innerHTML = '<div style="font-size:0.65rem;word-break:break-all;max-width:220px;color:var(--text-primary);">' + esc(data.uri) + '</div>';
                }
            } catch (e) {
                alert('Fehler: ' + e.message);
            }
        }

        async function authTOTPConfirm() {
            const code = (document.getElementById('totp-confirm-code') || {}).value || '';
            const msgEl = document.getElementById('auth-totp-msg');
            const t = lang === 'de';
            try {
                const resp = await fetch('/api/auth/totp/confirm', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ secret: _totpNewSecret, code })
                });
                const data = await resp.json();
                msgEl.style.display = '';
                if (resp.ok && data.ok) {
                    msgEl.style.color = 'var(--success)';
                    msgEl.textContent = '✓ ' + (data.message || 'TOTP aktiviert.');
                    setTimeout(() => selectSection('web_config'), 1200);
                } else {
                    msgEl.style.color = 'var(--danger)';
                    msgEl.textContent = data.error || (t ? 'Ungültiger Code.' : 'Invalid code.');
                }
            } catch (e) {
                msgEl.style.display = '';
                msgEl.style.color = 'var(--danger)';
                msgEl.textContent = 'Netzwerkfehler.';
            }
        }

        async function authTOTPDisable() {
            const t = lang === 'de';
            if (!confirm(t ? 'TOTP-Schutz wirklich deaktivieren?' : 'Really disable TOTP protection?')) return;
            try {
                const resp = await fetch('/api/auth/totp', { method: 'DELETE' });
                const data = await resp.json();
                if (resp.ok) {
                    selectSection('web_config');
                } else {
                    alert(data.error || 'Fehler.');
                }
            } catch (e) {
                alert('Netzwerkfehler.');
            }
        }

        function vaultDeletePrompt() {
            const word = lang === 'de' ? 'l\u00f6schen' : 'delete';
            document.getElementById('vault-confirm-word').textContent = word;
            document.getElementById('vault-confirm-input').placeholder = word;
            document.getElementById('vault-confirm-input').value = '';
            document.getElementById('vault-confirm-btn').disabled = true;
            document.getElementById('vault-modal-title').textContent = lang === 'de' ? '\u26a0\ufe0f Vault unwiderruflich l\u00f6schen' : '\u26a0\ufe0f Permanently delete vault';
            document.getElementById('vault-modal-desc').innerHTML = lang === 'de'
                ? 'Dies l\u00f6scht den Vault <strong>unwiderruflich</strong>. Alle gespeicherten API-Keys, Passw\u00f6rter und Zugangsdaten gehen f\u00fcr immer verloren!<br><br>Gib <strong style="color:#f87171;">l\u00f6schen</strong> ein um fortzufahren:'
                : 'This will <strong>permanently</strong> delete the vault. All stored API keys, passwords and credentials will be lost forever!<br><br>Type <strong style="color:#f87171;">delete</strong> to continue:';
            document.getElementById('vault-confirm-btn').textContent = lang === 'de' ? 'Vernichten' : 'Destroy';
            document.getElementById('vault-cancel-btn').textContent = lang === 'de' ? 'Abbrechen' : 'Cancel';
            document.getElementById('vault-delete-overlay').style.display = 'flex';
            setTimeout(() => document.getElementById('vault-confirm-input').focus(), 100);
        }

        function vaultCheckWord() {
            const word = lang === 'de' ? 'l\u00f6schen' : 'delete';
            document.getElementById('vault-confirm-btn').disabled =
                document.getElementById('vault-confirm-input').value !== word;
        }

        function vaultDeleteCancel() {
            document.getElementById('vault-delete-overlay').style.display = 'none';
        }

        async function vaultDeleteConfirm() {
            document.getElementById('vault-confirm-btn').disabled = true;
            try {
                const resp = await fetch('/api/vault', { method: 'DELETE' });
                const data = await resp.json();
                if (resp.ok) {
                    vaultExists = false;
                    document.getElementById('vault-delete-overlay').style.display = 'none';
                    // Reload config & re-render server section
                    const cfgResp = await fetch('/api/config');
                    configData = await cfgResp.json();
                    selectSection('server');
                    // Toast notification
                    const t = document.createElement('div');
                    t.style.cssText = 'position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--surface-elevated);border:1px solid rgba(239,68,68,0.35);border-radius:10px;padding:0.75rem 1.25rem;font-size:0.85rem;color:#fca5a5;box-shadow:0 8px 30px rgba(0,0,0,0.3);max-width:420px;';
                    t.textContent = lang === 'de' ? '\u2713 Vault gel\u00f6scht. Neuen Master Key eingeben, speichern und AuraGo neu starten.' : '\u2713 Vault deleted. Enter a new master key, save, and restart AuraGo.';
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 6000);
                } else {
                    alert(data.message || 'Fehler');
                    document.getElementById('vault-confirm-btn').disabled = false;
                }
            } catch (e) {
                alert('Netzwerkfehler: ' + e.message);
                document.getElementById('vault-confirm-btn').disabled = false;
            }
        }

    </script>

    <!-- Vault delete confirmation modal -->
    <div id="vault-delete-overlay"
        style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
        <div
            style="background:var(--surface);border:1px solid rgba(239,68,68,0.4);border-radius:14px;padding:2rem;max-width:480px;width:90%;box-shadow:0 24px 64px rgba(0,0,0,0.5);">
            <div style="font-size:3rem;text-align:center;margin-bottom:0.5rem;">☠️</div>
            <h2 id="vault-modal-title" style="color:#f87171;text-align:center;margin:0 0 1rem;font-size:1.15rem;"></h2>
            <div id="vault-modal-desc"
                style="color:var(--text-secondary);font-size:0.85rem;line-height:1.65;margin-bottom:1.25rem;text-align:center;">
            </div>
            <input id="vault-confirm-input" type="text" class="field-input"
                style="text-align:center;letter-spacing:0.12em;font-size:1rem;" oninput="vaultCheckWord()"
                autocomplete="off">
            <div id="vault-confirm-word" style="display:none;"></div>
            <div style="display:flex;gap:0.75rem;margin-top:1.25rem;">
                <button id="vault-cancel-btn" type="button" onclick="vaultDeleteCancel()"
                    style="flex:1;padding:0.6rem 1rem;border-radius:8px;border:1px solid var(--border-subtle);background:var(--surface-elevated);color:var(--text-primary);cursor:pointer;font-size:0.9rem;"></button>
                <button id="vault-confirm-btn" type="button" onclick="vaultDeleteConfirm()" disabled
                    style="flex:1;padding:0.6rem 1rem;border-radius:8px;border:1px solid rgba(239,68,68,0.4);background:rgba(239,68,68,0.12);color:#f87171;cursor:pointer;font-size:0.9rem;font-weight:600;"></button>
            </div>
        </div>
    </div>

    <!-- Radial menu and shared functionality are in shared.js -->

</body>

</html>
