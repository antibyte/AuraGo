<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AuraGo – Configuration</title>
    <script>document.title='AuraGo – '+('{{.Lang}}'==='de'?'Konfiguration':'Configuration');</script>
    <script src="/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aura': {
                            'accent': 'var(--accent)',
                            'bg': 'var(--bg-primary)',
                            'surface': 'var(--bg-secondary)',
                            'text': 'var(--text-primary)',
                            'muted': 'var(--text-secondary)',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['SF Mono', 'Fira Code', 'Cascadia Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js?v=6"></script>
    <!-- QR code generator for TOTP setup (auth section only) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        (function () { var th = localStorage.getItem('aurago-theme'); if (th) document.documentElement.setAttribute('data-theme', th); })();
        const I18N = {{.I18N}};
        const I18N_META = {{.I18NMeta}};
    </script>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/config.css">
    <link rel="stylesheet" href="/css/enhancements.css">
</head>

<body>
    <!-- Header -->
    <div class="cfg-header">
        <div class="cfg-logo-wrap">
            <button id="cfg-hamburger" class="hamburger-btn cfg-hamburger" title="Menu"
                aria-label="Toggle sidebar">☰</button>
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
                <span class="logo-subtitle"><script>document.write(t('config.logo_subtitle'))</script></span>
            </a>
        </div>
        <div class="header-actions">
            <button class="btn-header cfg-restart-btn cfg-restart-danger" onclick="restartAuraGo()">
                <span class="cfg-restart-full"><script>document.write(t('config.header.restart_full'))</script></span>
                <span class="cfg-restart-short">↻</span>
            </button>
            <button id="theme-toggle" type="button" class="btn-theme" data-i18n-title="common.toggle_theme"></button>
        </div>
    </div>

    <div id="radialMenuAnchor"></div>

    <!-- Layout -->
    <div class="cfg-layout">
        <!-- Sidebar backdrop (mobile) -->
        <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

        <!-- Sidebar -->
        <div class="cfg-sidebar" id="sidebar"></div>

        <!-- Content -->
        <div class="cfg-content" id="content">
            <div class="cfg-loading-state">
                <div class="cfg-loading-icon">⚙️</div>
                <div class="cfg-loading-text"><script>document.write(t('config.loading'))</script></div>
            </div>
        </div>
    </div>

    <!-- Save bar -->
    <div class="save-bar">
        <span class="changes-pill" id="changesPill"><script>document.write(t('config.save_bar.unsaved_changes'))</script></span>
        <span class="save-status" id="saveStatus"></span>
        <button class="btn-save" id="btnSave" onclick="saveConfig()" disabled><script>document.write(t('config.save_bar.save_button'))</script></button>
    </div>

    <script src="/js/config/main.js?v=6"></script>

    <!-- Vault delete confirmation modal -->
    <div id="vault-delete-overlay" class="modal-overlay">
        <div class="modal-card modal-card-danger">
            <div class="modal-icon" style="font-size:3rem;text-align:center;">☠️</div>
            <h2 id="modal-title" class="modal-title" style="color:#f87171;text-align:center;"></h2>
            <div id="modal-message" class="modal-body">
                <p id="vault-modal-desc" class="modal-desc" style="color:var(--text-secondary);font-size:0.85rem;line-height:1.65;margin-bottom:1.25rem;text-align:center;"></p>
                <input id="vault-confirm-input" type="text" class="field-input vault-confirm-input" oninput="vaultCheckWord()"
                    autocomplete="off" style="text-align:center;letter-spacing:0.12em;font-size:1rem;margin-top:12px;">
                <div id="vault-confirm-word" class="is-hidden"></div>
            </div>
            <div class="modal-actions">
                <button id="vault-cancel-btn" type="button" onclick="vaultDeleteCancel()"
                    class="btn btn-secondary"></button>
                <button id="vault-confirm-btn" type="button" onclick="vaultDeleteConfirm()" disabled
                    class="btn btn-danger"></button>
            </div>
        </div>
    </div>

    <!-- Radial menu and shared functionality are in shared.js -->

</body>

</html>
