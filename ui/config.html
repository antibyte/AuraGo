                integrationSubGroup: true,
                items: [
                    { key: 'proxmox', icon: '🖥️', label: { de: 'Proxmox', en: 'Proxmox' }, desc: { de: 'Proxmox VE Virtualisierung', en: 'Proxmox VE virtualization' } },
                    { key: 'tailscale', icon: '🔒', label: { de: 'Tailscale', en: 'Tailscale' }, desc: { de: 'Tailscale VPN-Verwaltung', en: 'Tailscale VPN management' } },
                    { key: 'ansible', icon: '⚙️', label: { de: 'Ansible', en: 'Ansible' }, desc: { de: 'Ansible-Automatisierung (sidecar oder local)', en: 'Ansible automation (sidecar or local mode)' } },
                    { key: 'meshcentral', icon: '🖥️', label: { de: 'MeshCentral', en: 'MeshCentral' }, desc: { de: 'Remote-Geräteverwaltung via MeshCentral Server', en: 'Remote device management via MeshCentral server' } }
                ]
            },
            {
                group: 'Entwicklung & KI',
                integrationSubGroup: true,
                items: [
                    { key: 'github', icon: '🐙', label: { de: 'GitHub', en: 'GitHub' }, desc: { de: 'GitHub Repository- & Issue-Verwaltung', en: 'GitHub repository & issue management' } },
                    { key: 'mcp', icon: '🔌', label: { de: 'MCP Server', en: 'MCP Servers' }, desc: { de: 'Model Context Protocol — externe Tool-Server verwalten', en: 'Model Context Protocol — manage external tool servers' } },
                    { key: 'sandbox', icon: '📦', label: { de: 'Sandbox', en: 'Sandbox' }, desc: { de: 'Isolierte Code-Ausführung in Docker-Containern', en: 'Isolated code execution in Docker containers' } },
                    { key: 'ollama', icon: '🦙', label: { de: 'Ollama', en: 'Ollama' }, desc: { de: 'Lokale LLM-Verwaltung', en: 'Local LLM management' } }
                ]
            },
            {
                group: '✏️ Prompts',
                items: [
                    { key: 'prompts_editor', icon: '🎭', label: { de: 'Prompts & Personas', en: 'Prompts & Personas' }, desc: { de: 'Zusatzprompt und Persönlichkeitsprofile verwalten', en: 'Manage additional prompt and personality profiles' } }
                ]
            },
            {
                group: '⚠️ Danger Zone',
                dangerGroup: true,
                items: [
                    { key: 'danger_zone', icon: '☠️', label: { de: 'Danger Zone', en: 'Danger Zone' }, desc: { de: 'God-Mode Fähigkeiten des Agenten ein-/ausschalten', en: 'Toggle god-mode agent capabilities' } }
                ]
            }
        ];

        const lang = SYSTEM_LANG === 'de' ? 'de' : 'en';
        let configData = {};
        let helpTexts = {};
        let schema = [];
        let activeSection = localStorage.getItem('aurago-cfg-section') || 'server';
        let isDirty = false;
        let initialSnapshot = '';
        let vaultExists = false;
        const SENSITIVE_KEYS = ['api_key', 'bot_token', 'password', 'app_password', 'access_token', 'token', 'user_key', 'app_token', 'master_key'];

        // Personality editor state
        let persState = { personalities: [], active: '', editName: undefined, isCore: false };

        // Provider management state (loaded from /api/providers)
        let providersCache = [];

        // Email accounts management state (loaded from /api/email-accounts)
        let emailAccountsCache = [];

        // MCP servers state (loaded from /api/mcp-servers)
        let mcpServersCache = [];

        // Sandbox status (loaded from /api/sandbox/status)
        let sandboxStatusCache = null;

        // Init
        async function init() {
            try {
                const [cfgResp, helpResp, schemaResp, vaultResp] = await Promise.all([
                    fetch('/api/config'),
                    fetch('/config_help.json'),
                    fetch('/api/config/schema'),
                    fetch('/api/vault/status')
                ]);
                configData = await cfgResp.json();
                helpTexts = await helpResp.json();
                schema = await schemaResp.json();
                try { vaultExists = (await vaultResp.json()).exists === true; } catch (_) { }
                // Load providers (best-effort – endpoint only exists when web_config is enabled)
                try {
                    const provResp = await fetch('/api/providers');
                    if (provResp.ok) providersCache = await provResp.json();
                } catch (_) { }
                // Load email accounts (best-effort)
                try {
                    const eaResp = await fetch('/api/email-accounts');
                    if (eaResp.ok) emailAccountsCache = await eaResp.json();
                } catch (_) { }
                // Load MCP servers (best-effort)
                try {
                    const mcpResp = await fetch('/api/mcp-servers');
                    if (mcpResp.ok) mcpServersCache = await mcpResp.json();
                } catch (_) { }
                // Load sandbox status (best-effort)
                try {
                    const sbResp = await fetch('/api/sandbox/status');
                    if (sbResp.ok) sandboxStatusCache = await sbResp.json();
                } catch (_) { }
            } catch (e) {
                document.getElementById('content').innerHTML = '<div style="text-align:center;padding:4rem;color:var(--danger);">❌ Fehler beim Laden der Konfiguration.<br><small>' + e.message + '</small></div>';
                return;
            }
            buildSidebar();
            selectSection(activeSection);
            // Take initial snapshot for dirty tracking after first render
            setTimeout(() => { initialSnapshot = collectSnapshot(); setDirty(false); }, 100);
        }

        /* ── Sidebar drawer (mobile) ── */
        const cfgHamburger = document.getElementById('cfg-hamburger');
        const sidebarEl = document.getElementById('sidebar');
        const sidebarBackdrop = document.getElementById('sidebar-backdrop');

        function openSidebar() {
            sidebarEl.classList.add('open');
            sidebarBackdrop.classList.add('open');
            cfgHamburger.textContent = '✕';
        }

        function closeSidebar() {
            sidebarEl.classList.remove('open');
            sidebarBackdrop.classList.remove('open');
            cfgHamburger.textContent = '☰';
        }

        cfgHamburger.addEventListener('click', () => {
            if (sidebarEl.classList.contains('open')) {
                closeSidebar();
            } else {
                openSidebar();
            }
        });

        sidebarBackdrop.addEventListener('click', closeSidebar);

        // ── Group collapse state (persisted in localStorage, keyed by group name) ──
        const COLLAPSED_GROUPS_KEY = 'aurago-cfg-groups-collapsed';

        function loadCollapsedGroups() {
            const allGroups = SECTIONS.map(g => g.group);
            try {
                const raw = localStorage.getItem(COLLAPSED_GROUPS_KEY);
                if (raw !== null) {
                    return new Set(JSON.parse(raw));
                }
                // First visit: collapse ALL groups by default
                return new Set(allGroups);
            } catch (_) {
                return new Set(allGroups);
            }
        }

        function saveCollapsedGroups() {
            localStorage.setItem(COLLAPSED_GROUPS_KEY, JSON.stringify([...collapsedGroups]));
        }

        const collapsedGroups = loadCollapsedGroups();

        function buildSidebar() {
            const sb = document.getElementById('sidebar');
            sb.innerHTML = '';
            let lastWasIntSub = false;

            SECTIONS.forEach((group) => {
                const groupName = group.group;
                const isCollapsed = collapsedGroups.has(groupName);

                // Insert section divider before first integration sub-group
                if (group.sectionDivider && !lastWasIntSub) {
                    const divider = document.createElement('div');
                    divider.className = 'sidebar-section-divider';
                    divider.textContent = group.sectionDivider;
                    sb.appendChild(divider);
                }
                lastWasIntSub = !!group.integrationSubGroup;

                // Create collapsible group container
                const groupDiv = document.createElement('div');
                groupDiv.className = 'sidebar-group'
                    + (isCollapsed ? ' collapsed' : '')
                    + (group.integrationSubGroup ? ' integration-subgroup' : '');

                // Group header (collapsible)
                const header = document.createElement('div');
                header.className = 'sidebar-group-header'
                    + (group.dangerGroup ? ' danger-group' : '')
                    + (group.integrationSubGroup ? ' integration-subgroup-header' : '');
                header.innerHTML = `
                    <span class="sidebar-group-title">${groupName}</span>
                    <span class="sidebar-group-arrow">▼</span>
                `;
                header.onclick = () => toggleGroup(groupName, groupDiv);

                // Group content (items)
                const content = document.createElement('div');
                content.className = 'sidebar-group-content';
                content.style.maxHeight = isCollapsed ? '0' : 'none';

                group.items.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'sidebar-item'
                        + (s.key === activeSection ? ' active' : '')
                        + (group.dangerGroup ? ' danger-item' : '')
                        + (group.integrationSubGroup ? ' integration-sub-item' : '');
                    item.dataset.section = s.key;
                    item.innerHTML = '<span class="icon">' + s.icon + '</span><span>' + s.label[lang] + '</span>';
                    item.onclick = () => selectSection(s.key);
                    content.appendChild(item);
                });

                groupDiv.appendChild(header);
                groupDiv.appendChild(content);
                sb.appendChild(groupDiv);
            });
        }

        function toggleGroup(groupName, groupDiv) {
            const isCollapsed = collapsedGroups.has(groupName);
            const content = groupDiv.querySelector('.sidebar-group-content');

            if (isCollapsed) {
                collapsedGroups.delete(groupName);
                groupDiv.classList.remove('collapsed');
                content.style.maxHeight = content.scrollHeight + 'px';
                setTimeout(() => content.style.maxHeight = 'none', 300);
            } else {
                collapsedGroups.add(groupName);
                groupDiv.classList.add('collapsed');
                content.style.maxHeight = content.scrollHeight + 'px';
                setTimeout(() => content.style.maxHeight = '0', 0);
            }
            saveCollapsedGroups();
        }

        function selectSection(key) {
            activeSection = key;
            localStorage.setItem('aurago-cfg-section', key);
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.toggle('active', el.dataset.section === key));
            // Auto-expand the group containing this section if it is collapsed
            for (const group of SECTIONS) {
                if (group.items.some(s => s.key === key) && collapsedGroups.has(group.group)) {
                    const groupDiv = [...document.querySelectorAll('.sidebar-group')].find(
                        el => el.querySelector('.sidebar-group-title') &&
                              el.querySelector('.sidebar-group-title').textContent.trim() === group.group
                    );
                    if (groupDiv) toggleGroup(group.group, groupDiv);
                    break;
                }
            }
            renderSection(key);
            // Re-attach change listeners after rendering
            attachChangeListeners();
            // Auto-close sidebar on mobile
            closeSidebar();
        }

        function renderSection(key) {
            let section = null;
            for (const group of SECTIONS) {
                const found = group.items.find(s => s.key === key);
                if (found) {
                    section = found;
                    break;
                }
            }
            if (!section) return;

            // Custom render for prompts editor
            if (key === 'prompts_editor') {
                renderPromptsSection(section);
                return;
            }

            // Custom render for webhooks section
            if (key === 'webhooks') {
                renderWebhooksSection(section);
                return;
            }

            // Custom render for danger zone
            if (key === 'danger_zone') {
                renderDangerZoneSection(section);
                return;
            }

            // Custom render for web config + auth (merged)
            if (key === 'web_config') {
                renderWebConfigSection(section);
                return;
            }

            // Custom render for file indexing
            if (key === 'indexing') {
                renderIndexingSection(section);
                return;
            }

            // Custom render for backup & restore
            if (key === 'backup_restore') {
                renderBackupSection(section);
                return;
            }

            // Custom render for device registry
            if (key === 'devices') {
                renderDevicesSection(section);
                return;
            }

            // Custom render for provider management
            if (key === 'providers') {
                renderProvidersSection(section);
                return;
            }

            // Custom render for email accounts management
            if (key === 'email') {
                renderEmailSection(section);
                return;
            }

            // Custom render for MCP servers management
            if (key === 'mcp') {
                renderMCPSection(section);
                return;
            }

            // Custom render for Sandbox settings
            if (key === 'sandbox') {
                renderSandboxSection(section);
                return;
            }

            // Custom render for secrets / vault management
            if (key === 'secrets') {
                renderSecretsSection(section);
                return;
            }

            const data = configData[key] || {};
            const sectionSchema = schema.find(s => s.yaml_key === key);

            // Keys managed by other sections — skip in generic renderer
            const AGENT_SKIP_KEYS = new Set([
                'allow_shell', 'allow_python', 'allow_filesystem_write',
                'allow_network_requests', 'allow_remote_shell', 'allow_self_update',
                'allow_mcp', 'allow_web_scraper', // → Danger Zone
                'sudo_enabled',            // → Danger Zone
                'core_personality',         // → Prompts & Personas
                'additional_prompt'         // → Prompts & Personas
            ]);
            // Legacy fields superseded by provider management — hide from UI
            const EMBEDDINGS_SKIP_KEYS = new Set(['api_key', 'external_model', 'external_url', 'internal_model']);
            // Legacy fields superseded by provider management — hide from UI
            const LLM_SKIP_KEYS = new Set(['api_key', 'base_url', 'model']);

            let html = '<div class="cfg-section active">';
            html += '<div class="section-header">' + section.icon + ' ' + section.label[lang] + '</div>';
            html += '<div class="section-desc">' + section.desc[lang] + '</div>';

            // LLM settings explanation
            if (key === 'llm') {
                html += `<div style="margin-bottom:1.2rem;padding:0.65rem 0.9rem;border-radius:9px;background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.22);font-size:0.78rem;color:var(--text-secondary);line-height:1.55;">
                    \u{1F9E0} ${lang === 'de'
                        ? 'Modell, URL und API-Key werden aus dem <strong>Provider-Eintrag</strong> in der Provider-Verwaltung \u00fcbernommen. Hier werden nur erweiterte LLM-Einstellungen konfiguriert.'
                        : 'Model, URL and API key are taken from the <strong>provider entry</strong> in provider management. Only advanced LLM settings are configured here.'}
                </div>`;
            }

            // Embeddings explanation
            if (key === 'embeddings') {
                html += `<div style="margin-bottom:1.2rem;padding:0.65rem 0.9rem;border-radius:9px;background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.22);font-size:0.78rem;color:var(--text-secondary);line-height:1.55;">
                    &#x1F9E0; ${lang === 'de'
                        ? 'Embeddings wandeln Texte in numerische Vektoren um, mit denen der Agent semantisch \u00e4hnliche Inhalte wiederfinden kann. Das erm\u00f6glicht das <strong>Langzeitged\u00e4chtnis</strong>: Gespr\u00e4chsinhalte, Notizen und indexierte Dateien werden als Embeddings gespeichert und bei Bedarf automatisch abgerufen. Modell und URL werden aus dem gew\u00e4hlten <strong>Provider-Eintrag</strong> \u00fcbernommen.'
                        : 'Embeddings convert text into numerical vectors, allowing the agent to find semantically similar content. This powers the agent\'s <strong>long-term memory</strong>: conversation content, notes and indexed files are stored as embeddings and retrieved automatically when relevant. Model and URL are taken from the selected <strong>provider entry</strong>.'}
                </div>`;
            }

            // Budget disclaimer
            if (key === 'budget') {
                html += `<div style="margin-bottom:1.2rem;padding:0.65rem 0.9rem;border-radius:9px;background:rgba(99,179,237,0.08);border:1px solid rgba(99,179,237,0.22);font-size:0.78rem;color:var(--text-secondary);line-height:1.55;">
                    ℹ️ ${lang === 'de'
                        ? 'Werte, die nicht direkt ermittelt werden können (z.\u00a0B. bei lokalen Modellen ohne Token-Reporting), werden intern geschätzt. Der angezeigte Verbrauch kann vom tatsächlichen Verbrauch abweichen. Diese Funktion ersetzt <strong>nicht</strong> das Setzen von Limits direkt beim Provider oder der API.'
                        : 'Values that cannot be determined directly (e.g. local models without token reporting) are estimated internally. The displayed usage may differ from the actual usage. This feature does <strong>not</strong> replace setting spending limits directly at the provider or API.'}
                </div>`;
            }

            // Tools permissions warning
            if (key === 'tools') {
                html += `<div style="margin-bottom:1.2rem;padding:0.65rem 0.9rem;border-radius:9px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.28);font-size:0.78rem;color:var(--text-secondary);line-height:1.55;">
                    ⚠️ ${lang === 'de'
                        ? '<strong>Diese Einstellungen sollten normalerweise nicht verändert werden.</strong> Das Deaktivieren von Tools schränkt die Leistungsfähigkeit des Agenten stark ein.'
                        : '<strong>These settings should normally not be changed.</strong> Disabling tools will significantly limit the agent\'s capabilities.'}
                </div>`;
            }

            if (sectionSchema && sectionSchema.children) {
                let schemaChildren = sectionSchema.children;
                if (key === 'agent') {
                    schemaChildren = schemaChildren.filter(f => !AGENT_SKIP_KEYS.has(f.yaml_key));
                }
                if (key === 'embeddings') {
                    schemaChildren = schemaChildren.filter(f => !EMBEDDINGS_SKIP_KEYS.has(f.yaml_key));
                }
                if (key === 'llm' || key === 'fallback_llm') {
                    schemaChildren = schemaChildren.filter(f => !LLM_SKIP_KEYS.has(f.yaml_key));
                }
                html += renderFields(schemaChildren, data, key);
            } else {
                for (const [k, v] of Object.entries(data)) {
                    // Skip keys that belong to other dedicated sections
                    if (key === 'agent' && AGENT_SKIP_KEYS.has(k)) continue;
                    if (key === 'embeddings' && EMBEDDINGS_SKIP_KEYS.has(k)) continue;
                    if ((key === 'llm' || key === 'fallback_llm') && LLM_SKIP_KEYS.has(k)) continue;
                    if (typeof v === 'object' && v !== null && !Array.isArray(v)) {
                        html += '<div style="margin-top:1rem;margin-bottom:0.5rem;font-weight:600;font-size:0.85rem;color:var(--accent);">' + formatKey(k) + '</div>';
                        for (const [sk, sv] of Object.entries(v)) {
                            html += renderField(key + '.' + k + '.' + sk, sk, sv, key + '.' + k);
                        }
                    } else {
                        html += renderField(key + '.' + k, k, v, key);
                    }
                }
            }

            // MeshCentral connection tester
            if (key === 'meshcentral') {
                html += renderMeshCentralTestBlock();
            }

            html += '</div>';

            document.getElementById('content').innerHTML = html;
        }

        /* ── Ollama model query (used inside provider modal) ── */
        async function queryOllamaModelsInModal() {
            const spinner = document.getElementById('prov-ollama-spinner');
            const resultDiv = document.getElementById('prov-ollama-result');
            const modelsDiv = document.getElementById('prov-ollama-models');
            const errorDiv = document.getElementById('prov-ollama-error');
            if (!spinner) return;

            spinner.style.display = 'inline';
            resultDiv.style.display = 'none';
            errorDiv.style.display = 'none';
            modelsDiv.innerHTML = '';

            const baseUrl = (document.getElementById('prov-url') || {}).value || '';
            const url = '/api/ollama/models' + (baseUrl ? '?url=' + encodeURIComponent(baseUrl) : '');

            try {
                const resp = await fetch(url);
                const json = await resp.json();
                resultDiv.style.display = 'block';

                if (!resp.ok || json.available === false) {
                    errorDiv.textContent = json.reason || (lang === 'de' ? 'Fehler beim Abrufen.' : 'Error fetching models.');
                    errorDiv.style.display = 'block';
                } else if (!json.models || json.models.length === 0) {
                    errorDiv.textContent = lang === 'de' ? 'Keine Modelle gefunden.' : 'No models found.';
                    errorDiv.style.display = 'block';
                } else {
                    modelsDiv.innerHTML = json.models.map(m =>
                        `<span style="display:inline-block;padding:0.2rem 0.6rem;border-radius:6px;background:var(--bg-primary);border:1px solid var(--border-subtle);font-family:monospace;font-size:0.75rem;color:var(--accent);cursor:pointer;transition:background 0.15s;" title="${lang === 'de' ? 'Klicken zum \u00dcbernehmen' : 'Click to apply'}" onmouseover="this.style.background='var(--accent)';this.style.color='#fff'" onmouseout="this.style.background='var(--bg-primary)';this.style.color='var(--accent)'" onclick="applyOllamaModelInModal(this.textContent)">${m}</span>`
                    ).join('');
                }
            } catch (e) {
                resultDiv.style.display = 'block';
                errorDiv.textContent = (lang === 'de' ? 'Verbindungsfehler: ' : 'Connection error: ') + e.message;
                errorDiv.style.display = 'block';
            } finally {
                spinner.style.display = 'none';
            }
        }

        function applyOllamaModelInModal(modelName) {
            const modelInput = document.getElementById('prov-model');
            if (modelInput) {
                modelInput.value = modelName;
                modelInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
        }

        /* ── OpenRouter Model Browser (reusable modal) ── */
        let _orModelsCache = null;
        let _orModelsCacheTime = 0;
        const OR_CACHE_TTL = 5 * 60 * 1000; // 5 min cache

        /**
         * Opens a full-screen OpenRouter model browser modal.
         * @param {function} onSelect - callback({id, name, pricing, context_length}) when user picks a model
         */
        async function openOpenRouterBrowser(onSelect) {
            const lDe = (typeof lang !== 'undefined' ? lang : 'de') === 'de';

            // Remove existing modal if any
            const existing = document.getElementById('or-browser-overlay');
            if (existing) existing.remove();

            const overlay = document.createElement('div');
            overlay.id = 'or-browser-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:1100;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;';
            overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };

            overlay.innerHTML = `
            <div style="background:var(--bg-secondary);border-radius:16px;width:min(760px,95vw);height:min(85vh,720px);display:flex;flex-direction:column;border:1px solid var(--border-subtle);overflow:hidden;" onclick="event.stopPropagation()">
                <!-- Header -->
                <div style="padding:1rem 1.2rem;border-bottom:1px solid var(--border-subtle);flex-shrink:0;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.7rem;">
                        <div style="font-weight:700;font-size:1rem;">🌐 OpenRouter ${lDe?'Modell-Browser':'Model Browser'}</div>
                        <button onclick="document.getElementById('or-browser-overlay').remove()" style="background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;">✕</button>
                    </div>
                    <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
                        <input id="or-search" class="field-input" type="text" placeholder="${lDe?'Modell suchen...':'Search models...'}" style="flex:1;min-width:180px;font-size:0.82rem;padding:0.4rem 0.7rem;">
                        <button id="or-free-btn" class="btn-save" style="padding:0.35rem 0.8rem;font-size:0.75rem;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border-subtle);white-space:nowrap;" title="${lDe?'Nur kostenlose Modelle anzeigen':'Show only free models'}">
                            🆓 ${lDe?'Kostenlose':'Free'}
                        </button>
                        <div id="or-count" style="font-size:0.72rem;color:var(--text-tertiary);white-space:nowrap;"></div>
                    </div>
                </div>
                <!-- Content area: list + detail -->
                <div style="flex:1;display:flex;overflow:hidden;">
                    <!-- Model list -->
                    <div id="or-list-wrap" style="flex:1;overflow-y:auto;min-width:0;">
                        <div id="or-list" style="padding:0.3rem;"></div>
                    </div>
                    <!-- Detail panel (hidden by default) -->
                    <div id="or-detail" style="width:280px;flex-shrink:0;border-left:1px solid var(--border-subtle);overflow-y:auto;display:none;padding:1rem;font-size:0.8rem;"></div>
                </div>
                <!-- Loading / error -->
                <div id="or-loading" style="padding:2rem;text-align:center;color:var(--text-secondary);font-size:0.85rem;">
                    ⏳ ${lDe?'Lade Modelle von OpenRouter...':'Loading models from OpenRouter...'}
                </div>
            </div>`;
            document.body.appendChild(overlay);

            const searchInput = document.getElementById('or-search');
            const freeBtn = document.getElementById('or-free-btn');
            const listDiv = document.getElementById('or-list');
            const detailDiv = document.getElementById('or-detail');
            const countDiv = document.getElementById('or-count');
            const loadingDiv = document.getElementById('or-loading');
            const listWrap = document.getElementById('or-list-wrap');

            let allModels = [];
            let freeOnly = false;
            let selectedModel = null;

            // Fetch models
            try {
                const now = Date.now();
                if (_orModelsCache && (now - _orModelsCacheTime) < OR_CACHE_TTL) {
                    allModels = _orModelsCache;
                } else {
                    const resp = await fetch('/api/openrouter/models');
                    const json = await resp.json();
                    if (json.available === false) {
                        loadingDiv.innerHTML = '<span style="color:var(--danger);">❌ ' + (json.reason || 'Error') + '</span>';
                        return;
                    }
                    allModels = (json.data || []).map(m => ({
                        id: m.id || '',
                        name: m.name || m.id || '',
                        description: m.description || '',
                        context_length: m.context_length || 0,
                        pricing: m.pricing || {},
                        architecture: m.architecture || {},
                        top_provider: m.top_provider || {},
                    }));
                    // Sort by name
                    allModels.sort((a, b) => a.name.localeCompare(b.name));
                    _orModelsCache = allModels;
                    _orModelsCacheTime = now;
                }
            } catch (e) {
                loadingDiv.innerHTML = '<span style="color:var(--danger);">❌ ' + (lDe?'Verbindungsfehler: ':'Connection error: ') + e.message + '</span>';
                return;
            }
            loadingDiv.style.display = 'none';
            listWrap.style.display = 'block';

            function isFree(m) {
                return m.pricing && parseFloat(m.pricing.prompt || '1') === 0 && parseFloat(m.pricing.completion || '1') === 0;
            }

            function formatCost(perToken) {
                const val = parseFloat(perToken || '0');
                if (val === 0) return lDe?'Kostenlos':'Free';
                const perMillion = val * 1000000;
                if (perMillion < 0.01) return '$' + perMillion.toFixed(4) + '/M';
                if (perMillion < 1) return '$' + perMillion.toFixed(3) + '/M';
                return '$' + perMillion.toFixed(2) + '/M';
            }

            function formatContext(ctx) {
                if (!ctx) return '—';
                if (ctx >= 1000000) return (ctx / 1000000).toFixed(1) + 'M';
                if (ctx >= 1000) return Math.round(ctx / 1000) + 'K';
                return ctx.toString();
            }

            function renderList() {
                const query = searchInput.value.toLowerCase().trim();
                const filtered = allModels.filter(m => {
                    if (freeOnly && !isFree(m)) return false;
                    if (query) {
                        return m.id.toLowerCase().includes(query) || m.name.toLowerCase().includes(query);
                    }
                    return true;
                });

                countDiv.textContent = filtered.length + (lDe?' Modelle':' models') + (freeOnly ? (lDe?' (nur kostenlose)':' (free only)') : '');

                if (filtered.length === 0) {
                    listDiv.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--text-tertiary);font-size:0.82rem;">' + (lDe?'Keine Modelle gefunden.':'No models found.') + '</div>';
                    return;
                }

                // Virtual-ish rendering: just render all since DOM handles it fine with simple divs
                listDiv.innerHTML = filtered.map(m => {
                    const free = isFree(m);
                    const promptCost = formatCost(m.pricing.prompt);
                    const completionCost = formatCost(m.pricing.completion);
                    const isSelected = selectedModel && selectedModel.id === m.id;
                    return `<div class="or-model-row" data-id="${escapeAttr(m.id)}" style="padding:0.5rem 0.7rem;border-bottom:1px solid var(--border-subtle);cursor:pointer;display:flex;align-items:center;gap:0.6rem;transition:background 0.12s;${isSelected?'background:var(--accent-dim);':''}">
                        <div style="flex:1;min-width:0;">
                            <div style="font-size:0.8rem;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeAttr(m.id)}">${escapeHtml(m.name)}</div>
                            <div style="font-size:0.68rem;color:var(--text-tertiary);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(m.id)}</div>
                        </div>
                        <div style="flex-shrink:0;display:flex;gap:0.4rem;align-items:center;">
                            ${free ? '<span style="font-size:0.65rem;padding:0.1rem 0.4rem;border-radius:4px;background:rgba(72,199,142,0.15);color:#48c78e;font-weight:600;">FREE</span>' : '<span style="font-size:0.65rem;color:var(--text-tertiary);" title="Input / Output">'+promptCost+' · '+completionCost+'</span>'}
                            <span style="font-size:0.65rem;color:var(--text-tertiary);" title="Context">${formatContext(m.context_length)}</span>
                        </div>
                    </div>`;
                }).join('');

                // Attach click handlers
                listDiv.querySelectorAll('.or-model-row').forEach(row => {
                    row.onmouseover = () => { if (!row.style.background.includes('accent')) row.style.background='var(--bg-tertiary)'; };
                    row.onmouseout = () => { if (selectedModel && selectedModel.id === row.dataset.id) row.style.background='var(--accent-dim)'; else row.style.background=''; };
                    row.onclick = () => {
                        const m = allModels.find(x => x.id === row.dataset.id);
                        if (!m) return;
                        selectedModel = m;
                        showDetail(m);
                        // Highlight selected
                        listDiv.querySelectorAll('.or-model-row').forEach(r => r.style.background='');
                        row.style.background = 'var(--accent-dim)';
                    };
                });
            }

            function showDetail(m) {
                detailDiv.style.display = 'block';
                const free = isFree(m);
                const promptPerM = (parseFloat(m.pricing.prompt || '0') * 1000000);
                const completionPerM = (parseFloat(m.pricing.completion || '0') * 1000000);
                detailDiv.innerHTML = `
                    <div style="font-weight:700;font-size:0.9rem;color:var(--text-primary);margin-bottom:0.3rem;">${escapeHtml(m.name)}</div>
                    <div style="font-family:monospace;font-size:0.7rem;color:var(--accent);margin-bottom:0.7rem;word-break:break-all;">${escapeHtml(m.id)}</div>
                    ${m.description ? '<div style="font-size:0.75rem;color:var(--text-secondary);margin-bottom:0.8rem;line-height:1.4;max-height:120px;overflow-y:auto;">' + escapeHtml(m.description) + '</div>' : ''}
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem 0.8rem;font-size:0.75rem;margin-bottom:0.8rem;">
                        <div><span style="color:var(--text-tertiary);">Context:</span></div>
                        <div style="font-weight:600;">${formatContext(m.context_length)} tokens</div>
                        <div><span style="color:var(--text-tertiary);">Input:</span></div>
                        <div style="font-weight:600;${free?'color:#48c78e;':''}">${free ? (lDe?'Kostenlos':'Free') : '$'+promptPerM.toFixed(4)+'/M'}</div>
                        <div><span style="color:var(--text-tertiary);">Output:</span></div>
                        <div style="font-weight:600;${free?'color:#48c78e;':''}">${free ? (lDe?'Kostenlos':'Free') : '$'+completionPerM.toFixed(4)+'/M'}</div>
                    </div>
                    ${free ? '<div style="padding:0.4rem 0.6rem;border-radius:7px;background:rgba(72,199,142,0.1);border:1px solid rgba(72,199,142,0.2);font-size:0.72rem;color:#48c78e;margin-bottom:0.8rem;">🆓 '+(lDe?'Dieses Modell ist kostenlos':'This model is free to use')+'</div>' : ''}
                    <button id="or-apply-btn" class="btn-save" style="width:100%;padding:0.5rem;font-size:0.82rem;">
                        ✅ ${lDe?'Modell übernehmen':'Apply Model'}
                    </button>
                    <div style="font-size:0.68rem;color:var(--text-tertiary);margin-top:0.5rem;text-align:center;">
                        ${!free ? (lDe?'Kosten werden automatisch für die Budgetverwaltung übernommen.':'Costs will be automatically imported for budget management.') : ''}
                    </div>
                `;
                document.getElementById('or-apply-btn').onclick = () => {
                    if (onSelect) onSelect({
                        id: m.id,
                        name: m.name,
                        pricing: m.pricing,
                        context_length: m.context_length,
                        inputPerMillion: parseFloat(m.pricing.prompt || '0') * 1000000,
                        outputPerMillion: parseFloat(m.pricing.completion || '0') * 1000000,
                    });
                    overlay.remove();
                };
            }

            // Search with debounce
            let searchTimer;
            searchInput.oninput = () => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(renderList, 150);
            };

            // Free toggle
            freeBtn.onclick = () => {
                freeOnly = !freeOnly;
                freeBtn.style.background = freeOnly ? 'rgba(72,199,142,0.2)' : 'var(--bg-tertiary)';
                freeBtn.style.color = freeOnly ? '#48c78e' : 'var(--text-primary)';
                freeBtn.style.borderColor = freeOnly ? 'rgba(72,199,142,0.4)' : 'var(--border-subtle)';
                renderList();
            };

            // Initial render
            renderList();
            searchInput.focus();
        }

        /**
         * Auto-update budget.models with pricing from OpenRouter model selection.
         * Adds new entry or updates existing one.
         * @param {object} m - model data with id, inputPerMillion, outputPerMillion
         */
        function updateBudgetModelCost(m) {
            if (!m || !m.id) return;
            // Only update if there are non-zero costs
            const inputPM = m.inputPerMillion || 0;
            const outputPM = m.outputPerMillion || 0;

            // Ensure budget.models exists
            if (!configData.budget) configData.budget = {};
            if (!Array.isArray(configData.budget.models)) configData.budget.models = [];

            // Check if model already exists
            const existing = configData.budget.models.find(
                e => e.name && e.name.toLowerCase() === m.id.toLowerCase()
            );

            if (existing) {
                existing.input_per_million = inputPM;
                existing.output_per_million = outputPM;
            } else {
                configData.budget.models.push({
                    name: m.id,
                    input_per_million: inputPM,
                    output_per_million: outputPM,
                });
            }
            setDirty(true);

            // Show a brief toast-style notification
            const lDe = lang === 'de';
            const msg = lDe
                ? `💰 Modellkosten für "${m.id}" wurden in der Budgetverwaltung aktualisiert.`
                : `💰 Model costs for "${m.id}" updated in budget management.`;
            showBudgetToast(msg);
        }

        function showBudgetToast(message) {
            const existing = document.getElementById('budget-toast');
            if (existing) existing.remove();
            const toast = document.createElement('div');
            toast.id = 'budget-toast';
            toast.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--bg-secondary);color:var(--text-primary);padding:0.6rem 1.2rem;border-radius:10px;font-size:0.8rem;border:1px solid rgba(72,199,142,0.3);box-shadow:0 4px 16px rgba(0,0,0,0.3);z-index:1200;animation:fadeInUp 0.3s;';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transition = 'opacity 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        function renderMeshCentralTestBlock() {
            const labelTest = lang === 'de' ? 'Verbindung testen' : 'Test Connection';
            const labelDesc = lang === 'de'
                ? 'Testet Login und WebSocket-Handshake mit den oben eingegebenen Werten. Wurden Felder nicht geändert, werden die gespeicherten Werte verwendet.'
                : 'Tests login and WebSocket handshake using the values entered above. Unchanged fields use the saved config values.';
            return `
            <div id="mc-test-block" style="margin-top:1.5rem;padding:1rem 1.2rem;border:1px solid var(--border-subtle);border-radius:12px;background:var(--bg-secondary);">
                <div style="font-size:0.8rem;font-weight:600;color:var(--accent);margin-bottom:0.5rem;">🔌 MeshCentral Test</div>
                <div style="font-size:0.78rem;color:var(--text-secondary);margin-bottom:0.8rem;">${labelDesc}</div>
                <div style="display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;">
                    <button class="btn-save" style="padding:0.4rem 1.1rem;font-size:0.78rem;" onclick="testMeshCentral()">${labelTest}</button>
                    <span id="mc-test-spinner" style="display:none;font-size:0.75rem;color:var(--text-secondary);">⏳ ${lang === 'de' ? 'Verbinde...' : 'Connecting...'}</span>
                </div>
                <div id="mc-test-result" style="margin-top:0.8rem;display:none;">
                    <div id="mc-test-msg" style="font-size:0.82rem;padding:0.45rem 0.7rem;border-radius:7px;"></div>
                </div>
            </div>`;
        }

        async function testMeshCentral() {
            const spinner   = document.getElementById('mc-test-spinner');
            const resultDiv = document.getElementById('mc-test-result');
            const msgDiv    = document.getElementById('mc-test-msg');
            if (!spinner) return;

            spinner.style.display = 'inline';
            resultDiv.style.display = 'none';

            // Read values from the existing config fields on the page.
            // If the user edited them, those values are sent; otherwise they're
            // empty/masked and the backend falls back to the saved config.
            const getField = (path) => {
                const el = document.querySelector(`[data-path="${path}"]`);
                if (!el) return '';
                const v = el.value.trim();
                // Password placeholder '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022' means unchanged — send empty so backend falls back to saved config
                if (el.type === 'password' && v === '\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022') return '';
                return v;
            };

            const body = {
                url:         getField('meshcentral.url'),
                username:    getField('meshcentral.username'),
                password:    getField('meshcentral.password'),
                login_token: getField('meshcentral.login_token'),
            };

            try {
                const resp = await fetch('/api/meshcentral/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const json = await resp.json();

                resultDiv.style.display = 'block';
                if (json.status === 'ok') {
                    msgDiv.style.background = 'rgba(34,197,94,0.12)';
                    msgDiv.style.color = 'var(--success, #22c55e)';
                    msgDiv.style.border = '1px solid rgba(34,197,94,0.3)';
                    msgDiv.textContent = '✅ ' + (json.message || (lang === 'de' ? 'Verbindung erfolgreich.' : 'Connection successful.'));
                } else {
                    msgDiv.style.background = 'rgba(239,68,68,0.10)';
                    msgDiv.style.color = 'var(--danger, #ef4444)';
                    msgDiv.style.border = '1px solid rgba(239,68,68,0.25)';
                    msgDiv.textContent = '❌ ' + (json.message || (lang === 'de' ? 'Verbindung fehlgeschlagen.' : 'Connection failed.'));
                }
            } catch (e) {
                resultDiv.style.display = 'block';
                msgDiv.style.background = 'rgba(239,68,68,0.10)';
                msgDiv.style.color = 'var(--danger, #ef4444)';
                msgDiv.style.border = '1px solid rgba(239,68,68,0.25)';
                msgDiv.textContent = '❌ ' + e.message;
            } finally {
                spinner.style.display = 'none';
            }
        }

        function renderFields(fields, data, parentPath) {
            let html = '';
            for (const field of fields) {
                const val = data[field.yaml_key];
                const fullPath = parentPath + '.' + field.yaml_key;

                if (field.type === 'object' && field.children) {
                    html += '<div style="margin-top:1.2rem;margin-bottom:0.5rem;font-weight:600;font-size:0.85rem;color:var(--accent);border-bottom:1px solid var(--border-subtle);padding-bottom:0.3rem;">' + formatKey(field.yaml_key) + '</div>';
                    html += renderFields(field.children, val || {}, fullPath);
                } else {
                    html += renderField(fullPath, field.yaml_key, val, parentPath, field);
                }
            }
            return html;
        }

        function renderField(fullPath, key, value, parentPath, fieldSchema) {
            // Special: server.master_key — locked when vault exists, editable when no vault
            if (fullPath === 'server.master_key') {
                const help = helpTexts[fullPath];
                const helpText = help ? (help[lang] || help['en'] || '') : '';
                let h = '<div class="field-group">';
                h += '<div class="field-label">Master Key <span style="font-size:0.65rem;color:var(--warning);">🔒</span></div>';
                if (helpText) h += '<div class="field-help">' + helpText + '</div>';
                if (vaultExists) {
                    h += '<div class="password-wrap">';
                    h += '<input class="field-input" type="password" value="\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" disabled style="opacity:0.55;cursor:not-allowed;flex:1;">';
                    h += '<button type="button" class="password-toggle" title="' + (lang === 'de' ? 'Vault l\u00f6schen' : 'Delete vault') + '" onclick="vaultDeletePrompt()" style="color:#f87171;font-size:1rem;">🗑️</button>';
                    h += '</div>';
                    h += '<div style="font-size:0.75rem;color:var(--text-secondary);margin-top:0.3rem;">🔐 ' + (lang === 'de' ? 'Vault vorhanden – Master Key gesperrt. Vault l\u00f6schen um neuen Key zu setzen.' : 'Vault exists – Master Key locked. Delete vault to set a new key.') + '</div>';
                } else {
                    h += '<div class="password-wrap">';
                    h += '<input class="field-input" type="password" data-path="server.master_key" value="" placeholder="' + (lang === 'de' ? '64-stelliger Hex-Key...' : '64-char hex key...') + '" autocomplete="off">';
                    h += '<button type="button" class="password-toggle" data-visible="false" onclick="togglePassword(this)">' + EYE_OPEN_SVG + '</button>';
                    h += '</div>';
                    h += '<div style="font-size:0.75rem;color:var(--warning);margin-top:0.3rem;">⚠️ ' + (lang === 'de' ? 'Kein Vault vorhanden. Neuen Key eingeben, speichern und AuraGo neu starten.' : 'No vault found. Enter a new key, save, and restart AuraGo.') + '</div>';
                }
                h += '</div>';
                return h;
            }

            const helpKey = fullPath;
            const help = helpTexts[helpKey];
            const helpText = help ? (help[lang] || help['en'] || '') : '';
            const helpOptions = help ? help.options : null;
            const isSensitive = fieldSchema?.sensitive || SENSITIVE_KEYS.includes(key);
            const fieldType = fieldSchema?.type || guessType(value);

            let html = '<div class="field-group">';
            html += '<div class="field-label">' + formatKey(key);
            if (isSensitive) html += ' <span style="font-size:0.65rem;color:var(--warning);">🔒</span>';
            html += '</div>';
            if (helpText) html += '<div class="field-help">' + helpText + '</div>';

            if (fieldType === 'bool') {
                const isOn = value === true;
                html += '<div class="toggle-wrap">';
                html += '<div class="toggle' + (isOn ? ' on' : '') + '" data-path="' + fullPath + '" onclick="toggleBool(this)"></div>';
                html += '<span class="toggle-label">' + (isOn ? 'Aktiv' : 'Inaktiv') + '</span>';
                html += '</div>';
            } else if (help && help.provider_ref) {
                // Dynamic provider dropdown — populated from /api/providers
                html += '<select class="field-select" data-path="' + fullPath + '">';
                const emptyLabel = lang === 'de' ? '— kein Provider —' : '— no provider —';
                const emptySelected = (!value || value === '') ? ' selected' : '';
                html += '<option value=""' + emptySelected + '>' + emptyLabel + '</option>';
                if (help.allow_disabled) {
                    const disSelected = (value === 'disabled') ? ' selected' : '';
                    html += '<option value="disabled"' + disSelected + '>🚫 disabled</option>';
                }
                providersCache.forEach(p => {
                    const selected = (String(value) === String(p.id)) ? ' selected' : '';
                    const displayName = p.name || p.id;
                    const badge = p.type ? (' [' + p.type + ']') : '';
                    const modelHint = p.model ? (' — ' + p.model) : '';
                    html += '<option value="' + escapeAttr(p.id) + '"' + selected + '>' + escapeAttr(displayName + badge + modelHint) + '</option>';
                });
                html += '</select>';
            } else if (helpOptions && Array.isArray(helpOptions)) {
                // Dropdown for fields with predefined options
                html += '<select class="field-select" data-path="' + fullPath + '">';
                helpOptions.forEach(opt => {
                    const selected = (String(value) === String(opt)) ? ' selected' : '';
                    html += '<option value="' + escapeAttr(opt) + '"' + selected + '>' + escapeAttr(opt) + '</option>';
                });
                html += '</select>';
            } else if (isSensitive) {
                const displayVal = (value === '••••••••' || !value) ? '' : value;
                html += '<div class="password-wrap">';
                html += '<input class="field-input" type="password" data-path="' + fullPath + '" value="' + escapeAttr(displayVal) + '" placeholder="••••••••" autocomplete="off">';
                html += '<button type="button" class="password-toggle" data-visible="false" onclick="togglePassword(this)">' + EYE_OPEN_SVG + '</button>';
                html += '</div>';
            } else if (fieldType === 'int' || fieldType === 'float') {
                const step = fieldType === 'float' ? '0.01' : '1';
                // Special handling for agent.core_memory_max_entries: show default 200 if missing/0
                let showValue = value;
                if (fullPath.endsWith('agent.core_memory_max_entries')) {
                    showValue = (value === undefined || value === null || value === 0 || value === '') ? 200 : value;
                }
                html += '<input class="field-input" type="number" step="' + step + '" data-path="' + fullPath + '" value="' + (showValue ?? '') + '">';
            } else if (fieldType === 'array') {
                // Special handling for budget.models - always render as JSON object array
                const isObjArray = fullPath === 'budget.models' || (Array.isArray(value) && value.length > 0 && typeof value[0] === 'object' && value[0] !== null);
                if (isObjArray) {
                    const jsonVal = Array.isArray(value) ? JSON.stringify(value, null, 2) : '[]';
                    html += '<textarea class="field-input" data-path="' + fullPath + '" data-type="json" rows="6" style="font-family:monospace;font-size:0.78rem;resize:vertical;white-space:pre;">' + escapeHtml(jsonVal) + '</textarea>';
                    html += '<div style="font-size:0.72rem;color:var(--text-secondary);margin-top:0.3rem;">JSON-Array (Objekte mit name, input_per_million, output_per_million)</div>';
                } else {
                    const arrVal = Array.isArray(value) ? value.join(', ') : (value || '');
                    html += '<input class="field-input" type="text" data-path="' + fullPath + '" data-type="array" value="' + escapeAttr(arrVal) + '" placeholder="Kommagetrennte Werte">';
                }
            } else {
                html += '<input class="field-input" type="text" data-path="' + fullPath + '" value="' + escapeAttr(value ?? '') + '">';
            }
            html += '</div>';
            return html;
        }

        function guessType(val) {
            if (typeof val === 'boolean') return 'bool';
            if (typeof val === 'number') return Number.isInteger(val) ? 'int' : 'float';
            if (Array.isArray(val)) return 'array';
            return 'string';
        }

        function formatKey(key) {
            return key.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        }

        function escapeAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
        function escapeHtml(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function toggleBool(el) {
            const on = el.classList.toggle('on');
            if (el.nextElementSibling) {
                el.nextElementSibling.textContent = on ? 'Aktiv' : 'Inaktiv';
            }
            markDirty();
        }

        function togglePassword(btn) {
            const input = btn.closest('.password-wrap').querySelector('.field-input');
            const isVisible = btn.dataset.visible === 'true';
            if (isVisible) {
                input.type = 'password';
                btn.innerHTML = EYE_OPEN_SVG;
                btn.dataset.visible = 'false';
            } else {
                input.type = 'text';
                btn.innerHTML = EYE_CLOSED_SVG;
                btn.dataset.visible = 'true';
            }
        }

        // ── Dirty tracking ──────────────────────────────────
        function collectSnapshot() {
            const parts = [];
            document.querySelectorAll('[data-path]').forEach(el => {
                const path = el.dataset.path;
                let val;
                if (el.classList.contains('toggle')) {
                    val = el.classList.contains('on') ? 'true' : 'false';
                } else {
                    val = el.value;
                }
                parts.push(path + '=' + val);
            });
            return parts.join('|');
        }

        function markDirty() {
            if (!isDirty) {
                isDirty = true;
                setDirty(true);
            }
        }

        function setDirty(dirty) {
            isDirty = dirty;
            const btn = document.getElementById('btnSave');
            const pill = document.getElementById('changesPill');
            btn.disabled = !dirty;
            pill.classList.toggle('visible', dirty);
        }

        function attachChangeListeners() {
            document.querySelectorAll('.field-input, .field-select').forEach(el => {

        // ── Save ────────────────────────────────────────────
        async function saveConfig() {
            const btn = document.getElementById('btnSave');
            const status = document.getElementById('saveStatus');
            btn.disabled = true;
            status.className = 'save-status';
            status.textContent = 'Speichere...';

            // Collect all field values
            const patch = {};
            document.querySelectorAll('[data-path]').forEach(el => {
                const path = el.dataset.path;
                const parts = path.split('.');
                let val;

                if (el.classList.contains('toggle')) {
                    val = el.classList.contains('on');
                } else if (el.type === 'number') {
                    val = el.value === '' ? 0 : (el.step === '0.01' ? parseFloat(el.value) : parseInt(el.value));
                } else if (el.dataset.type === 'array') {
                    // Check if this is an object array (budget.models) or string array
                    if (fullPath === 'budget.models' || el.value.trim().startsWith('[')) {
                        // Object array - parse as JSON
                        try { val = JSON.parse(el.value); } catch (e) { 
                            val = el.value.split(',').map(s => s.trim()).filter(Boolean); 
                        }
                    } else {
                        // Simple string array
                        val = el.value.split(',').map(s => s.trim()).filter(Boolean);
                    }
                } else if (el.dataset.type === 'json') {
                    try { val = JSON.parse(el.value); } catch (e) { val = el.value; }
                } else {
                    val = el.value;
                }

                // Build nested object from dotted path
                let obj = patch;
                for (let i = 0; i < parts.length - 1; i++) {
                    if (!obj[parts[i]]) obj[parts[i]] = {};
                    obj = obj[parts[i]];
                }
                obj[parts[parts.length - 1]] = val;
            });

            try {
                const resp = await fetch('/api/config', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(patch)
                });
                const result = await resp.json();
                if (resp.ok) {
                    if (result.needs_restart) {
                        status.className = 'save-status';
                        status.style.color = 'var(--warning)';
                        status.textContent = '⚠ ' + (result.message || 'Neustart nötig');
                    } else {
                        status.className = 'save-status success';
                        status.textContent = '✓ ' + (result.message || 'Gespeichert & angewendet');
                    }
                    // Refresh config data and reset dirty state
                    const cfgResp = await fetch('/api/config');
                    configData = await cfgResp.json();
                    initialSnapshot = collectSnapshot();
                    setDirty(false);
                } else {
                    status.className = 'save-status error';
                    status.textContent = '✗ ' + (result.message || 'Fehler');
                    btn.disabled = false;
                }
            } catch (e) {
                status.className = 'save-status error';
                status.textContent = '✗ ' + e.message;
                btn.disabled = false;
            }
            setTimeout(() => { status.textContent = ''; }, 5000);
        }

        async function restartAuraGo() {
            if (!confirm('AuraGo Service wirklich neu starten? (Dauert ca. 3-5 Sekunden)')) return;

            try {
                const resp = await fetch('/api/restart', { method: 'POST' });
                if (resp.ok) {
                    const res = await resp.json();
                    document.body.innerHTML = `
                        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg-primary);color:var(--text-primary);">
                            <div style="font-size:4rem;margin-bottom:1.5rem;animation:spin 2s linear infinite;">↻</div>
                            <h2 style="font-size:1.5rem;font-weight:600;">${res.message}</h2>
                            <p style="color:var(--text-secondary);margin-top:0.75rem;">Die Seite lädt gleich automatisch neu...</p>
                            <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
                        </div>
                    `;
                    // Attempt to reload after 4 seconds to give the service time to restart
                    setTimeout(() => window.location.reload(), 4000);
                } else {
                    alert('Fehler: Neustart konnte nicht angefordert werden.');
                }
            } catch (e) {
                // If the fetch fails immediately, it might be that the server died instantly.
                // We'll still show the reloading screen.
                document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:var(--text-secondary);">Verbindung getrennt. Warte auf Neustart...</div>';
                setTimeout(() => window.location.reload(), 4000);
            }
        }
