<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="login.page_title">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGo – Login</title>
    <script src="/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="/fonts/fonts.css" rel="stylesheet">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css">
    <link rel="stylesheet" href="/shared-animations.css">
    <script src="/shared.js?v=7"></script>
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        const TOTP_ENABLED = {{if .TOTPEnabled}}true{{else}}false{{end}};
        const REDIRECT_URL = "{{.Redirect}}";
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
        /* ── i18n ── */
        const I18N = {{.I18N}};
    </script>
    <link rel="stylesheet" href="/css/tokens.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/enhancements.css">
</head>

<body>
    <!-- Epic Background -->
    <canvas id="bg-canvas" class="is-hidden"></canvas>
    
    <!-- CSS Fallback (shown by default, hidden when WebGL starts successfully) -->
    <div id="css-bg" class="css-fallback-bg">
        <div class="particle-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Vignette Overlay -->
    <div class="vignette"></div>

    <!-- Scan Line Effect -->
    <div class="scan-line"></div>

    <!-- Theme toggle -->
    <button id="theme-toggle" type="button" class="btn-theme corner-theme" data-i18n-title="common.toggle_theme"></button>

    <!-- Login Card -->
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">✦</div>
            <div class="login-title">AURAGO</div>
            <div class="login-subtitle" id="loginSubtitle"></div>
        </div>

        <!-- Password -->
        <div class="login-field">
            <label class="login-label" for="password" id="lblPassword"></label>
            <div class="login-input-wrap">
                <input class="login-input" type="password" id="password"
                    placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') submitLogin()">
                <button type="button" class="eye-btn" onclick="toggleEye(this, 'password')" id="eyeBtn">👁</button>
            </div>
        </div>

        <!-- TOTP Code (shown only when TOTP is enabled) -->
        <div id="totpSection" class="is-hidden">
            <div class="totp-divider" id="totpDivider"></div>
            <div class="login-field">
                <label class="login-label" for="totpCode" id="lblTotp"></label>
                <input class="login-input" type="number" id="totpCode"
                    placeholder="000000" maxlength="6" autocomplete="one-time-code"
                    onkeydown="if(event.key==='Enter') submitLogin()">
            </div>
        </div>

        <!-- Submit Button -->
        <button class="btn-login" id="btnLogin" onclick="submitLogin()">
            <span id="btnText"></span>
        </button>

        <!-- Error -->
        <div class="login-error" id="loginError"></div>
    </div>

    <!-- Three.js for WebGL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onerror="window._threeLoadFailed=true"></script>
    <script src="/js/login/main.js"></script>
</body>

</html>
