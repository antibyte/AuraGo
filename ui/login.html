<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGo – Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        const TOTP_ENABLED = {{if .TOTPEnabled}}true{{else}}false{{end}};
        const REDIRECT_URL = "{{.Redirect}}";
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            background: var(--bg-primary);
            position: relative;
            overflow: hidden;
        }

        /* ═══════════════════════════════════════════════════════════════
           EPIC BACKGROUND ANIMATION - WebGL + CSS Fallback
           ═══════════════════════════════════════════════════════════════ */
        
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* CSS Fallback Animation - Activated when WebGL not available */
        .css-fallback-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: 
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(45, 212, 191, 0.08), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(13, 148, 136, 0.05), transparent),
                radial-gradient(ellipse 50% 30% at 20% 100%, rgba(45, 212, 191, 0.04), transparent);
        }

        .css-fallback-bg::before {
            content: '';
            position: absolute;
            inset: -50%;
            background: 
                radial-gradient(circle at 30% 30%, rgba(45, 212, 191, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(13, 148, 136, 0.1) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(45, 212, 191, 0.05) 0%, transparent 50%);
            animation: aurora-move 20s ease-in-out infinite;
        }

        .css-fallback-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.02;
            mix-blend-mode: overlay;
        }

        @keyframes aurora-move {
            0%, 100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
            25% {
                transform: translate(5%, 5%) rotate(2deg) scale(1.05);
            }
            50% {
                transform: translate(-3%, 8%) rotate(-1deg) scale(0.95);
            }
            75% {
                transform: translate(-5%, -3%) rotate(1deg) scale(1.02);
            }
        }

        /* Floating Orbs for CSS Fallback */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: orb-float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.4) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(13, 148, 136, 0.3) 0%, transparent 70%);
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(45, 212, 191, 0.25) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            animation-delay: -10s;
        }

        @keyframes orb-float {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(30px, -30px) scale(1.1);
            }
            66% {
                transform: translate(-20px, 20px) scale(0.9);
            }
        }

        /* Particle Network Grid */
        .particle-grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(45, 212, 191, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(45, 212, 191, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-pulse 4s ease-in-out infinite;
        }

        @keyframes grid-pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        /* Vignette Overlay */
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, var(--bg-primary) 100%);
            opacity: 0.8;
        }

        /* Login Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(45, 212, 191, 0.15);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            box-shadow: 
                0 24px 64px rgba(0, 0, 0, 0.4),
                0 0 0 1px rgba(45, 212, 191, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from { 
                opacity: 0; 
                transform: translateY(20px) scale(0.98);
                filter: blur(10px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* Glow effect behind card */
        .login-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 25px;
            background: linear-gradient(135deg, rgba(45, 212, 191, 0.2), transparent 40%, transparent 60%, rgba(13, 148, 136, 0.1));
            z-index: -1;
            opacity: 0;
            animation: glow-in 1s ease 0.5s forwards;
        }

        @keyframes glow-in {
            to { opacity: 1; }
        }

        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
            gap: 0.75rem;
        }

        .login-logo-icon {
            width: 64px;
            height: 64px;
            border-radius: 20px;
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            display: grid;
            place-items: center;
            font-size: 1.8rem;
            box-shadow: 
                0 0 40px rgba(45, 212, 191, 0.4),
                0 0 80px rgba(45, 212, 191, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            animation: logo-pulse 3s ease-in-out infinite;
        }

        @keyframes logo-pulse {
            0%, 100% { 
                box-shadow: 
                    0 0 40px rgba(45, 212, 191, 0.4),
                    0 0 80px rgba(45, 212, 191, 0.2);
            }
            50% { 
                box-shadow: 
                    0 0 50px rgba(45, 212, 191, 0.6),
                    0 0 100px rgba(45, 212, 191, 0.3);
            }
        }

        .login-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, #f1f5f9, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-subtitle {
            font-size: var(--text-xs);
            color: var(--text-secondary);
            margin-top: -0.5rem;
        }

        /* Form fields */
        .login-field {
            margin-bottom: 1rem;
        }

        .login-label {
            display: block;
            font-size: var(--text-xs);
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.4rem;
        }

        .login-input-wrap {
            position: relative;
        }

        .login-input {
            width: 100%;
            padding: 0.7rem 1rem;
            font-size: var(--text-base);
            font-family: inherit;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.2s;
        }

        .login-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15), 0 0 20px rgba(45, 212, 191, 0.1);
        }

        .login-input.error-field {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        .login-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.45;
        }

        .eye-btn {
            position: absolute;
            right: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.2rem;
            line-height: 1;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .eye-btn:hover { opacity: 1; }

        /* TOTP divider */
        .totp-divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0 1rem;
            color: var(--text-secondary);
            font-size: var(--text-xs);
        }

        .totp-divider::before,
        .totp-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.3), transparent);
        }

        /* Login button */
        .btn-login {
            width: 100%;
            padding: 0.75rem;
            font-size: var(--text-base);
            font-weight: 600;
            font-family: inherit;
            background: linear-gradient(135deg, #2dd4bf, #0d9488);
            color: #fff;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
            box-shadow: 
                0 4px 16px rgba(45, 212, 191, 0.3),
                0 0 0 1px rgba(45, 212, 191, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 8px 24px rgba(45, 212, 191, 0.4),
                0 0 0 1px rgba(45, 212, 191, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .btn-login:hover::before {
            transform: translateX(100%);
        }

        .btn-login:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Error message */
        .login-error {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.25);
            border-radius: 10px;
            padding: 0.65rem 0.9rem;
            font-size: var(--text-sm);
            color: #fca5a5;
            margin-top: 1rem;
            text-align: center;
            animation: fadeIn 0.25s ease;
        }

        .login-error.visible { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Spinner */
        .spinner-sm {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Theme toggle in corner */
        .corner-theme {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 100;
        }

        /* TOTP code input */
        #totpCode {
            font-family: var(--font-mono, 'SF Mono', 'Fira Code', monospace);
            letter-spacing: 0.3em;
            text-align: center;
            font-size: 1.2rem;
        }

        input[type=number]::-webkit-outer-spin-button,
        input[type=number]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        /* Scan line effect */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.3), transparent);
            animation: scan 8s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }
    </style>
</head>

<body>
    <!-- Epic Background -->
    <canvas id="bg-canvas" style="display:none"></canvas>
    
    <!-- CSS Fallback (shown by default, hidden when WebGL starts successfully) -->
    <div id="css-bg" class="css-fallback-bg">
        <div class="particle-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <!-- Vignette Overlay -->
    <div class="vignette"></div>

    <!-- Scan Line Effect -->
    <div class="scan-line"></div>

    <!-- Theme toggle -->
    <button id="theme-toggle" class="btn-theme corner-theme" title="Toggle theme"></button>

    <!-- Login Card -->
    <div class="login-card">
        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-icon">✦</div>
            <div class="login-title">AURAGO</div>
            <div class="login-subtitle">Bitte anmelden um fortzufahren</div>
        </div>

        <!-- Password -->
        <div class="login-field">
            <label class="login-label" for="password">Passwort</label>
            <div class="login-input-wrap">
                <input class="login-input" type="password" id="password"
                    placeholder="••••••••" autocomplete="current-password"
                    onkeydown="if(event.key==='Enter') submitLogin()">
                <button type="button" class="eye-btn" onclick="toggleEye(this, 'password')" title="Passwort anzeigen">👁</button>
            </div>
        </div>

        <!-- TOTP Code (shown only when TOTP is enabled) -->
        <div id="totpSection" style="display:none;">
            <div class="totp-divider">Authenticator-Code</div>
            <div class="login-field">
                <label class="login-label" for="totpCode">6-stelliger Code</label>
                <input class="login-input" type="number" id="totpCode"
                    placeholder="000000" maxlength="6" autocomplete="one-time-code"
                    onkeydown="if(event.key==='Enter') submitLogin()">
            </div>
        </div>

        <!-- Submit Button -->
        <button class="btn-login" id="btnLogin" onclick="submitLogin()">
            <span id="btnText">Anmelden →</span>
        </button>

        <!-- Error -->
        <div class="login-error" id="loginError"></div>
    </div>

    <!-- Three.js for WebGL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" onerror="window._threeLoadFailed=true"></script>
    <script>
        // ═══════════════════════════════════════════════════════════════
        // EPIC WEBGL BACKGROUND - Neural Network Particle System
        // ═══════════════════════════════════════════════════════════════
        
        const canvas = document.getElementById('bg-canvas');
        const cssFallback = document.getElementById('css-bg');
        
        let scene, camera, renderer, particles, lines;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        function showCSSFallback() {
            canvas.style.display = 'none';
            cssFallback.style.display = 'block';
        }

        function showWebGL() {
            canvas.style.display = 'block';
            cssFallback.style.display = 'none';
        }
        
        // Check WebGL support
        function webglAvailable() {
            try {
                const testCanvas = document.createElement('canvas');
                return !!(window.WebGLRenderingContext && 
                    (testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl')));
            } catch(e) {
                return false;
            }
        }
        
        // Initialize after Three.js is loaded
        function initBackground() {
            if (webglAvailable() && typeof THREE !== 'undefined' && !window._threeLoadFailed) {
                try {
                    initWebGL();
                } catch(e) {
                    console.warn('[AuraGo] WebGL init failed, using CSS fallback:', e);
                    showCSSFallback();
                }
            } else {
                // Show CSS fallback (Three.js unavailable or WebGL not supported)
                showCSSFallback();
            }
        }
        
        // Wait for Three.js to load
        if (document.readyState === 'complete') {
            initBackground();
        } else {
            window.addEventListener('load', initBackground);
        }
        
        function initWebGL() {
            // Scene setup
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0b0f1a, 0.001);
            
            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 50;
            
            // Renderer
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                alpha: true, 
                antialias: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x0b0f1a, 1);
            
            // Create particle system
            createParticles();
            createConnections();
            createFloatingOrbs();

            // WebGL ready — show canvas, hide CSS fallback
            showWebGL();
            
            // Mouse tracking
            document.addEventListener('mousemove', onMouseMove, false);
            window.addEventListener('resize', onWindowResize, false);
            
            // Start animation
            animate();
        }
        
        function createParticles() {
            const particleCount = 150;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const sizes = new Float32Array(particleCount);
            
            const color1 = new THREE.Color(0x2dd4bf); // Teal
            const color2 = new THREE.Color(0x0d9488); // Darker teal
            
            for (let i = 0; i < particleCount; i++) {
                // Position
                positions[i * 3] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 100;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 50;
                
                // Color gradient
                const mixRatio = Math.random();
                const color = color1.clone().lerp(color2, mixRatio);
                colors[i * 3] = color.r;
                colors[i * 3 + 1] = color.g;
                colors[i * 3 + 2] = color.b;
                
                // Size
                sizes[i] = Math.random() * 2 + 0.5;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
            
            // Custom shader material for glowing particles
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    uniform float time;
                    
                    void main() {
                        vColor = color;
                        vec3 pos = position;
                        
                        // Gentle floating animation
                        pos.y += sin(time * 0.5 + position.x * 0.1) * 2.0;
                        pos.x += cos(time * 0.3 + position.y * 0.1) * 1.0;
                        
                        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                        gl_PointSize = size * (300.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    
                    void main() {
                        // Create circular glow
                        vec2 center = gl_PointCoord - vec2(0.5);
                        float dist = length(center);
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        
                        // Core brightness
                        float core = 1.0 - smoothstep(0.0, 0.2, dist);
                        
                        gl_FragColor = vec4(vColor * (0.8 + core * 0.4), alpha * 0.8);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }
        
        function createConnections() {
            // Create lines between nearby particles
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0x2dd4bf,
                transparent: true,
                opacity: 0.15,
                blending: THREE.AdditiveBlending
            });
            
            const lineGeometry = new THREE.BufferGeometry();
            const linePositions = new Float32Array(150 * 150 * 6); // Max possible lines
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            lineGeometry.setDrawRange(0, 0);
            
            lines = new THREE.LineSegments(lineGeometry, lineMaterial);
            lines.userData = { positions: linePositions };
            scene.add(lines);
        }
        
        function createFloatingOrbs() {
            // Large glowing orbs in background
            const orbGeometry = new THREE.SphereGeometry(1, 32, 32);
            
            const orbPositions = [
                { x: -30, y: 20, z: -20, scale: 8, color: 0x2dd4bf },
                { x: 35, y: -15, z: -30, scale: 6, color: 0x0d9488 },
                { x: 0, y: -25, z: -10, scale: 10, color: 0x115e59 }
            ];
            
            orbPositions.forEach((orb, i) => {
                const material = new THREE.MeshBasicMaterial({
                    color: orb.color,
                    transparent: true,
                    opacity: 0.08,
                    blending: THREE.AdditiveBlending
                });
                
                const mesh = new THREE.Mesh(orbGeometry, material);
                mesh.position.set(orb.x, orb.y, orb.z);
                mesh.scale.setScalar(orb.scale);
                mesh.userData = { 
                    originalPos: { ...orb },
                    phase: i * Math.PI / 3 
                };
                
                scene.add(mesh);
                
                // Add glow halo
                const haloMaterial = new THREE.MeshBasicMaterial({
                    color: orb.color,
                    transparent: true,
                    opacity: 0.03,
                    blending: THREE.AdditiveBlending
                });
                const halo = new THREE.Mesh(orbGeometry, haloMaterial);
                halo.position.copy(mesh.position);
                halo.scale.setScalar(orb.scale * 1.5);
                halo.userData = mesh.userData;
                scene.add(halo);
            });
        }
        
        function updateConnections() {
            const positions = particles.geometry.attributes.position.array;
            const linePositions = lines.userData.positions;
            let lineIndex = 0;
            const maxDistance = 20;
            
            for (let i = 0; i < 150; i++) {
                let connections = 0;
                for (let j = i + 1; j < 150 && connections < 3; j++) {
                    const dx = positions[i * 3] - positions[j * 3];
                    const dy = positions[i * 3 + 1] - positions[j * 3 + 1];
                    const dz = positions[i * 3 + 2] - positions[j * 3 + 2];
                    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
                    
                    if (dist < maxDistance) {
                        const alpha = 1 - (dist / maxDistance);
                        
                        linePositions[lineIndex++] = positions[i * 3];
                        linePositions[lineIndex++] = positions[i * 3 + 1];
                        linePositions[lineIndex++] = positions[i * 3 + 2];
                        linePositions[lineIndex++] = positions[j * 3];
                        linePositions[lineIndex++] = positions[j * 3 + 1];
                        linePositions[lineIndex++] = positions[j * 3 + 2];
                        
                        connections++;
                    }
                }
            }
            
            lines.geometry.attributes.position.needsUpdate = true;
            lines.geometry.setDrawRange(0, lineIndex / 3);
        }
        
        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            if (particles) {
                // Update shader time
                particles.material.uniforms.time.value = time;
                
                // Rotate entire system slowly
                particles.rotation.y = time * 0.05;
                particles.rotation.x = Math.sin(time * 0.02) * 0.1;
                
                // Update positions for connection lines
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < 150; i++) {
                    const ix = i * 3;
                    const iy = i * 3 + 1;
                    const iz = i * 3 + 2;
                    
                    // Add subtle movement
                    positions[iy] += Math.sin(time + positions[ix] * 0.1) * 0.02;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                
                // Update connections
                updateConnections();
                lines.rotation.y = time * 0.05;
                lines.rotation.x = Math.sin(time * 0.02) * 0.1;
            }
            
            // Animate orbs
            scene.children.forEach(child => {
                if (child.userData && child.userData.originalPos) {
                    const { originalPos, phase } = child.userData;
                    child.position.x = originalPos.x + Math.sin(time * 0.5 + phase) * 5;
                    child.position.y = originalPos.y + Math.cos(time * 0.3 + phase) * 3;
                }
            });
            
            // Camera follows mouse subtly
            camera.position.x += (mouseX * 2 - camera.position.x) * 0.02;
            camera.position.y += (mouseY * 2 - camera.position.y) * 0.02;
            camera.lookAt(scene.position);
            
            renderer.render(scene, camera);
        }
        
        // ═══════════════════════════════════════════════════════════════
        // LOGIN FUNCTIONALITY
        // ═══════════════════════════════════════════════════════════════
        
        if (TOTP_ENABLED) {
            document.getElementById('totpSection').style.display = '';
        }
        
        window.addEventListener('load', () => {
            document.getElementById('password').focus();
        });
        
        function toggleEye(btn, inputId) {
            const inp = document.getElementById(inputId);
            if (inp.type === 'password') {
                inp.type = 'text';
                btn.textContent = '🙈';
            } else {
                inp.type = 'password';
                btn.textContent = '👁';
            }
        }
        
        function toggleTheme() {
            const html = document.documentElement;
            const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('aurago-theme', next);
            
            // Update WebGL clear color for theme
            if (renderer) {
                renderer.setClearColor(next === 'dark' ? 0x0b0f1a : 0xf8fafc, 1);
                if (particles) {
                    const colors = particles.geometry.attributes.color.array;
                    const color1 = new THREE.Color(next === 'dark' ? 0x2dd4bf : 0x0f766e);
                    const color2 = new THREE.Color(next === 'dark' ? 0x0d9488 : 0x0d9488);
                    
                    for (let i = 0; i < 150; i++) {
                        const mixRatio = Math.random();
                        const color = color1.clone().lerp(color2, mixRatio);
                        colors[i * 3] = color.r;
                        colors[i * 3 + 1] = color.g;
                        colors[i * 3 + 2] = color.b;
                    }
                    particles.geometry.attributes.color.needsUpdate = true;
                }
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('loginError');
            el.textContent = msg;
            el.classList.add('visible');
        }
        
        function clearError() {
            document.getElementById('loginError').classList.remove('visible');
            document.getElementById('password').classList.remove('error-field');
            document.getElementById('totpCode').classList.remove('error-field');
        }
        
        async function submitLogin() {
            clearError();
            const password = document.getElementById('password').value;
            const totpCode = document.getElementById('totpCode').value;
            
            if (!password) {
                document.getElementById('password').classList.add('error-field');
                document.getElementById('password').focus();
                return;
            }
            
            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            document.getElementById('btnText').innerHTML = '<div class="spinner-sm"></div>';
            
            try {
                const redirect = REDIRECT_URL || '/';
                const resp = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password, totp_code: totpCode, redirect }),
                });
                
                const data = await resp.json();
                
                if (resp.ok && data.ok) {
                    window.location.href = data.redirect || '/';
                } else {
                    showError(data.error || 'Anmeldung fehlgeschlagen.');
                    document.getElementById('password').classList.add('error-field');
                    if (TOTP_ENABLED && data.error && data.error.toLowerCase().includes('authenticator')) {
                        document.getElementById('totpCode').classList.add('error-field');
                        document.getElementById('totpCode').focus();
                    } else {
                        document.getElementById('password').focus();
                    }
                }
            } catch (err) {
                showError('Netzwerkfehler. Bitte erneut versuchen.');
            } finally {
                btn.disabled = false;
                document.getElementById('btnText').textContent = 'Anmelden →';
            }
        }
    </script>
