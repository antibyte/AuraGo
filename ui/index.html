<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark" data-i18n-page-title="chat.page_title">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="AuraGo" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title></title>
    <meta name="description" content="AI-powered chat interface for your home lab">
    <meta property="og:title" content="AuraGo Chat">
    <meta property="og:description" content="AI-powered chat interface for your home lab">
    <meta property="og:image" content="/aurago_logo_dark.png">
    <meta property="og:type" content="website">
    <script src="/js/shared/prepaint-theme.js?v={{.BuildVersion}}"></script>
    <script type="application/json" id="aurago-template-data">{{.TemplateDataJSON}}</script>
    <script src="/js/shared/template-data.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/register-sw.js?v={{.BuildVersion}}" data-sw-url="/sw.js?v={{.BuildVersion}}"></script>
    <link href="/fonts/fonts.css?v=20260502a" rel="stylesheet">
    <link rel="stylesheet" href="/css/tailwind-compat.css">
    <link rel="stylesheet" href="/shared-variables.css">
    <link rel="stylesheet" href="/shared-utilities.css">
    <link rel="stylesheet" href="/shared-components.css?v=20260502b">
    <link rel="stylesheet" href="/shared-animations.css">
    <script src="/js/shared/shared-core.js?v={{.BuildVersion}}"></script>
    <script src="/js/shared/shared-chat.js?v={{.BuildVersion}}"></script>
    <link id="hljs-theme" rel="stylesheet" href="/css/hljs-github-dark.min.css">
    <link rel="stylesheet" href="/css/chat.bundle.css?v={{.BuildVersion}}">
    <link rel="stylesheet" href="/css/realtime-speech.css?v={{.BuildVersion}}">
</head>

<body class="h-screen h-[100dvh] flex flex-col">
    <a href="#chat-box" class="skip-link" data-i18n="common.skip_to_content"></a>

    <header class="app-header">
        <a href="/" class="logo">
            <div class="logo-icon"><span class="chat-ui-icon is-large" data-chat-icon="robot"></span></div>
            <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
        </a>
        <div class="header-actions">

            <!-- Speaker toggle for TTS auto-play -->
            <button id="speaker-toggle" type="button" class="btn-speaker" data-i18n-aria-label="chat.aria_toggle_speaker">
                <span class="chat-ui-icon" data-chat-icon="speaker-muted"></span>
            </button>
            <!-- Chat theme picker -->
            <div id="chat-theme-picker" class="chat-theme-picker">
                <button id="chat-theme-btn" type="button" class="chat-theme-btn" data-i18n-aria-label="chat.aria_chat_theme" aria-haspopup="listbox" aria-expanded="false">
                    <span class="chat-theme-icon" id="chat-theme-icon" data-chat-icon="theme-dark"></span>
                </button>
                <div id="chat-theme-dropdown" class="chat-theme-dropdown" role="listbox" hidden>
                    <button type="button" class="chat-theme-option" data-theme="dark" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-dark"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_standard"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="light" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-light"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_light"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="retro-crt" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-retro-crt"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_retro_crt"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="8bit" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-8bit"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_8bit"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="cyberwar" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-cyberwar"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_cyberwar"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="lollipop" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-lollipop"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_lollipop"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="dark-sun" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-dark-sun"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_dark_sun"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="ocean" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-ocean"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_ocean"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="sandstorm" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-sandstorm"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_sandstorm"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="papyrus" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-papyrus"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_papyrus"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="threedee" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-threedee"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_threedee"></span>
                    </button>
                    <button type="button" class="chat-theme-option" data-theme="black-matrix" role="option">
                        <span class="chat-theme-option-icon" data-chat-icon="theme-black-matrix"></span>
                        <span class="chat-theme-option-label" data-i18n="chat.theme_black_matrix"></span>
                    </button>
                </div>
            </div>
            <!-- Always visible on all screens -->
            <span id="tokenCounter" class="pill pill-tokens"></span>

            <span id="budgetPill" class="pill pill-budget">$0.00</span>
            <span id="creditsPill" class="pill pill-budget is-hidden credits-pill-action"><span class="chat-ui-icon" data-chat-icon="credit-card"></span> $0.00</span>
            <button type="button" id="personality-mobile-btn" class="personality-mobile-btn" title="Personality" aria-label="Select personality">
                <span class="chat-ui-icon" data-chat-icon="bot"></span>
            </button>
            <div class="personality-select-wrapper">
                <button type="button" id="personality-select" class="select-personality" data-i18n-title="chat.personality_select_title" aria-haspopup="listbox" aria-expanded="false">
                    <img class="personality-current-icon" id="personality-current-icon" src="/img/persona-icons/custom.png" alt="" width="32" height="32" decoding="async">
                    <span class="personality-select-label" id="personality-label">Persona</span>
                    <span class="personality-chevron chat-ui-icon" data-chat-icon="chevron-down"></span>
                </button>
                <div class="personality-dropdown" id="personality-dropdown" role="listbox" hidden></div>
                <div class="personality-preview-panel" id="personality-preview" hidden aria-hidden="true">
                    <div class="personality-preview-image-frame">
                        <img class="personality-preview-image" id="personality-preview-image" alt="" width="256" height="256" decoding="async">
                    </div>
                    <div class="personality-description-card" id="personality-preview-description"></div>
                </div>
            </div>
            <div class="mood-widget" id="moodWidget">
                <button class="mood-toggle" id="moodToggle" data-i18n-aria-label="chat.aria_mood_settings" aria-expanded="false" aria-haspopup="true">
                    <span class="mood-emoji" id="moodEmoji" data-chat-icon="mood-brain"></span>
                    <span id="moodText"></span>
                    <span class="mood-chevron chat-ui-icon" data-chat-icon="chevron-down"></span>
                </button>
                <div class="mood-panel" id="moodPanel">
                    <div class="mood-panel-header">
                        <span class="mood-emoji-lg" id="moodPanelEmoji" data-chat-icon="mood-brain"></span>
                        <span class="mood-label" id="moodPanelLabel"></span>
                    </div>
                    <div class="mood-emotion is-hidden" id="moodEmotion"></div>
                    <div id="moodTraits"></div>
                </div>
            </div>
            <span id="debug-pill" class="pill pill-debug"></span>
            <button id="warnings-btn" type="button" class="btn-warnings" data-i18n-aria-label="chat.aria_system_warnings">
                <span class="warnings-icon chat-ui-icon" data-chat-icon="warning"></span>
                <span id="warnings-badge" class="warnings-badge is-hidden">0</span>
            </button>
            <span id="connectionPill" class="pill pill-active"></span>
            <a id="logout-btn" href="/auth/logout" class="btn-header btn-header-link is-hidden"
                data-logout-action="true"
                data-i18n-aria-label="chat.aria_logout"></a>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <!-- ── Session Drawer (left edge tab) ── -->
    <button id="session-toggle-btn" type="button" class="session-edge-tab"
        data-i18n-aria-label="chat.aria_conversations"
        aria-controls="session-drawer"
        aria-expanded="false">
        <span class="chat-ui-icon" data-chat-icon="conversation"></span>
    </button>
    <div id="session-backdrop" class="session-backdrop"></div>
    <aside id="session-drawer" class="session-drawer">
        <div class="session-drawer-header">
            <span class="session-drawer-title" data-i18n="chat.sessions_title"></span>
            <button type="button" id="session-drawer-close" class="session-drawer-close" data-i18n-aria-label="common.close">
                <span class="chat-ui-icon" data-chat-icon="close"></span>
            </button>
        </div>
        <button type="button" id="session-new-btn" class="session-new-btn">
            <span class="session-new-icon chat-ui-icon" data-chat-icon="new-chat"></span>
            <span data-i18n="chat.sessions_new"></span>
        </button>
        <div id="session-list" class="session-list">
            <div class="session-empty" data-i18n="chat.sessions_empty"></div>
        </div>
    </aside>

    <!-- ── Integrations Drawer (right side webhosts) ── -->
    <button id="integrations-toggle-btn" type="button" class="integrations-edge-tab"
        data-i18n-aria-label="chat.aria_integrations"
        aria-controls="integrations-drawer"
        aria-expanded="false">
        <span class="chat-ui-icon" data-chat-icon="web"></span>
    </button>
    <div id="integrations-backdrop" class="integrations-backdrop"></div>
    <aside id="integrations-drawer" class="integrations-drawer">
        <div class="integrations-drawer-header">
            <button type="button" id="integrations-drawer-close" class="integrations-drawer-close" data-i18n-aria-label="common.close">
                <span class="chat-ui-icon" data-chat-icon="close"></span>
            </button>
            <span class="integrations-drawer-title" data-i18n="chat.integrations_title"></span>
        </div>
        <div id="integrations-list" class="integrations-list">
            <div class="integrations-empty" data-i18n="chat.integrations_loading"></div>
        </div>
    </aside>

    <main id="chat-box" tabindex="-1">
        <div id="chat-content">
            <div class="greeting-row" data-greeting>
                <div class="greeting-icon greeting-icon-robot" aria-hidden="true"></div>
                <div class="greeting-text"></div>
            </div>
        </div>
        <div id="chat-robot-mascot" class="chat-robot-mascot" aria-hidden="true">
            <div class="chat-robot-effects" id="chat-robot-effects"></div>
            <div id="chat-robot-sprite" class="chat-robot-sprite"></div>
        </div>
        <div id="tool-icon-stack" class="tool-icon-stack" aria-hidden="true"></div>
    </main>

    <div id="agentStatusContainer" class="is-hidden">
        <div class="status-pill">
            <div class="pulsing-dot"></div>
            <span id="agentStatusIcon" class="status-tool-icon tool-icon-sprite is-hidden" aria-hidden="true"></span>
            <span id="agentStatusText"></span>
        </div>
    </div>

    <footer class="app-footer">
        <form id="chat-form" class="input-row">
            <input type="file" id="file-input" class="is-hidden" multiple>
            <button type="button" id="voice-btn" class="btn-voice btn-composer-primary" data-i18n-aria-label="chat.aria_voice_input">
                <span class="chat-ui-icon" data-chat-icon="voice"></span>
            </button>
            <button type="button" id="realtime-speech-btn" class="btn-voice btn-composer-primary realtime-speech-launcher"
                data-realtime-speech-launcher data-i18n-aria-label="chat.realtime_open"
                aria-controls="realtime-speech-overlay" aria-expanded="false" aria-pressed="false">
                <span class="realtime-speech-launcher-wave" aria-hidden="true"><i></i><i></i><i></i></span>
            </button>
            <div id="composer-panel" class="composer-panel is-hidden">
                <button type="button" id="clear-btn" class="composer-tool-btn" data-i18n-aria-label="chat.aria_clear">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="clear"></span>
                    <span class="tool-label"></span>
                </button>
                <button type="button" id="upload-btn" class="composer-tool-btn" data-i18n-aria-label="chat.aria_upload">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="attach"></span>
                    <span class="tool-label"></span>
                </button>
                <button type="button" id="cheatsheet-picker-btn" class="composer-tool-btn" data-i18n-aria-label="chat.aria_cheatsheet">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="clipboard"></span>
                    <span class="tool-label"></span>
                </button>
                <button type="button" id="push-btn" class="composer-tool-btn" data-i18n-aria-label="chat.aria_notifications">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="bell"></span>
                    <span class="tool-label"></span>
                </button>
                {{if .PersonalityEnabled}}
                <button type="button" id="feedback-toggle-btn" class="composer-tool-btn" data-i18n-aria-label="chat.aria_feedback">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="feedback"></span>
                    <span class="tool-label"></span>
                </button>
                {{end}}
                <button type="button" id="stop-btn" class="composer-tool-btn composer-tool-btn-danger" disabled data-i18n-aria-label="chat.aria_stop">
                    <span class="tool-icon chat-ui-icon" data-chat-icon="stop"></span>
                    <span class="tool-label"></span>
                </button>
            </div>
            <div class="input-wrap">
                <textarea id="user-input" name="aura-chat-input" autocomplete="off" spellcheck="true" rows="1"
                    placeholder=""></textarea>
            </div>
            <button type="submit" id="send-btn" class="btn-send btn-composer-primary" data-i18n-aria-label="chat.aria_send">
                <span class="chat-ui-icon" data-chat-icon="send"></span>
            </button>
            <button type="button" id="composer-more-btn" class="btn-more btn-composer-primary" data-i18n-aria-label="chat.aria_more_options" aria-expanded="false" aria-controls="composer-panel">
                <span class="chat-ui-icon" data-chat-icon="more"></span>
            </button>
        </form>
        {{if .PersonalityEnabled}}
        <div id="mood-feedback-row" class="mood-feedback-row is-hidden">
            <button type="button" class="mood-btn mood-positive" data-feedback="positive"
                ><span class="chat-ui-icon" data-chat-icon="positive"></span></button>
            <button type="button" class="mood-btn mood-negative" data-feedback="negative"
                ><span class="chat-ui-icon" data-chat-icon="negative"></span></button>
            <button type="button" class="mood-btn mood-angry" data-feedback="angry"><span class="chat-ui-icon" data-chat-icon="angry"></span></button>
            <button type="button" class="mood-btn mood-laughing" data-feedback="laughing"><span class="chat-ui-icon" data-chat-icon="laughing"></span></button>
            <button type="button" class="mood-btn mood-crying" data-feedback="crying"><span class="chat-ui-icon" data-chat-icon="crying"></span></button>
            <button type="button" class="mood-btn mood-amazed" data-feedback="amazed"><span class="chat-ui-icon" data-chat-icon="amazed"></span></button>
        </div>
        {{end}}
        <div id="attachment-chip" class="attachment-chip is-hidden">
            <span class="chat-ui-icon" data-chat-icon="attach"></span><span id="attachment-name" class="attachment-chip-name"></span>
            <button type="button" id="attachment-clear" class="chip-clear"><span class="chat-ui-icon" data-chat-icon="close"></span></button>
        </div>
        <div id="attachments-panel" class="attachments-panel is-hidden"></div>
    </footer>

    <!-- ── Cheatsheet Picker Modal ── -->
    <div id="cheatsheet-picker-overlay" class="modal-overlay">
        <div class="modal-card cheatsheet-picker-card">
            <div class="modal-title cheatsheet-picker-title">
                <span><span class="chat-ui-icon" data-chat-icon="clipboard"></span> <span data-i18n="chat.cheatsheet_picker_title"></span></span>
                <button id="cheatsheet-picker-close-x" class="btn-small" data-i18n-aria-label="chat.close"><span class="chat-ui-icon" data-chat-icon="close"></span></button>
            </div>
            <div id="cheatsheet-picker-list" class="cheatsheet-picker-list">
                <div class="cheatsheet-picker-empty" data-i18n="chat.cheatsheet_picker_loading"></div>
            </div>
            <div class="modal-actions">
                <button id="cheatsheet-picker-send" class="modal-btn confirm" disabled data-i18n="chat.cheatsheet_picker_send"></button>
                <button id="cheatsheet-picker-cancel" class="modal-btn cancel" data-i18n="chat.close"></button>
            </div>
        </div>
    </div>

    <!-- ── Warnings Modal ── -->
    <div id="warnings-overlay" class="modal-overlay">
        <div class="modal-card warnings-modal-card">
            <div class="modal-title warnings-modal-title">
                <span><span class="chat-ui-icon" data-chat-icon="warning"></span> <span data-i18n="chat.warnings_title"></span></span>
                <button id="warnings-ack-all" class="btn-small" data-i18n="chat.warnings_ack_all"></button>
            </div>
            <div id="warnings-list" class="warnings-list">
                <div class="warnings-empty" data-i18n="chat.warnings_empty"></div>
            </div>
            <div class="modal-actions">
                <button id="warnings-close" class="modal-btn confirm" data-i18n="chat.close"></button>
            </div>
        </div>
    </div>

    <!-- ── Custom Modal ── -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-message" class="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="modal-btn cancel"></button>
                <button id="modal-confirm" class="modal-btn confirm"></button>
            </div>
        </div>
    </div>

    <div id="realtime-speech-overlay" class="realtime-speech-webchat-overlay" aria-hidden="true">
        <div class="realtime-speech-webchat-dialog" role="dialog" aria-modal="true" aria-labelledby="realtime-speech-webchat-title">
            <div class="realtime-speech-webchat-titlebar">
                <strong id="realtime-speech-webchat-title" data-i18n="chat.realtime_title"></strong>
                <button type="button" id="realtime-speech-overlay-close" data-i18n-aria-label="common.close">×</button>
            </div>
            <div id="realtime-speech-webchat-panel"></div>
        </div>
    </div>

    <script src="/js/chat/bundles/chat-vendor.bundle.js?v={{.BuildVersion}}"></script>
    <script src="/js/chat/bundles/chat-runtime.bundle.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/vendor/ort.wasm.min.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/silero-vad.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/audio-engine.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/provider-common.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/provider-openai.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/provider-xai.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/provider-gemini.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/core.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/panel.js?v={{.BuildVersion}}"></script>
    <script src="/js/realtime-speech/webchat.js?v={{.BuildVersion}}"></script>

    <!-- Image Lightbox Overlay -->
    <div id="img-lightbox">
        <button id="img-lightbox-close"><span class="chat-ui-icon" data-chat-icon="close"></span></button>
        <img id="img-lightbox-img" src="" alt="">
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- SVG Filters for Ocean Refraction -->
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <defs>
            <filter id="ocean-refraction">
                <feTurbulence id="ocean-refraction-turbulence" type="fractalNoise" baseFrequency="0.006 0.009" numOctaves="3" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
</body>

</html>
