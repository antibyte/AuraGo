<!DOCTYPE html>
<html lang="{{.Lang}}" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <title>AuraGo Interface</title>
    <script src="/tailwind.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'aura': {
                            'accent': 'var(--accent)',
                            'bg': 'var(--bg-primary)',
                            'surface': 'var(--bg-secondary)',
                            'text': 'var(--text-primary)',
                            'muted': 'var(--text-secondary)',
                        }
                    },
                    fontFamily: {
                        'sans': ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                        'mono': ['SF Mono', 'Fira Code', 'Cascadia Code', 'monospace'],
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@14.0.0/dist/markdown-it.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared.css">
    <script src="/shared.js"></script>
    <script>
        const SYSTEM_LANG = "{{.Lang}}";
        const SHOW_TOOL_RESULTS = {{.ShowToolResults }};
        const AGENT_DEBUG_MODE = {{.DebugMode }};
        const PERSONALITY_ENABLED = {{.PersonalityEnabled }};
        const I18N = {{.I18N}};
        /* Prevent theme-flash: apply saved theme before first paint */
        (function () { var t = localStorage.getItem('aurago-theme'); if (t) document.documentElement.setAttribute('data-theme', t); })();
    </script>
    <link rel="stylesheet" href="/css/chat.css">
    <link rel="stylesheet" href="/css/chat-modules.css">

<body class="h-screen h-[100dvh] flex flex-col">

    <header class="app-header">
        <a href="/" class="logo">
            <div class="logo-icon">🤖</div>
            <span class="logo-wordmark-accent">AURA</span><span class="logo-wordmark-base">GO</span>
        </a>
        <div class="header-actions">
            <!-- Theme toggle first (consistent across all pages) -->
            <button id="theme-toggle" class="btn-theme"></button>
            <!-- Always visible on all screens -->
            <span id="tokenCounter" class="pill pill-tokens"></span>

            <span id="budgetPill" class="pill pill-budget">$0.00</span>
            <span id="creditsPill" class="pill pill-budget is-hidden credits-pill-action">💳 $0.00</span>
            <div class="personality-select-wrapper">
                <select id="personality-select" class="select-personality">
                    <option value="" disabled selected></option>
                </select>
                <span class="personality-chevron">▾</span>
            </div>
            <div class="mood-widget" id="moodWidget">
                <button class="mood-toggle" id="moodToggle">
                    <span class="mood-emoji" id="moodEmoji">🧠</span>
                    <span id="moodText"></span>
                    <span class="mood-chevron">▾</span>
                </button>
                <div class="mood-panel" id="moodPanel">
                    <div class="mood-panel-header">
                        <span class="mood-emoji-lg" id="moodPanelEmoji">🧠</span>
                        <span class="mood-label" id="moodPanelLabel"></span>
                    </div>
                    <div id="moodTraits"></div>
                </div>
            </div>
            <span id="debug-pill" class="pill pill-debug"></span>
            <span id="connectionPill" class="pill pill-active"></span>
            <a id="logout-btn" href="/auth/logout" class="btn-header btn-header-link is-hidden"></a>
        </div>
    </header>

    <div id="radialMenuAnchor"></div>

    <main id="chat-box">
        <div id="chat-content">
            <div class="greeting-row" data-greeting>
                <div class="greeting-icon">🤖</div>
                <div class="greeting-text"></div>
            </div>
        </div>
    </main>

    <div id="agentStatusContainer">
        <div class="status-pill">
            <div class="pulsing-dot"></div>
            <span id="agentStatusText"></span>
        </div>
    </div>

    <footer class="app-footer">
        <form id="chat-form" class="input-row">
            <input type="file" id="file-input" class="is-hidden">
            <div class="input-wrap">
                <textarea id="user-input" name="aura-chat-input" autocomplete="off" spellcheck="true" rows="2"
                    placeholder=""></textarea>
            </div>
            <div class="input-actions btn-grid">
                <button type="button" id="clear-btn" class="btn-new-chat" title=""><span class="btn-icon">🔄</span><span class="btn-text"></span></button>
                <div class="action-btns">
                    <button type="button" id="upload-btn" class="btn-upload" title="📎">📎</button>
                    <button type="button" id="voice-btn" class="btn-voice" title="🎤">🎤</button>
                    <button type="button" id="push-btn" class="btn-push" title="🔔">🔔</button>
                    <button type="submit" id="send-btn" class="btn-send" title="➤">➤</button>
                    <button type="button" id="stop-btn" class="btn-stop" disabled title="■">■</button>
                </div>
            </div>
        </form>
        {{if .PersonalityEnabled}}
        <div id="mood-feedback-row" class="mood-feedback-row">
            <button type="button" class="mood-btn mood-positive" data-feedback="positive"
                >👍</button>
            <button type="button" class="mood-btn mood-negative" data-feedback="negative"
                >👎</button>
            <button type="button" class="mood-btn mood-angry" data-feedback="angry">😡</button>
            <button type="button" class="mood-btn mood-laughing" data-feedback="laughing">😂</button>
            <button type="button" class="mood-btn mood-crying" data-feedback="crying">😢</button>
            <button type="button" class="mood-btn mood-amazed" data-feedback="amazed">😲</button>
        </div>
        {{end}}
        <div id="attachment-chip" class="attachment-chip">
            <span>📎&nbsp;</span><span id="attachment-name" class="attachment-chip-name"></span>
            <button type="button" id="attachment-clear" class="chip-clear">✕</button>
        </div>
    </footer>

    <!-- ── Custom Modal ── -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-card">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-message" class="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-cancel" class="modal-btn cancel"></button>
                <button id="modal-confirm" class="modal-btn confirm"></button>
            </div>
        </div>
    </div>

    <script src="/js/chat/audio-player.js"></script>
    <script src="/js/chat/voice-recorder.js"></script>
    <script src="/js/chat/mermaid-renderer.js"></script>
    <script src="/js/chat/drag-drop.js"></script>
    <!-- Chat Modules -->
    <script src="/js/chat/modules/smart-scroller.js"></script>
    <script src="/js/chat/modules/code-blocks.js"></script>
    <script src="/js/chat/modules/voice-recorder.js"></script>
    <script src="/js/chat/modules/drag-drop.js"></script>
    <script src="/js/chat/modules/mermaid-loader.js"></script>
    <script src="/js/chat/main.js"></script>

    <!-- Image Lightbox Overlay -->
    <div id="img-lightbox">
        <button id="img-lightbox-close">&#x2715;</button>
        <img id="img-lightbox-img" src="" alt="">
    </div>

    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="/js/chat/viewport-fix.js"></script>
</body>

</html>
