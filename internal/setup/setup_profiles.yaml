# Pre-configured setup profiles for the AuraGo setup wizard.
# Each profile defines a complete LLM stack. The user only provides:
#   - API Key
#   - Admin Password
#   - Language
# Everything else is auto-configured from the profile.
#
# TTS NOTE: TTS does NOT use the provider system. It has its own config
# structure (tts.provider, tts.minimax.*, tts.elevenlabs.*) and separate
# vault keys. Use the dedicated "tts" block instead of "models.tts".

profiles:
  - id: openrouter
    name: "OpenRouter"
    description: "Access 200+ models from all major providers. Recommended for most users."
    icon: "🌐"
    sort_order: 1
    pricing_label: "Pay-per-use / Free models available"
    pricing_url: "https://openrouter.ai/credits"
    key_url: "https://openrouter.ai/keys"
    key_placeholder: "sk-or-v1-..."
    provider_type: openrouter
    base_url: "https://openrouter.ai/api/v1"
    main_model: "google/gemini-3.1-flash-lite" # Bestes neues, sehr günstiges Modell mit starker Logik
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "google/gemini-3.1-flash-lite"
      whisper:
        model: "google/gemini-3.1-flash-lite"
        mode: "multimodal"
      embeddings:
        model: "nomic-ai/nomic-embed-text-v1.5" # Sehr performant und preiswert auf OpenRouter
      helper:
        model: "deepseek/deepseek-chat" # Extrem günstig (DeepSeek V3/R1 Architektur) und rasant als Helper

  - id: minimax_coding
    name: "MiniMax Coding Plan"
    description: "MiniMax M2.7 token plan with optional High-Speed support. Strong value for creative + agentic code workflows."
    icon: "💻"
    sort_order: 2
    recommended: true
    pricing_label: "Token plan – included models"
    pricing_url: "https://platform.minimax.io/docs/guides/pricing-token-plan"
    key_url: "https://platform.minimax.io"
    alt_key_url: "https://platform.minimaxi.com"
    key_placeholder: "sk-..."
    provider_type: openai
    base_url: "https://api.minimax.io/v1"
    alt_base_url: "https://api.minimaxi.com/v1"
    main_model: "MiniMax-M2.7"
    highspeed_model: "MiniMax-M2.7-highspeed"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: true
      image_generation: true
      music_generation: true
      video_generation: false
    models:
      vision:
        model: "MiniMax-M2.7"
      whisper:
        model: "MiniMax-M2.7"
        mode: "multimodal"
      embeddings:
        model: "minimax-embedding"
      helper:
        model: "MiniMax-M2.1" # Schnellerer, ressourcenschonender Helper der Vorgängergeneration
      image_generation:
        model: "image-01"
      music_generation:
        model: "music-01"
    # TTS uses its own config structure (NOT the provider system)
    tts:
      provider: "minimax"
      model_id: "speech-02-turbo"
      voice_id: "male-qn-qingse"

  - id: alibaba_coding
    name: "Alibaba Coding Plan"
    description: "Alibaba Qwen-Max models with coding optimizations. Strong multi-step reasoning."
    icon: "🛒"
    sort_order: 3
    pricing_label: "Coding plan – included models"
    pricing_url: "https://www.alibabacloud.com"
    key_url: "https://dashscope.console.aliyun.com"
    key_placeholder: "sk-..."
    provider_type: openai
    base_url: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1" # Korrigierter OpenAI-kompatibler Endpunkt
    main_model: "qwen-max" # Aktuelles Flaggschiff der Qwen 3 Serie
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false          # cosyvoice not yet implemented in AuraGo
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "qwen-vl-max"
      whisper:
        model: "qwen-audio-turbo"
        mode: "multimodal"
      embeddings:
        model: "text-embedding-v3"
      helper:
        model: "qwen-plus" # Ideale Balance aus Speed und Performance für Helper-Tasks

  - id: zai_glm_coding
    name: "Z AI GLM Coding Plan"
    description: "Zhipu AI GLM models. Excellent Chinese and English support with stable multi-step reasoning."
    icon: "🧠"
    sort_order: 4
    pricing_label: "Coding plan – included models"
    pricing_url: "https://open.bigmodel.cn"
    key_url: "https://open.bigmodel.cn/usercenter/apikeys"
    key_placeholder: "gl-..."
    provider_type: openai
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    main_model: "glm-4.7" # Neues GLM Modell
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "glm-4v-plus"
      whisper:
        model: "glm-4-voice"
        mode: "multimodal"
      embeddings:
        model: "embedding-3"
      helper:
        model: "glm-4.5-air" # Sehr schnelles und günstiges MoE Modell

  - id: kimi_code
    name: "Kimi Code"
    description: "Moonshot AI Kimi models. Strong coding and extreme long-context capabilities."
    icon: "🌙"
    sort_order: 5
    pricing_label: "Pay-per-use"
    pricing_url: "https://platform.moonshot.cn"
    key_url: "https://platform.moonshot.cn/console/api-keys"
    key_placeholder: "sk-..."
    provider_type: openai
    base_url: "https://api.moonshot.cn/v1"
    main_model: "kimi-k2" # Aktuelle K2 Architektur
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: false
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "kimi-vl-a3b-thinking"
      embeddings:
        model: "moonshot-v1-embedding"
      helper:
        model: "moonshot-v1-32k" # Klassisches, extrem schnelles Kimi Modell für kleine Agenten-Schritte

  # Custom = existing manual setup flow (no auto-config)
  - id: custom
    name: "Custom"
    description: "Configure everything manually. Full control over all settings."
    icon: "⚙️"
    sort_order: 99
    pricing_label: ""
    pricing_url: ""
    key_url: ""
    key_placeholder: ""
    provider_type: ""
    base_url: ""
    main_model: ""
    native_function_calling: false
    default_trust_level: 1
    features:
      vision: false
      whisper: false
      embeddings: false
      helper: false
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
