# Pre-configured setup profiles for the AuraGo setup wizard.
# Each profile defines a complete LLM stack. The user only provides:
#   - API Key
#   - Admin Password
#   - Language
# Everything else is auto-configured from the profile.
#
# TTS NOTE: TTS does NOT use the provider system. It has its own config
# structure (tts.provider, tts.minimax.*, tts.elevenlabs.*) and separate
# vault keys. Use the dedicated "tts" block instead of "models.tts".

profiles:
  - id: openrouter
    name: "OpenRouter"
    description: "Access 200+ models from all major providers. Recommended for most users."
    icon: "🌐"
    sort_order: 1
    pricing_label: "Pay-per-use / Free models available"
    pricing_url: "https://openrouter.ai/credits"
    key_url: "https://openrouter.ai/keys"
    key_placeholder: "sk-or-v1-..."
    provider_type: openrouter
    base_url: "https://openrouter.ai/api/v1"
    main_model: "google/gemini-2.5-flash"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "google/gemini-2.5-flash"
      whisper:
        model: "google/gemini-2.5-flash-lite-preview-06-2025"
        mode: "multimodal"
      embeddings:
        model: "qwen/qwen3-embedding-8b"
      helper:
        model: "google/gemini-2.5-flash-lite-preview-06-2025"

  - id: minimax_coding
    name: "MiniMax Coding Plan"
    description: "MiniMax coding-optimized models with image and music generation. Best value for creative + code workflows."
    icon: "💻"
    sort_order: 2
    pricing_label: "Coding plan – included models"
    pricing_url: "https://www.minimaxi.com"
    key_url: "https://platform.minimaxi.com"
    key_placeholder: "mm-..."
    provider_type: openai
    base_url: "https://api.minimaxi.com/v1"
    main_model: "MiniMax-M1"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: true
      image_generation: true
      music_generation: true
      video_generation: false
    models:
      vision:
        model: "MiniMax-VL-01"
      whisper:
        model: "MiniMax-M1"
        mode: "multimodal"
      embeddings:
        model: "minimax-embedding"
      helper:
        model: "MiniMax-M1"
      image_generation:
        model: "image-01"
      music_generation:
        model: "music-01"
    # TTS uses its own config structure (NOT the provider system)
    tts:
      provider: "minimax"
      model_id: "speech-02-turbo"
      voice_id: "male-qn-qingse"

  - id: alibaba_coding
    name: "Alibaba Coding Plan"
    description: "Alibaba Qwen models with coding optimizations. Strong multilingual support."
    icon: "🛒"
    sort_order: 3
    pricing_label: "Coding plan – included models"
    pricing_url: "https://www.alibabacloud.com"
    key_url: "https://dashscope.console.aliyun.com"
    key_placeholder: "sk-..."
    provider_type: openai
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    main_model: "qwen3-235b-a22b"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false          # cosyvoice not yet implemented in AuraGo
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "qwen2.5-vl-72b-instruct"
      whisper:
        model: "qwen2-audio-instruct"
        mode: "multimodal"
      embeddings:
        model: "text-embedding-v3"
      helper:
        model: "qwen3-30b-a3b"

  - id: zai_glm_coding
    name: "Z AI GLM Coding Plan"
    description: "Zhipu AI GLM models. Excellent Chinese and English support with strong coding."
    icon: "🧠"
    sort_order: 4
    pricing_label: "Coding plan – included models"
    pricing_url: "https://open.bigmodel.cn"
    key_url: "https://open.bigmodel.cn/usercenter/apikeys"
    key_placeholder: "gl-..."
    provider_type: openai
    base_url: "https://open.bigmodel.cn/api/paas/v4"
    main_model: "glm-4-plus"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: true
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "glm-4v-plus"
      whisper:
        model: "glm-4-voice"
        mode: "multimodal"
      embeddings:
        model: "embedding-3"
      helper:
        model: "glm-4-flash"

  - id: kimi_code
    name: "Kimi Code"
    description: "Moonshot AI Kimi models. Strong coding and long-context capabilities."
    icon: "🌙"
    sort_order: 5
    pricing_label: "Pay-per-use"
    pricing_url: "https://platform.moonshot.cn"
    key_url: "https://platform.moonshot.cn/console/api-keys"
    key_placeholder: "sk-..."
    provider_type: openai
    base_url: "https://api.moonshot.cn/v1"
    main_model: "kimi-k2-0711"
    native_function_calling: true
    default_trust_level: 3
    features:
      vision: true
      whisper: false
      embeddings: true
      helper: true
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
    models:
      vision:
        model: "kimi-vl-a3b-thinking"
      embeddings:
        model: "text-embedding-v3"
      helper:
        model: "kimi-k2-0711"

  # Custom = existing manual setup flow (no auto-config)
  - id: custom
    name: "Custom"
    description: "Configure everything manually. Full control over all settings."
    icon: "⚙️"
    sort_order: 99
    pricing_label: ""
    pricing_url: ""
    key_url: ""
    key_placeholder: ""
    provider_type: ""
    base_url: ""
    main_model: ""
    native_function_calling: false
    default_trust_level: 1
    features:
      vision: false
      whisper: false
      embeddings: false
      helper: false
      tts: false
      image_generation: false
      music_generation: false
      video_generation: false
