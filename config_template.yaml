    user_profiling_threshold: 2        # confirmations needed before injecting a trait into prompt
    emotion_synthesizer:
        enabled: false                 # enable emotion synthesis
        min_interval_seconds: 60       # minimum seconds between emotion synthesis runs
        max_history_entries: 100       # max emotion history entries to keep
        trigger_on_mood_change: true   # synthesize when V2 detects a mood change (default: true)
        trigger_always: false          # synthesize on every message (default: false)
    inner_voice:
        enabled: false                 # enable inner voice / subconscious nudge engine (requires emotion_synthesizer + engine_v2)
        min_interval_secs: 60          # minimum seconds between inner voice generations
        max_per_session: 20            # maximum inner voice thoughts per session
        decay_turns: 3                 # inner voice thought expires after N turns
        error_streak_min: 2            # minimum consecutive errors before error-streak trigger fires
