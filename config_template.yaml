        serve_http: false                   # also expose AuraGo web UI over Tailscale (default: join network only)
        expose_homepage: false              # also expose the Homepage/Caddy web server over Tailscale on :8443
        funnel: false                       # expose AuraGo publicly via Tailscale Funnel on :443
        allow_http_fallback: false           # fall back to HTTP on :80 if HTTPS cert is unavailable (disabled by default for security)
