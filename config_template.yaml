    tunnel_name: ""                         # named tunnel: tunnel name from CF dashboard
    account_id: ""                          # Cloudflare account ID (required for named tunnels and API-based noTLSVerify)
    tunnel_id: ""                           # optional: explicit tunnel UUID; used to auto-configure noTLSVerify via API when HTTPS is enabled (leave empty to auto-resolve by tunnel_name)
    loopback_port: 0                        # optional: plain-HTTP port on 127.0.0.1 for cloudflared when HTTPS is active (e.g. 18080). cloudflared uses http://127.0.0.1:<port> instead of the HTTPS endpoint so no TLS verification is needed at all. Zero disables this feature.
    expose_web_ui: true                     # route AuraGo web UI through the tunnel
    expose_homepage: true                   # route Homepage web server through the tunnel
    custom_ingress: []                      # additional ingress rules: [{hostname: "x.example.com", service: "http://localhost:3000"}]
