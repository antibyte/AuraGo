    tailscale_address: ""                                # host/IP for Tailscale mode, e.g. aurago.tailnet.ts.net or 100.x.y.z:8090
    supervisor_url: ""                                   # explicit ws(s):// URL for manual mode, e.g. wss://aurago.example.com/api/remote/ws
    discovery_port: 8092
    max_file_size_mb: 50
    auto_approve: false
    allowed_paths: []                                      # remote file-operation whitelist; empty blocks file reads/writes/lists
    audit_log: true
browser_automation:
    enabled: false
    mode: sidecar
    url: "http://browser-automation:7331"
    container_name: aurago_browser_automation
    image: aurago-browser-automation:latest
    auto_start: true                                         # starts immediately when browser automation is enabled (kept for compatibility)
    auto_build: true
    dockerfile_dir: "."
    session_ttl_minutes: 30
    max_sessions: 3
    allow_file_uploads: true
    allow_file_downloads: true
    allowed_download_dir: browser_downloads
    viewport:
        width: 1280
        height: 720
    headless: true
    readonly: false
    screenshots_dir: browser_screenshots
    cloak_humanize: false                                  # simulate human-like mouse, keyboard and scroll behavior
    cloak_human_preset: default                            # behavior preset: default (normal) or careful (slower)
    cloak_proxy: ""                                        # optional proxy for browser sessions (http://user:pass@proxy:8080)
    cloak_fingerprint_seed: ""                             # fixed seed for consistent browser fingerprint across sessions
space_agent:
    enabled: false
    auto_start: true
    repo_url: "https://github.com/agent0ai/space-agent"
    git_ref: main
    container_name: aurago_space_agent
    image: aurago-space-agent:main
    host: "0.0.0.0"                                      # LAN exposure interface for the published Docker port
    port: 3100
    https_enabled: true                                  # AuraGo-managed HTTPS wrapper for browsers that require secure origins
    https_port: 3101
    customware_path: data/sidecars/space-agent/customware
    data_path: data/sidecars/space-agent/data
    admin_user: admin
    public_url: ""                                        # Optional browser URL; empty derives https://<AuraGo-server-host>:3101 when https_enabled is true
manifest:
    enabled: false
    auto_start: true                                      # starts managed Manifest/Postgres sidecars when enabled
    mode: managed                                         # managed or external
    url: "http://manifest:2099"                           # managed dashboard/API URL from inside AuraGo Docker; use http://127.0.0.1:2099 on bare metal
    external_base_url: "https://app.manifest.build/v1"    # external/hosted OpenAI-compatible Manifest endpoint
    container_name: aurago_manifest
    image: manifestdotbuild/manifest:5                    # pin major version; avoid latest for unattended upgrades
    host: "127.0.0.1"                                     # requested dashboard/API bind address; managed sidecars widen loopback to 0.0.0.0 so the UI link works from another LAN browser
    port: 2099
    host_port: 2099
    network_name: aurago_manifest
    postgres_container_name: aurago_manifest_postgres
    postgres_image: postgres:15-alpine
    postgres_user: manifest
    postgres_database: manifest
    postgres_volume: aurago_manifest_pgdata
    health_path: ""                                       # optional explicit health path; empty probes /health, /api/health, then TCP
    routing:                                              # optional non-breaking routing hints for Manifest header tiers/specificity
      enabled: false                                      # when true, AuraGo may add safe Manifest routing headers to Manifest-provider LLM requests
      specificity_mode: off                               # off, fixed, or auto; auto only sends a header for unambiguous tool-prefix matches
      specificity: ""                                     # fixed mode category, e.g. coding, web_browsing, data_analysis, image_generation
      headers: {}                                         # safe custom headers for Manifest header tiers, e.g. {"x-aurago-task": "coding"}
    # Vault-only fields saved via UI, never config.yaml:
    # api_key: mnfst_...
    # postgres_password: generated/stored in vault
    # better_auth_secret: generated/stored in vault
omniroute:
    enabled: false
    auto_start: true                                      # starts the managed OmniRoute sidecar when enabled
    mode: managed                                         # managed or external
    url: "http://omniroute:20128"                         # managed dashboard/API URL from inside AuraGo Docker; use http://127.0.0.1:20128 on bare metal
    external_base_url: "http://127.0.0.1:20128/v1"        # OpenAI-compatible /v1 URL for an existing OmniRoute endpoint
    container_name: aurago_omniroute
    image: diegosouzapw/omniroute:3.8.39                  # pinned sidecar image
    host: "127.0.0.1"                                     # requested dashboard/API bind address
    port: 20128
    host_port: 20128
    network_name: aurago_omniroute
    data_volume: aurago_omniroute_data                    # persists /app/data
    health_path: "/api/monitoring/health"
    memory_mb: 512
    # Vault-only fields saved via UI, never config.yaml:
    # api_key: copied from OmniRoute after creating an API key in its dashboard
    # initial_password: required before the first managed start
    # jwt_secret: generated/stored in vault
    # api_key_secret: generated/stored in vault
    # ws_bridge_secret: generated/stored in vault
dograh:
    enabled: false
    auto_start: true                                      # starts managed Dograh stack when enabled
    mode: managed                                         # managed or external
    readonly: true                                        # blocks Dograh resource mutations from AuraGo helpers
    allow_test_calls: false                               # reserved for Dograh voice/telephony test helpers
