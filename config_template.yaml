# ── Built-in Tool Permissions ── all enabled, none in readonly mode
tools:
    memory:
        enabled: true
        readonly: false
        ondemand_retrieval:
            enabled: true
            max_essential_memories: 1
            max_available_memories: 6
            max_available_kg_nodes: 6
            max_available_chars: 1600
            dedupe_scope: turn
    knowledge_graph:
        enabled: true
        readonly: false                                      # true = query/search only; blocks manual mutations and optimize pruning
        auto_extraction: true                                # nightly entity extraction from recent conversations
        prompt_injection: true                               # inject relevant graph context into the system prompt
        max_prompt_nodes: 5                                  # max graph nodes injected per prompt
        max_prompt_chars: 800                                # max graph context chars injected per prompt
        retrieval_fusion: true                               # enrich RAG results with related graph context
        min_semantic_similarity: 0.60                        # minimum similarity for KG semantic search
        exclude_node_types: ["activity_entity", "unknown"]   # node types excluded from semantic/prompt context
        semantic_reindex_interval: "5m"                      # minimum interval between dirty-node semantic reindexes
        protect_optimize_sources: ["planner", "inventory_sync", "manual", "file_sync", "core_memory"]  # sources exempt from auto-optimize graph pruning
        protect_id_prefixes: ["core_fact_", "dev_", "contact_"]  # node ID prefixes exempt from auto-optimize graph pruning
        pending_co_mention_ttl_days: 7                       # days before weak pending co-mention edges are cleaned up
        low_confidence_co_mention_min_weight: 2              # minimum co-mention weight shown by default
        hide_low_confidence_by_default: true                 # hide weak auto co-mention edges unless explicitly requested
    secrets_vault:
        enabled: true
        readonly: false
    scheduler:
        enabled: true                                      # global scheduler kill switch; false loads persisted jobs but does not run them
        readonly: false                                     # true allows listing only; existing active jobs keep running
    notes:
        enabled: true
        readonly: false
    missions:
        enabled: true
        readonly: false
    stop_process:
        enabled: true
    inventory:
        enabled: true
    memory_maintenance:
        enabled: true
    wol:
        enabled: true
    web_capture:
        enabled: true                                       # enable web_capture tool (screenshot/PDF via headless Chromium)
    network_ping:
        enabled: true                                       # enable network_ping (ICMP) and port_scanner tools
    network_scan:
        enabled: true                                       # enable mdns_scan tool (mDNS/Bonjour local network discovery)
    form_automation:
        enabled: false                                      # enable form_automation tool (headless browser form fill/submit, requires web_capture)
    upnp_scan:
        enabled: true                                      # enable upnp_scan tool (UPnP/SSDP device discovery on LAN)
    contacts:
        enabled: true                                      # enable address_book tool (contact management)
    planner:
        enabled: true                                      # enable manage_appointments and manage_todos tools (calendar & task management)
    python_secret_injection:
        enabled: false                                     # allow Python tools to request vault secrets via vault_keys (default: disabled for security)
    python_tool_bridge:
        enabled: false                                     # allow Python skills to call native AuraGo tools via HTTP bridge (default: disabled)
        allowed_tools: []                                  # whitelist of native tool names skills may call; empty = none (explicit whitelist required)
        allowed_sql_connections: []                         # SQL connection names allowed for sql_query via tool bridge; empty = block SQL bridge calls
    python_timeout_seconds: 30                             # foreground Python/shell execution timeout
    skill_timeout_seconds: 120                             # skill execution timeout
    background_timeout_seconds: 3600                       # background Python/shell/tool execution timeout before forced termination
    web_scraper:
        enabled: true
        summary_mode: false
        summary_provider: ""                                 # deprecated compatibility field; helper-owned summaries now use llm.helper_*
    wikipedia:
        summary_mode: false
        summary_provider: ""                                 # deprecated compatibility field; helper-owned summaries now use llm.helper_*
    ddg_search:
        summary_mode: false
        summary_provider: ""                                 # deprecated compatibility field; helper-owned summaries now use llm.helper_*
    pdf_extractor:
        enabled: true
        summary_mode: false
        summary_provider: ""                                 # deprecated compatibility field; helper-owned summaries now use llm.helper_*
    document_creator:
        enabled: false
        backend: maroto  # maroto (built-in) or gotenberg (Docker sidecar)
        output_dir: data/documents
        gotenberg:
            url: "http://gotenberg:3000"
            timeout: 120
    media_conversion:
        enabled: false
        readonly: false
        ffmpeg_path: ""
        imagemagick_path: ""
        timeout_seconds: 120
    send_youtube_video:
        enabled: true                                       # show YouTube links as embedded players in Web Chat; disable for privacy-hardened installs
    video_download:
        enabled: true                                       # search/info tool; download/transcribe stay separately gated below
        readonly: false                                     # hard read-only override; when true, download/transcribe are blocked
        allow_download: false                               # opt-in: allow downloading video/audio files
        allow_transcribe: false                             # opt-in: allow downloading audio and running speech-to-text
        mode: docker                                      # docker (default, auto-managed container) or native (requires yt-dlp installed on the host)
        yt_dlp_path: ""                                  # native mode only: optional yt-dlp binary path override; auto-detected if empty
        download_dir: data/downloads                      # project-local directory for downloaded media
        max_file_size_mb: 500                             # maximum downloaded file size in MB (0 = unlimited)
        timeout_seconds: 300                              # per-command timeout in seconds
        default_format: best                              # best, bestaudio, or a custom yt-dlp format string
        max_search_results: 10                            # maximum search results returned to the agent
        container_image: ghcr.io/jauderho/yt-dlp:latest    # Docker image used in docker mode
        auto_pull: true                                   # automatically pull the container image when missing
    browser_automation:
        enabled: false                                     # enable browser_automation tool (CloakBrowser stealth browser sidecar)
    virtual_desktop:
        enabled: false                                     # enable virtual_desktop tool; also requires virtual_desktop.allow_agent_control
    office_document:
        enabled: false                                     # enable office_document tool; also requires virtual_desktop.enabled and allow_agent_control
        readonly: false                                    # read-only mode: allow read only; block write, patch, and export
    office_workbook:
        enabled: false                                     # enable office_workbook tool; also requires virtual_desktop.enabled and allow_agent_control
        readonly: false                                    # read-only mode: allow read/evaluate only; block write, set_cell, set_range, and export
    skill_manager:
        enabled: true                                       # enable the Skill Manager Web UI
        allow_uploads: true                                 # allow users to upload new Python skills
        readonly: false                                     # read-only mode: view skills but no changes
        require_scan: true                                  # require security scan before enabling new skills
        max_upload_size_mb: 1                               # maximum upload file size in MB
        auto_enable_clean: false                            # automatically enable skills that pass security scan
        scan_with_guardian: false                            # use LLM Guardian for code review (opt-in)
        skillspector:
            enabled: false                                  # optional external NVIDIA SkillSpector CLI scanner
            command_path: skillspector                      # executable name or absolute path
            timeout_seconds: 60                             # per-scan timeout
            max_output_kb: 512                              # maximum JSON output captured from the scanner
        # Allowed script languages for Agent Skills (default: ["python"])
        # Bash and JavaScript are supported but require user confirmation (warning-gated)
        # and agent.allow_shell=true at execution time. Python requires agent.allow_python=true.
        # Options: "python", "bash", "javascript"
        # allowed_script_languages:
        #   - python
        # Allow binary asset upload/download for Agent Skills (default: true)
        # allow_binary_assets: true
    daemon_skills:
        enabled: false                                      # enable long-running daemon skill processes (opt-in)
        max_concurrent_daemons: 5                           # max simultaneous daemon processes
        global_rate_limit_secs: 60                          # minimum seconds between any two wake-ups
        max_wakeups_per_hour: 6                             # per-skill circuit breaker threshold
        max_budget_per_hour: 0.50                           # hourly wake-up cost cap in USD
# ── Mission Preparation ────────────────────────────────────────────────────────
# Pre-analyses missions via LLM before execution to produce advisory context
# (tool guides, step plans, decision points, pitfalls). Purely advisory — never blocks execution.
mission_preparation:
    enabled: false                                          # enable mission preparation feature
    provider: ""                                            # provider entry ID; empty = use main LLM provider
    timeout_seconds: 120                                    # LLM call timeout in seconds
    max_essential_tools: 5                                  # max tools to include in preparation guide
    cache_expiry_hours: 24                                  # prepared data cache lifetime in hours
    min_confidence: 0.5                                     # minimum confidence to mark as prepared (0.0 - 1.0)
    auto_prepare_scheduled: true                            # auto-prepare scheduled missions on change
# ── S3-compatible storage ──────────────────────────────────────────────────────
s3:
    enabled: false
    readonly: false                                         # true = only list/download, no upload/delete/copy
    endpoint: ""                                            # e.g. https://s3.amazonaws.com or http://minio.local:9000
    region: "us-east-1"
    bucket: ""                                              # default bucket (optional)
    use_path_style: true                                    # required for MinIO and most S3-compatible services
    insecure: false                                         # allow HTTP (non-TLS) endpoints
    # access_key and secret_key are stored in the encrypted vault — configure via Config UI
# LLM Providers — configure via the Setup Wizard or Config UI
# Supported types: openai, openrouter, ollama, anthropic, google, minimax,
# workers-ai, manifest, omniroute, yepapi, custom, deepseek, groq, mistral, xai,
# moonshot, qwen, zai, llamacpp, lmstudio, copilot, opencode-go
# Example: route through a managed or external Manifest.build gateway.
# Store the mnfst_... API key in the vault via the Config UI.
# providers:
#   - id: manifest
#     type: manifest
#     name: "Manifest Gateway"
#     model: "manifest/auto"
#     capabilities:                                      # optional; omitted or auto=true enables per-model detection
#       auto: true                                       # detect from provider metadata, models.dev registry, and safe heuristics
#       tool_calling: true                               # stored detected/manual value for the current model
#       structured_outputs: false
#       multimodal: false
#       detected_model: "manifest/auto"
#       source: "legacy_fallback"                        # manual, openrouter, oh-my-pi, models.dev, heuristic, legacy_fallback
# Example: route through a managed or external OmniRoute gateway.
# Store the OmniRoute API key in the vault via the Config UI.
# providers:
#   - id: omniroute
#     type: omniroute
#     name: "OmniRoute Gateway"
#     model: "auto"
providers: []
model_catalog:
    enabled: true                                         # use bundled Oh-My-Pi provider/model metadata for UI and capability detection
    disabled_providers: []                                # provider IDs or AuraGo provider types hidden/disabled in catalog status
    catalog_only_visible: true                            # show unsupported upstream providers as read-only catalog entries
    upstream_version: ""                                  # optional note/pin for operators; bundled snapshot metadata remains authoritative
llm:
    provider: ""
    multimodal: false                                      # deprecated fallback only when provider/model capabilities are unknown
    multimodal_provider_types_extra: []                    # legacy fallback: extra provider types treated as multimodal-capable (e.g. ["ollama"])
    helper_enabled: false                                   # recommended: enable a dedicated helper LLM for internal analysis/background features
    helper_provider: ""                                     # if disabled or unset, many helper-dependent features will not work fully
    helper_model: ""                                        # optional override; use a smaller, cost-efficient model here when possible
    use_native_functions: true                              # deprecated fallback only when provider/model capabilities are unknown
    temperature: 0.7
    structured_outputs: false                               # deprecated fallback only when provider/model capabilities are unknown
    anthropic_thinking:
        enabled: false                                   # enable Anthropic "thinking" (only for supported Claude models)
        budget_tokens: 10000                             # tokens reserved for thinking; 0 uses default
        model_allowlist: []                              # optional: exact/prefix allowlist (supports "*" suffix), empty = auto-detect
logging:
    enable_file_log: true
    enable_prompt_log: false                   # write full LLM requests to log/prompts.log (may contain sensitive data)
    log_dir: ./log
meshcentral:
    enabled: false
    readonly: false
    blocked_operations: []
    url: ""
    username: ""
    insecure: false  # Set to true to skip TLS certificate verification (not recommended for production)
maintenance:
    enabled: true
    time: "04:00"
    retention:
        patterns_days: 90
        archive_events_days: 90
        mood_log_days: 30
        error_patterns_days: 7
        profile_stale_days: 30
        done_notes_days: 7
        operational_issues_days: 30
consolidation:
    enabled: true
    auto_optimize: true
    archive_retain_days: 30
    max_batch_messages: 200
    optimize_threshold: 1
    chat_session_limit: 10                               # max chat sessions retained before archival rotation
    stm_retention_messages: 500                          # max STM rows per session before archive+trim (0 = disabled)
    memory_meta_budget: 0                                # max tracked LTM memory_meta rows before nightly eviction (0 = disabled)
    model: ""                                             # optional override; empty = use llm.model for nightly extraction
memory_analysis:
    provider: ""                                          # deprecated compatibility field; helper-owned runtime now uses llm.helper_*
    model: ""                                             # deprecated compatibility field; helper-owned runtime now uses llm.helper_*
    auto_confirm_threshold: 0.92                           # adaptive memory strategy is always active; this only tunes auto-store aggressiveness
    reflection_day: sunday
server:
    host: 127.0.0.1
    port: 8088
    max_body_bytes: 10485760
    debug_pprof: false                              # expose /debug/pprof endpoints for profiling
    https:
        enabled: false
        cert_mode: auto                     # "auto" (Let's Encrypt), "custom" (uploaded cert), "selfsigned" (auto-generated)
        domain: ""
        email: ""
        cert_file: ""                       # custom mode: path to PEM certificate file
        key_file: ""                        # custom mode: path to PEM private key file
        https_port: 443
        http_port: 80
        behind_proxy: false
sqlite:
    short_term_path: ./data/short_term.db
    # Deprecated: long-term memory uses directories.vectordb_dir (chromem), not SQLite.
    # Kept for legacy installs; backups include this file only when it still exists.
    long_term_path: ./data/long_term.db
    inventory_path: ./data/inventory.db
    invasion_path: ./data/invasion.db
    cheatsheet_path: ./data/cheatsheets.db
    image_gallery_path: ./data/image_gallery.db
    remote_control_path: ./data/remote_control.db
    media_registry_path: ./data/media_registry.db
    homepage_registry_path: ./data/homepage_registry.db
    contacts_path: ./data/contacts.db
    planner_path: ./data/planner.db
    virtual_desktop_path: ./data/virtual_desktop.db
    site_monitor_path: ./data/site_monitor.db
    sql_connections_path: ./data/sql_connections.db
    skills_path: ./data/skills.db
    knowledge_graph_path: ./data/knowledge_graph.db
    optimization_path: ./data/optimization.db
    prepared_missions_path: ./data/prepared_missions.db
    mission_history_path: ./data/mission_history.db
    push_path: ./data/push.db
    launchpad_path: ./data/launchpad.db

# SQL Connections — External database connections managed by the agent
# Supports PostgreSQL, MySQL/MariaDB, and SQLite
sql_connections:
    enabled: false
    # Global read-only mode: block all INSERT, UPDATE, DELETE, and DDL queries
    # regardless of connection-level permissions (default: false)
    readonly: false
    # Allow the agent to create, update, and delete SQL connections.
    # When false (default), the agent can only list, get, and test connections.
    # Enable this only if you trust the agent with connection management.
    allow_management: false
    # Maximum number of open connections per database
    max_pool_size: 5
    # Connection timeout in seconds
    connection_timeout_sec: 30
    # Query timeout in seconds
    query_timeout_sec: 120
    # Maximum number of rows returned per query
    max_result_rows: 1000
    # Per-connection rate limiting: minimum seconds between accesses per connection
    # Helps prevent overwhelming external databases with rapid successive queries
    # Set to 0 to disable rate limiting (default: 1 second)
    rate_limit_window_sec: 1
    # Idle connection TTL: evict connections after this many seconds of inactivity
    # Set to 0 to use default (10 minutes)
    idle_ttl_sec: 600

telegram:
    bot_token: ""
    telegram_user_id: 0
    max_concurrent_workers: 5
