# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AuraGo Configuration Template
#  This file is used for fresh installations. On first start, the
#  Setup Wizard will guide you through the initial configuration.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auth:
    enabled: false
    password_hash: ""
    session_secret: ""
    session_timeout_hours: 24
    totp_secret: ""
    totp_enabled: false
    max_login_attempts: 5
    lockout_minutes: 15
agent:
    context_window: 131000
    core_memory_cap_mode: soft
    core_memory_max_entries: 200
    core_personality: friend
    debug_mode: false
    max_tool_calls: 12
    memory_compression_char_limit: 50000
    personality_engine: true
    personality_engine_v2: true
    personality_v2_model: ""
    personality_v2_url: ""
    personality_v2_api_key: ""
    personality_v2_timeout_secs: 120
    tool_output_limit: 50000  # max characters of a single tool result fed into context (0 = unlimited)
    show_tool_results: false
    step_delay_seconds: 0
    system_language: English
    system_prompt_token_budget: 12288
    workflow_feedback: true
    sudo_enabled: false
    # ── Danger Zone ── disabled by default for fresh installs
    allow_shell: false
    allow_python: false
    allow_filesystem_write: false
    allow_network_requests: false
    allow_remote_shell: false
    allow_self_update: false
    # ── Standard API access ── enabled by default
    allow_mcp: true
    allow_web_scraper: true
    # ── Adaptive tool filtering (reduces token usage for tool schemas) ──
    adaptive_tools:
        enabled: false                                              # enable adaptive filtering
        max_tools: 60                                               # max tool schemas sent to LLM (0 = unlimited)
        decay_half_life_days: 7                                     # usage score halves after this many days
        always_include: [filesystem, shell, manage_memory, query_memory, execute_python, docker, api_request]
    # ── Tool guide injection ──
    max_tool_guides: 5                                              # max tool guide documents injected into prompt (default: 5)
budget:
    daily_limit_usd: 1
    default_cost:
        input_per_million: 1
        output_per_million: 3
    enabled: false
    enforcement: warn
    models: []
    reset_hour: 0
    warning_threshold: 0.8
chromecast:
    enabled: false
    tts_port: 8090
circuit_breaker:
    llm_timeout_seconds: 600
    maintenance_timeout_minutes: 10
    max_tool_calls: 20
    retry_intervals:
        - 10s
        - 2m
        - 10m
co_agents:
    circuit_breaker:
        max_tokens: 0
        max_tool_calls: 12
        timeout_seconds: 300
    enabled: false
    llm:
        api_key: ""
        base_url: ""
        model: ""
        provider: ""
    max_concurrent: 3
directories:
    data_dir: ./data
    prompts_dir: ./prompts
    skills_dir: ./agent_workspace/skills
    tools_dir: ./agent_workspace/tools
    vectordb_dir: ./data/vectordb
    workspace_dir: ./agent_workspace/workdir
discord:
    allowed_user_id: ""
    bot_token: ""
    default_channel_id: ""
    enabled: false
    guild_id: ""
docker:
    enabled: false
    host: ""
email:
    enabled: false
    from_address: ""
    imap_host: ""
    imap_port: 993
    password: ""
    smtp_host: ""
    smtp_port: 587
    username: ""
    watch_enabled: false
    watch_folder: INBOX
    watch_interval_seconds: 120
embeddings:
    api_key: ""
    external_model: ""
    external_url: ""
    internal_model: ""
    provider: internal
fallback_llm:
    api_key: ""
    base_url: ""
    enabled: false
    error_threshold: 2
    model: ""
    probe_interval_seconds: 60
home_assistant:
    access_token: ""
    enabled: false
    url: ""
homepage:
    enabled: false
    allow_deploy: false
    allow_container_management: true
    # DANGER ZONE: Allow local Python HTTP server when Docker unavailable
    # Enabling this executes Python directly on the host system (security risk)
    allow_local_server: false
    deploy_host: ""
    deploy_port: 22
    deploy_user: ""
    deploy_path: ""
    deploy_method: sftp
    webserver_enabled: false
    webserver_port: 8080
    webserver_domain: ""
    webserver_internal_only: false
    workspace_path: ""
    # Circuit Breaker Max Calls für komplexe Homepage-Workflows
    # Setzt ein eigenes Tool-Call-Limit wenn Homepage aktiv ist (Standard: 35, max: 100)
    circuit_breaker_max_calls: 35
brave_search:
    enabled: false
    api_key: ""
    country: ""
    lang: ""
koofr:
    app_password: ""
    base_url: https://app.koofr.net
    enabled: false
    username: ""
paperless_ngx:
    enabled: false
    readonly: false
    url: ""
virustotal:
    enabled: false
    api_key: ""
# ── Built-in Tool Permissions ── all enabled, none in readonly mode
tools:
    memory:
        enabled: true
        readonly: false
    knowledge_graph:
        enabled: true
        readonly: false
    secrets_vault:
        enabled: true
        readonly: false
    scheduler:
        enabled: true
        readonly: false
    notes:
        enabled: true
        readonly: false
    missions:
        enabled: true
        readonly: false
    stop_process:
        enabled: true
    inventory:
        enabled: true
    memory_maintenance:
        enabled: true
    wol:
        enabled: false
    web_capture:
        enabled: true                                       # enable web_capture tool (screenshot/PDF via headless Chromium)
    network_ping:
        enabled: true                                       # enable network_ping (ICMP) and port_scanner tools
    network_scan:
        enabled: true                                       # enable mdns_scan tool (mDNS/Bonjour local network discovery)
    form_automation:
        enabled: false                                      # enable form_automation tool (headless browser form fill/submit, requires web_capture)
    upnp_scan:
        enabled: false                                      # enable upnp_scan tool (UPnP/SSDP device discovery on LAN)
    web_scraper:
        enabled: true
        summary_mode: false
        summary_provider: ""
    wikipedia:
        summary_mode: false
        summary_provider: ""
    ddg_search:
        summary_mode: false
        summary_provider: ""
    pdf_extractor:
        enabled: true
        summary_mode: false
        summary_provider: ""
    document_creator:
        enabled: false
        backend: maroto  # maroto (built-in) or gotenberg (Docker sidecar)
        output_dir: data/documents
        gotenberg:
            url: "http://gotenberg:3000"
            timeout: 120
# ── S3-compatible storage ──────────────────────────────────────────────────────
s3:
    enabled: false
    readonly: false                                         # true = only list/download, no upload/delete/copy
    endpoint: ""                                            # e.g. https://s3.amazonaws.com or http://minio.local:9000
    region: "us-east-1"
    bucket: ""                                              # default bucket (optional)
    use_path_style: true                                    # required for MinIO and most S3-compatible services
    insecure: false                                         # allow HTTP (non-TLS) endpoints
    # access_key and secret_key are stored in the encrypted vault — configure via Config UI
# LLM Providers — configure via the Setup Wizard or Config UI
providers: []
llm:
    provider: ""
    use_native_functions: true
    temperature: 0.7
    structured_outputs: false
logging:
    enable_file_log: true
    log_dir: ./log
meshcentral:
    enabled: false
    readonly: false
    blocked_operations: []
    url: ""
    username: ""
    insecure: false  # Set to true to skip TLS certificate verification (not recommended for production)
maintenance:
    enabled: true
    lifeboat_enabled: true
    lifeboat_port: 8091
    time: "04:00"
server:
    host: 127.0.0.1
    port: 8088
    bridge_address: ""
    max_body_bytes: 10485760
    https:
        enabled: false
        cert_mode: auto                     # "auto" (Let's Encrypt), "custom" (uploaded cert), "selfsigned" (auto-generated)
        domain: ""
        email: ""
        cert_file: ""                       # custom mode: path to PEM certificate file
        key_file: ""                        # custom mode: path to PEM private key file
        https_port: 443
        http_port: 80
        behind_proxy: false
sqlite:
    inventory_path: ./data/inventory.db
    invasion_path: ./data/invasion.db
    remote_control_path: ./data/remote_control.db
    long_term_path: ./data/long_term.db
    short_term_path: ./data/short_term.db
    media_registry_path: ./data/media_registry.db
    homepage_registry_path: ./data/homepage_registry.db
telegram:
    bot_token: ""
    telegram_user_id: 0
    max_concurrent_workers: 5
tts:
    elevenlabs:
        api_key: ""
        model_id: eleven_multilingual_v2
        voice_id: ""
    language: en
    provider: google
media_registry:
    enabled: true
vision:
    provider: ""
web_config:
    enabled: true
invasion_control:
    enabled: false
remote_control:
    enabled: false
    readonly: false
    discovery_port: 8092
    max_file_size_mb: 50
    auto_approve: false
    allowed_paths: []
    audit_log: true
indexing:
    enabled: true
    directories:
        - ./knowledge
    poll_interval_seconds: 60
    extensions:
        - .txt
        - .md
        - .json
        - .csv
        - .log
        - .yaml
        - .yml
webdav:
    enabled: false
    password: ""
    url: ""
    username: ""
whisper:
    provider: ""
mqtt:
    enabled: false
    broker: ""
    client_id: aurago
    username: ""
    topics: []
    qos: 0
    relay_to_agent: false
adguard:
    enabled: false
    readonly: false
    url: ""
    username: ""
fritzbox:
    enabled: false
    host: "fritz.box"                       # Fritz!Box hostname or IP (default: fritz.box)
    port: 49000                             # TR-064 SOAP port (default: 49000)
    https: false                            # use HTTPS for TR-064 (port 49443)
    username: "admin"                       # Fritz!Box login username
    # password stored in vault under key "fritzbox_password"
    system:
        enabled: true
        readonly: false
    network:
        enabled: true
        readonly: false
    telephony:
        enabled: false
        readonly: true                      # read-only by default (call lists, phonebooks)
        sub_features:
            call_list: true
            phonebooks: true
            tam: true
        polling:
            enabled: false
            interval_seconds: 60            # how often to check for new calls/messages
    smarthome:
        enabled: false
        readonly: false
    storage:
        enabled: false
        readonly: false
    tv:
        enabled: false                      # only available on Fritz!Box with built-in TV tuner
# ── Additional Integrations ── disabled by default for fresh installs
webhooks:
    enabled: false
    readonly: false
    max_payload_size: 65536
    rate_limit: 0
proxmox:
    enabled: false
    readonly: false
    url: ""
    token_id: ""
    node: ""
    insecure: false
ollama:
    enabled: false
    readonly: false
    url: ""
rocketchat:
    enabled: false
    url: ""
    user_id: ""
    channel: ""
    alias: ""
tailscale:
    enabled: false
    readonly: false
    tailnet: ""
    tsnet:
        enabled: false                      # enable embedded Tailscale node (independent of API integration)
        hostname: aurago                    # MagicDNS hostname → aurago.tailnet-name.ts.net
        state_dir: ""                       # persistent state directory (default: data/tsnet)
        funnel: false                       # expose via Tailscale Funnel (V2 placeholder)
cloudflare_tunnel:
    enabled: false
    readonly: false
    mode: auto                              # "auto" (docker preferred, native fallback), "docker", "native"
    auto_start: true                        # start tunnel automatically when AuraGo starts
    auth_method: token                      # "token" (Connector Token), "named" (credentials.json), "quick" (temporary URL, no account)
    tunnel_name: ""                         # named tunnel: tunnel name from CF dashboard
    account_id: ""                          # named tunnel: Cloudflare account ID
    expose_web_ui: true                     # route AuraGo web UI through the tunnel
    expose_homepage: true                   # route Homepage web server through the tunnel
    custom_ingress: []                      # additional ingress rules: [{hostname: "x.example.com", service: "http://localhost:3000"}]
    metrics_port: 0                         # cloudflared metrics endpoint (0 = disabled)
    log_level: info                         # cloudflared log level: info, debug, warn, error
ansible:
    enabled: false
    readonly: false
    mode: sidecar
    url: ""
    timeout: 300
    playbooks_dir: ""
    default_inventory: ""
    image: ""              # Docker image for sidecar (default: aurago-ansible:latest)
    container_name: ""     # Container name (default: aurago_ansible)
    auto_build: false      # Build image automatically at startup if not found locally
    dockerfile_dir: ""     # Directory containing Dockerfile.ansible (default: ".")
egg_mode:
    enabled: false
    master_url: ""
    shared_key: ""
    egg_id: ""
    nest_id: ""
github:
    enabled: false
    readonly: false
    owner: ""
    default_private: false
    base_url: ""
google_workspace:
    enabled: false
    readonly: false
    gmail: false
    gmail_send: false
    calendar: false
    calendar_write: false
    drive: false
    docs: false
    docs_write: false
    sheets: false
    sheets_write: false
    client_id: ""
onedrive:
    enabled: false
    readonly: false
    client_id: ""     # Azure App Registration (public client) Client ID
    tenant_id: common  # "common", "consumers", "organizations", or tenant UUID
image_generation:
    enabled: false
    provider: ""
    model: ""
    default_size: "1024x1024"
    default_quality: "standard"
    default_style: "natural"
    prompt_enhancement: false
    max_monthly: 0
llm_guardian:
