# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AuraGo Configuration Template
#  This file is used for fresh installations. On first start, the
#  Setup Wizard will guide you through the initial configuration.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auth:
    enabled: true                 # login protection active by default
    session_timeout_hours: 24
    totp_enabled: false
    max_login_attempts: 5
    lockout_minutes: 15
agent:
    context_window: 0             # 0 = auto-detect from provider API at startup
    core_memory_cap_mode: soft
    core_memory_max_entries: 200
    debug_mode: false
    max_tool_calls: 15
    memory_compression_char_limit: 60000
    tool_output_limit: 50000  # max characters of a single tool result fed into context (0 = unlimited)
    show_tool_results: false
    step_delay_seconds: 0
    system_language: English
    system_prompt_token_budget: 12288
    workflow_feedback: true
    sudo_enabled: false
    # ── Danger Zone ── disabled by default for fresh installs
    allow_shell: false
    allow_python: false
    allow_filesystem_write: false
    allow_network_requests: false
    allow_remote_shell: false
    allow_self_update: false
    # ── Standard API access ── enabled by default
    allow_mcp: true
    allow_web_scraper: true
    # ── Adaptive tool filtering (reduces token usage for tool schemas) ──
    adaptive_tools:
        enabled: false                                              # enable adaptive filtering
        max_tools: 60                                               # max tool schemas sent to LLM (0 = unlimited)
        decay_half_life_days: 7                                     # usage score halves after this many days
        always_include: [filesystem, shell, manage_memory, query_memory, execute_python, docker, api_request]
    recovery:
        max_provider_422_recoveries: 3                              # automatic retries after provider-side 422 validation errors
        min_messages_for_empty_retry: 5                             # retry empty LLM responses only when enough conversation context exists
        duplicate_consecutive_hits: 2                               # circuit breaker after repeated identical tool calls in a row
        duplicate_frequency_hits: 3                                 # circuit breaker after repeated identical tool calls overall
        identical_tool_error_hits: 3                                # stop retrying when the exact same tool error repeats
    # ── Tool guide injection ──
    max_tool_guides: 5                                              # max tool guide documents injected into prompt (default: 5)
budget:
    daily_limit_usd: 5
    default_cost:
        input_per_million: 0.4
        output_per_million: 0.7
    enabled: false
    enforcement: warn
    models: []
    reset_hour: 0
    warning_threshold: 0.8
chromecast:
    enabled: false
    tts_port: 8090
circuit_breaker:
    llm_timeout_seconds: 600
    maintenance_timeout_minutes: 10
    max_tool_calls: 20
    retry_intervals:
        - 10s
        - 2m
        - 10m
co_agents:
    circuit_breaker:
        max_tokens: 0
        max_tool_calls: 12
        timeout_seconds: 300
    enabled: false
    llm:
        api_key: ""
        base_url: ""
        model: ""
        provider: ""
    max_concurrent: 3
    specialists:
        researcher:
            enabled: false
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        coder:
            enabled: false
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        designer:
            enabled: false
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        security:
            enabled: false
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        writer:
            enabled: false
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
directories:
    data_dir: ./data
    prompts_dir: ./prompts
    skills_dir: ./agent_workspace/skills
    tools_dir: ./agent_workspace/tools
    vectordb_dir: ./data/vectordb
    workspace_dir: ./agent_workspace/workdir
discord:
    allowed_user_id: ""
    bot_token: ""
    default_channel_id: ""
    enabled: false
    guild_id: ""
docker:
    enabled: false
    host: ""
email:
    enabled: false
    from_address: ""
    imap_host: ""
    imap_port: 993
    password: ""
    smtp_host: ""
    smtp_port: 587
    username: ""
    watch_enabled: false
    watch_folder: INBOX
    watch_interval_seconds: 120
embeddings:
    api_key: ""
    external_model: ""
    external_url: ""
    internal_model: ""
    provider: internal
