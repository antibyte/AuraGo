    readonly: false
    max_payload_size: 65536
    rate_limit: 0
proxmox:
    enabled: false
    readonly: false
    url: ""
    token_id: ""
    node: ""
    insecure: false
ollama:
    enabled: false
    readonly: false
    url: ""
rocketchat:
    enabled: false
    url: ""
    user_id: ""
    channel: ""
    alias: ""
tailscale:
    enabled: false
    readonly: false
    tailnet: ""
ansible:
    enabled: false
    readonly: false
    mode: sidecar
    url: ""
    timeout: 300
    playbooks_dir: ""
    default_inventory: ""
egg_mode:
    enabled: false
    master_url: ""
    shared_key: ""
    egg_id: ""
    nest_id: ""
github:
    enabled: false
    readonly: false
    owner: ""
    default_private: false
    base_url: ""
netlify:
    enabled: false
    readonly: false
    allow_deploy: true
    allow_site_management: false
    allow_env_management: false
