        preset: strict                        # promptsec preset ("strict", "moderate", "lenient")
        spotlight: true                       # use promptsec spotlighting for output isolation
        canary: true                          # use promptsec canaries for manipulation detection
        sanitizer:
            normalize: true                   # unicode normalization
            dehomoglyph: true                 # replace homoglyphs with base characters
            decode: true                      # decode obfuscated payloads (base64, url, hex)
        embedding:
            enabled: false                   # local cosine-similarity guard against known attack vectors
            threshold: 0.65                  # similarity threshold (0.0 - 1.0)
        policy: ""                           # context-aware policy: "", "rag", "support", "coding", "translation", "custom"
        custom_policy:
            disallowed_tasks: []            # only used when policy is "custom"
        taint:
            enabled: false                  # track data provenance / trust levels
