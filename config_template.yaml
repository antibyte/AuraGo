    ui_url: "http://dograh-ui:3010"                       # managed UI URL from inside AuraGo Docker; use http://127.0.0.1:3010 on bare metal
    host: "127.0.0.1"                                     # API/UI bind address for published Docker ports
    api_port: 8000
    api_host_port: 8000
    ui_port: 3010
    ui_host_port: 3010
    api_container_name: aurago_dograh_api
    ui_container_name: aurago_dograh_ui
    postgres_container_name: aurago_dograh_postgres
    redis_container_name: aurago_dograh_redis
    minio_container_name: aurago_dograh_minio
    coturn_container_name: aurago_dograh_coturn
    network_name: aurago_dograh
    api_image: ghcr.io/dograh-hq/dograh-api:latest        # official upstream GHCR image; override for forks/pins
    ui_image: ghcr.io/dograh-hq/dograh-ui:latest          # official upstream GHCR image; override for forks/pins
    postgres_image: pgvector/pgvector:pg17
    redis_image: redis:7
    minio_image: minio/minio:latest
    coturn_image: coturn/coturn:4.8.0
    postgres_user: postgres
    postgres_database: postgres
    postgres_volume: aurago_dograh_pgdata
    redis_volume: aurago_dograh_redisdata
    minio_volume: aurago_dograh_minio
    minio_root_user: minioadmin
    minio_bucket: dograh
    telemetry_enabled: false                              # privacy default for home-lab deployments
    turn_enabled: false                                   # starts optional coturn sidecar when true
    health_path: /api/v1/health
    mcp_client_enabled: true                              # AuraGo -> Dograh via Dograh /api/v1/mcp/
    mcp_server_tool_enabled: true                         # Dograh -> AuraGo via AuraGo /mcp
    aurago_mcp_tool_name: AuraGo
    aurago_mcp_credential_uuid: ""                        # create in Dograh UI for Authorization: Bearer <AuraGo MCP token>
    aurago_mcp_allowed_tools: []                           # optional Dograh tools_filter
    callback_webhook_enabled: true
    callback_webhook_slug: dograh-callback
    # Vault-only fields saved via UI, never config.yaml:
    # api_key: Dograh API key
    # oss_jwt_secret: generated/stored in vault
    # postgres_password: generated/stored in vault
    # redis_password: generated/stored in vault
    # minio_root_password: generated/stored in vault
    # aurago_mcp_token: optional metadata copy, stored in vault
virtual_desktop:
    enabled: true
    readonly: false
    allow_agent_control: false                            # exposes the virtual_desktop tool when tools.virtual_desktop.enabled is also true
    allow_generated_apps: true
    allow_python_jobs: false
    workspace_dir: agent_workspace/virtual_desktop
    max_file_size_mb: 50
    control_level: confirm_destructive                    # confirm_destructive or trusted
    max_ws_clients: 8
    remote_max_session_minutes: 60                         # max SSH/VNC session duration
    remote_idle_timeout_minutes: 5                          # close idle SSH/VNC sessions after this many minutes
    code_studio:
        enabled: true
        image: ghcr.io/antibyte/aurago-code-studio:latest
        auto_start: false                                  # false = lazy start when the app opens
        auto_stop_minutes: 30                              # stop container after inactivity
        max_memory_mb: 4096                                # Docker memory limit
        max_cpu_cores: 2                                   # Docker CPU quota
    openscad:
        enabled: true                                      # built-in headless OpenSCAD compiler container
        image: openscad/openscad:latest
        auto_start: false                                  # false = lazy start when the app renders
        auto_stop_minutes: 20                              # stop container after inactivity
        max_memory_mb: 2048                                # Docker memory limit
        max_cpu_cores: 2                                   # Docker CPU quota
        max_concurrent_jobs: 1                             # render jobs at once
        geometry_backend: auto                             # auto prefers Manifold when the image supports --backend; cgal/manifold force a backend when available
        default_exports: [png, stl]                        # default render output formats
        max_source_kb: 512                                 # maximum uploaded/generated SCAD source size
        max_output_mb: 100                                 # maximum output file size per job
        render_timeout_seconds: 120                        # default compiler timeout
        max_render_timeout_seconds: 600                    # hard timeout cap
        job_retention_days: 7                              # cached render job retention
indexing:
    enabled: true
    directories:
        - path: ./knowledge
          collection: ""                        # optional; empty = default collection "file_index"
    poll_interval_seconds: 60
    chunking:
        strategy: recursive                         # recursive (default) or legacy; changes trigger a clean reindex
        max_chars: 3500                             # target maximum characters per text chunk
        overlap_chars: 200                          # characters repeated between adjacent chunks
        max_chunks_per_file: 200                    # hard cap per indexed file
    extensions:
        - .txt
        - .md
        - .json
        - .csv
        - .log
        - .yaml
        - .yml
        - .pdf
        - .docx
        - .xlsx
        - .pptx
        - .odt
        - .ods
        - .odp
        - .rtf
    index_images: false                         # send images to Vision LLM for analysis and index results
workspace_search:
    enabled: true                                # resident fast search index for the full agent workspace
    max_file_size_mb: 10                         # text files up to this size are indexed for grep
    max_index_size_mb: 256                       # total in-memory text-content budget
    max_results: 100                             # default result limit for workspace_search operations
    poll_interval_seconds: 5                     # background rescan interval; no fsnotify dependency
    fuzzy_threshold: 0.35                        # minimum fuzzy path score for find
    exclude:
        - .git
        - node_modules
        - __pycache__
        - venv
        - .venv
        - .env
        - "*.db"
        - "*.sqlite"
        - "*.sqlite3"
        - vault.bin
        - data/vault.bin
