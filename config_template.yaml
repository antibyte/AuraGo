# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  AuraGo Configuration Template
#  This file is used for fresh installations. On first start, the
#  Setup Wizard will guide you through the initial configuration.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
auth:
    enabled: true                 # login protection active by default
    session_timeout_hours: 24
    require_origin_header: false  # stricter CSRF mode: require Origin on authenticated writes
    totp_enabled: false
    max_login_attempts: 5
    lockout_minutes: 15
agent:
    context_window: 0             # 0 = auto-detect from provider API at startup
    core_memory_cap_mode: hard
    core_memory_max_entries: 80
    debug_mode: false
    max_tool_calls: 15
    memory_compression_char_limit: 60000
    max_concurrent_loops: 8       # maximum concurrent agent loop executions
    tool_output_limit: 50000  # max characters of a single tool result fed into context (0 = unlimited)
    discover_tools_snapshot_ttl_minutes: 5  # minutes to retain discover_tools snapshots (<=0 = default 5)
    show_tool_results: false
    step_delay_seconds: 0
    system_language: English
    system_prompt_token_budget: 0 # 0 = automatic
    adaptive_system_prompt_token_budget: true
    workflow_feedback: true
    sudo_enabled: false
    sudo_unrestricted: false  # allow sudo to write outside the install dir (requires removing ProtectSystem=strict from the systemd unit)

    # ── Output Compression ── reduces token consumption by filtering and
    #    deduplicating verbose tool outputs before they enter the LLM context.
    #    Enabled by default.  tool_output_limit truncation runs BEFORE compression.
    #    See documentation/output_compression.md for details.
    output_compression:
        enabled: true                # master toggle (default: true)
        min_chars: 500               # only compress outputs exceeding this size (default: 500)
        preserve_errors: true        # never compress outputs containing error markers (default: true)
        shell_compression: true      # git, docker, kubectl, go test, pytest, grep, find, ls/tree filters
        python_compression: true     # Python traceback frame filtering and output dedup
        api_compression: true        # JSON null-field removal and compaction for API responses
        repetitive_substitution:     # optional dictionary substitution for repetitive log-like output
            enabled: false           # disabled by default; exact/code-like outputs are skipped
            lzw_enabled: true         # replace long repeated phrases when enabled
            ltsc_lite_enabled: false  # reserved for stricter LTSC-lite, off by default
            min_phrase_chars: 15
            min_occurrences: 3
            min_savings_percent: 15
            max_input_chars: 50000
            max_dictionary_entries: 16
        toon_json:                   # optional TOON-style conversion for known homogeneous API arrays
            enabled: false           # disabled by default; api_request/file reads are skipped
            min_savings_percent: 10
            max_rows: 200
        reversible:
            enabled: true                 # archive original outputs so compact views can be expanded later
            max_age_hours: 24             # cleanup age for archived outputs
            primary_output_vault: true    # store large native outputs as compact views plus output_ref
            max_inline_chars: 6000        # inline outputs up to this size before preferring the vault view

    # ── History Compaction ── compacts older native tool rounds in the live
    #    request while preserving recent full tool-call groups.
    history_compaction:
        enabled: true
        keep_recent_tool_rounds_full: 2

    # ── Danger Zone ── disabled by default for fresh installs
    allow_shell: false
    allow_python: false
    allow_filesystem_write: false
    allow_network_requests: false
    allow_remote_shell: false
    allow_self_update: false
    allow_package_manager: false  # enable structured OS package management (also requires package_manager.enabled)
    # ── Standard API access ── disabled by default for fresh installs (must be explicitly enabled)
    allow_mcp: false
    allow_web_scraper: false
    # ── Adaptive tool filtering (reduces token usage for tool schemas) ──
    adaptive_tools:
        enabled: true                                               # enable adaptive filtering / progressive discovery (default: true)
        max_tools: 10                                               # max adaptive/preferred tool schemas; hard-required and soft always-include tools are added on top (0 = unlimited, default: 10)
        max_total_tools: 20                                         # max final native schemas after hard-required tools are kept (0 = unlimited, default: 20)
        max_schema_tokens: 6500                                     # optional schema token cap for adaptive tools (0 = no extra cap; default: 6500)
        provider_profiles_enabled: true                             # apply provider-specific tool caps and response-header timeout defaults
        session_tool_retention_turns: 8                              # keep tools used in recent turns visible as soft always-include tools
        decay_half_life_days: 7                                     # usage score halves after this many days
        always_include: [filesystem, query_memory, manage_memory, execute_shell]
    recovery:
        max_provider_422_recoveries: 3                              # automatic retries after provider-side 422 validation errors
        min_messages_for_empty_retry: 5                             # retry empty LLM responses only when enough conversation context exists
        duplicate_consecutive_hits: 2                               # circuit breaker after repeated identical tool calls in a row
        duplicate_frequency_hits: 3                                 # circuit breaker after repeated identical tool calls overall
        identical_tool_error_hits: 3                                # stop retrying when the exact same tool error repeats
    background_tasks:
        enabled: true                                               # persistent background task queue for follow_up, cron, and wait events
        follow_up_delay_seconds: 2                                  # small delay so the current response can finish first
        http_timeout_seconds: 120                                   # loopback timeout for background prompt execution
        max_retries: 2                                              # retry failed background prompt executions
        retry_delay_seconds: 60                                     # retry delay for failed background prompt executions
        wait_poll_interval_seconds: 5                               # poll interval for wait_for_event tasks
        wait_default_timeout_secs: 600                              # default timeout for wait_for_event tasks
    # ── Announcement detector ──
    announcement_detector:
        enabled: false                                              # recover structurally incomplete text-only continuations without tool calls
    # ── Reuse-First materialisation ──
    # Controls when the agent automatically creates cheatsheets / skills from successful runs.
    # Without these gates, runs that ended in errors but happened to use words like "fixed" or
    # "resolved" in the final answer would be promoted into "knowledge", creating noise.
    reuse_first:
        auto_materialize: true                                      # master toggle for automatic cheatsheet/skill creation (default: true)
        require_success_signal: true                                # only materialise when no tool errors occurred during the turn (default: true)
        min_steps: 3                                                # minimum number of distinct tool steps required before materialising (default: 3)
        max_artifacts_per_session: 1                                # cap on auto-created cheatsheets+skills per session (default: 1 each)
    # ── Tool guide injection ──
    max_tool_guides: 3                                              # max tool guide documents injected into prompt (default: 3)
    budget:
        daily_limit_usd: 5
        default_cost:
            input_per_million: 0.4
            output_per_million: 0.7
        enabled: false
        enforcement: warn
        models: []
        reset_hour: 0
        warning_threshold: 0.8
chromecast:
    enabled: false
    tts_port: 8090
    media_host_allowlist: []
circuit_breaker:
    llm_timeout_seconds: 600
    llm_per_attempt_timeout_seconds: 120           # per API attempt timeout used inside retry loops
    llm_stream_chunk_timeout_seconds: 30            # abort streaming if no chunk arrives within this window
    maintenance_timeout_minutes: 10
    max_tool_calls: 20
    retry_intervals:
        - 10s
        - 2m
        - 10m
    final_retry_interval: 30s                   # retry delay after configured intervals are exhausted
co_agents:
    circuit_breaker:
        max_tokens: 0
        max_tool_calls: 12
        timeout_seconds: 300
    budget_quota_percent: 25
    cleanup_interval_minutes: 10
    cleanup_max_age_minutes: 30
    enabled: false
    llm:
        api_key: ""
        base_url: ""
        model: ""
        provider: ""
    max_context_hints: 6
    max_context_hint_chars: 180
    max_concurrent: 3
    max_result_bytes: 100000
    queue_when_busy: true
    retry_policy:
        max_retries: 1
        retry_delay_seconds: 5
        retryable_error_patterns:
            - deadline exceeded
            - timeout
            - timed out
            - temporarily unavailable
            - temporary failure
            - rate limit
            - too many requests
            - connection reset
            - connection refused
            - connection aborted
            - broken pipe
            - eof
            - unavailable
            - network is unreachable
    specialists:
        researcher:
            enabled: false
            additional_prompt: ""
            cheatsheet_id: ""
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        coder:
            enabled: false
            additional_prompt: ""
            cheatsheet_id: ""
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        designer:
            enabled: false
            additional_prompt: ""
            cheatsheet_id: ""
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        security:
            enabled: false
            additional_prompt: ""
            cheatsheet_id: ""
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
        writer:
            enabled: false
            additional_prompt: |
                ## Multilingual natural writing defaults

                You are the AuraGo Writer Specialist. Produce text that sounds like a capable human writing in the requested language, not like translated model output.

                Language and audience
                - Write in the task language, or in AuraGo's system language if none is specified. Preserve mixed-language passages unless translation is requested.
                - Match the medium, audience, formality, regional variant, and pronoun convention. For German, preserve Du/Sie when implied. For languages with script-specific punctuation, use natural native punctuation.
                - If the task is a rewrite, preserve meaning, facts, names, numbers, structure, and the author's intent. Do not add claims, citations, or biographical filler.

                Voice calibration
                - If a writing sample or existing draft is provided, mirror its register, rhythm, paragraph length, terminology, and punctuation habits. Do not upgrade casual wording into corporate prose.
                - If no sample is provided, write plainly with varied sentence length, concrete detail, and a natural rhythm suitable for the genre.

                AI-pattern cleanup
                - Remove formulaic openings and closings, excessive politeness, generic upbeat conclusions, over-signposting, forced three-part lists, vague authority claims, inflated significance, promotional adjectives, needless hedging, passive actor hiding, synonym cycling, and abstract filler.
                - Prefer direct verbs, specific nouns, named sources when available, and simple sentence shapes.
                - Do not use English-only rules blindly. Dashes, title case, punctuation, sentence length, and paragraph shape must follow the target language and medium.
                - Avoid repeated decorative dashes, emojis, bold labels, and inline header lists unless they are normal for the requested format.
                - Remove translationese: word-for-word calques, unnatural connector stacking, English idioms transplanted into another language, and register shifts that native speakers would notice.

                Safety and honesty
                - Do not invent facts, citations, quotes, dates, or personal details. If something is unknown, say so briefly or omit it.
                - Do not claim text was written by a human or help evade disclosure rules. The goal is clear, natural writing, not deception.

                Process
                - Internally do a quick pass: draft, check what still sounds generic or model-like, then revise.
                - Return only the final usable text unless the main task asks for analysis, options, or an edit report.
            cheatsheet_id: ""
            llm:
                provider: ""
            circuit_breaker:
                max_tool_calls: 0
                timeout_seconds: 0
                max_tokens: 0
