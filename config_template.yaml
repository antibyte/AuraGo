            enabled: false                  # enforce prompt structure (sandwich defense)
            mode: sandwich                  # sandwich, xml, random
        llm_judge:
            enabled: false                  # escalate uncertain detections to LLM Guardian
            mode: uncertain                 # uncertain, always, threat_detected, no_threat
            timeout_secs: 2                 # max wait for judge response
